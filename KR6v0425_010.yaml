body:
  text: 清石埭楊文會仁山註子曰學而時習之不亦說乎有朋自遠方來不亦樂乎人不知而不慍不亦君子乎開章言學須知為學之方詳在大學前篇孔子自言下學而上達誠為學之正軌也時時習之日有進益以期造乎至善之地則中心喜悅可知矣朋自遠來同聲相應同氣相求也其樂何如設人不知而內自慍是謂徇人則非君子之道矣有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與有子此言以孝弟治天下得聖門一貫之旨也子曰禘自既灌而往者吾不欲觀之矣灌所以降神誠無感通神不來格此祭便成虛設故不欲觀祭如在祭神如神在子曰吾不與祭如不祭兩如字最妙記者因聞孔子之言而知孔子祭時有此種觀境也子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也維摩經中三十二菩薩皆以對法顯不二法門六祖壇經以三十六對顯禪宗妙義子貢聞一知二者即從對法上知一貫之旨也若顏子聞一知十者乃證華嚴法門也經中凡舉一法即具十門重重無盡名為圓融法界子貢能知顏子造詣之深復能自知修道分齊故孔子印其弗如而與之也子曰默而識之學而不厭誨人不倦何有於我哉下文夫子自許為之不厭誨人不倦此章何有於我之句疑傳寫有誤子謂顏淵曰用之則行舍之則藏惟我與爾有是夫意必固我四者皆無故用行舍藏無可不可孔子獨許顏子非他人所能也子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲此章與顏子簞瓢陋巷之樂相同故知孔顏心心相印也葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾孔子所用是直心直心者純而不雜非如世人雜慮交攻之心也子釣而不綱弋不射㝛時人有設綱與射㝛者孔子輒止之釣與弋未嘗禁也門下士因悟孔子接引學徒之方遂記此二言觀陳亢問伯魚一章便可知矣一部論語中弋釣之機時時有之乃至古今聖賢莫不如是禪門所謂垂釣看箭亦此意也近世以傳教為務者則設綱射㝛矣子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也自修化人皆無限量所以不居聖與仁者剗其朕迹也公西華窺見一斑知非淺境故生敬仰曾子有疾召門弟子曰啟予足啟予手詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子菩薩現身人道欲護持在家律儀毫無違犯難之又難也曾子冰淵自懍至臨終時方知得免若據此章便謂儒家修己局於一生死後無事亦淺之乎測純儒矣子絕四毋意毋必毋固毋我此四病一切學者均須除盡但學有淺深則除有先後四者之中以我為根我病若除則前三盡絕矣子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉楊子讀論語至此合掌高聲唱曰南無大空王如來聞者驚曰讀孔子書而稱佛名何也楊子曰子以謂孔子與佛有二致乎設有二致則佛不得為三界尊孔子不得為萬世師矣論語一書能見孔子全體大用者唯此章耳夫無知者般若真空也情與無情莫不以此為體雖遇劣機一以本分接之蓋鄙夫所執不出兩端所謂有無一異俱不俱常無常等法孔子叩其兩端而竭其妄知則鄙夫當體空空與孔子之無知何以異哉將欲顯示根本無分別智先以有知縱之次以無知奪之雖下劣之機來問於我亦以真空接之空空如也四字形容得妙世人之心不出兩端孔子以空義叩而竭之則鄙夫自失其妄執而悟真空妙諦矣食不厭精膾不厭細厭麤而喜精人之常情也矯枉過正者厭精而就麤孔子既不厭麤復不厭精但可食則食之而已廄焚子退朝曰傷人乎不問馬此章各家註解均未達其意一者解不問馬之言謂孔子貴人而賤畜不合埋馬以帷之義二者以不字連上讀謂先問人而後問馬似覺有理然亦尋常之事門人所不記也當知廄中本自無馬馬從朝中駕車而歸孔子見廄已焚只問傷人一語絕無詰責之辭門人見其不動聲色異而記之後人妄添不問馬三字遂使意味索然也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死子路就遠處問孔子就當處答大似禪機蓋子路忿世俗以欺詐事人問其事鬼神亦容得欺詐否故孔子答以既不能事人亦不能事鬼子路又問此等人死後如何孔子答以生不成為生死亦不成為死復次子路問事鬼神意謂幽冥之道與人世有別也孔子答意能盡事人之道即與事鬼神無別也又問死意謂死後無跡可尋一靈真性向何處去孔子答意當知生時靈性何在便知死後不異生時也點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與點也鼓瑟所以調心當孔子與羣賢問答之時曾晢鼓瑟未停可見古人用功無片刻間斷也問言將及鏗爾舍瑟何等雍容自在不待出言已知其涵養功深矣三子皆言經世曾晢獨言潔己所以異也下文言志當以表法釋之暮春者喻人生壯盛之時也春服既成者喻為學之方漸有成效也冠者五六人童子六七人引導初機循序而進不拘長幼偕行也浴乎沂者滌除麤垢也風乎舞雩者消散細惑也詠而歸一唱三歎以復其性之本然也夫子喟然歎曰吾與點也如六祖印懷讓云汝如是吾亦如是曾晢之言正心修身道之體也三子之言治國平天下道之用也有體方有用聖門所重者在修己之道耳顏淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顏淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顏淵曰回雖不敏請事斯語矣己者七識我執也禮者平等性智也仁者性淨本覺也轉七識為平等性智則天下無不平等而歸於性淨本覺矣蓋仁之體一切眾生本自具足祗因七識染污意起俱生分別我執於無障闇中妄見種種障闇若破我執自復平等之禮便見天下人無不同仁此所以由己而不由人也顏子既領此意便問修習之方孔子令其在視聽言動上淨除習氣稍違平等性便是非禮即須治之顏子心領神會便請從事矣季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正子帥二語不但答季康子即為天下後世為人上者之針砭也季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊此言直指季康子為盜魁季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃子為政一語如驚天之雷指示季康子以絕大作用以上三章孔子見得季康子是個人方施此等鍵椎可惜當機不知痛癢然較今之從政者則遠勝矣今時執政前無人敢發此語儻答一次決無再問三問也樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼樊遲見得世無可為遂欲高蹈棄世作獨善之計然猶不敢自決故請學稼孔子以旁機答之復不甘心又請學圃孔子仍以旁機答之樊遲心折而出矣孔子以小人斥之者斥其捨離兼善之心也孔子行菩薩道不許門人退入二乘其慈悲行願有如此者子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成學佛者亦須知此意欲速則不能通達深義見小利或貪味禪或求小果則不能成就無上菩提子曰賢者辟世其次辟地其次辟色其次辟言孔子見去位者多而歎之然孔子則未嘗辟也辟世之言解之者均是辟地非辟世也必須斷三界結使證獨覺道方稱辟世身雖在世而心已離世矣然非上智者不能其次則有三等程子謂四者無有優劣非也子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與形容孔子至此言而盡矣胡氏謂晨門以是譏孔子不但不知晨門亦併不知孔子蓋孔子不論可不可但盡其在我而已子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫己知也斯已而已矣深則厲淺則揭子曰果哉末之難矣聞擊磬而歎有心可謂孔子之知音矣下文以自了漢期孔子實未知孔子之用心也斯已而已之語所謂要了便了不必遲回煩惱深流猛厲而過虛妄淺流輕揭而度何不早登彼岸耶孔子輕小果而不為故笑而置之子曰性相近也習相遠也此性應指八識起妄之原也起處甚微細所以相近及乎習於善惡則千差萬別愈趨而愈遠矣子曰予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孔子終日言而未嘗言終日不言而未嘗不言忽以予欲無言四字微示其意子貢名言習氣未忘以為非言則無以述孔子復云天不言而時行物生以喻大道之妙若會其意則知孔子常在世間入一切眾生心中隨機化導何有生死去來之相耶章末復加天何言哉一語其悠揚詠歎之致令子貢心領而神會也
