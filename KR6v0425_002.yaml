body:
  text: 馬鳴菩薩造陳真諦三藏譯清楊文會略註大宗地者一切法門之總綱如地發生萬物義理深微故稱玄文千枝萬葉從此分佈故名為本論者決擇徵釋翼贊佛經也又本論之外應有釋論以伸其義惜未傳來歸依德處無邊大決擇分第一頂禮一切無餘明非一非一諸則地不數不思無量一并諸種種趣生類本無量數斷命品與等塵塵無有法兼不可說無所有通俱非是等諸法論曰就此二行偈中天竺偈頌八字成句四句為一偈貝葉梵文橫書三十二字作一行譯成漢文五字七字不等亦以四句為一行偈則有八門云何為八一者顯示中中主者門二者顯示道路軌則門三者顯示離雜合一門四者顯示無邊毛生門五者顯示種種離識門六者顯示假有無實門七者顯示無所有事門八者顯示具足無礙門是名為八思議所及處并所不及處無非歸依德處則能歸所歸融合為一十界依正悉入自心所造之論攝盡十方三世一切佛法無欠無餘後生何幸而能得此妙典耶就顯示中中主者門中則有五種佛寶云何為五一者隨順隨轉應身主者二者有無無礙變身主者三者本體本性法身主者四者本末俱絕滿道主者五者隨應無礙自然主者是名為五以上開三身為五身一是生身二是變化身此二是應身三是法身四是自受用身五是他受用身此二是報身下文引經第一修集行因大陀羅尼脩多羅中作如是說爾時花輪寶光明天子則白佛言世尊第一導師有幾數量可思議不可思議惟願世尊為我等眾開示顯說我等大眾聞其名字常誦常念出無明藏到涅槃城於是世尊告天子言我若以神通力無量無邊阿僧祇劫中說其名字終不能盡今當略言為汝等眾宣說其要善男子其覺者數廣大圓滿過於恆沙略說五種云何為五一者隨體佛二者變體佛三者法體佛四者莫測佛五者應轉佛乃至廣說故如偈頂禮一切無餘明故以何義故一切導師皆名主者以三義故云何為三一者自在義諸法王故佛為法王於法自在二者頂上義三界一故天上天下唯佛獨尊三者周徧義無所不至故毘盧遮那徧一切處是名為三如是已說顯示中中主者門次當說顯示道路軌則門法寶就此門中則有六種云何為六一者音䐡言導無礙自在軌則二者所依本地平等一種離諸虛妄軌則三者生長莊嚴一一有力軌則四者究竟圓滿無餘盡攝軌則五者非名非相非體非用無造無作軌則六者自然現前常住不變無所詮了究竟淨滿軌則是名為六第三分中所說五種本位以此中一二兩法為第三周徧圓滿廣大位以第三法為第一無超次第漸轉位以第四法為第二無餘究竟總持位以第五法為第四一切諸法俱非位以第六法為第五一切諸法俱是位此六彼五開合應知引經第二金剛三昧無礙解脫本智實性脩多羅中作如是說復次文殊師利若我廣說總有十億七萬三千五十法門行者履遊道路則則若我略說總有六種行者履遊則則如是六則通攝一切無量無邊軌則藏海云何為六一者說則二者等則三者種則四者上則五者非則六者常則乃至廣說故如偈非一非一諸則地故以何義故一切法藏皆名軌則以三義故云何為三一者金區義時人易轉法門之印常恆不變如彼區故二者引導義攝將行者令趣治路如彼導故三者能持義善持自相而不壞失如彼持故是名為三如是已說顯示道路軌則門次當說顯示離雜合一門僧寶就此門中則有三種云何為三一者結縛合一一切無量無邊無明煩惱之眾類再生雖無內合一而有外合一以數量等成立契一義故凡僧二者解脫合一一切無量無邊三乘諸聖人等內有道理之合一義外有同塵之合一義故三乘聖僧三者具足俱非合一一切無量無邊金剛中間大聖眾等具足能契所契之二義故一乘聖僧是名為三引經第三文殊師利論義第一無極無盡脩多羅中作如是說僧眾之海雖無有量而其本體但有三種云何為三一者無根無諍地二者俱根無諍地三者有根無諍地乃至廣說故如偈不數不思無量一故以何義故一切諸僧皆名合一有二義故云何為二一者積集義集會無量無邊一切散亂塵故身合一二者一種義安止無量無邊一切波浪識故心合一是名為二如是已說顯示離雜合一門次當說顯示無邊毛生門有情就此門中則有三門云何為三一者有類毛生無邊門二者空類毛生無邊門三者似類毛生無邊門是名為三就初門中則有四種云何為四一者卵生二者胎生三者溼生四者化生是名為四如是四生能攝一切無量有類根本名數就中門中則有三種云何為三一者光明中藏空類二者闇色中藏空類三者風雲中藏空類是名為三中藏者在內安住也如是三類空故非空身如虛空非頑冥空以隱故空隱而不現故名為空應審觀察空類眷屬其數眾多不出此量就後門中亦有三種云何為三一者幻化呪術相相無理似類二者變藥方禁相相無理似類上之二類雖有相相而不合理故名似類三者隨本現前影像似類本人妄想所現影像雖現在前而非實有亦名似類是名為三如是三類能攝一切無量無邊種種似類根本名數引經第四集類法門脩多羅中作如是說有識種類廣說有十略說有三云何為三一者心識親近在有眾生二者處所隱藏不見眾生三者識遠似有動轉眾生是名為三乃至廣說故如偈并諸種種趣生類故以何義故一切眾生皆名毛生有二義故云何為二一者動轉不定義隨趣受生無有定法故二者眾多無數義方角無有數量故是名為二今此門中為欲現示聖如角尠凡如毛多故如是已說顯示無邊毛生門次當說現示種種離識門無情就此門中則有二種云何為二一者共業建立斷命品二者別業建立斷命品是名為二就第一門中則有四種云何為四一者風輪大地斷命品二者水輪大地斷命品三者金輪大地斷命品四者火輪大地斷命品是名為四如是四輪能攝一切無量無邊共業建立斷命品類根本名數言別業建立斷命品者謂眾生身非執受攝髮毛等類引經第五業行本因脩多羅中作如是說復次文殊師利言眾生居住世間者則有二種云何為二一者總輪世間二者別持世間是名為二此二世間善能攝持無量無邊一切居住依止世間乃至廣說故如偈及無量數斷命品故以何義故一切離識皆名斷命所謂無有了別智品故如是已說現示種種離識門次當說現示假有無實門假有就此門中則有五種云何為五一者如水中月假有二者如闥婆城假有三者如陽炎水假有四者如幻化作假有五者如谷響音假有是名為五引經第六大寶無盡蓮華地地脩多羅中作如是說如水中月等五種虛說譬喻總攝五萬五千五百五十詮虛說譬喻根本名字乃至廣說故如偈與等塵塵無有法故以何義故一切無量虛說譬喻皆名無有所謂無有實自性故名曰為無無有其實非都無故名曰為有如是已說現示假有無實門次當說現示無所有事門空無就此門中則有四種云何為四一者如石女兒無所有事二者如兔馬角無所有事三者如龜䠓七由切同鰌魚名毛無所有事四者如羅漢染無所有事是名為四引經第七本地脩多羅中作如是說復次佛子汝前所問何等法名為無所有品者石女兒等四種本說我若廣說其數無量乃至廣說故如偈兼不可說無所有故以何義故一切空法皆悉名為無所有事有二種故云何為二一者彼空法體性空空如此四本說故二者此空若不詮彼則是空故假此空法以詮他法之空若不詮彼則此空本無是名為二如是已說現示無所有事門次當說現示具足無礙門普融就此門中則有十種云何為十一者心主法二者心念法三者色主法四者色子法五者非契應法六者無為法七者非有為非無為法八者亦有為亦無為法九者俱俱法十者俱非法是名為十言心主法者可一八識等諸心識本法故言心念法者與此相應一切數法言色主法者可一能造大種法等言色子法者可一所造種種色法言非契應法者可一非色非心種種諸法言無為法者虛空等四種無為法言非有為非無為法者一心等諸本性法言亦有為亦無為法者一心等諸本性之法作業用相言俱俱法者大本之法其第一分言俱非法者大本之法其最後分如是十法今此門中一有一無一生一滅一逆一順一品一類不相捨離是故說言現示具足無礙門焉此門統攝一切諸法為本論之綱要故歸依德處總匯於茲引經第八最勝德王廣大虛空脩多羅中作如是說不可說不可說不可說十方世界微塵之數無量無邊法門大海一居一起一住一止終不分剖亦不捨離以此義故建立稱曰廣大圓滿虛空地地無盡無極法界大海門乃至廣說故如偈通俱非是等諸法故歸依德處因緣大決擇分第二如是已說歸依德處無邊大決擇分次當說歸依德處因緣大決擇分其相云何偈曰以有十種大因緣造作歸依德處海所謂禮恩及加力廣大殊勝與無我決定大海并贊化兼通現示自本身如是十種大因緣圓滿大士乃能具凡非境聖亦非量隨分菩薩亦不能論曰何因緣故歸依德處以有十種大因緣故而作歸依如偈以有十種大因緣造作歸依德處海故云何名為十種因緣一者禮敬尊重甚深因緣能作禮敬歸依德處摧伏憍慢增長善根故如偈禮故二者憶念恩澤報推因緣而能造作勝妙論教開曉一切狂亂眾生一切德處皆悉歡喜故如偈恩故三者仰請加力成為因緣若為造作大論法門彼諸德處不以加力不能分別法門海故如偈及加力故四者開布廣散令了因緣以妙言辭示聰明詮現了彼諸脩多羅中祕密微妙深遠文義大海為令廣大故如偈廣大故五者勸物令生殊勝因緣造作論教開示文義若不歸依彼諸眾生不能究竟信受奉行故如偈殊勝故六者修習忍辱無我因緣發起歡喜尊重歸向廣大心故如偈與無我故七者出生功德決定因緣歸依德處造作論教若見若聞若見見者若聞聞者若同國住一切皆悉隨時不移出生增長無量無邊一切功德善根之品決定決定不謬違故如偈決定故八者大海無盡寶藏因緣積集無量無邊一切諸種種力造作殊勝圓滿大海如意寶輪金剛德藏為欲救度無量無邊貧窮苦惱眾生類故如偈大海故九者方便善巧教化因緣具足者中雖無別歸而贊教化為利生故如偈并贊化故十者現示過去本身因緣所歸德處一切皆悉無非自身之攝持故如偈兼通現示自本身故菩薩融三世間以為自身所謂聲聞身緣覺身菩薩身如來身法身智身此六是智正覺世間業報身眾生身此二是有情世間國土身虛空身此二是器世間是名十種大因緣相如是廣大殊勝因緣何人所作佛菩薩作菩薩菩薩當不能作况凡二乘如偈如是十種大因緣圓滿大士乃能具凡非境聖亦非量隨分菩薩亦不能故此論從一信心具餘五十位又位位中具金剛五位是名佛菩薩亦名圓滿大士東土談教義者以十住初心便成正覺為圓頓極則馬鳴大士則言信位便該果海實大法東來所未聞也菩薩菩薩者漸教三賢十聖位位別修不能一位攝一切位故名隨分菩薩若一念與真際相應則轉偏成圓轉漸成頓矣凡者六道眾生也二乘者聲聞緣覺也雖證聖道祇名小果耳以上序分竟以下正宗分一種金剛道路大決擇分第三唯此一乘無二無三故稱一種究竟堅固不可破壞喻如金剛千聖所由縱橫無礙名為道路如是已說歸依德處因緣大決擇分次當說一種金剛道路大決擇分其相云何偈曰一種金剛地總有五種位謂漸次究竟及圓滿等非并及等是位如是五種位諸脩多羅中具足無餘說論曰一種金剛道路無礙本地地中總有幾位廣說雖無量略說有五種如是五位一切總則一切根本一切中藏一切出生如偈一種金剛地總有五種位故云何名為五種本位一者無超次第漸轉位二者無餘究竟總持位三者周徧圓滿廣大位四者一切諸法俱非位五者一切諸法俱是位是名為五種根本位第一第五兩位就生滅門說第二第四兩位就真如門說第三一位真如生滅二門和合說如偈謂漸次究竟及圓滿等非并及等是位故如是五位自家宣說龜則方說上問下答如是五位直是方說非宣說量自家宣說者隨意發揮應機無定也龜則方說者佛佛道同古今一致也如偈如是五種位諸脩多羅中具足無餘說故位所依止本數名字其相云何偈曰所依止本數總有五十一謂虛假光明四十種名字不動真金剛十種本名字及大極地故是名所依數論曰五種本位所依止之名字差別其數幾有廣說雖無量略說有五十一種名字如是五十一種根本名字一切天地一切父母一切體性一切所依天為日月星辰所依地為人物草木所依父母為有情所從生體性為形色之本元舉此數者皆為一切世法之所依以喻五十一根本位為一切佛法之所依別一解云五十一種根本名字為一切萬物之天地一切有情之父母一切形色之體性一切法門之所依也如偈所依止本數總有五十一故若非根本五十一位則金剛五位無所依止以論中所闡重在金剛五位故先列之次列五十一位以為依止猶如一經一緯相織而成一幅雜華雲錦也云何名為五十一數所謂虛假光明分中有四十種真金剛中有十種數此五十中加大極自然陀羅尼地故是故成立五十一數此分初列根本五十一位以地前四十心名為虛假光明地上十心名為真金剛且依通途教義而言自第七分至論終則五十一種皆名真金剛位方顯此論之玄宗蓋一信心即具五十一位因果交徹非若他宗判十信為內凡住行向為三賢地上為十聖天地懸隔也華嚴論疏說初住成佛攝四十二位以十信為相似覺未入分證位此論則以信心統攝真金剛位誠圓中之圓頓中之頓也名字分中四十種數當何等相所謂十種愛樂心十種識知心十種修道心十種不退心各差別故云何名為十愛樂心十信一者必叉多信心二者阿摩訶尸念心三者諦度毘梨耶精進心四者和羅只度慧心五者奢摩陀提尸定心六者摩訶阿毘跋致多不退心七者阿羅婆訶尼回向心八者婆𡄣多阿梨羅訶諦護法心九者尸羅俱尸阿尸羅戒心十者摩訶毘呵阿僧那願心是名為十云何名為十識知心十解亦名十住一者留伽度發心住二者留諦迦度治地住三者留羅伽修行住四者留摩訶生貴住五者安婆娑方便具足住六者毘跋致正心住七者阿毘跋致不退住八者必叉伽童真住九者必阿羅法王子住十者留山迦灌頂住是名為十云何名為十修道心十行一者度伽呵歡喜行二者度安爾饒益行三者度只羅無瞋恨行四者度和差無盡行五者度利他離癡亂行六者度生婆諦善現行七者度沙必無著行八者度阿訶尊重行九者度佛阿善法行十者度叉一婆真實行是名為十云何名為十不退心十迴向一者羅諦流沙救護一切眾生迴向二者羅曇沙不壞迴向三者必自伽等一切佛迴向四者法必他至一切處迴向五者佛度陀無邊功德藏迴向六者羅叉必隨順平等善根迴向七者師羅文伽隨順等觀一切眾生迴向八者婆訶諦真如相迴向九者婆羅提弗陀無縛解脫迴向十者達摩邊伽法界無量迴向是名為十如偈謂虛假光明四十種名字故云何為十真金剛心十地一者鳩摩羅伽逆流歡喜地二者須何伽一婆道流離垢地三者須那迦流照明地四者須陀洹觀明燄地五者斯陀含度障難勝地六者阿那含薄流現前地七者阿羅漢過三有遠行地八者阿尼羅漢變化生不動地九者阿那訶訶慧光妙善地十者阿訶羅弗明行足法雲地是名為十如偈不動真金剛十種本名字故此五十中更復加婆伽婆佛陀妙覺者無上地應審觀察是名五十一種名字如偈及大極地故是名所依數故如是五十一種心中彼無超次第漸轉位安立屬當其相云何偈曰五十一位中如次無超轉一中具一切名為漸轉位論曰唯一行者五十一種別相位中迴向趣入如其次第無超過法所以者何此門位量法如是故如偈五十一位中如次無超轉故如是行者以何行相而漸漸轉謂具具轉故云何名為具具轉相謂一信心位中具餘五十心而轉乃至一大極地位中具餘五十心而轉故若爾一物耶異物耶上問下答實是異物而一物故所以者何一信心中具一切位非餘位故而一信中具一切位同餘餘位中具一切位故以何義故一信心中具諸餘位更須漸轉上問下答具一中具而不能具多中具故是故須轉今此門中五十一中一切具具皆悉具足方名漸轉位故如偈一中具一切名為漸轉位故引經第九摩訶衍金剛種子脩多羅中作如是說金剛道路足行行者以二大事而決定轉云何名為二決定轉一者徧度通達轉二者具具增長轉是名為二言徧度通達轉者通徧經過五十一種大道路故言具具增長轉者一一位中攝諸位故乃至廣說故別教一乘迥異三乘故名唯一行者五十一位位位圓具次第漸轉無超過法是聖教之綱宗也華嚴經中純談此義行布圓融圓融行布即漸即頓亦權亦實若非此位則一切佛法無可安立故居五位之首此段文義甚為精妙悉心體究自能通達不煩委釋一切經中凡說多劫修行位位圓證者皆屬此門如是已說無超次第漸轉門次當說無餘究竟總持門其相云何偈曰五十一位中隨其先得入攝一切一切名無餘究竟隨入一位即全彰性德所謂以少方便疾得菩提也論曰有五十一別相位中或有行者以信趣入楞嚴經五陰盡時能入菩薩金剛乾慧即超十信十住十行十向十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得豈非從乾慧地徹於究竟乎有人判乾慧地亦在信位即是以信趣入也或有行者以真金地而趣入楞嚴經觀音圓通判位應在初住而佛果妙用一時現前豈非無餘究竟乎古德亦有判作初地者是以真金地而趣入也或有行者以大極地而趣入達摩一宗以大極地而趣入內分二類一從久遠劫來滌除心垢忽遇機緣觸發一超直入一是大心凡夫奮起根本無明忽然迸裂頂門眼開徹透心源後世淺學之士慎勿妄貪高舉承虛掠影也如是等諸行者隨其先得入位之量盡攝一切一切位地究竟無餘亦無移轉亦無出入一一白白是故說言總持門位如偈五十一位中隨其先得入攝一切一切名無餘究竟故此義經中往往有之後人不達曲為解釋此論一出方知奇特之法超越常情非通途教義所能該攝也引經第十難入未曾有會脩多羅中作如是說即是入楞伽經迴向則信心信心則佛地佛地則十地究竟有何次依真如門說亂住位乃至廣說故如是已說無餘究竟總持門次當說周徧圓滿廣大門其相云何偈曰五十一種位無前後一時俱轉俱行故名周徧圓滿論曰五十一位無有前後一時俱轉一時俱行無有所餘亦五十一別相位中所有無量無邊諸位無有前後一時俱轉一時俱行無有所餘是故說言圓滿位焉如偈五十一種位無前後一時俱轉俱行故名周徧圓滿故引經第十一法界法輪無盡中藏脩多羅中作如是說爾時文殊師利聞世尊所說即從坐起合掌頂禮前白佛言世尊云何名為橫轉無向修道人者如宜世尊為諸大眾宣說開示如是大事於是世尊即告文殊師利言一種無二一道一區大地行者一切行道無前無後一時發起一時同轉一時住持一時證入一時安立是名橫轉無向道人乃至廣說故賢首清涼疏華嚴經闡揚一時一處帝網無盡法門正合此位如是已說周徧圓滿廣大門次當說一切諸法俱非門其相云何偈曰諸無量無邊一切種種位皆悉非建立名俱非位地論曰今此偈中為明何義為欲現示此俱非門非因非果非位非地非有非無非名非義非事非理非壞非常非生非滅一切一切皆悉非故如偈諸無量無邊一切種種位皆悉非建立名俱非位地故若爾以何義故建立位名上問下答以其非義立為位故般若波羅密如大火聚燒盡一切世間悉無有餘而不損一草又云般若妙智不與二十二根相應皆此位義也故菩薩行深般若時證入空如來藏四句離百非遣何有一法當情耶引經第十二大明脩多羅中作如是說即是般若經無位位第一位禪宗說無位真人正符此義乃至廣說故如是已說一切諸法俱非門次當說一切諸法俱是門其相云何偈曰一切種種法無非金剛身以一身義故名為俱是門論曰無量無邊一切位法一切皆悉是金剛身等無差別唯依一身是故說言俱是門焉所以者何今此門中無一一法而非金剛真實身故如偈一切種種法無非金剛身以一身義故名為俱是門故引經第十三種金大地脩多羅中作如是說無病道人唯見積影不見散身故此位順不空如來藏金剛身者法界體性也三千性相皆是法身所現影像台家所謂一色一香無非中道者蓋有見於此也入此位中求纖毫過患不可得故名無病道人散身者隨業感果苦樂萬殊者也既見實相則觸處全真無染幻之形狀矣金剛寶輪山王大決擇分第四此分言種種差別轉相故名寶輪山王表果德位位有果也如是已說一種金剛道路大決擇分次當說金剛寶輪山王大決擇分其相云何偈曰漸是盡滿非一時及前後與俱并俱非一異時處轉論曰今此偈中為明何義為欲現示一身金剛大力寶輪山王體中次第漸轉諸法等是無餘究竟周徧圓滿俱非絕離此五種位一時轉前後轉俱有轉俱非轉亦一時轉亦異時轉亦一處轉亦異處轉具足具足自在自在無所障礙故差別轉相略說八種若明此義則知古今宏法大士於五位法中有單提一單者如南嶽青原以下五宗禪德即是異時異處轉也有兼闡二門三門者有具轉五門者如天台賢首清涼永明諸公皆名一時一處轉也引經第十四大嚴盡地虛空法界脩多羅中作如是說復次龍明汝前所問云何名為金剛本身廣大地地無障無礙恆沙功德品者殊勝極妙不可思議不可思議五種金剛道路足行地地無盡中藏之根本自性出生增長所依止藏乃至廣說故金輪山王道路大決擇分第五以十五種作用名為道路如是已說金剛寶輪山王大決擇分次當說金輪山王道路大決擇分其相云何偈曰山王道路中總有十五位體五種位中各有三用故論曰此金輪山王道路中建立幾位為道路量廣說雖無量略說有十五種位以如是位為道路分如偈山王道路中總有十五位故以何因緣分明了知此道路中有十五種根本之位謂彼金剛大力寶輪山王體五種位中皆悉各各有三種自在作用故以此義故成立十五差別名數如偈體五種位中各有三用故故引經第十五方脩多羅中作如是說一區王民行地地中唯有十五種體分業數位無所餘位乃至廣說故引經第十六然明神妙理脩多羅中作如是說有二十五種差別位者取王家轉非取作轉故金剛五位中位位互具五種則成二十五種差別位以互具者皆是本體五位故名王家轉此分所說位位各有三用乃造作轉與彼本位有別造作轉攝十五種位名字形相當如何耶偈曰明了及遠數相續并三合徧動徧不動字等兼廣大徧到不徧到融立與俱離是名十五名如次應觀察論曰就次第漸轉體中則有三種用云何為三一者分明了達審地作用不亂次第建立位地行道分明名義俱了故如偈明了故二者遠行遠修無數作用經無量劫過此諸位修集功德無窮盡故如偈及遠數故三者無斷無絕恆轉作用剎那剎那中間中間常恆不息自然轉故如偈相續故是名為三就諸法等是體中亦有三種用云何為三一者能詮能了一合作用善巧言說無礙覺慧其數無量一金剛故二者所詮所證一合作用甚深極義勝妙玄理唯是一區唯是一身無二歧故三者隨應有名一合作用隨其所應一切有名一切皆悉一金身故是名為三如偈并三合故就無餘究竟體中亦有三種用云何為三一者周徧圓滿動轉作用第一時中依一位中通攝一切而究竟轉故如偈徧動故二者周徧圓滿不動作用如是轉者所餘一切無量位中不移不轉常決定故如偈徧不動故三者名句文字無別作用隨其先唱與餘一故如偈字等故是名為三就周徧圓滿體中亦有三種用云何為三一者無量無邊廣大作用其法自體出現業相盡極廣大無分界故如偈廣大故二者無礙通達徧到作用一時建立一切位故如偈徧到故三者極極無數不徧作用徧通經過而唯有一邊故如偈不徧到故是名為三就俱非絕離體中亦有三種用云何為三一者消融無所建立作用一切諸法皆悉遣除無所許故如偈融故二者建立諸法悉持作用一切諸法以俱非義是理成故如偈立故三者消融建立俱絕作用究竟絕道廣建立故如偈與俱離故是名為三是為十五種位名字焉此道路位大利根者乃能通達鈍根眾生決定難了如偈是名十五名如次應觀察故上來十五種作用文辭巧妙義理深玄利根上士智慧觀察即能通達鈍根眾生雖難明了苟能深心體究亦作將來勝因幸勿自生退屈也如是諸位亦一時出興亦異時出興亦俱時出興亦一處轉亦異處轉亦俱處轉亦不出興亦不移轉亦唯一種亦是多種出興移轉有十種不同是故聖賢應世於十五用或具或闕或隱或顯人莫能測也於彼本法有作功用有作方便自然自在建立造作應審觀察獨一山王摩訶山王大決擇分第六獨一者無對待也摩訶此云大超出凡小權漸也如是已說金輪山王道路大決擇分次當說獨一山王摩訶山王大決擇分其相云何偈曰摩訶山王中總有千二百七十五種位謂五十一種大根本位中皆一一各各漸轉等五位具足安立故論曰此獨一山王摩訶山王體中建立幾位以為體分廣說雖無量略說其要唯有一千二百七十五種決定位故如偈摩訶山王中總有千二百七十五種位故以何因緣山王體中有千二百七十五位分明現知所謂常恆五十一種根本位中一一各各次第漸轉諸法等是無餘究竟周徧圓滿俱非絕離五種位具足轉故亦漸轉等五種位中各各開示漸轉等五種別位故是故成立一千二百七十五位五十一種根本位各具漸轉等五位即成二百五十五位又漸轉等五種位中各具漸轉等五位便成一千二百七十五位如偈謂五十一種大根本位中皆一一各各漸轉等五位具足安立故故此獨一山王摩訶山王體中如是千二百七十五種位亦一一時轉亦異一時轉亦俱一時轉亦皆非轉亦一時一處轉亦一時異處轉亦異時異處轉亦皆非轉八種轉相與第四分有別蓋第四分專論五位此分則論位位互具成一千二百七十五位是故轉相更變耳自在自然無障無礙是故說言無盡虛空大陀陀筏羅法界本藏地地出生無窮無極廣德大海法門藏焉引經第十七大智莊嚴法界性身甚深脩多羅中作如是說非比非喻難得惟說大海中藏大海一體本地地中三品德類具足圓滿無所闕失云何為三一者上品德類其位名字眾多無數與十方世界微塵之數其量等故華嚴經內海雲比丘受持普眼法門假使有人以大海量墨須彌聚筆書寫此經一品中一門一門中一法一法中一義一義中一句不得少分即此上品德類也二者中品德類其位名字與百百百億三千大千世界微塵之數其量等故龍樹菩薩入龍宮所見上本華嚴經有十三千大千世界微塵數偈一四天下微塵數品中本華嚴經有四十九萬八千八百偈一千二百品皆中品德類所攝三者下品德類其位名字有一千二百七十五位故下本華嚴經十萬偈四十八品乃下品德類所攝是名為三如是諸位一一一一一一乃至無量無量無量無量無量無量心真如門為萬法之本平等無二故說為一信住行向地佛有六位以六箇一字括之心生滅門顯示差別相用不可窮盡以六箇無量括之若引世典表法六一者乾之六爻也純粹至精稱之為一六無量者坤之六爻也萬物資生故稱無量乃至廣說故以上四分為佛法之總綱第三分開演正宗首舉金剛五位普攝經中差別門徑次列根本五十一位以為依止則無盡教海綱舉目張矣第四分總括前文詳示轉相第五分就五位中開出十五種作用為無邊妙用之根源第六分明位位互具為後文廣大法數之張本一部論義揭示昭然所謂大宗地者此也以次三十分層層闡揚皆從此中流出耳
