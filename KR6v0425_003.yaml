body:
  text: 馬鳴菩薩造陳真諦三藏譯清楊文會略注大海部藏道路大決擇分第七法門深廣猶如大海部即品類藏即含容如是已説獨一山王摩訶山王大決擇分次當説大海部藏道路大決擇分其相云何偈曰大海部藏中總有十種法謂五種非空及五種無常論曰此大海部藏道路分中建立幾法為部藏量所謂建立十種法體以為大海部藏分故引經第十八摩訶衍地修多羅中作如是説俱俱海藏履道分中唯有十法無有餘法乃至廣説故如偈大海部藏中總有十種法故以何義故有十應知五種非空五種無常各差別故如偈謂五種非空及五種無常故五種功德皆名非空者防世人著空也五種過患皆名無常者防世人執常也彼十種法其名字相當如何耶偈曰離礙及有實性火并今光兼深里出興地藏大龍王如是五種名非空不共稱起持變壞品與大力無名如是五種名無常不共稱各有第一一以請氣力故立門實本攝如法應觀察論曰云何名為五種非空決定住法一者離礙非空決定住法即空如來藏依此建立一切諸法俱非位二者有實非空決定住法即不空如來藏依此建立一切諸法俱是位三者性火非空決定住法性具功能觸著即燒依此建立無餘究竟總持位四者今光非空決定住法現前覺照念劫圓融依此建立周遍圓滿廣大位五者深里出興決定住法破障騰空甘霖普潤依此建立無超次第漸轉位是名為五如偈離礙及有實性火并今光兼深里出興地藏大龍王故如是五名五種非空決定住法不共異轉差別名字如偈如是五種名非空不共稱故云何名為五種無常虛假轉法一者動起無常虛假轉法二者止持無常虛假轉法三者易變無常虛假轉法四者散壞無常虛假轉法五者大力無常虛假轉法是名為五如偈起持變壞品與大力無明故如是五名五種無常虛假轉法不共異轉差別名字如偈如是五種名無常不共稱故深里大力如是二法氣力立門非取實體應審觀察五種非空分配五位深里出興配屬漸轉大力無明為障道之本非深里出興地藏大龍王莫能破之故於十法後特提此二以為對治二者均有氣力但虛假轉法不敵決定住法故終為所破而轉染成淨也如偈各有第一一以請氣力故立門實本攝如法應觀察故如是已説建立名字不同門次當説所詮義理差別門如是五種非空決定住法各有幾數所謂各各有二種故云何名為二種離礙一者守身離礙二者變轉離礙言守身離礙者無障礙身常恆決定不失壞故言變轉離礙者建立萬有令自在故是名為二守身者安住不動也變轉者應機無滯也云何名為二種有實一者守身有實二者變轉有實言守身有實者常平等身常恆決定不失壞故言變轉有實者建立差別令安住故是名為二云何名為二種性火一者守身性火二者變轉性火言守身性火者明德藏身常恆決定不失壞故言變轉性火者塵纍俱轉隨順成故是名為二云何名為二種今光一者守身今光二者變轉今光言守身今光者始炎炎身決定常恆不失壞故言變轉今光者隨順流轉無所礙故是名為二云何名為二種深里一者守身深里二者變轉深里言守身深里者離絶中身常恆決定不失壞故言變轉深里者諸無為中得自在故是名為二如前所説五種無常業用差別各各如何所謂如次出生一切無量無邊大過患海皆無餘故住持一切無量無邊大過患海皆無餘故變易一切無量無邊大功德海皆無餘故壞滅一切無量無邊大功德海皆無餘故覆障非德非患中身自在皆無餘故如是五法自體及品各各差別應審觀察如是已説所詮義理差別門次當説依位決定安立門如前所説五十一種真金剛位遍幾處耶偈曰如是五十一遍於五種處大聰明行者能善決擇知論曰如前所説五十一位遍離礙等五種處中無所不至無所不通以此義故大金剛位有五應知從離礙等五種非空建立金剛五位配釋如前如偈如是五十一遍於五種處故如是位地利根能知非鈍者境所以者何極甚深故極利了故極祕密故此三句通讚一部論義非利根莫能知也如偈大聰明行者能善決擇知故亦復處二故位亦二應知是故具集有十而已第三分在金剛道路説五位此分在大海部藏説十位即是處二位亦二也然今所説是變非身今説十位是對治門中之變金剛五位是龜則方説之身別建立位總幾數有字身差別其相云何偈曰別建立位數總有十種焉漸次及盡餘不動與俱滅一空一有位智智斷智地相值兼撥立邊邊轉一會具足此十位門界量圓滿論曰別建立位總有十種在對治門中有此十位與根本五位各不相濫故名別建立位云何為十一者一向無超漸次位二者遍究竟盡不盡位三者一切中際不動位四者雙立諸法俱滅位五者若一空當一有位六者能斷所斷悉智位七者熏力相對相值位八者隨除障處立位位九者真妄得邊有無位十者諸法一種一會位是名為十如偈別建立位數總有十種焉漸次及盡餘不動與俱滅一空一有位智智斷智地相值兼撥立邊邊轉一會故隨有一別建立彼總必當具足一切別位方得建立大總位耶問必當具別總得成故答如偈具足此十位門界量圓滿故如是十種別相之位遍於幾處上問下答遍五處故金剛五位所謂轉攝五種處中各具五十一金剛位經過諸位亦有十種別相位故大總相位總有幾數遍幾處耶偈曰總位有三種謂上中下故唯遍五種處非餘位應知論曰大性總地根本體位總有三種云何為三一者趣高上上轉去位二者自然安住中中位三者向焉下下轉去位是名為三如偈總位有三種謂上中下故故如是三總隨別有有唯遍轉五非所餘位應審觀察如偈唯遍五種處非餘位應知故如是已説依位決定安立門次當説依位法數具闕門如前所説十種本法守轉二種金剛位中為盡不盡謂若守位中唯具德五無所餘五若轉位中十法具足無所闕失以此義故總別二門有無亦了前文所詮義理差別門中五種非空各有守身轉變二相具德五者即五種非空也所餘五者即五種無常也守位唯具德有之轉位德患俱有故説具闕門如是已説依位法數具闕門次當説德患對量現宗門其相云何偈曰起性止及今變空壞并實力龍如次對有似而取多論曰治障照覆對量形相如其次第五種無常是障是覆五種非空能治能照動起無常以性火住法治之止持無常以今光住法治之易變無常以離礙住法治之散壞無常以有實住法治之大力無常以出興龍王治之以之為量如偈起性止及今變空壞并實力龍如次對故如是對量一向轉耶俱量轉耶問俱量應知答如偈有似而取多故如是已説德患對量現宗門次當説隨次別釋廣説門且離礙門安布形相現示云何主伴治障當如何耶偈曰離礙身體中有五十一位五十一位中有三種總相三種總相中有十種別相初五十一中一一皆各各具足十本數最初主後伴次初主後伴如次應觀察論曰就離礙中有五十一種金剛位就此位中有三種根本總相位就此總中有十種分離別相位如偈離礙身體中有五十一位五十一位中有三種總相三種總相中有十種別相故金剛諸位一一位中皆具本數如偈初五十一中一一皆各各具足十本數故主伴各二云何二主一者主主二者伴主云何二伴一者伴伴二者主伴言主主者是離礙故言伴主者第二轉故有實言伴伴者除五本法餘眷屬故五本法之眷屬言主伴者除其離礙餘四法故有實性火今光深里如偈最初主後伴次初主後伴如次應觀察故三種總相金剛位中云何安立謂初信心以為其始後𮖸陀地𮖸持遇切應是佛陀地以為其終次第漸轉是故建立趣高上上轉去位後𮖸陀地以為其始第一信心以為其終次第漸轉是故建立向焉下下轉去位下轉門別本罕見上下二門位位各各離邊中道決定安立是故建立自然安住中中位以此義故十種別相唯有上下不有中焉且依上門建立十位形相云何偈曰信五事已經至後後位故一事究竟故一味中轉故治障一滅故治障不俱故一智斷智故上下相照故本無今有故治障自辨故無別一轉故如次應觀察論曰依趣高上上轉去門見十別位形相如何謂以五種非空住法對治五種虛假轉法如其次第無有超過漸漸轉故建立一向無超漸次位如偈信五事已經至後後位故故以五事治五事隨其所應一究竟故建立遍究竟盡不盡位如偈一事究竟故故以五事治五事不增不減不大不小一味平等中道實相故建立一切中際不動位如偈一味中轉故故以五事治五事隨障滅時其智慧體則便滅故建立雙立諸法俱滅位如偈治障一滅故故以五事治五事治起無障障起無治不能親近不能俱行不能及達故建立若一空當一有位如偈治障不俱故故以五事治五事治勝氣力變一切障為治眷屬亦以勝力斷眷屬故建立能斷所斷悉智位如偈以智斷智故故以五事治五事隨其所應上位下位互相照達隨其所應斷除障故建立熏力相對相值位如偈上下相照故故以五事治五事隨所斷障虛妄無本安立位地亦無本故建立隨除障處立位位如偈本無今有故故以五事治五事治皆明淨障皆暗冥彼治斷事悉已成辦此障覆用悉已具足故建立真妄得邊有無位如偈治障自辨故故以五事治五事治障二法無二無別一味平等一體一性一業一用故建立諸法一種一會位如偈無別一轉故故以上十位皆是對治門中之差別行相依法修習過患消除功德顯現是為入道之要門也如是諸位如偈釋説專心觀察其理分明本趣具現如偈如次應觀察故如偈釋説者十門詳示釋偈中之義也專心觀察等令人隨文見諦解行雙圓也是名為依離礙門安立諸位總別現示上上差別五門之中專依離礙門以般若真空為主中主也上上轉去非般若不為功故獨舉一門次依下門建立十門形相云何偈曰如前説十義隨應當如如壞得體歸空漸次第轉故論曰依向焉下下轉去門見十別位形相如何謂如前所説十種義中隨其所應順順如如壞其得體歸空本存故此亦依離礙門無智無得即是歸空本存也金剛經云乃至無有少法可得是名阿耨多羅三藐三菩提如偈如前説十義隨應當如如壞得體歸空故如是諸位為一時轉前後轉耶問以前後轉非一時故答如偈漸次第轉故故於餘諸法如是如是隨隨如如説示造作應審觀察其別轉相是本存故歸空本存是本主故主中主皆悉各各如是二轉一時前後有二義故云何為二一者建立轉前後定故二者本性轉無前後故是名為二如前所説種種諸門同名異物住思應觀深里出興地藏大龍王大決擇分第八前分偈中有深里出興地藏大龍王之句故此文來如是已説大海部藏道路大決擇分次當説深里出興地藏大龍王大決擇分其相云何偈曰地藏龍王中總有二種義所謂德藏義并及患藏義論曰就深里出興地藏大龍王體中則有二義云何為二一者功德本藏義二者過患本藏義言功德本藏義者此大龍王為四非空根本藏故言過患本藏義者此大龍王為四無常根本藏故如偈地藏龍王中總有二種義所謂德藏義并及患藏義故前分説五種德藏五種患藏此分單提地藏大龍王為德患二藏之根本屬漸轉位令知入道要門方有下手之處向下二分層層推廣皆演此法始知無超次第漸轉位如大王路人所共由也此論初列金剛五位以無超次第漸轉位居首後文詳演五位行相先説漸轉位中對治法門中間俱是俱非總持圓滿四位共有十六分復以漸轉位中次第證道之相終焉學者可以知所從事矣華嚴四十二位行布分明梵網四十心地舍那自説我已百阿僧祇劫修行心地以之為因初捨凡夫成等正覺起信論説一切菩薩皆經三阿僧祇劫無有超過之法非菩薩行滿不能成佛近世宗教二家每斥三祇歷位為劣高談一念頓超為勝請洗心滌慮觀於此論具二藏義地藏龍王居住何處其里幾量長短大小等諸形相當如何耶偈曰處唵婆尸尼里五十一量長一千由旬頭有婆多提則出四種水尾有舍伽必則出四種風色如玻璃珠論曰今此偈中為明何義為欲現示舉事現理開演本法大海故此大龍王居於何處謂居唵婆尸尼中故如偈處唵婆尸尼故出水入地去隔幾量謂從水底向地下入五十一由旬之量故如偈里五十一量故彼大龍王身長幾量一千由旬無增減故如偈長一千由旬故彼大龍王於其頭上有清白毫名曰婆多提從此毫端出四種水云何為四一者中空水其出水塵空以為內有以為外而出生故離礙二者方等水其出水塵四角量等無差違故有實三者常熱水其出水塵於一切處於一切時常恆暖故性火四者耀明水其出水塵光明清白常恆今故今光是名為四如偈頭有婆多提則出四種水故亦彼龍王於其尾末有一毛𮑃吹歲切名曰舍伽必從此毛末出四種風云何為四一者發塵風此風起時經多中間發起無量無邊塵故動起二者持塵風此風出時止住諸塵令安住故止持三者變珍風此風出時經多中間變諸金玉作砂石故易變四者壞珍風此風出時經多中間壞滅金玉作無有故散壞是名為四如偈尾有舍伽必則出四種風故彼龍身色譬如玻璃無有定色如偈色如玻璃珠故起信論云所言法者謂衆生心是心則攝一切世間出世間法地藏大龍王者喻衆生心也心之淨分即在纏真如能出四種功德水為出世間法心之染分即大力無明能出四種過患風為世間法處唵婆尸尼者喻本性王無住本處里五十一量者喻真金位定數量品長一千由旬者喻本性王具千種德頭有婆多提者喻本性王於諸淨品有作方便則出四種水者喻四非空尾有舍伽必者喻本性王於諸染品有作業用則出四種風者喻四無常色如玻璃珠者喻本性王染淨不攝如其次第應審思擇復次住處大海水底相去中間喻五十一種金剛位已具出現至大海時喻雜類趣息海浪時喻起善心時常起浪時喻惡心興時亦復住心應審觀察引經第十九本行上地一味平等妙法無邊業用具足大海寶輪妙嚴王子修多羅中作如是説生四道法道品法不四道攝離絶中心生四輪法輪回法不四輪攝離絶中心而立名字説大力無明者隨所生法建立名故乃至廣説故深里出興地藏大龍王道路大決擇分第九有十種功德十種過患以為道路如是已説深里出興地藏大龍王大決擇分次當説深里出興地藏大龍王道路大決擇分其相云何偈曰龍王道路中總有二十法謂二本藏中各有十法故論曰就深里出興地藏大龍王道路中總有二十中自在法所以者何功德過患二種藏中各有十故如偈龍王道路中總有二十法謂二本藏中各有十法故故彼二十法名字形相當如何耶偈曰功德本藏十常壞俱及非自他俱并非無礙兼一全過患本藏十如一違無有對利融上下如次應觀察如是二十法一一皆各各圓滿廣大故與本存等量論曰就功德本藏之體中則有十法能攝一切無量功德云何為十一者本體自性決定常住不生不滅遠離流轉功德品二者本體自性常恆移轉是生是滅流轉俱行功德品第一門是不變義第二門是隨緣義二門合觀即是如來藏不變隨緣隨緣不變之義三者決定常住常恆無常一時俱轉無前後違功德品四者出常無常二事不攝自體本性離脫亡行功德品五者十種自自攝一切法無有所餘獨一無二一種一行功德品六者無體無性從因緣起亦有亦無隨應變轉功德品以上四門顯示性德玄妙非深入法海者不能領會七者無餘究竟俱轉俱行不相捨離功德品總持位八者非自非他絶離有名住於非非自性決定功德品俱非位九者於一切法隨應無礙自體自性法爾道理性造如是功德品圓滿位十者五根一一根五塵一一塵一切諸法亦復如是功德品俱是位是名為十上來十種功德在對治門中開演以漸轉位統攝一切也如偈功德本藏十常壞俱及非自他俱并非無礙兼一全故就過患本藏之體中亦有十法能攝一切無量過患云何為十一者於一切法隨順如如如作逆事過患品二者造作諸法同一業用一作逆事過患品三者治道起時無有定體違作逆事過患品四者染淨諸法皆無所有無作逆事過患品五者一切諸法皆總有有有作逆事過患品六者隨治同量如如現前對作逆事過患品七者由治道力自類增益利作逆事過患品八者由治道息發起自用融作逆事過患品九者待上轉者方得起用上作逆事過患品十者以隱藏時方得起用下作逆事過患品是名為十如其次第住思止心專心觀察其理攸明過患專與功德作障礙故名逆事論中舉十種名相一曰如二曰一三曰違四曰無五曰有六曰對七曰利八曰融九曰上十曰下觀此十逆則知障礙法無所不至非精修止觀之力豈能顯發性具功德而令過患轉逆為順輔弼心王作無涯大用耶如偈過患本藏十如一違無有對利融上下如次應觀察故如是二十法與彼本方等無差別是故有二十種本藏無相違過所以者何其本藏中如是道理自然常有不從本藏長建立故何故處處皆存品字如前所説二十種法各各有百眷屬類故是故言品例前應了如偈如是二十法一一皆各各圓滿廣大故與本存等量故如是已説建立名字門次當説所詮義理門且治及障對量差別當如何耶偈曰如是二十法一一皆各各一德治諸過諸過障一德無有定次第而數品類等無失對量過如理應觀察如説本存法説品類亦爾論曰如前所説二十種法一一各各一德治一切障一切障障一德無別對量如偈如是二十法一一皆各各一德治諸過諸過障一德無有定次第故若如是説今此門中對量軌則混成雜亂上問下答雖無別對量而有總對量是故無失如偈而數品類等無失對量過如理應觀察故如本品爾例前應了如偈如説本存法説品類亦爾故如是已説治障對量差別門次當説安立金剛位地門其相云何偈曰此本法門中亦有金剛位依位有三門謂上中下門論曰就此本法門中亦有五十一金剛位如上所説二十種法依位安立云何安立謂諸位中皆具二十無有前後一時轉故然則此中有三種門云何為三一者一向上轉門二者一向下轉門三者一向中轉門是名為三如是三門各各一一位中具足俱轉不待初後際故如説本法品類亦爾以此小門廣大回持應廣通達如偈此本法門中亦有金剛位依位有三門謂上中下門故大龍王重重廣海無盡大藏大決擇分第十如是已説深里出興地藏大龍王道路大決擇分次當説大龍王重重廣海無盡大藏大決擇分其相云何偈曰廣海大藏中總有三種重謂初中後重初重有二十二億十方界量法門大海二十種本藏各生一萬量各別百眷屬各生一千故是故數圓滿住心應觀察中後重倍此應廣通達故論曰就大龍王重重廣海無盡大藏之自家中總有三重能攝諸位云何為三一者初第一有重二者中安住居重三者後建立轉重是名為三就第一重中則有二十二億十方世界之量種種勝妙法門大海此義云何謂二十種本藏法中一一各各出生一萬法門大海各各別別百眷屬中一一各各出生一千法門海故以此義故名字圓滿義理具足如其次第安住其心定止其思聰明觀察其數量理及所詮意現了分明對治法門非止觀不為功故兩分重言之如偈廣海大藏中總有三種重謂初中後重初重有二十二億十方界量法門大海二十種本藏各生一萬量各別百眷屬各生一千故是故數圓滿住心應觀察故次二種重如其次第倍前普布應廣通達如偈中後重倍此應廣通達故故自第七分説德患對治至此治道功深故説廣大數量以見重重法海無有窮盡也引經第二十大摩尼寶藏陀羅尼修集修多羅中作如是説龍龍地地大無盡海藏中有多十方之量法門軌則品類最初名為轉大法輪具足一海無極無盡引導光明現照地地本業本用出生增長軌則大海法門最後名為有性無性無我空理大利益廣光明亦離脫亦合轉具足具足無邊摩訶行種地本藏法雨騰門出興上味品類法門唯取一界以為譬喻非取塵等乃至廣説故舉最初法門最後法門以該中間十方之量法門唯取一界以為譬喻非取塵等者但以十方世界之數為法門數量非以微塵之數為法門數量也以上四分説對治法為入道之要門學者既從前四分得其綱領即須斷惑證真以免説食數寶之誚故第七分説五種非空為能治五種無常為所治建立十種別相令知對治之方第八分專提地藏大龍王為四德四患之本蓋大龍王藏於地內名阿賴耶剋其本體即如來藏故為德患之本大力無明依此而起出生四患龍王本具四德之用出地後方能顯發此為聖凡之關鍵也第九分暢演十德十患令人修習止觀轉凡成聖第十分説無盡海藏以開廓心鏡破初學狹隘之見耳深觀論義此四分應屬無超次第漸轉位蓋對治門中所説五種非空決定住法為金剛五位之本而五法中以深里一法出生四法深里者漸轉位也無盡無窮塵塵數量道路大決擇分第十一如是已説大龍王重重廣海無盡大藏大決擇分次當説無盡無窮塵塵數量道路大決擇分其相云何偈曰塵塵道路中如前所説量亦有五十一決定金剛位依此位立相則有十種重以為道路量二因一果等論曰就此門中有幾數位五十一種真金剛位具足圓滿無闕失故如偈塵塵道路中如前所説量亦有五十一決定金剛位故就此位中則有十種變對法門能攝門量云何為十一者二因一果門二者一因一果門三者少因多果門四者因果一味門五者無因無果門六者自然安住門七者因果門八者果因門九者言説門十者言人門是名為十如是十門以為門量如偈依此位立相則有十種重以為道路量二因一果等故自七分至十分皆説對治法門障空理顯因果全彰故此分中説十種因果差別之相雖末後二門一名言説一名言人亦從前文因果而來也彼第一門形相如何偈曰以信心為初如次率自類取所餘位初至於定心位則取如來地亦如其次第不退心為初率同品自類取餘位第二至於願心位亦取如來地修行位為初如次率自類取餘位第三至於正心位亦取如來地不退位為初如次率自類取餘位第四至灌頂住位亦取如來地離癡行為初如次率自類取餘位第五至於無著行亦取如來地尊重行為初如次率自類取餘位第六至於真實行亦取如來地隨順觀衆生回向以為初如次率自類取所餘四位各數量契當餘有如來地以同地為伴莊嚴一覺海各因及果稱配釋廣觀察其理當分明此偈四十二句最難分配以下文長行觀之方能明了前五句以信心為初如次率自類即是一信心二念心三精進心四慧心五定心名為率自類也信心與發心住合修念心與歡喜行合修精進心與救護一切衆生回向合修慧心與逆流歡喜地合修即是取所餘位初也定心與大極地合修即是至於定心位則取如來地也二亦如其次第不退心為初六句不退心與治地住合修回向心與饒益行合修護法心與不壞回向合修戒心與道流離垢地合修即是率同品自類取餘位第二也願心與大極地合修即是至於願心位亦取如來地也三修行位為初五句修行住與無瞋恨行合修生貴住與等一切佛回向合修方便具足住與流照明地合修即是如次率自類取餘位第三也正心住與大極地合修即是至於正心位亦取如來地也四不退位為初五句不退住與無盡行合修童真住與至一切處回向合修法王子住與觀明焰地合修即是如次率自類取餘位第四也灌頂住與大極地合修即是至灌頂住位亦取如來地也五離癡行為初五句離癡亂行與無邊功德藏回向合修善現行與度障難勝地合修即是如次率自類取餘位第五也無著行與大極地合修即是至於無著行亦取如來地也六尊重行為初五句尊重行與隨順平等善根回向合修善法行與薄流現前地合修即是如次率自類取餘位第六也真實行與大極地合修即是至於真實行亦取如來地也七隨順觀衆生回向以為初五句隨順等觀一切衆生回向與過三有遠行地合修真如相回向與變化生不動地合修無縛解脫回向與慧光妙善地合修法界無量回向與明行足法雲地合修即是如次率自類取所餘四位各數量契當也以上七段二位合修以四十四位配成二十二位前六段末皆取如來地配成六位共成二十八位餘有如來地無他位可配即以同地為伴所謂圓融法界自為主伴以無量莊嚴莊嚴一覺海如是二十九位成就二因一果門至於各因及果稱須觀下文長行五位名義則二十四位名義可以類推故偈云配釋廣觀察其理當分明若位位次第配五十位則成二千五百五十位因果名稱各各不同思之可見論曰今此門中為明何義為欲現示五十一位皆為同量以二種因感得一果廣三寶海無窮盡故此義云何所謂信心及發心地之二種因同一行相不相捨離俱行合轉住一所作起無量具生無邊德具足莊嚴一大覺海能生長因名為最上第一出生增長決定真實本藏原母遠離繫縛莊嚴無勝地種子海會所莊嚴果名為具足真金剛圓滿大慈悲法身虛空等無差別最初地地無上極海一盡大覺無二山王次念心地歡喜行地之二種法能長養因具足莊嚴一大覺海因名為安樂常明決定增長無苦無妄自然照達一切法性無所障礙種子海會果名為常樂總明大虛空界甚深恆了無二山王次精進心地救護一切衆生回向地之二種法能長養因具足莊嚴一大覺海因名為發起殊勝大悲光水遠離懈怠常度常行本地自性具足通達種子海會果名為慈悲光明常恆達慧無二山王次慧心地逆流歡喜地之二種法能長養因具足莊嚴一大覺海因名為大真金剛日月光明自性離苦除斷暗品種子海會果名為極極重地無上一體自然窮了無二山王次定心地大極地地之二種法能長養因具足莊嚴一大覺海因名為決定安寂遠離散亂照曜無窮水水火火種子海會果名為寂圓滿地明圓滿地具足德藏無二山王如是諸佛皆悉各各作三大事云何為三一者興化二者説法三者勝進言興化者出興一十方世界之塵量變化身故言説法者宣説一十方世界之塵量發心信地法門海故言勝進者向上上位如次入故是名為三就變化中亦皆各各有此三事應廣通達如是如是隨隨如如後後諸位例前應知如偈以信心為初如次率自類取所餘位初至於定心位則取如來地故長行五段因果名稱即偈中初五句之演義也以此類推則二十四位可以意會能生長因通名種子海會所莊嚴果通名無二山王可知此法從初信位即證佛果不待初住也所説如是諸佛即此信等所成之佛唯三大事漸增數量下文一十百千萬億十億百億千億萬億以表勝進之階差耳他經言地前菩薩一行中修一行謂以當位行為本兼修餘一行即是此文二因一果之義初地至七地一行中修一切行八地已去一切行中修一切行可與此論參觀如是已説二因一果門次當説一因一果門其相云何偈曰五十一種位各不待他力獨住自家中感得一果故因及果名字如其次第加種子大覺故配釋應了知次第同前説增減不同耳論曰今此偈中為明何義為欲現示因果二法數量契當莊嚴覺道三寶之海轉廣大故如偈五十一種位各不待他力獨住自家中感得一果故故因及果稱於本名字加種子大覺之稱故如偈因及果名字如其次第加種子大覺故配釋應了知故次第轉相與前所説等無差別唯增數量減數量別各不同耳如偈次第同前説增減不同耳故如是諸佛皆悉各各作三大事名同前説義有不同言興化者出興十十方世界之塵量變化身故言説法者宣説十十方世界之塵量各各因位法門海故言勝進者向上上位如次入故就變化身中亦有此三事應廣通達如是已説一因一果門次當説少因多果門其相云何偈曰五十一位中一一皆各各感五十果位名少因多果論曰今此門中為明何義為欲現示唯一種因感五十果無礙自在無所闕失三寶之海轉廣大故如偈五十一位中一一皆各各感五十果位名少因多果故如是諸佛皆悉各各作三大事名如前説義有不同言興化者出興百十方世界之塵量變化身故言説法者宣説百十方世界之塵量各各因位法門海故言勝進者向上上位如次入故就變化中有此三事應廣通達如是已説少因多果門次當説因果一味門其相云何偈曰五十一位中一一皆各各有五百果海五百果海中一一皆各各有五百因海如是平等故名因果一味論曰今此門中為明何義為欲現示因果二法數量契當無有增減三寶之海轉廣大故如偈五十一位中一一皆各各有五百果海五百果海中一一皆各各有五百因海如是平等故名因果一味故五十一位各各有五百果海則成二萬五千五百果海一一果海各各有五百因海則成一百二十七億五萬因海即是一為無量之義也如是諸佛所作三事亦復同前唯義異耳所謂千故變化身相亦復如是如是已説因果一味門次當説無因無果門其相云何偈曰五十一位法非因亦非果生千因果法名無因無果論曰今此門中為明何義為欲現示五十一位因而不有果因出生千因之大海果而不有因果出生千果之大海三寶之海轉廣大故如偈五十一位法非因亦非果生千因果法名無因無果故因必有果果必有因盡人而知也忽説無果之因出生千因無因之果出生千果則出人意外矣因從無果生果從無因生故名無因無果豈通途教義所能攝哉如是諸佛所作三事亦復同前唯義異耳所謂萬故如是已説無因無果門次當説自然安住門其相云何偈曰五十一位中一一皆各各經無量劫轉不出自家故論曰今此門中為明何義為欲現示位位皆各經無量劫以修行成道等事轉無其分際三寶之海轉廣大故如偈五十一位中一一皆各各經無量劫轉不出自家故故判教雖有頓漸莫不捨劣而趣勝今此文中五十一位皆經多劫而無分際不但果位無盡即因位亦無盡矣又云不出自家者一一白白不雜不亂故名自然安住門也如是諸佛所作三事亦復同前唯義異耳所謂億故如是已説自然安住門次當説因果門其相云何偈曰生五十一位生五十一位所生無盡故名為因果門論曰今此門中為明何義為欲現示能生能生無有窮盡所生所生無有窮盡三寶之海轉廣大故如偈生五十一位生五十一位所生無盡故名為因果門故如是諸佛所作三事亦復同前唯義異耳謂十億故如是已説因果門次當説果因門其相云何偈曰此義例前了無別意趣耳唯有數量增住心應觀察論曰今此門中為明何義為欲現示五十一位亦因亦果各生無盡無盡因果大海法門三寶之海轉廣大故如偈唯有數量增故如是諸佛所作三事亦復同前唯義異耳謂百億故如是已説果因門次當説言説門其相云何偈曰一切三寶海皆悉起言説無有窮盡故名為言説門論曰今此門中為明何義為欲現示一切三寶皆悉各各宣説無盡僧海無盡法海無盡覺海三寶之海轉廣大故如偈一切三寶海皆悉起言説無有窮盡故名為言説門故僧海因也法海修因證果之路也覺海所得之果也宣説因果之法名為言説門如是諸三寶所作三事亦復同前唯義異耳謂千億故如是已説言説門次當説言人門其相云何偈曰一切三寶説如説量作人無有窮盡故名為言人門論曰今此偈中為明何義為欲現示如前所説諸三寶説如所説量造作行者無有窮盡三寶之海轉廣大故如偈一切三寶説如説量作人無有窮盡故名為言人門故以言説門覺悟有情令得道果輾轉相傳無有窮盡如是諸人成道已訖所作三事亦復同前唯義異耳謂萬億故引經第二十一大明總持具足心地修多羅中作如是説譬喻十方無際無本無始無終道行足履地地法藏中有十種殊勝轉轉增長倍倍具足圓滿廣大法門海會乃至廣説故
