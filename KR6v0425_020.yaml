body:
  text: 清石埭楊文會仁山著謝客啓鄙人性喜山林不貪榮利自二十七先君子棄世家貧母老無以為生從事於宦途者三十年內而吳楚外而英法公務之暇遊心釋典幸得一隙之明遂以家事委諸兒輩今年已七旬精力衰頽敬告新舊知交權作謝客之計及此桑榆晚景藉以校訂深經刊之印之嘉惠後學庶不負四十年來一片婆心耳所有遠方來函概不作答伏乞鑒原南洋勸業會開設佛經流通所啓性理之學莫妙於佛經佛經起自印度逮東漢時流傳華夏至今一千八百餘載沙門釋子代有偉人宰官居士精通其義者不可勝數近時印度佛教衰微三藏教典求而可得者獨中國與日本耳茲逢南洋勸業會開從來未有之奇觀各省仕商雲集特將金陵維揚常州姑蘇杭州等處新刊釋典擇其要者裒集一處以應遠方蒞會諸君購閲是則區區微忱所蘄於向道之士也報告同人書鄙人四十年來屏絶世事專力於刻經流通竊以弘法利生為願今垂老尚有心願中未了之事一俟病體稍瘥當併日以進用將大概敬讅我同會諸君編輯大藏續藏提要經典浩繁讀者苦難抉擇今仿四庫提要之例分類編定以便初學類別日本續藏刻本為大藏集要日本現刻之續藏搜求甚富但其中須加區別以歸純一今擬分為三類一必刊行者一可刊行者一不刊行者甄定去留使讀者不至迷於所向先刻成大藏集要約三千卷以便學者隨時購閲餘俟陸續刻成全藏以上二書體例略定尚未著手編訂期以數年當可蕆事以外尚有未竟之稿數種亟須足成之釋摩訶衍論集注瑜伽師地論右二書稿已過半但搜葺諸家注説及點句會文頗費心力儻天假之年當有觀成之日也等不等觀雜録雜録約有百餘頁原稿均散亂無序略加編定便可成書鄙人志願亟望金陵刻經處刻成全藏務使校對刷印均極精審庶不至貽誤學者至他處所刻未精之本聽其自行流通本處概不與之合併成書謹案大藏集要一名輯要見序例至所云瑜伽師地論釋摩訶衍論集注稿已過半者蓋腹稿也以先生晚年手顫艱於握管又無筆受之人二書遂不傳於世至可惜已編者識與釋幻人書一幻人法師出法華經性理會解併或問見示書而歸之捧讀大著於古今注釋之外別出手眼誠為希有但其中不無可商之處略為大雅陳之經中有法説有喻説有託事表法弘經大士不可破事相但須即事顯理或問篇中六種震動寶塔高廣劫日長短等論均拂事相而談性理似於教義有違夫地動之文處處有之師言天翻地覆之勢人何能堪是專就凡境而言也楞嚴經中魔宮隳裂惟魔有神通方能見之凡人不見也維摩經內持他方世界置於此土彼界菩薩知之凡夫不知也以此類推大地六種震動亦唯得通人乃能知見世俗凡人不知不覺也寶塔高廣更無容疑於一毛端現寶王剎維摩室內容無量座芥納須彌等文均是大小相入之理至於六十小劫謂如食頃亦是延促自由之法華嚴毗目瞿沙仙人執善財手經微塵數劫亦此義也大凡諸佛菩薩境界不可以凡情難信即拂事談理若並無其事而結集者憑空鋪敘以為表法豈非如邱長春之作西遊記乎且神通亦非虛言人天二乘菩薩如來皆有等差如禪宗所謂神通併妙用運水及搬柴乃指當人性德而言頭頭顯露法法全彰在天而天在人而人不向人道外別説神通也其實天道神通遠勝於人推而至於妙覺果海迥非世俗所能思議矣受持法華經者即父母所生清淨六根遂有六通之用圓十信位已能如此若至初住便能六根互用性理會解引恭禪師聞風刺葉聲有省東坡筆談悟互用之理是謂六即中之理即此經所説六根清淨已到相似之極將入分證位矣豈恭師東坡見地所能比擬也哉現前山河大地盡屬假有無非唯心所現時劫遷流生於行陰是不相應法若時量方量不破欲其超脫輪回恐難之又難矣所以三藏教典皆非凡夫意言境界法華所謂深固幽遠無人能到者此也忝承垂問敢獻芻蕘不足當方家一笑與釋幻人書二附來書衲比年來之代諸長老座弘揚教典自愧不勝但依常規消文釋義有事談事有相説相外始談性理蓋欲三根普利共證性天未嘗拂事相而談也至或問篇特為執事相以詰難者辨耳若但答以佛菩薩神通境界非凡人所知等語誠恐不足取信於人又何能弘揚大教乎故開方便門示真實相使迂拘之輩知如來大教有喻説托事説不可執喻昧理取事為實認黃葉以為真金捨醇醪而餔糟粕庶幾佛種不致斷絶如意寶珠窮子自得大教之弘揚又豈外於是哉衲於來教深得一番領悟敬為達者陳之來教云經中有法説有喻説有托事説善哉言乎來教又云六種震動寶塔高廣劫日長短以及一毛端現寶王剎維摩室容無量座芥納須彌等文均是大小相入之理六十小劫謂如食頃亦是延促自由之法者此即喻説托事之説歟經云普佛世界六種震動下文即敘爾時會中四衆八部人非人及諸小王轉輪聖王是諸大衆得未曾有歡喜合掌一心觀佛此事相也佛性人所同具衆生身心即佛世界一會大衆即普佛世界大衆見佛入定雨華有所觀感歡喜合掌一心觀佛非六根震動而何會義亦表六根豈可拂經中之事相而談注家之事相乎蓋無主見者是非不辨故隨人轉如來所謂真可憐愍者又經云於此經卷敬視如佛種種供養華香瓔珞末香塗香燒香繒蓋幢幡衣服伎樂乃至合掌恭敬下文又云若經所在之處皆應起七寶塔極令高廣嚴飾不須復安舍利所以者何此中已有如來全身此塔應以一切華香瓔珞繒蓋幢幡伎樂歌頌供養此經中事也上文以種種物供經下文以種種物供塔無異足見經即塔矣又般若經云經典所在之處即為是塔比法華經尤屬顯然依經之事表經中之法有違教義否乎又經云六十小劫身心不動聽佛説法謂如食頃上文六十小劫下文身心不動身心不動則六用寂然六識亦不行劫波此云時分時識也依此事相表經之法再者謂如二字是相似語執作實解有違教義否乎至維摩丈室容無量座於一毫端現寶王剎芥納須彌等文是喻心量之廣大能收能放也其可大可小唯心量能之物量大小有定不能也若謂佛菩薩境界非凡情所測按維摩丈室毗耶離城五印度境一航可通五印度之天地與此土之天地無異豈可指他方佛土言之佛菩薩境界亦是性土之談華嚴華藏世界及香水海蓋表如來藏性海耳楞嚴云如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來如是非器界明矣一毫端現寶王剎與楞嚴經如來妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎是同是別芥納須彌歸宗曾答李翔載在語録今人不足信古人有足徵非釋家如是儒家亦有此中庸云始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於密藏於密芥子也彌六合納須彌也此理性理也誠如來教云一毛端現寶王剎芥納須彌等文均是大小相入之理六十小劫謂如食頃亦是延促自由之法此理此法與經書之理法遙遙相對妙哉妙哉此等文字舍理法而作實解何異世人看西遊記見孫悟空神通廣大拔一毛口中嚼碎噴出喝聲變即變無量孫悟空耳中定海神針取出叫大大大即碗來粗細此等文字通人觀之尚明所喻何如來大教竟如是觀耶古人謂依經講句三世佛冤此冤竟不可解耶豈不令人痛哭流涕哉誠如來教所云阿難結集如邱長春作西遊記矣來教又云寶塔高廣更無容疑是對無信根者説如良醫治病看證下藥斷不以板方殺人菩薩化人亦復如是著相者為説非相著非相者為説實相可謂妙於權矣夫如來教典故貴乎信無信不入故又不可不疑無疑不悟故大疑大悟小疑小悟不疑不悟言從疑後翻成悟也況信之一字有邪正之不同耶來教又云神通亦非虛言人天二乘菩薩如來皆有等差如禪宗所謂神通併妙用運水及搬柴乃指當人性德而言頭頭顯露法法全彰在天而天在人而人不向人道外別説神通也善哉善哉如是龐老之運水搬柴是婆子之拈盞傾茶是擴而充之動作云為無一不是當人性德神通矣來教所云頭頭顯露法法全彰豈不善哉神通有等差者由智慧有大小故佛之智慧大神通故大菩薩智慧神通不及佛二乘不及菩薩天人不及二乘然佛之神通又不在是法華云導師作是念此輩甚可愍如何欲退還而失大珍寶尋思時方便當設神通力化作大城郭由是觀之諸佛神通力方便力也所謂佛菩薩境界凡人不知者此也著於事相焉能見性如經云時諸四衆計著於法阿難所集契經也不可作傳記史書觀契合於道也道即性也性即理也見性始證道證道必見性古人云離心談法無有是處故楞嚴會上詰責多聞謂阿難憶持十方如來十二部經清淨妙理如恆河沙祇益戲論法華經長者密遣二人共窮子除糞皆所以明三藏教乘乃如來方便順衆生性而説不可執也般若經云如筏喻者法尚應捨何況非法此中實而權權而實三根普濟共證菩提是佛菩薩境界非沙門婆羅門若天魔梵及餘世間所及來教云三藏教典皆非凡夫意言境界法華所謂深固幽遠無人能到者是矣以上種種性理會解已詳言之今因來教有得重而申之是一番提起一番新也捧讀尊示不憚詳細開導真可謂老婆心切矣然鄙人有不能已於言者謹復約略陳之尊示有事談事有相説相外始談性理鄙見事相即是性理事相説透性理全顯是尊意分理事為二途鄙意融理事為一致尊意以大地山河目前萬物為實有鄙意以大地山河目前萬物唯識所現了無實體不過同業妄見別業妄見耳若證實相轉變自由一一無非真如妙諦有何相而不破有何性而不顯耶不然雖高談性理只是第六識上所緣之影了無實用欲其橫截生死不可得矣大小相入長短相攝超情離見之事最微妙者也胸藏萬卷聽法忘倦尋常意中之事至淺近者也尊意以經文所顯微妙之法為黃葉為糟粕以後人所談淺近之理為真金為醇醪安得謂之不斷佛種乎尊示所引經云若經所在之處皆應起七寶塔極令高廣嚴飾不須復安舍利云云此文顯然以經與塔及舍利為三事何曾説塔即是經耶起塔之事三世諸佛法中之常軌所以供養生身舍利經典是法身舍利亦應起塔供養非是後人無知妄作也金剛經云經典所在之處即為是塔令人尊崇經典如尊崇塔也若塔即是經經即是塔則言塔不必言經言經不必言塔何須兩相比擬也哉大凡同是一物而有二名者必不將二名互相比論何以故原是一物故也凡有二名可以互相比論者必非同體何以故定是二物故也又尊示時識也三字未知出何典鄙意但知識是心法時是不相應行法若時劫不能融通自在依然被十二時轉何能轉得十二時耶尊示可大可小唯心量能之物量大小有定不能也此真所謂心外有法矣大而天地日月小而纖芥微塵無一不是唯心變現儻離心之外實有山河大地則盡法界衆生永無出生死之日何以故依報不能轉變正報豈能自由耶聲聞證無學果衆僧不信必令現十八變若不能現即須擯逐因其犯大妄語也此佛滅度後初五百歲之通例耳十八變中地水火風空皆能互用菩薩入初住時旋乾轉坤又何足怪至於維摩丈室在印度境人人得而知之豈菩薩神變能現於他方世界而不能現於此土耶即如現前金陵城內大街小巷屋宅荒野無一微塵許地不具十界依正互攝互入重重無盡豈得將此處定作穢土看耶當日法華會上如來種種神變惟菩薩大阿羅漢及根熟衆生方能見之見相即知法即悟解即證入爾時靈鷲山中牧童樵子僅見老比丘趺坐説法有許多比丘居士圍繞靜聽而已即諸天散華亦不能見豈能見無量諸佛菩薩同時雲集耶大師所引中庸云始言一理云云此非中庸之語程子之語也大師於佛經不重注疏至於儒書推尊宋人何也程子就世間理事而言則可而以此語作出世心法會引證芥納須彌等文則大不可蓋心無形相云何放卷若以緣大境為放緣細境為卷者六識攀緣心也其退藏於密者宋儒所謂心要在腔子裏楞嚴七處徵心第一執尚未破焉能見真性夫真實見性者隨機普應而無所在雖無所在而隨機普應所以二祖覓心了不可得即蒙初祖印可後人點胸自許者皆是執心在內也周易所云洗心退藏於密意在境智俱泯與此有別歸宗之語祇就李翱能領會處應機答之若作芥納須彌鐵板注腳則活句翻成死句矣尊示屢提見性二字見性是因中初步又提開方便門示真實相此是果位妙用經云唯佛與佛乃能究盡諸法實相等覺菩薩尚非其分而謂參禪見性者能之乎若云因該果海果徹因源直須善財龍女之儔頓證圓住乃能如是參禪見性者何能企及尊示引楞嚴經內佛斥阿難之語蓋為多聞不修者便呵多聞為無聞盲修者便呵無聞應病與藥豈有定法除糞喻者乃令二乘斷見思惑非令其除三藏聖教也見思若盡即證無學果便行三百由旬到化城矣且就聲聞論之在華嚴會如聾啞在阿含會斷惑證真在方等會大受呵斥在般若會轉教菩薩在法華會授記作佛如來教化皆有次第由淺而深禪宗一門直指人心見性成佛雖云教外別傳實是般若法門觀五祖六祖之語則可見矣所以禪宗祇須直下見性不論成佛不成佛法華會上諸大弟子授記成佛皆須歷久遠劫惟一龍女當下成佛此經之義不得以禪門見性概之蓋禪人見性大有淺深晚唐以後利根漸少雖云見性如暗室中鑽鑿小孔得一隙之明若比之太虛空曠日月星辰旋轉其中風雲雷雨變化其際不可同日而語矣明雖是同而大小有異以此等語言證法華深義何啻初生嬰孩比於成人乎摩訶迦葉為禪宗第一祖阿難為第二祖法華授記成佛均在久遠劫後則其他可知矣十二祖馬鳴是八地菩薩十四祖龍樹是初地菩薩可見禪宗證入深深性海仍須歷位而修始臻妙覺極果不宜儱侗和會尊示又引楞嚴云如來國土淨穢有無皆是我心變化所現云云大師判云如是非器界明矣此語聚九州鐵鑄成一大錯經文既言淨穢有無則穢者有者非器界而何大師意謂器界必非自心所變不但不知如來藏性併不知阿賴耶識見相二分矣密嚴深密等經瑜伽唯識等論皆詮此義此義不明則一切經論窒礙難通不得不別尋義路以解釋之然法華經深固幽遠五千比丘尚須退席機未熟也移置天人寄於他土不堪受此大法也今欲令下愚凡夫亦能見信專就淺近而説縱能啓凡愚之信仍非法華深義儻法華經義淺近如此天乘尚未能達何論二乘何論大乘更何論一佛乘耶總而言之經中寶塔出現諸佛雲集地涌菩薩等事當日在佛前聽法之人曾見此相否若實未見有此相則此經非靈山會上之經乃阿難筆底之經矣阿難既蒙授記又證無學更紹祖位如欲立言傳世化度後人祇須直截痛快暢會性理又何必無中生有憑空結撰令後人無從摸索耶尊示又云依經講句三世佛冤云云更有離經一字即同魔説須是不觸不背方免斯過若只認上句而忘下句豈但痛哭流涕直是千佛出世救他不得也鄙人不避忌諱作此逆耳之言非欲爭勝於筆端實為報恩於佛祖此段公案須俟彌勒下生時證明與釋惟靜書一前年沈雪峰歸自西蜀備述晤談形狀不勝悠然神往頃者袁司馬到寧得接手函展讀之餘如親道範欣慰莫名蜀吳一江相接而水遠山長二十年來不獲一晤世途睽隔有如是耶且喜法緣相接刻款頻頒謂非真淨界中心心相印乎會自別後始而奔走於湘鄂兩省既而馳驅於英法兩國雖俗務叢身而弘法之心未嘗稍懈近年閉戶窮經於釋迦如來一代時教稍知原委始信孔顏心法不隔𮈔毫柱下漆園同是大權示現自覺家居與庵居無異甘作世外間人不復問世態炎涼矣與釋惟靜書二頃接手函欣悉精神矍鑠振興教育為西蜀開普通之門實法運興衰之一大關鍵也江南學務莫先於揚州天寧寺而阻之者甚多甚至同室操戈鬬諍堅固甚可歎也拙作課本承尊處刻印流行欣喜之至聞日本亦有人重刻矣承賜圓覺大疏拜領謝謝若得刻資亦擬鐫板併在日本覓得大鈔可相繼而刻之承索出洋日記雖往返二次所見所聞均與他人紀載無異地在空中一彈丸耳老子所云不出戶知天下不窺牖見天道知此理者可於一毛端現寶王剎坐微塵裏轉大法輪矣與釋遐山書來示以古書所載老子蹤迹疑真疑妄請閲天人答宣律師問佛生時代則脫然無事矣西人在印度考究佛生時代多種不同莫衷一是可見後人記往古之事不能執為孰是孰非也嘗見今人述數十年內之事亦不能得其真但如煙雲過眼而已若於此等言句計較真妄則唯識理不成金剛經云一切有為法如夢幻泡影如露亦如電應作如是觀請深味乎其言也與釋式海書慈潤上善示以尊函得知弘法情殷慧光西矚欽佩無量今春同志諸君聞知印度佛法有振興之機彼土人士欲得中華名德為之提倡但兩地語言文字難以交通明道者年既長大學語維艱年少者經義未通徒往無益遂議建立祇桓精舍為造就人材之基用三門教授一者佛法二者漢文三者英文俟英語純熟方能赴印度學梵文再以佛法傳入彼土目前英文漢文教習已得三位惟佛學尚無其人幸法師肯肩斯任則三學具足矣但此學孰與公私學校章程大不相同教習各盡義務不送修金虛禮浮文一概不用來本孰者人人自知分所應為無主客之分平等平等各盡其心而已法師惠然肯來到寧日期遲早均聽尊便與釋自真智圓國瑛書接閲來函承囑唯識隨疏刊板一事敝處未能代辦鄙人經手事件有瑜伽師地論久未完工此論是相宗之祖世人患其無疏頃得東洋覓來之瑜伽論記係唐僧遁倫所作約八十萬字亦擬刻之更有東洋求得之古本書籍改定行款校正訛舛甚費心力會獨任其難其易辦者則讓他人校刻是則私衷所竊願也與周玉山馥書一比年來時事多艱知交中引退者有數人閣下其一也回憶攝山之遊何等豪健一轉瞬間已成六十衰翁閣下仕而後隱弟不仕而隱閣下以隱為隱弟以不隱為隱殊途同歸他日遭逢定當相視而笑也台從南遷不知稅駕何所或云在清江或云住泰州或云暫入白門即他往矣令人莫測其老子之猶龍乎娛老之方莫妙於學佛世間萬事置之度外神遊極樂之邦雖南面王吾不與易也閣下既辭軒冕敢以此言奉勸北方來款刻在楞嚴正脈壽經義疏門論義記三種之內茲寄呈兩分請以一分致裕方伯為荷又拙作陰符發隱十宗略説各一卷呈請教正便中惠我好音不勝翹盼之至與周玉山馥書二附來書前請劭甫觀察求賜內典十三經謹領到近日有人論亡人作閻羅事記得佛經中言閻王雖有職事與鬼無異略記不清公博覽羣經望將經中言及閻羅事鈔示或將原書封寄甚感前聞解組歸來遨遊廬阜望風懷想我勞如何頃接手函欣慰之至釋氏十三經由劭甫觀察經手彼已付價承問亡人作閻羅事佛典所載與世俗勸善書有同有異蓋世俗書中出於道家之言故有十殿等名而佛書則無之佛家言六道鬼道居其一由閻摩羅王主之權力甚為廣大世俗所傳死後作陰官者往往有之不過如陽世大小職官而已修行人若得此報是大不幸乃生前見道不明於淨土法門無專修之功以致被業力所牽受此陰界之報也兒孫若為其造福祈生淨土當於佛法門中作大功德小則超生天界大則徑往西方此義散見於內典不能專指一處故無書可寄與周玉山馥書三昨蒙垂顧惜別殷殷舊雨重逢未知何日會以足疾不能隨侍旌旄遨遊粵嶠寸衷耿耿墨楮難宣唐詩有云此心曾共木蘭舟直到天南潮水頭可謂先得我心者矣送上觀楞伽記一部全椒釋憨山所作東坡所謂不能句讀者憨山透徹無滯可稱傑作往生論注一册梁曇鸞撰此方闡揚淨土之書推為巨擘禪源諸詮一册和會宗教惜全書不傳僅存其序耳大小止觀天台家之要典也圓覺金剛二經注釋詳明維摩詰經極談妙理顯密圓通文約義豐高僧初集可見弘道有人方能流傳至今也以上十種計二十册治事餘暇偶一翻閲贈書之人宛在心目間也與馮華甫啓文書附來書接誦惠函均已領悉承詢云云文以行陰不停念念遷滅世間極聖猶落四見不出心外之法況乎後賢因而入佛默守話頭者亦有年矣及至廬山兼閲教典每讀無聞比丘短於聞教師心為足反遭墜墮故知教宜廣薰不致得少為足然而教有權實半滿開遮之別故讀教者先須知時方可區別事理佛以觀機逗教隨宜説法如果儱侗反被經縛此觀教之不易也至於歸趣云云實無處所可歸若有處可歸則亦化城之機或以無住為住亦可説得歸趣然無住之義深無涯際若悟華嚴不動佛之義則亦悟會無住之住矣故佛説華嚴終不離菩提樹而遍會諸天善財不動步於覺母之前而遍歷百城如是會之即此即彼豈有去來三世之迹法性遍虛空虛空無歸趣而無我之我亦無歸趣無我之我既無歸趣則真知無住為住之義矣雖然此須實證海印三昧方許受用也質之高明未識以為然否吾翁既得左右逢源之旨乃蒙分明道出先德曰分明一點無餘欠不待明星已現前此語正合逢源之旨如是則一理平等宜乎法無不通而密證之功亦即深入無際耳文以山河遠隔阻於執侍而渴念醍醐不啻雲霓之望還祈不捨有緣時錫金針以當曼室老人遙伸右手為一摩頂耳盼甚禱甚頃接惠函既承詳示道妙敢以直言答之大凡學佛法者入手切須的當釋迦佛出現世間應病與藥初無定法佛滅度後諸大弟子結集三藏是為教內正傳後來東土天台賢首慈恩諸師所闡揚者是也摩訶迦葉傳佛心印是為教外別傳東土六代祖師及五宗提唱者是也馬鳴龍樹宗淨土諸經勸人念佛往生是為教內別傳東土遠公曇鸞而後諸師弘揚者是也今閲居士見處從禪門參學而入以無住為住作歸趣妙則妙矣其如生死何君云無住之義深無涯際若單就無住二字即是一切不著別無深義經云應無所住而生其心又云應生無所住心此中深義在隨緣不變不變隨緣之如來藏心也夫金剛談無住之旨為二乘發大心者剗其朕迹也二乘已出生死回小向大故施此藥華嚴經內善財童子以十信滿心方得親見文殊指令南詢歷參知識證同佛智是謂初發心時便成正覺豈凡位所能企及君云善財不動步於覺母之前而遍歷百城此語不合經意經文善財於文殊所辭退南行向勝樂國參德雲比丘直至五十三參之後文殊遙伸右手過一百一十城摩善財頂文義甚明無去無來者真諦理也去來宛然者俗諦事也理事圓融方入法界僅從理上會得解行不能雙圓直須事上一一透過始得真實受用若如近時杜撰禪和稍得一知半解便謂超佛越祖世諦不除而除真諦俗見不掃而掃法見將一代時教盡行抹卻豈知西天二十八祖造論釋經宗説兼暢達摩以楞伽印心六祖無一字一義不合經文方為傳佛心印也居士所謂觀教不易者是未得其旨趣耳歸趣二字不可含糊發聲聞心以初果為入流以無學果為歸趣是謂化城發菩薩心以初住為入位以究竟妙覺為歸趣是謂寶所若未至初住總不能斷生死流唯有淨土橫超一門是至捷至妙之法也不然雖透末後牢關稍有業識未淨亦不免於輪轉耳一入胞胎前功盡失再出頭來未知何日矣君云法性遍虛空不知虛空亦是妄見楞嚴經云空生大覺中如海一漚發直得虛空量滅始有少分相應據居士見地不出當處即是一語大似隔靴搔癢故作此苦切之言以為他山之助弟於此事虛心體究不敢隨聲附和以蹈末法惡習儻不以弟言為河漢請將大乘起信論讀誦通利自能透徹真實佛法不至摩空捉影虛費時光也與陳仲培書附來書僕一官承乏久滯中州屢蒙大府以餉弱兵單詢及下走而才庸識淺無裨時艱如須彌一螢火耳負慚廊廟有志山林雖迷失本性恆河沙劫未能自憶受生幸昔年密承乩示有前生圓寂天目山之語僕擬二三年後片帆東下直指石頭見善知識合掌頂禮未識德山臨濟肯棒喝及之否然此猶俟諸異日目前有急欲折衷者特一一呈焉金剛決疑憨山大士之所注也僕始得之而驚驚所解必得真詮也繼讀之而疑疑所解多違經訓也須菩提於楞嚴會上自白於佛者頓入如來寶明空海同佛知見何至金剛一經佛則重重宣示須菩提則節節生疑此等疑團不但小乘無之即吾輩窮經其疑亦不至此況過去青龍如來耶願為有學折衷者一楞嚴呪心即密語也僕向不於密呪求解但有則存之不廢而已善知識訂訛正偽尤能上契佛心一會至五會僕俱成誦每日敬讀全呪三遍敬書呪末云敬誦三遍弟子某某受持超度幽冥所謂地獄餓鬼畜生同時解脫或告豫曰此住相布施也住相則呪不靈然否願為有學折衷者二楞嚴之二十五學圓覺之二十五輪善知識擇何學選何輪為涅槃門願為有學折衷而訓告者三承詢三條謹當裁答一者金剛決疑憨老之作本於天親昔無著宗彌勒偈而造論以十八住釋金剛經其弟天親又以二十七疑釋之法身大士各抒己見皆不違經意須菩提所興疑問為開導初發意菩薩而入般若法門所謂影響聲聞助佛揚化釋迦會下如是詢問乃至千萬億佛會下亦如是詢問須以本迹兩門權實二法通之則一切經典皆無疑滯矣二者呪是密語從古不翻蓋有深意惟楞嚴呪諸佛菩薩護法天神名號居多每段內有密語數句以滿漢蒙古西番四體全呪考之便知虔心持誦自他俱利若見諸相非相則一切有相當體即空雖念念度生實無生可度雖無生可度而念念度生尚何住相之有哉三者修習法門以稱機為貴楞嚴獨選耳根會則專學勢至以一切佛法入念佛一門即華嚴經融攝無礙之旨也嘗觀古來參禪之徒既透末後牢關而轉世退失者往往有之今時禪侶未開正眼輒以宗師自命掃除經教輕蔑淨土其不損善根而招惡果者幾希間嘗討論今古偏者斥之弊者救之棄粗淺而求精深捨浮泛而取真實期與如來教法毫不相違允為淨土資糧圓覺二十五輪以三輪為本即台家三止三觀之義念佛法門圓攝無遺不假他求也閣下身膺軒冕心切林泉其宿因深厚已可想見修道之士未證無生法忍輪回終不能脫惟有淨土橫超一門是出火宅之捷徑他日行旌南指暢談衷曲豈非三生舊好乎會漂流孽海年已六旬從公於江安湘鄂者十餘載隨使於英法義比者六七年應得升階辭不受以中書君老於牖下除流通法寶外別無所事也與陶矩林森甲書久未晤談渴想殊深頃聞攝篆常鎮欣喜之至弟所求者無他欲得大力主持開辦釋氏學堂耳揚州天寧寺已稟準立案開辦僧學堂定於二月間開校鎮江之金山江天寺常州之東門外天寧寺均在治下亦宜開設僧學堂以振興佛教但各寺住持僧安於守舊不樂維新非得大權力以鼓動其機不能奮發有為也與陳南陔采蘭書接奉手函併學堂示稿捧讀之餘莫名欽佩敝邑處山僻之境民智未開經賢父母為之提唱他日學業有成得預通才之列皆蒙大德所造就也弟衰老無能不談世務者十餘年矣自弱冠至今以釋氏之學治心以老氏之道處世與人交接退讓為先客冬旅寧同鄉倡議學務因弟於二十年前自歐回華曾提此議故堅約聚談而素性不與籌款之事是以書捐一册併未寓目兼之足力漸衰艱於步履自新歲以來遍告於人不與聞學界事矣去歲公牘信函弟均不願出名有兩次信寄劭甫兄伸明鄙意而同鄉諸君仍以賤名列於簡首實有違於老氏之道也安徽學會以賤名列於池董之內亦非弟所知蒯禮卿李幼山諸君屢促赴會弟均未往以固執之心不可奪也老父台明鑒秋毫尚希諒其愚衷幸甚與李小藝國治書一接讀手函領悉種種刻資五十金業已登收當付收條何以未到聞他處已有刻傳燈録五燈會元二書者金陵既無續到之款即將存資改刻觀楞伽記誠禪宗之要典也明春可以出書此中有陳仲培觀察一百四十金經末載施資姓氏或刻法名或刻別號請代詢示悉仲翁原擬刻法華指掌敝處因指掌不佳不願流通現有揚鎮僧俗集資鋟板矣近年嘗有就學於敝寓者九江桂伯華為最猛利已相依兩載矣現擬添造房舍能住二十人造就佛學導師為開釋氏學堂計也僕建立馬鳴宗以大乘起信論為本依大宗地玄文本論中五位判教總括釋迦如來大法無欠無餘誠救弊補偏之要道也漢汴鐵路明歲可通居士能作金陵之遊乎娑婆界中千載一時非宿緣湊合未易值遇也與李小藝國治書二甲辰之歲得手書併石墨二册書中有云六年俸滿乞退南來懸想上年當到乃至今未接光儀不知稽遲何所尊齒六十有五弟年七十有二安居樂道正其時矣南方有人發願重新印度佛教選才教授敝處獨肩其任台駕南來共襄盛舉是所願也僧徒課程計三門一者佛學二者漢文三者英文三門精通方能赴印度布教人數以十名為度非五萬金不辦籌款全仗他人分任此乃釋迦如來遺教中一大事因緣也往歲尊處寄來三色套板楞嚴全部業已奉還茲有同人欲刻此本如能將原本隨帶南來俟刻成後送新書幾部併舊書繳還原主不至遺失與馮夢華煦書夏間接讀手書承允撰金山長老二傳當即告知該寺退居老宿不勝欣喜之至秋闈揭曉趨令姪壽桐處道賀得聞尊嫂夫人於九月十四日亥時仙逝敝內亦於是日酉刻謝世先後數刻之間南北如出一轍敝內久病困憊不能念佛者已半年矣十四日午後忽呼媳女輩扶起念佛一炷香略睡片刻復令人掖坐而逝全身既冷頂門猶溫似有生西景象也尊夫人去時有善知識護持想能不失正念飄然遐舉矣正恁麼時顯示無常苦空無我之法有志出世者所當猛省與沈雪峰豐瑞書附來書弟自別後抵署內子業已去世鏡花水月原是虛浮而草載夫妻綿惙時未能一面以助其往生至今猶耿耿也孫紹鼎比部為懷遠山長由程朱而陸王由陸王而禪宗北方之學者未能或之先也聞亦曾與閣下論道現與弟尚稱莫逆日相質問覺辦道之念油然而生始知古人近朱近墨之言信不誣也今有疑義未能釋然不遠千里就高明證之長女年草一歲幼時聽父母講求因果即戒殺放生稍長聞有議婚者輒涕泣不食問其志云俟經義稍通願至金陵投圓音比丘尼祝髮弟即從其志回覆者數家然彼不過粗通文字大部經典皆未能讀僅讀金剛彌陀心經大悲呪四種尚不能通其義惟一心持誦佛名而已去歲母歿始持長齋今夏偶患時證纏綿二十餘日弟時時囑其念佛觀佛一心西向彼自恨修持時淺恐未能往生至五月卅日辰刻神氣大變時而昏迷弟即呼其名而警醒之喻以必能往生之理令其安心念佛如是者數次至未刻忽令人扶起西向而坐合掌念佛弟彼時因縣令之母有急病促往診治萬不能卻即囑媳女輩小心護持如見垂危切勿哀痛但念佛助其往生為要至酉刻歸來業已化去據媳女云弟出門兩刻彼忽開目四顧云父親何在衆云出外彼云無事不必尋他不過傳語請其放心我頃間已蒙二菩薩引去見佛業蒙佛授記下品下生因世諦中有兩次刲股療親之孝改為下品中生幸蒙父親時時提撕之力請其放心不必記罣也僕婦孫姓者亦長齋念佛見此情形云小姐是童女修真得此利益我輩半途修行恐趕不上彼云念佛只要真心不在半途不半途也又囑親屬云爾等平時念佛不真心恐不得力若能真心念佛到此方知受用矣大家勉之我去矣即垂目不語按之已氣絶矣弟歸時察其囟門額上猶如火熱聞説神清語朗來去自如似已得善果然有可疑者因其讀經未能通達持名不過三四年遽生安養恐無如是之易且經云一見彌陀即不退轉何以見佛受記之後又得回來勸慰諸人或另有因緣關係耶抑臨終時為魔所擾耶凡情未能測知大善知識慧眼明察定能徹其底蘊矣請明以示我以堅我輩淨土之願是所深幸所注陰符經已發刻否如有印本乞賜我一部為盻接讀手函備悉種種令嬡信心純篤正念往生甚為希有阿彌陀經歎為難信之法毗婆娑論説為易行之道知此二言便無疑義觀經説十惡五逆臨終稱名尚能往生況貞潔自處一心回向者乎彼臨終時感應道交乃係前陰將謝心鏡開朗菩薩接引如來授記之事皆於中現故能回顧家屬勸進修持非有去來之相亦非魔事也以理論之下品生者見佛聞法無如是之速然稱性法門無前無後一時頓現雖千百年後之事亦於頃刻間悉見悉聞所謂長時作短時短時作長時非凡夫意識所能測度也十萬億佛土天仙神力亦不能到而念佛者與彌陀願力相接一剎那頃即生彼土真淨界中有何隔閡之有哉奉贈拙作陰符經發隱併送孫紹鼎比部一册孫君信羅近溪之語不出明了意識邊事若能進而求之將如來一代時教究徹根源則知黃老孔顏心法原無二致不被後儒淺見所囿也與劉次饒紹寬書接讀手書得悉閣下潛心內典有年文學之士往往輕淨土而崇性理鄙人初學佛時亦有此見自閲彌陀疏鈔後始知淨土深妙從前偏見消滅無餘現住娑婆世界水火土石皆是衆生染業所感極樂世界金銀琉璃乃從彌陀淨業化成非如世人有貪愛心也楞嚴十因六報就造惡最重者言之所受之苦從自心變現各各差別非從外來也遙想閣下但閲經文未看注疏故生此種見解若多閲注疏自然了達無礙矣金剛心經二種注解甚多須分三類一曰正解二曰俗解三曰邪解專閲正解一類俗解邪解萬不可閲大凡佛經八面玲瓏其文義之妙如神龍變化飛空絶迹若以世俗之見窺之徒增迷悶耳佛經理事圓融毫無虛妄久久精研自能通達拙作佛教初學課本可閲附呈僧學堂課程一紙等不等觀雜録卷六目録與鄭陶齋官應書附來書與夏穗卿曾佑書附來書與桂伯華念祖書一附來書與桂伯華念祖書二與李淡緣息書一附來書與李淡緣息書二附來書與李淡緣息書三附來書與李淡緣息書四附來書與黎端甫養正書附來書與梅擷藝光羲書附來書與呂勉夫佩璜書與王雷夏宗炎書與陳大鐙心來書附來書與李質卿書與郭月樓道直書與廖迪心世臧書與某君書與陳栖蓮汝湜書一與陳栖蓮汝湜書二代陳栖蓮答黃掇焦書一代陳栖蓮答黃掇焦書二
