body:
  text: 清石埭楊文會仁山著彙刻古逸淨土十書緣起淨土家言流傳於世者以天台觀經疏及十疑論為最古嗣後作者寥寥咸謂學道之士羣趨於禪而淨業中衰斯言也余未之信頃年四海交通遂得遨遊泰西遇日本南條上人於英倫上人名文雄淨土宗傑士也既各歸國適內戚蘇君少坡隨使節赴日本屬就南條物色釋典凡中華古德逸書輒購之計三百餘種其中專談淨土之書自元魏以迄南宋擇其尤雅者得十種彙而刊之庶幾後之學者一展卷間得與如是諸上善人俱會一處也無量壽經義疏隋沙門慧遠撰觀無量壽佛經疏唐沙門善導撰阿彌陀經義疏宋沙門元照撰稱讚淨土佛攝受經疏唐沙門靖邁撰往生論注元魏沙門曇鸞撰安樂集唐沙門道綽撰西方要訣唐沙門窺基撰遊心安樂道唐新羅沙門元曉撰淨土論唐沙門迦才撰釋淨土羣疑論唐沙門懷感撰會刊古本起信論義記緣起大藏教典卷帙浩繁求其簡要精深者莫如起信論而解釋此論者自隋唐以來無慮數十家雖各有所長然比之賢首則瞪乎其後矣藏內賢首疏五卷人皆病其割裂太碎語意不貫蓋圭峰科會之本也蓮池重加修輯刻於雲棲憨山治為疏略刻於徑山文義雖覺稍聯總不能如原作之一氣呵成也近年求得古逸內典於日本自六朝以迄元明凡數百種內有起信論義記以十門開釋始知圭峰刪削頗多致失原本規模然經日本僧徒和會仍不免割裂之病求之數年復獲別行古本真藏公原文也讎校再三重加排定務使論文記文自成段落庶幾作者義味溢於行間後之覽者恍如親承指教也另有別記一卷似作於義記之先蓋別記所詳者義記則略之遂併刊以成完璧云日本南條文雄與余友善此記賴以得之其嘉惠後學豈淺鮮哉天竺字母題詞華嚴經云十方剎土有以諸佛音聲為體楞嚴經云此方真教體清淨在音聞天竺字母音聲之本也又經中有三種般若從文字起觀照從觀照證實相天竺字母文字之源也音聲文字既為入道之初門故以天竺字母刊示同學焉梵網經菩薩戒本疏題辭有學戒人問於豫曰賢首疏梵網戒經而不疏上卷何也豫應之曰此非淺見所能知也不觀夫天台智者大師乎既證法華三昧得無礙辨才於梵網經亦不疏上卷蓋盧舍那佛為諸菩薩說心地法門非凡位所能測知其文從四禪天傳來不類天竺語言什公譯經時禁筆受者率意潤文是以悉仍其舊不但天台賢首深知其意即唐宋諸師如勝莊太賢輩皆專釋下卷自明季以來始有併上卷而釋之者雖各抒所見以惠初學而未達古人不疏之意也問曰上卷法門既不能解然則流傳人間將何益耶豫曰弘法大士欲令世人生仰慕心修行升進中下之流作未來因利根上智慧眼開時不煩解釋而了如指掌矣賢首此疏深達戒經奧旨學者苟能悉心研究信受奉行自然從凡夫地直趣佛果不遭歧路豈非破煩惱障之利器行菩薩道之正軌乎經中稱為光明金剛寶戒可知上卷所說四十心地法門定當以此戒為基也學戒人歡喜踊躍曰今而後知所從事矣心經淺釋題辭代梅擷藝作或有問於豫曰往昔疏心經者多矣今獨作為淺釋何也豫應之曰心經文約義豐誦之者衆皆以古疏難通無從窺其蘊奧不有淺釋初學何由得入故淺釋者心經之津梁也夫心經以二百六十餘言攝盡六百卷般若妙義果能自淺而深徹見真空實相則一大藏教無不從此流出所謂般若為諸佛母也此經以心為名心也者十界聖凡所同具也迷則萬別千差悟則平等一致迷悟之機即在照見五蘊皆空一語耳五蘊本空非照之使空乃照見其本空也奈何衆生顛倒昏迷以空為有沈沒於苦海之中而不自覺若依經照之淺者漸脫塵勞深者頓超彼岸隨機獲益豈有定法問者唯唯而退遂記其言於簡首歐陽母朱生西行述題詞憶佛念佛現前當來必定見佛此經語也無禪有淨土萬修萬人去此祖語也信如此言則歸心淨土者何患不得往生乎嶺南歐陽氏號石芝者向道之士也事母極孝嘗以念佛法門勸進其母行之七年正念往生閲所述八瑞五奇求諸往生傳中亦不多見信乎石芝孝道精純有以致之也推此生度母之心以至西歸證道之後度多生父母亦復如是極而至於無量劫來六親眷屬不可稱不可數莫不如今生度母之誠方便化導而度脫之同歸無量壽佛清泰國中是則石芝從一孝道證窮法界之大願也夫大藏輯要敘例此書專為初學而輯分別部類以便檢閲凡羽翼經律論者概從本文為主亦臣子隨君父之義也華嚴部經分大小二乘大乘以華嚴為首凡賢宗及各家著述發明華嚴經義者概歸此部方等部開小顯大之經及有注疏者概歸此部淨土部係由方等分出另立一部以逗時機凡天竺震旦諸師演暢淨土宗旨者概歸此部法相部亦從方等分出以為專門之學慈恩宗及各家著述彙入此部般若部經論注疏彙為一部法華部法華各種注疏及開權顯實之經彙入此部涅槃部扶律談常自為一部以上通為菩薩藏小乘經此為聲聞藏不依說時列於方等之前者所以別於大乘也以上大小二乘統為顯部密部凡有壇儀之經及印度支那諸師撰述均入此部顯密二門圓融具足一代時教總括無遺矣大乘律菩薩調伏藏七衆同遵併諸家疏釋擇要彙集小乘律聲聞調伏藏非受具戒者不宜檢閲故所收從略大乘論菩薩對法藏為入大乘之要門釋經各部已隨本經別行之論併諸疏釋輯録於此小乘論聲聞對法藏卷帙繁多今略輯數種以見一斑西土撰集論藏所不攝者別為一類所謂雜藏也禪宗教外別傳不立文字語録一興浩如煙海今擇其要者彙為一宗天台宗釋經各部隨入經藏餘歸此宗傳記古聖高賢流風餘韻具載此篇纂集編輯成部者歸此一類弘護摧邪顯正責在僧伽救弊補偏功歸檀越靈山付囑意在於斯旁通歸元無二方便多門儒道心傳豈有隔礙耶導俗真俗二途霄壤之別不假方便心何由發言淺意深閲者毋忽賢首法集敘世之學華嚴者莫不以賢首為宗而賢首之書傳至今日者僅藏內十餘卷耳後人閲清涼大疏咸謂青出於藍而青於藍因欲易賢首宗為清涼宗蓋未見藏公全書故也近年四海交通得與東瀛南條文雄遊求覓古德逸書數百種所謂賢首十疏者已得其六方知清涼大疏皆本於探玄記也賢首作新華嚴疏未竟而卒後二十七年清涼乃生及其作疏一宗賢首豈非乘願再來闡發大經乎今將賢首著述去僞存真彙而刊之名曰賢首法集世之學華嚴者其以是為圭臬也可晉譯華嚴經探玄記百二十卷至相作搜玄記文義甚略賢首繼之作探玄記發揮盡致海東元曉得之立命弟子分講遂盛行於新羅其時唐土重譯華嚴既成學者舍舊從新賢首因疏新經未及半部而卒其徒慧苑足成之命曰刊定記多逞己意違背師說清涼疏內辨之綦詳今以二本對閲方知清涼作疏全宗此記鈔録原文十之五六其為古德所重如此而蕅益輒議之曰經既未全疏亦草略蓋係臆度之辭此記宋元以來無人得見蕅益何從而見之耶東洋刻本未會經文單記二十卷足六十萬言今以經合於記釐為百二十卷另有華嚴文義綱目一卷與此記同處頗多故不列入謹案華嚴經探玄記先生未及編會此云以經合於記釐為百二十卷者蓋其預定卷數也編者識梵網經菩薩戒本疏古本六卷今作十卷重戒以十門解釋輕戒以八門解釋精深切當超越古今學菩薩道者得此疏而研究之則亦庶乎其不差矣般若波羅密多心經略疏一卷此疏與基師幽贊一時而各出手眼判然不同宋僧師會作連珠記以輔翼之前於此者有靖邁疏唐人疏心經流傳至今者惟此三種耳入楞伽心玄義一卷考本傳有楞伽經疏七卷求之日本僅得玄義一卷已可見全經大旨矣賢首十疏中已得者華嚴探玄記梵網經疏心經略疏起信義記十二門論宗致義記法界無差別論疏及此卷未得者新華嚴經未完之疏幸有清涼疏鈔補其缺略密嚴經疏得日本殘缺寫本核其文義不類賢首之作法華經疏無可尋覓惜哉大乘起信論義記古本三卷今作七卷別記一卷此論古疏傳至今時者僅見三家隋之淨影唐之賢首海東之元曉雖各有所長而以賢首為巨擘後世作者何能企及今於東瀛得賢首原本會而刊之實為學摩訶衍之要門也十二門論宗致義記古本二卷今作三卷杜順和尚法界觀門以真空觀居首為後二觀之基藏公此記即以成就空觀也學者能於此記及心經略疏融會貫通則得速入般若波羅密門法界無差別論疏古本一卷今作二卷非得此疏論中深義後人何從而知之華嚴指歸一卷內分十門每門又分為十以顯十十無盡法門也學華嚴者切宜深究世人以華嚴指歸還源觀金師子章名為賢首三要由今觀之豈止三要妄盡還源觀一卷內分六門一體二用三遍四德五止六觀台家每謂賢宗有教無觀曷一覽此文乎華嚴三昧章一卷新羅崔致遠作賢首傳用華嚴三昧觀直心中十義配成十科證知此章即觀文也東洋刻本改其名為發菩提心章於表德中全録杜順和尚法界觀文近三千言遂疑此本非賢首作庚子冬南條文雄遊高麗得古寫本郵寄西來首題華嚴三昧章讎校盡善登之梨棗因來本作章故仍其舊尚有華嚴世界觀求而未得也華嚴義海百門一卷以一塵暢演法界宗旨文獻通考作百門義海元明以來無人得見今從日本取來係由宋本重刻者末後闕一總結第八門亦有脫文是宋時已無完本矣一乘教義分齊章一名華嚴教分記古本三卷今合疏作十卷賢首宗旨備於此章宋道亭作義苑疏更為詳明近代杭州僧柏亭撰賢首五教儀分門別類備列名相欲與台家教觀爭衡而不知其違於古法嘗試論之教義章內凡提頓教所引經文皆無位次柏亭則概列位次華嚴四十二位不列四加柏亭則概列四加圓教十住初心便成正覺應判分證位柏亭則判相似位此其顯然者也賢首既有此章學者苟能神而明之於一乘教義徹底通達矣此章之末說十玄門本於至相原書及作探玄記改易數名為清涼張本後人謂清涼十玄異於賢首者蓋未見探玄記也華嚴金師子章一卷賢首說此章至一一毛處各有師子武后遂悟華嚴宗旨宋沙門淨源參酌四家注釋作雲間類解盛行於世三寶章內分八門傳稱三寶別行記想即此也明藏以下之六章合為兩卷統名華嚴經明法品內立三寶章相沿數百年無人釐正學者粗心看過以流轉等章與三寶名目義味無涉遂不措意今將各章分析刊行俾後之學者隨舉一章皆得探其蘊奧也流轉章即生滅顯無生即流轉顯不動入道捷徑無過於此有志之士請細玩之法界緣起章內有四門僅了第一門餘三門缺圓音章舉一語業顯三業之勝佛果妙用衆生心地本自有之但以無明障蔽而不能顯既讀此章當知愧憤策勵修行也法身章內分四門十世章此觀純熟一切妄執自然消落立法之巧妙迥出常情也玄義章內分十門即華嚴玄義也華嚴經傳記占本五卷今作三卷一名華嚴感應傳後代屢有改作漸失原本規模今得此書內稱賢首法師處甚多想係門下士增修之本也賢首國師別傳一卷新羅崔致遠作此本中土無傳且撰述在各家之先故附於法集末卷華嚴策林一卷普賢觀行法門一卷華嚴經問答二卷華嚴遊心法界記一卷以上四種均係贋作故不收録日本續藏經敘三藏教典結集於印度者不可知其部帙之數自流傳震旦至隋唐以來代有增益由五千以至七千此其大較也明紫柏尊者以方冊代梵策閲者便之大藏以外復有續藏合之已逾萬卷以遭兵燹板已無存者豫與同志欲踵刊之而未成也近年日本藏經書院以聚珍版刷大藏經較弘教書院之本字大而便覽豫已購而藏之頃復製續藏經凡印度支那古德撰述未入大藏者悉集而刷之為部千六百有奇卷逾八千仍搜求古遺之本正未有艾也豫亦為之搜輯樂觀其成是輯也得六朝唐宋之遺書為紫柏所未見誠世間之奇搆實足補隋唐所不足也大乘中觀釋論敘經云以有空義故一切法得成故三藏教典以般若居首蓋真空實相為諸佛母也龍樹菩薩造五百偈發明空義青目菩薩釋之姚秦三藏鳩摩羅什譯出名曰中論凡二十七品分別明菩薩又釋之亦二十七品譯於唐波羅頗密多羅名曰般若燈論安慧菩薩又釋之譯於宋惟淨三藏名曰大乘中觀釋論三部均入大藏惟宋譯僅十三品不無遺憾近時日本新印大藏經由高麗古本鈔出後分十四品而成完璧金陵貫通大師見之歡喜踊躍集資鋟板以廣流傳俾後之學者三部參觀豁然證契頓入如來寶明空海則六百卷般若妙義一時現前豈非法門之快事乎中論疏敘龍樹菩薩傳佛心印為十四祖其教人之法以般若真空為本嘗作中論五百偈闡揚第一義空初至東土傳習之士首推羅什門下生肇二公肇公作論至今獨存生公諸論僅存其名惜哉隋唐間嘉祥吉藏禪師專弘此道作三論疏行世當是時學天台教者每以北齊慧文遙宗龍樹僅取三觀一偈為台教之祖而禪宗諸師又以不立文字棄龍樹妙論於不顧於是三論一宗遂成絶學近代四海交通嘉祥三論疏自扶桑傳來梅擷雲居士見而愛之玩味不釋手遂將論疏二本纂合鋟板俾世之學者由此證入般若波羅密門則知如來心傳不即文字不離文字與其苦參一句無義味語謂之教外別傳何若快讀此論此疏如清涼水洗滌塵垢一旦豁然透脫即證擇滅無為較之禪家所證非擇滅無為出百法明門六種無為之二豈有二哉成唯識論述記敘性相二宗有以異乎無以異也性宗直下明空空至極處真性自顯相宗先破我法後彰圓實以無所得而為究竟乃知執有執空互相乖角者皆門外漢也唐以前相宗典籍未被東土自玄奘法師西遊印度而後唯識一宗輝映於震旦矣有窺基法師者奘公之高弟也親承師命翻譯成唯識論會萃十家而成一部並以聞於師者著為述記學相宗者奉為準繩逮元季而失傳五百年來無人得見好學之士每以為憾近年四海交通得與日本博士南條上人遊上人以此書贈豫金陵講經沙門松巖見而心喜亟募資鋟板揚州觀如大師願任其半未及竣工而觀松二公相繼西逝江表緇素踵而成之嗟乎此書失之如此其久得之如此其難而倡刻之人皆不見其成以是見唯識一宗流傳於世非偶然也後之覽者其勿等閒視之普賢菩薩圓妙方便總持法門敘顯宗居士者故友曹君鏡初之法號也遺篋中得其所著書若干種內有普賢菩薩圓妙方便總持法門一卷其子詠香齎以示余余受而讀之歎曰此真所謂拈一莖草作丈六金身者乎夫牙牌者戲具之小焉者也居士即以普賢乘六牙象目之因而暢演十法界六波羅密五時八教參互錯綜貫攝於三十二支之內頓使支支點點放光動地熾然說法無有間歇而衆生現前受用不聞不覩惟應度者乃能知之嘗思華嚴法華等經真俗融通理事無礙昔李長者以卦象釋義藏國師以金獅說法今曹居士以牙牌示象推而至於一草一木一棒一喝莫不皆具法界體用後之作者塵說剎說海墨書而不盡其以是為嚆矢也夫大宗地玄文本論略注自敘大宗地玄文本論建立金剛五位以衆生無量劫來業果相續非三僧祇修證之功不能盡除故立無超次第漸轉位以衆生一念相應即同諸佛故立無餘究竟總持位以衆生心含法界普融無盡故立周遍圓滿廣大位以衆生念念著有違解脫門故立一切諸法俱非位以衆生棄有著空趣於斷滅故立一切諸法俱是位上之五位為佛法之總綱攝盡一切破障法門該括一切稱性法門纖毫無遺若明此義則談宗談教說有說空皆不相妨何有分河飲水互相是非之弊哉奈何千餘年來無人提倡遂使無上妙法祕而不宣誠不解其何故也或以論中名義玄微皆是法身大士行相非凡位所知師家艱於應對故不以此論示人然一切悉知必至佛果等覺以還隨分演說不害其德望也儒門所謂知之為知之不知為不知是知也會竊取此義略加注釋所未知者斷不強解庶幾後學得一隙明或有利根上智頓入甚深法界徹底通達是所望也其文義明顯者亦不詮釋閲者自能領會耳高麗古藏作二十卷與起信論序相符宋元藏皆未收入明藏作八卷復併作四卷今從之此論窮微極妙專接利根上智兼為凡小權漸之機作一乘勝因伏願見者聞者熏習成種久久純熟心光發宣即能頓入金剛信位圓修圓證五位齊彰與論主大願注者誠心交光相羅如寶絲網輾轉開導無有既極釋摩訶衍論集注自敘翻譯釋論當在譯大乘起信論之後因本論全文與真諦所譯相同也卷首題姚秦時譯誤矣隋唐五代未見流行永明禪師作宗鏡録始引此論至遼時大顯於世疏記鈔相繼而出考至元法實勘同録尚有釋論十卷而疏記鈔久佚矣近時從日本傳來亟欲刊行而科文繁多恐後人疲於心力轉令本釋二論不能精究因摘其要言注於釋論之內科文一概刪去如肇公注維摩經之例另有聖法記數紙作時最先亦摘録之以成善本謹案先生擬輯是書未遑屬稿今可見者僅此敘文惜哉編者識佛教初學課本自敘釋教三字經者明季吹萬老人效世俗訓蒙之書而作也敏修長老為之注釋流傳二百餘年矣頃者普陀印光法師從而新之正文改十之三注釋改十之七原本編為兩排者改而為一排考據精詳文辭圓潤超勝舊作而題名之處不將重訂者列於其次可謂坦然忘我者矣豫不揣固陋率爾改作與新舊兩本迥不相同事略而法備言簡而義周人有勸豫易其名者因名之為佛教初學課本云道德經發隱自敘憨山清禪師解道德經歷十五年方成雖與焦弱侯同時而弱侯未之見也故其輯老子翼闕憨山解誠為憾事弱侯所採凡六十四家後解之者更有多種故經中奧義發揮殆盡矣豫閲道德經至出生入死一章見各家注解無一合者遂以佛教義釋之似覺出人意表復益二章總陰符發隱梓之或問孔子既稱老子為猶龍何以其書不入孰課耶答曰漢唐以來人皆以道家目之不知其真俗圓融實有裨於世道人心若與論語並行家弦戶誦則士民之風當為之一變也沖虛經發隱自敘列子書八篇唐時尊為沖虛經與道德南華並重注道德者多於南華而注沖虛者特少在晉則有張湛在唐則有盧重元此二種現行於世考書目所載有唐殷敬順宋江遹二解求而未得也甲辰夏索居避暑取列子讀之妙義顯發多出於張盧二家之外如開寶藏如涌醴泉實與佛經相表裏信筆直書得四十二章約計全書三分之一因名之為沖虛經發隱云南華經發隱自敘太史公言莊周作漁父盜跖胠篋以詆訾孔子之徒以明老子之術豈知漁父盜跖皆他人依託大違莊子本意觀其內篇推尊孔子處便可知矣司馬氏不於內篇窺莊子之學而據僞撰以判莊子宜其將老莊申韓合為一傳也至唐初尊之為南華經而作注解者漸多唯明之陸西星憨山清二家以佛理釋之憨山僅釋內篇西星則解全部今閲二書猶有發揮未盡之意因以己意釋十二章與古今著述迥不相同質之漆園當亦相視而笑嘗見宗鏡判老莊為通明禪憨山判老莊為天乘止觀及讀其書或論處世或論出世出世之言或淺或深淺者不出天乘深者直達佛界以是知老列莊三子皆從薩婆若海逆流而出和光混俗說五乘法人乘天乘聲聞乘菩薩乘佛乘能令衆生隨根獲益後之解者局於一途終不能盡三大士之蘊奧也重刊淨土四經跋豫初聞佛法惟尚宗乘見淨土經論輒不介意以為著相莊嚴非了義說及見雲棲諸書闡發奧旨始知淨土一門普被羣機廣流末法實為苦海之舟航入道之階梯也無如兵燹之餘僅見小本彌陀經而於大本無量壽經及十六觀經迄不可得適來金陵獲見此本於王君梅叔處覓之數年者一旦得之喜出望外此本為邵陽魏公默深所輯魏公經世之學人所共知而不知其本源心地淨業圓成乃由體以起用也世緣將盡心切利人遂取無量壽經參會數譯刪繁就簡訂為善本復以十六觀經及阿彌陀經普賢行願品合為一集名曰淨土四經使世之習淨業者但受此本無不具足自逆匪竄擾以來其板想不復存今者廣募信施重鋟梨棗庶幾魏公一片婆心末學咸受其惠伏願世間修佛乘者毋於淨土便生輕慢須信念佛一門乃我佛世尊別開方便普度羣生之法儻不知其義旨深微但能諦信奉行自有開悟之期知其義者正好一心回向萬行圓修轉五濁為蓮邦證彌陀於自性是則豫之所厚望焉華嚴一乘十玄門跋華嚴大教闡揚十玄門者此為鼻祖賢首仍之載於教義章內大意相同而文有詳略及作探玄記改易二名用一華葉演說為清涼懸談張本後人不知以為清涼十玄與賢首有異者蓋未見探玄記也今教義章與懸談並行於世而復刻此卷欲令人知其本源耳起信論疏法數別録跋右依百法明門論唯識一宗名相繁多慈氏菩薩所說瑜伽師地論有六百六十法天親菩薩約之為百法即此百法明門也起信論雖專詮性宗然亦兼唯識法相蓋相非性不融性非相不顯故特録百法於篇末庶易檢尋焉起信論真妄生滅法相圖跋馬鳴大士撰起信論貫通宗教為學佛初階不明斯義則經中奧窔無由通達賢首國師特為造疏判屬大乘終教蓋下接小始上通頓圓也慈雲灌頂法師總括論義輯成一圖真妄諸法瞭如指掌長沙曹顯宗居士復加參訂俾教網脈絡毫髮無遺可謂精益求精簡而又簡矣爰附刊於論疏之後以廣流傳焉西方極樂世界依正莊嚴圓圖跋昔善導和尚畫淨土變相三百餘壁歲遠年湮不可復覩近代彭二林居士繪極樂莊嚴手卷系以詩偈豫曾見之歎賞不置然篇幅甚長未便懸供也有拙道人者專修淨業雅尚蓮宗見南北叢林所刊極樂圖未臻精妙乃考淨土三經參以造像量度選擇良工繪而刊之時在同治癸酉歲也五年之間流布二千餘幅板漸銷磨道人慨然曰此圖之出啓人淨信者多矣然作者之心猶有進焉於是轉方廣為圓融現毫端之寶剎大含細入隱顯交參以重重無盡之心寫無盡重重之境脫稿成於匝月開雕竣在期年一佛當陽現萬德莊嚴之報相羣生皈命遵十方交讚之深經其託質蓮池者有少有長順凡情也剋實而論六道往生女轉為男老變為少永無衰耗之相又其中菩薩緣覺聲聞為上首者略標九品復有初出花胎未入聖位者不妨權現人天相也他如經行坐禪誦經聽法或在地上或在虛空有從他方飛身來者有從空中化身去者神用無方略見一斑也樓閣欄楯行樹羅網寶幢幡蓋水鳥光明隨方點綴以表無量經中備言娑婆極樂苦樂之相及兩土修行難易差別彌陀本願有云十方衆生至心信樂欲生我國乃至十念若不生者不取正覺今成佛以來已十劫矣此願非虛切宜諦信若夫利根之士高談性理輕視蓮邦是皆未達空有圓融之旨棄大海而認涓滴者也當知一真法界迥絶思議以言其體則纖塵不立以言其用則萬有齊彰娑婆既唯心所現極樂豈外乎唯心是故上品者圓證無生法忍以其解第一義也即中下之流信心堅固願行純篤但得往生徑登不退無始輪回一朝永斷豈不截然大丈夫哉畫者山陰張益刻者丹徒潘文法也西歸直指跋玉峰周安士先生著述傳於世者計有四種一曰陰騭文廣義二曰萬善先資集三曰欲海回狂四曰西歸直指凡有見者莫不歡喜信受以故各處刊板流通最廣西歸直指一書經吳門江鐵君刪改非復周氏原制江君以為綱要一卷撮舉王龍舒所輯大彌陀經及四十八願等今已先將魏譯無量壽經及二林居士所著論合刻流行則綱要可以不列不知周氏此書全從各家撰集中摘來若以他本所有者概不重出則此書不至刪除淨盡不止也今於虞山朱君保之處得勝蓮居士施刻原本見者慶喜無量咸謂周君願力所持特留此本嘉惠後學也亟授手民以復舊觀周君有云願將東土三千界盡種西方九品蓮惟冀輾轉流通以相傳於無窮耳書起信論海東疏記後嘗考傳記義想與元曉入唐參禪曉公悟唯心之旨中途而返義想宋傳作湘就學終南歲久方歸賢首作華嚴探玄記寄之想公命弟子分講大闡華嚴宗旨又考諸宗章疏録載元曉著述四十七種而義想僅一卷耳及見日本大安所作海東別記序稱元曉與法藏同受學於至相之門始悟義想元曉一人也如此方稱憨山德清蕅益智旭之類後人不察歧而二之誤矣宋贊寧作二公傳恍忽離奇尤不足信因校疏記併以識之書華嚴念佛三昧論後彭二林居士撰華嚴念佛三昧論以五門分疏可謂盡善盡美矣唯後之問答第四章內謂方山喫緊提倡在十住初心即成正覺若依自力積劫熏修程途尚遠此語與華嚴圓頓門似覺有礙何則方山宗旨唯是一時一處法門不立日劫遠近之見二林見地圓明當不至以時量為實法想是偶失檢點耳書居士傳汪大紳評語後居士傳內汪大紳評語直截痛快實具宗匠手眼但其中每引程朱為契合似覺不類度其意無非欲引理學家究明心宗耳然理學家既宗程朱決不信有此事是汪君援引之意不能令儒者生信反令儒者易視禪宗以為不出程朱心學矣甚哉立言之不可不慎也豫願他日重刻此傳將評語內與儒家牽合者節去未始非護法之一端也等不等觀雜録卷四目録大藏總經目録辨一藏數目辨評佛祖統紀評楞嚴指掌疏評阿彌陀經衷論評金剛直解講義合參評方植之向果微言評日本僧一柳讀觀經眼評日本僧一柳純他力論答釋德高質疑十八問答廖迪心世臧偈附問偈印施西方接引圖回向發願偈
