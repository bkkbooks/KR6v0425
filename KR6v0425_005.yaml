body:
  text: 馬鳴菩薩造陳真諦三藏譯清楊文會略注繫縛地地品類不吉祥道路大決擇分第二十七此就生滅門中雜染分説重言地地者表雜染無盡也一繫縛一切繫縛即是同品同類統名不吉祥道路因位修行莫不由此而求出離或疑二十四分既名離惡品藏二十五分既名非患道路何故此分復名不吉祥道路耶答曰自弟七分以來詳示五位行相而未明次第漸轉之功故從此分以下説修證階差以收前文對治之效耳如是已説摩訶寶輪王廣大圓滿無上地地大決擇分次當説繫縛地地品類不吉祥道路大決擇分其相云何偈曰繫縛道路中亦有金剛位依位立轉相則有四種法謂能所障果如是四種法皆悉有為量如法應觀察論曰就繫縛地地品類不吉祥道路分中亦有五十一金剛位依此諸位建立轉相有四種法云何為四一者能證智法二者所證理法三者障礙事法四者證得果法是名為四如是四法皆有為量應審思擇如偈繫縛道路中亦有金剛位依位立轉相則有四種法謂能所障果如是四種法皆悉有為量如法應觀察故此從凡位入信位之初説對治法門有斷有證與第七分名異義同皆是漸轉門中最初方便也如是四法各有幾數其轉形相當如何耶偈曰各有二種法謂本始體相生滅及增減轉相唯上上發始因地唯有上轉而無下轉橫轉論曰四種法中各有二種云何二智一者本古性德智二者始今起德智是名為二云何二理一者體有實理二者相有實理是名為二云何二障一者本生本生障二者本滅本滅障是名為二云何二果一者增長功德果二者損減過患果是名為二如偈各有二種法謂本始體相生滅及增減故修行轉相唯上上故如偈轉相唯上上故障治證果對量差別形相如何偈曰本生體增對始滅相減對從多亦通了如法應觀察論曰本古性德智斷除本生本生障證得體有實理成就增長功德果如偈本生體增對故始今起德智斷除本滅本滅障證得相有實理成就損減過患果如偈始滅相減對故如是四法五十一種真金位中皆悉具足應審思擇繫縛地中具有五十一金剛位所謂染無自性全體即真也故四種法中以智理二法斷除生滅二障證得二果本古性德者性淨本覺也本生障者生相無明也體有實理者不從修得也增長功德果者稱性功德修而後顯也始起德智者始覺修德也本滅障者滅相無明也相有實理者萬行莊嚴也損減過患果者煩惱漸薄歷位修證也生住異滅四相以住相攝入生相以異相攝入滅相本生本生者生生不已也本滅本滅者滅滅無窮也皆言本者莫不依真而起也生相極細滅相極粗皆是染法故名繫縛地也就繫縛地智理事果皆名有為以從修證而得果也至三十一分出離繫縛地則十空十有皆名無為矣唯一向轉俱種轉耶上問下答俱種轉故如偈從多亦通了如法應觀察故生滅二障業用差別形相如何偈曰本主生滅時勝生勝滅故論曰功德善根出興對治轉勝出興轉勝對滅作逆事故如偈本主生滅時勝生勝滅故故本古性德智稱之為本主本主原無生滅從對治法上言其生滅生善滅惡皆能勝他對障礙法而作逆事是不屈撓行也引經第三十六大金剛山寶海會衆修多羅中作如是説復次文殊師利汝前所問云何名為諸法無常一道一種第一轉門者以四無常故我作如是唱云何為四一者智無常二者理無常三者無常無常四者上果無常是名為四文殊師利言智無常者斷煩惱故言理無常者智所證故言無常無常者被斷除故言果無常者待因力故乃至廣説故在無常法中第一轉門法法皆名無常言無常無常者即前文障礙事法也繫縛地地自然本王摩訶縯品大決擇分第二十八繫縛地中本王自在故有為無為二法齊轉所謂染淨同源縛脫無二也縯子為切考字典縯字縯字之訛縫衣相著為縯可以意會如是已説繫縛地地品類不吉祥道路大決擇分次當説繫縛地地自然本王摩訶縯品大決擇分其相云何偈曰自然本王中有為無為法具足圓滿轉此中具上下論曰就自然本王摩訶縯品分中則有二轉云何為二一者有為轉二者無為轉是名為二如偈自然本王中有為無為法具足圓滿轉故亦有二轉云何為二一者上轉二者下轉是名為二如偈此中具上下故此是第二轉門應是住位故有為無為並行上轉下轉齊運有為無為各有幾數上下轉相當如何耶偈曰無為唯有一有為有二種如次實本始上下無為主出生二有為轉勝廣大轉論曰無為有一有為有二一謂有實故二謂本始故如偈無為唯有一有為有二種如次實本始故依真際説唯一實理故言無為唯有一依世俗説權分本始故言有為有二種如是三法五十一種金剛位中亦上亦下增長功德轉相云何謂上時中一一位位無為法主皆悉各各出生增長一萬本始清妙覺慧其下時中一一位位皆悉各各二億本始清妙覺慧具足圓滿出生增長如是如是如如上下至小無量如説本存眷屬亦爾如偈上下無為主出生二有為轉勝廣大轉故如其次第增數應知引經第三十七品地經論修多羅中作如是説世間藏地本王海中無常功德衆多無數常住功德其數微少是故説言世間藏地乃至廣説故世間藏地是雜染門本王海中是清淨門雜染未盡淨業未純故功德多屬無常而常住功德甚微少也自然本王廣大轉地無障無礙俱行道路大決擇分第二十九如是已説繫縛地地自然本王摩訶縯品大決擇分次當説自然本王廣大轉地無障無礙俱行道路大決擇分其相云何偈曰本王道路中依位漸漸轉一主生二伴至中無量故數變皆悉通如法應觀察論曰就自然本王廣大轉地無障無礙俱行道路分中依五十一位如其次第亦上亦下漸漸轉行無為法主生二有為若上若下增中無量數至中無量變故如偈本王道路中依位漸漸轉一主生二伴至中無量故數變皆悉通如法應觀察故引經第三十八部宗花品修多羅中作如是説行藏海中有一常德其數無量行藏海中有二無常功德品類其數無量亦升亦𢩹胡雅切其數無量乃至廣説故此是第三轉門應是行位行藏海中與前世間藏地本王海中大不相同所以常德與無常德皆是無量升進之功思之可見最極廣大俱行山王無盡海海大決擇分第三十如是已説自然本王廣大轉地無障無礙俱行道路大決擇分次當説最極廣大俱行山王無盡海海大決擇分其相云何偈曰無盡海海中依位漸漸轉一主生二伴至大無量故數及變例前應廣通達焉論曰就無盡海海藏中依五十一位如其次第亦上亦下無為法主出生增長二有為法增大無量數至大無量變故如偈無盡海海中依位漸漸轉一主生二伴至大無量故數及變例前應廣通達焉故引經第三十九彼修多羅中作如是説行常山王海中有三種大無量云何為三一者常大無量二者無常大無量三者轉變大無量乃至廣説故此是第四轉門應是回向位回向妙果名為行常山王常與無常并及轉變皆大無量已稱法界性矣出離繫縛地清白解脫道路大決擇分第三十一如是已説最極廣大俱行山王無盡海海大決擇分次當説出離繫縛地清白解脫道路大決擇分其相云何偈曰解脫道路中有二十無為謂十空十有如是諸無為五十一位中皆悉具足有依法位立轉有二重重超論曰就出離繫縛地清白解脫道路分中則有二十無為常法所謂十空十有無為各差別故此是第五轉門位在地上忽然超越世出世間名為離繫縛地故十空十有皆是無為金剛經云一切賢聖皆以無為法而有差別即此論中所説五十一位具足二十無為差別而轉也云何名為十空無為一者廣大虛空自然常住離造作空無為二者大虛空影空無為三者虛空影影空無為四者破影無所有空無為五者空空俱非空無為六者離言絶説空無為七者絶離未畢空無為八者絶離心解空無為九者絶離窮窮空無為十者無障無礙大空大空空無為是名為十云何名為十有無為一者一切言説決定常住無破非空無為二者一切心識決定常住無破非空無為三者一切大種決定常住無破非空無為四者一切俱非決定常住無破非空無為五者一切有實決定常住無破非空無為六者一切性火決定常住無破非空無為七者一切今光決定常住無破非空無為八者一切有名決定常住無破非空無為九者一切無名決定常住無破非空無為十者廣大圓滿自性本有一切種有決定常住無破非空無為是名為十如偈解脫道路中有二十無為謂十空十有故如是二十種無為法五十一種金剛位中具足圓滿無闕失轉如偈如是諸無為五十一位中皆悉具足有故依如是等二十無為五十一位建立轉相則有二種云何為二一者重重該攝無障礙門二者次第亂轉超過門是名為二如偈依法位立轉有二重重超故且重重該攝無障礙門形相如何偈曰二十法一一各攝後二十五十一種位一一皆各各攝五十一位亦此相違攝以此因緣故建立重重名論曰云何名為重重門相謂該攝故云何該攝謂二十種無為常法信心具足一一各各攝後諸位各二十種無為法故如説信心餘位亦爾如偈二十法一一各攝後二十故五十一種位各攝五十一亦無障礙如偈五十一種位一一皆各各攝五十一位故亦一一法攝一切位一一位位攝一切法亦無障礙如偈亦此相違攝故以如是二種該攝門故立重重名如偈以此因緣故建立重重名故如是已説重重該攝無障礙門次當説次第亂轉超過門其相云何偈曰五十一位中隨一經五十漸漸增法數周遍廣大轉論曰今此偈中為明何義為欲現示五十一種金剛位中以信為初經五十位以發心住而為其初經五十位乃至以最極地而為其初經五十位若第一轉增四十一百數法位轉若第二轉增八十二百數法位轉乃至最後地故如偈五十一位中隨一經五十漸漸增法數周遍廣大轉故引經第四十蘊高山王品類修多羅中作如是説無破地地門中有寂靜寶其數衆多空寂靜寶其數衆多若有行者入此門中通達諸法無為大道無所障礙無所疑畏其心自在決定常住大安樂漸漸增長常功德海乃至廣説故世人但知空寂靜寶而不知有寂靜寶有若喧動則違於空空有相違即是凡夫外道之法若知二門皆寂則真常性德無雜無障矣解脫山王根本地地無礙自在大決擇分第三十二如是已説出離繫縛地清白解脫道路大決擇分次當説解脫山王根本地地無礙自在大決擇分其相云何偈曰根本山王中空有互相生諸位相生故轉勝廣大轉論曰今此偈中為明何義為欲現示十空無為一一各各出生十有無為常法十有無為一一各各出生十空無為常法空生有有生空故名空有互相生五十一位一一各各出生五十依重重等門圓滿廣大轉故如偈根本山王中空有互相生諸位相生故轉勝廣大轉故引經第四十一摩訶衍海修多羅中作如是説解脫海中亦有空有亦有有空其數衆多如是空有唯是常滅真常寂滅非無常量唯是功德非過患品菩薩盡地求纖毫過患不可得是故説言解脫藏海乃至廣説故解脫山王大道路大決擇分第三十三如是已説解脫山王根本地地無礙自在大決擇分次當説解脫山王大道路大決擇分其相云何偈曰山王道路中前所説量中增空空有有位位轉勝生論曰就解脫山王大道路分中則有三轉云何為三一者空空轉十空無為一一各各生十空故二者有有轉十有無為一一各各生十有故三者位位轉五十一位一一各各生五十故是名為三取自相生非他相故空生空有生有位生位皆自相生也前分空有互生此分空有自生故不同耳如偈山王道路中前所説量中增空空有有位位轉勝生故餘種種門轉轉增數應廣通達廣大無盡解脫海海摩訶山王大決擇分第三十四如是已説解脫山王大道路大決擇分次當説廣大無盡解脫海海摩訶山王大決擇分其相云何偈曰前所説諸轉無有窮盡故論曰今此偈中為明何義為欲現示空生自空無有窮盡空生異空無有窮盡空生諸有無有窮盡有亦如是無有窮盡位亦如是無有窮盡重重無窮亂轉無窮無其邊際無其始終甚深甚深周遍周遍廣大轉行則是解脫海海山王無礙自在體相用故空有二門統攝世間出世間一切諸法重重亂轉二門統攝次第非次第一切諸位以無邊際無始終總括體相用三大至於究竟圓極果海無餘蘊矣如偈前所説諸轉無有窮盡故故摩訶空塵海藏王道路大決擇分第三十五如是已説廣大無盡解脫海海摩訶山王大決擇分次當説摩訶空塵海藏王道路大決擇分其相云何偈曰海王道路中具足百自在以此因緣故建立海王名論曰今此偈中為明何義為欲現示海王藏中無有別法唯有自在故有幾自在謂百種故云何為百一者時自在三十二法亦一時轉亦異時轉亦轉時中不轉亦不轉時中轉亦遠時轉亦近時轉乃至無量故二者處自在一異等處轉乃至無量故三者物自在為同異等用乃至無量故四者周遍自在無所不通等乃至無量故五者大小自在極重極微等乃至無量故六者有無自在亦現亦隱等乃至無量故七者寂動自在亦定亦散等乃至無量故八者甚深自在不可思議等事乃至無量故九者不自在自在以逆等事乃至無量故十者無礙自在以逆順事等乃至無量故乃至第百自在自在無盡自在等皆悉自在乃至無量故如前所説三十二法如是自在具足圓滿無闕失轉以此義故立海王名應審思擇自第三分至此已説三十二法今説百種自在以顯無量法門莫不自在也第九不自在自在即一切世間極惡趣中無非自在提婆達多在阿鼻地獄如處三禪天樂是真能證此道者矣如偈海王道路中具足百自在以此因緣故建立海王名故引經第四十二覺華修多羅中作如是説第一廣分大海門中若廣説有一十方世界之塵量自在若略説有一百自在乃至廣説故大不可思議重重不可稱量阿説本王大決擇分第三十六如是已説摩訶空塵海藏王道路大決擇分次當説大不可思議重重不可稱量阿説本王大決擇分其相云何偈曰阿説本王中有十方塵量十方空塵量三十三法海論曰今此偈中為明何義為欲現示阿説海中具足圓滿十方世界之塵數十方世界之塵數三十三法海十方世界之塵數十方虛空之塵數三十三法海故如偈阿説本王中有十方塵量十方空塵量三十三法海故引經第四十三本王修多羅中作如是説爾時世尊告大衆言我以三達智通達一切法無所障礙無所闕失而有一海不可思議不可思議不能窮了謂空塵本王性德圓滿自在自在無盡藏海乃至廣説故上文三十三法統攝無量法門不可窮盡如來以無量智照無量法智無量法亦無量若能窮了即是有量故説此分為三十四法之終猶周易之終於未濟也或問自二十七分以來文中無信住行向地之名何故以五位釋之答曰二十七分在繫縛地有第一轉門之語智理事果皆屬有為非信位而何二十八分繫縛地中本王出現有為無為二法齊轉無常衆多常住微少非住位而何二十九分常無常德皆無量數且有行藏海中之語非行位而何三十分內常與無常并轉變法皆大無量以回向三處稱法界性非回向而何三十一分出離繫縛清白解脫十空十有皆是無為常法非地上而何以次四分盡三十四皆是地上菩薩行相至三十五分及三十六分明因圓果滿無法可説祇引經中性德圓滿自在自在之語結之賢首所謂因位可説果位不可説者此也自二十七以下八分詳示無超次第漸轉位末後二分融歸果海如是則三十四法無欠無餘矣已上正宗分竟已下流通分校量功德讚歎信行現示利益大決擇分第三十七如是已説大不可思議重重不可稱量阿説本王大決擇分次當説校量功德讚歎信行現示利益大決擇分其相云何偈曰譬如盛火聚雖在極遠處以光明勢力能破遠方暗一喻此玄文本論亦復如如是若有衆生類同世界共住雖未得見學此論火光明能破遠衆生心相不覺暗令得覺知明隨分伏其染法合譬如盛火聚轉勝近其處光明漸漸了能破暗更增二喻此玄文本論亦復如如是若有衆生類同一國共住雖未得見學此論火光明除衆生無知轉轉令分明法合譬如盛火聚轉轉近其處光明耀更增三喻此玄文本論亦復如如是若有衆生類同一城共住雖未得見學此論火光明除衆生無知轉轉更分明法合譬如盛火聚更轉近其處光明重重增暖氣溫其身四喻此玄文本論亦復如如是若有衆生類同一家共住雖未得見學此論火光明除心惑護身轉轉增長故法合譬如有一人得彼大火聚此人則便得六種大利益謂能塞寒氣能成熟資具不入毒蟲等破暗常明了隨請人普施焚燒穢糞等五喻此玄文本論亦復如如是若有衆生類得此玄文論此人即便得六種大利益謂禁煩惱軍成就功德品不入邪魔衆破無明品類般若慧現前貧窮佛法財來乞求衆生隨順普施與燒滅煩惱糞法合比如有妙華水深池中名曰青蓮華有人剎那中見此蓮華相一百七日中其眼根清白終日無晦濁六喻此玄文本論亦復如如是若有衆生類雖不知此論文義之大海而目見此論其眼根清淨見三世諸佛有作方便目法合比如有天鼓懸圓生樹頂名曰妙聲覺無量天女子聞此鼓音已二千七日中其耳根清速無塞隔之事七喻此玄文本論亦復如如是若有衆生類雖不知文義而耳聞此論其耳根清淨聞諸佛梵響有作方便耳法合比如有妙藥生雪山之頂名曰上味常有人取此藥著其舌之原身香極芬芬不承用飲食其命極長遠亦飛騰虛空八喻此玄文本論亦復如如是若有衆生類此論中一字一句若一行若一決擇分若一卷之量以舌經讀誦雖不知義理而獲得一切諸修多羅海經讀誦功德法合比如有菩薩名曰不思議大力解脫者此菩薩大士神通自在故於一切所作皆無所障礙隨應悉現前九喻此玄文本論亦復如如是若有諸衆生觀達其義理覺悟文下詮通達一切法皆無所障礙一一覺分明法合比如有神王名曰大安樂有人須小具祀祠此神王出興七寶藏令得大安樂十喻此玄文本論亦復如如是若有一男女此玄文本論勤受持讀誦有人須小具專心供此人即得無窮盡福德智慧寶無所疑畏心法合比如有妙香名曰芬滿布有人持此香遊行於遠方其經過處處七七日中間有香氣不盡十一喻此玄文本論亦復如如是若有一男女荷擔此論部遊行於遠方若度大海水所有諸衆生皆得大利益若度山野等所有諸衆生亦得大利益法合譬如有妙珠名曰如意寶隨此珠住處無量眷屬玉遍周匝圍繞十二喻此玄文本論亦復如如是隨其住止處有十方世界塵量大神王一一大神王各率十方界塵數眷屬神守護此論珠若滅正法時作微塵散壞所有諸神王發大聲哭涕隨塵所住處往詣常守護受持此論者如是數量神若生若死後常不離守護法合功德雖無量而略説如是以上五十一行偈有十二喻讚歎論之德用尺良切校量過患訶責誹謗現示罪業大決擇分第三十八如是已説校量功德讚歎信行現示利益大決擇分次當説校量過患訶責誹謗現示罪業大決擇分其相云何偈曰譬如有一山名曰寶輪上此山具七寶更無有窮盡貧窮求寶類無量無邊數有珠能禁寶名曰頂玻璃若人有此珠則能取七寶遠離貧窮苦獲得大安樂若人無此珠不能寶禁故終日不能得問所以者何若無珠人詣唯見虎狼熊及赤蛇青蛇種種雜毒蟲終不見珍寶以見毒類故其心極疑怖狂亂而馳走乃至於死滅珍寶自然有而彼求珍人福薄罪重故終不能見得衆生亦如是善根甚深人捧堅固信珠入大乘深海取功德之寶出生死苦輪善根微薄人得見甚深論無實信心故依正作邪解受苦輪無期譬如生盲人得妙莊嚴具無有歡樂事癡人亦如是雖得甚深論其愚癡極故不覺出世寶無有學習心譬如居井龍從流水至海大迷大亂故謗海而命終癡人亦如是自所習堅執定一不移轉聞未曾有法大迷大亂故誹謗其廣大墮落惡道中無有出離期以上十五偈説三種喻訶斥愚迷若有衆生類見聞斯論教不信心誹謗此人則誹謗三世一切佛三世諸法藏三世諸僧海此人所得罪無量無量數不能知邊際十方界塵量諸佛大菩薩一時悉出現宣説如是量法門之大海專教化此人經過無量劫終不能教化問所以者何唯宣説此法無餘別道故如是衆生類十方界塵量諸佛大菩薩以大神通力向未來遠劫觀察其限界無覺道之期問所以者何不學三十四大金剛軌則到大涅槃岸無有是處故是故諸行者以勤修方便應觀其法海不能達其原妄生誹謗心墮落惡道中無有出離期以上十偈説誹謗得罪決定不應作決定不應作罪業雖無量而略説如是末後一偈丁寧誥誡現示本因決定證成除疑生信大決擇分第三十九如是已説校量過患訶責誹謗現示罪業大決擇分次當説現示本因決定證成除疑生信大決擇分其相云何偈曰我於往昔無量劫隨世尊修菩薩行一時世尊王家奴國名金水其王名寶金輪藏此大王有三十億奴婢類有六十億大白馬金銀等寶亦無盡有最下奴名常信於中大王告常信汝受此六十億馬不離守護令無傷爾時彼奴受諸馬常恆不離無傷護如是六十億白馬經一日食百兩金時常信作如是念我身唯一馬衆多難哉難哉無傷畜此諸馬惡馳難禁今何方便能護持常信作是念已訖則便依師學術方術力變作萬白馬六十億白馬中中𬽔𬽔𭡒𭡒立化馬發大聲作如是唱馬馬皆悉作禮拜爾時有中中化馬皆悉先前作禮拜餘諸馬皆隨禮拜作如是事已訖後化馬責小咎皆殺諸馬更皆伏從化常信所願悉成就都無所憂怪之心常信更復作是念此諸馬皆從我化除其為資具黃金造作善業易穢報告諸馬作如是唱諦聽諦聽諸畜生我身并及汝等身於過去世心負悔具作一切惡業障亦奴亦馬生此處恆一切時不自在病苦所逼飢寒亂一時不得其安樂若此生中不作善後世亦受如是報去去無有出離期如宜汝等諸畜生除自資具供德處須臾飢渴感長樂我人有思心欲修無其間間空過時况汝等畜生之身形穢心濁修何時如宜從我化無逆其國中有殊勝鳥名曰雅音聲覺悟此鳥聲不可思議人聞其音大悲慨爾時彼六十億馬聞常信所語已訖一時發大聲悲哭至十日量無休息如是諸馬其聲響與雅音聲覺悟鳥平等平等無差別爾時常信馬皆喜百兩金分為二分一分以為生長具一分以為福田分福田分五十兩金造作一金剛佛像總有六十億佛像最上第一大白馬名曰長嚴雜色見常信及諸馬皆死第二生中皆悉人同一眷屬不相離出家學道勤修行彼六十億出家人皆名馬鳴無別名從過去立名字故過去常信今釋迦彼時六十億白馬今時六十億馬鳴最第一馬雜色見今時中我身而已第三生中亦人身隨世尊行菩薩行第四生中亦得人隨世尊習忍辱行轉轉經過五百生次生中瞋因緣故得重蛇身受大苦次生中受大魚身次生中亦得蛇身以蛇身詣世尊所投體懺悔發慚愧以偈表意發大心次生中得人同分隨世尊發願繫屬則世尊作如是願我若成覺道圓滿宣説百億修多羅普利益廣略衆生我則作如是誓願造作一百釋明論分利益廣略衆生如次後後經多生世尊滿足行因海安住法界山王位我亦漸漸修因行證入第八不動地我則往詣世尊所稽首頂禮立一面爾時世尊告我言我念往昔無量劫汝我同住一處中發願作繫屬因緣如宜汝造作論教我滅度後興正法我則更頂禮和南向世尊作如是白我今不知作論法雅暗都無所覺達唯願世尊為迷子開曉造作論教法爾時世尊告我言善哉善哉善男子諦聽諦聽善思念我當為汝分別説善男子諸佛法藏無量無邊不説劫無窮盡亦無分界如是無量法藏海若廣説論若略説皆通該攝無餘持是名造作論教法我亦重疑更作請法門海無量無邊我今未滿福智海居學位中未究竟皆攝無餘持何得爾時世尊告我言法門大海雖無量有攝無量宗本法若具攝此宗本法是名説攝諸法藏我亦更作如是白云何名為宗本法其數幾有可知不爾時世尊告我言所言宗本法體者謂三十四法大海若有論者具此法名言圓滿大海論若有論者不具者名言一分小智論以如是大要因緣我今依三十四法該攝安立無餘説因緣品類雖無量而總言略説如是釋迦因地為王家奴菩薩道中行權方便不擇貴賤也化作萬馬教化羣馬造福脫苦度生妙用無分人畜也第一大馬名雜色見者即論主馬鳴是後以瞋因受蛇身魚身一念懺悔得生人中隨佛發願乃造論之緣起也百部論中此為宗本三十四法該攝無餘學者其可不盡心乎𬽔職雉切𭡒職救切勸持流通發大願海大決擇分第四十如是已説現示本因決定證成除疑生信大決擇分次當説勸持流通發大願海大決擇分其相云何偈曰願此圓滿大海論遍不思議塵剎中出生無量般若日消除無邊無明暗轉作三寶之大海無非法雨功德藏非請感周遍相應非勸策自然成就論主大願畢現於茲仁山氏略注既成歎曰佛法之妙有如是耶夫佛法何以妙心法之妙也心法何以妙自性本具也自性雖具非修莫顯經中每云佛神力故法如是故佛神力者修德也法如是者性德也諸佛正遍知海入一切衆生心想中是故衆生修因契果皆佛加持之力也此論為佛法宗本窮微極奧故稱玄文老子云玄之又玄衆妙之門欲知玄妙法門請觀此論魏門李氏法名清池施龍銀一百圓鋟板光緒三十二年冬十一月金陵刻經處識自敘釋教三字經者明季吹萬老人效世俗訓蒙之書而作也敏修長老為之注釋流傳二百餘年矣頃者普陀印光法師從而新之正文改十之三注釋改十之七原本編為兩排者改而為一排考據精詳文辭圓潤超勝舊作而題名之處不將重訂者列於其次可謂坦然忘我者矣豫不揣固陋率爾改作與新舊二本迥不相同事略而法備言簡而義周人有勸豫易其名者因名之為佛教初學課本云光緒三十二年春二月石埭楊文會仁山氏識時年七十
