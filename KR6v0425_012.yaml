body:
  text: 石埭楊文會仁山注豫幼時喜讀奇書凡道家兵家以及諸子莫不購置所得注陰符者凡四家又録其正文以為讀本而莫知其義趣所在也後專意學佛一切雜學典籍束之高閣二十餘年矣頃因查檢書笥得抄本陰符經流覽一周覺立言甚奇非超凡入聖者不能作遂悉心體究而後恍然於古聖垂教之深意直與佛經相為表裏但隨方語言文似各別而義實相貫也因略為疏其大旨令人知所措心若夫深造微是在當人妙契耳或曰古今解此經者非指為兵機即演成丹訣子獨以佛法釋之何也豫曰聖言如摩尼寶仁者見之謂之仁智者見之謂之智且此經之可貴有如黃金若作銅鐵用之豈不可惜故豫直以甚深之義釋之也或曰然則子之所釋者亦有證據乎子曰有夫論道之書莫精於佛經佛經多種莫妙於華嚴悟華嚴宗旨者始可與談此道矣古人有言證入一真法界真俗圓融重重無盡即世間離世間豈有心契大道而猶生隔礙者哉所以善財童子參訪知識時而人間時而天上時而在神道時而入毗盧樓閣其傳授正法者或為天神或為人王或為比丘或為居士或為外道或為婦女和光混俗人莫之知惟深入法界虛心尋覓乃能見之則謂作此經者即華嚴法界善知識可也有疑之者以為黃帝生於釋迦之前千數百年何得指為華嚴善知識耶子曰華嚴法界無古無今去來現在佛佛道同故曰唯此一事實餘二即非真若以世俗情見求之則去道遠矣或曰論道之書與佛經相通者多矣子獨高視陰符何居豫曰嘗觀關尹子而知非古書也故於陰符而特尊之關尹規倣釋老以文其說顯係後人贋作况不及關尹者乎陰符無一語蹈襲佛經而尋其意義如出一轍且字句險雋脈絡超脫豈後人所能摹倣耶凡觀內外典籍須具擇法眼方不隨人腳跟轉耳上篇觀天之道真智顯照法界緣起執天之行機在握返本還源盡矣豎窮橫遍無缺無餘開章十字為金經綱領中間出沒變化不離宗旨至下篇自然之道靜二十九字結成觀天之道一語是故聖人至篇末一段文結成執天之行一語而首尾圓足矣執字即宇宙在手也既能執天之行則萬化自然生乎身矣此即先天而天勿違者也周易說先天二字最有深意何謂先天心超天地未生之先禪宗所謂空劫以前一段光景蓋一念起處根身器界同時現前此心已落後天矣所以見不超色聽不出聲總在無明牢籠之內也先天而天勿違者即禪宗我為法王於法自在者也天有五賊見之者昌五賊有二釋一就五行釋五行者水火木金土何以謂之五賊耶蓋生剋相仍乃流轉之道今專就相剋而言是以名之五賊賊賊奪盡即顯真空實返本還源之要也故見之者昌二就五塵釋五塵者色聲香味觸皆從外來殘害性真故曰天有五賊若見其元賊為我用故曰見之者昌釋氏曰六為賊媒自劫家寶此但云五賊者以法塵不在於外故非天所有也五賊在心施行於天三界唯心此的示賊之根元以免向外馳求也釋典云內色如外現與此同意體會此義則知篇首天道天行皆不出一心下文宇宙二句亦從此出所謂百千法門無量妙義一時向一毛頭上會悟得去宇宙在乎手統攝無遺萬化生乎身出生無盡大用現前人莫能測釋典所謂身中現剎剎中現身又云轉得山河歸自己轉得自己歸山河者皆此意也天性法界體性人也在人言人不必他求人心真妄和合機也無明不覺一念妄動立天之道以定人也以真性伏粗細二惑指示入道之方何等直捷何等精微天發殺機移星易宿地發殺機龍蛇起陸顯依報非常之變以起下文人發殺機命根頓斷天地反覆迥異尋常天地不自發以人發而發但見人發而不見天地發是正報轉而依報未轉尚在信位禪宗問如何是諸佛出身處答曰東山水上行又云日午打三更面南看北斗經云一人發真歸元十方虛空盡皆銷殞何况天地依空建立耶孔子讚顏回曰退而省其私亦足以發同此發字天人合發依正全轉萬變定基入初住位定者住也基者初發心住為四十二位之基也自開章至萬化生乎身統論道妙以啓信根天性下從信起修是謂頓修天發下即修即斷是謂頓斷天人下即斷即證是謂頓證上智之士一超直入所謂初發心時便成正覺即與善財龍女同流以上為根器極利者說頓中之頓法門下文為根器稍遜者說頓中之漸法門宣示身心邪正之別以判逐妄歸真之路觀兩可以字易如反掌故知與下篇接機有別也性有巧拙可以伏藏此節屬心妙智無住名之為巧業識染著名之為拙巧拙由心而云性者從其本也智現則業識伏識生則妙智藏九竅之邪在乎三要可以動靜此節屬身三要者目口陰也此三竅最易起邪動則隨流靜則返本火生於木喻心起惑禍發必剋焦灼性靈奸生於國喻身造業時動必潰流轉苦海上言逐妄之害下言歸真之益知之修煉謂之聖人知之者知其火與奸之為害也修者修其身也有轉邪歸正之功煉者煉其心也以智慧火銷煩惱垢有煉礦成金之效可以超凡入聖矣修煉之法未曾說明因上文立天之道以定人一語足以概之若欲詳悉其方須閲釋典以持戒修其身以止觀煉其心循序而進最易入道中篇天生天殺道之理也指現前共知共見者發端為下文張本天地萬物之盜承上起下萬物人之盜牽引意識處處貪著人萬物之盜遍攬外境以為我所此云天地即是陰陽造化之理三句互相鈎鎖而以末句為主下文返還從此句出三盜既宜三才既安愚人攬外五塵以為己有名之為盜智者知其唯心所現用不離體則盜得其宜而三才安矣經云是法住法位世間相常住既脫糾纏而圓融無礙涉入交參是謂既宜既安故曰食其時百骸理動其機萬化安此引成語以釋上文之意也先喻後法人之盜機吸取外塵貪著不捨如飲食無度而通體成病矣道者之心如鏡鑑形物來則現物去無迹猶食之以時而百骸調適又盜機沾滯汩沒性靈動其機者擺脫凡情活潑無礙猶金剛經應無所住而生其心之意又經云衆生處處著引之令得出蓋真性一顯物我皆忘此正申明三盜既宜三才既安之旨上明證道下明起用人知其神之神業識流轉隱含盜機不知不神之所以神般若無知而無不知此明根本無分別智非世人所認緣慮心也蓋神之神者有知而知者也分別意識也不神之所以神者無知而無不知者也根本無分別智也此智現前方能發起下文聖神之用楞嚴經二種根本一者無始生死輪回根本即神之神也二者無始涅槃元清淨體即不神之所以神也孔子曰吾有知乎哉無知也亦是此意日月有數大小有定聖功生焉神明出焉日月有數時也大小有定方也盡人而知之體至道者即此尋常事理之中顯出無窮妙用於有數之中而能延促自由後先互換乃聖功所由生也於有定之中而能大小相容一多無礙此神明所由出也方山華嚴論云十世古今始終不離於當念無邊剎海自他不隔於毫端非聖神其孰能與於斯因日月有數而作甲子以參錯循環之法御之所謂聖功生焉因大小有定而畫八卦以交互變通之理統之所謂神明出焉容成氏曰除日無歲無內無外亦是此義上明修因下明契果其盜機也天下莫能見莫能知君子得之固躬小人得之輕命得字如罪人斯得之意此言盜機隱微難見得之者獲益有別也上篇人心之機但是妄動未曾對境故上根一踏便登聖位此言盜機乃是起念取境之機從此入者尚須升進方登聖位故以君子稱之君子者大乘種性兼善天下者也既得此機則我執隨破而證無生即老子所謂無死地是名固躬小人者獨善其身不求利人者也即獨覺種性既得此機見無生理便欲捨分段身入於寂滅所謂輕命也盜機因何要得得之將何所益豈知盜機非盜機也乃家珍也能見能知則名為得得無所得盜亦非盜機亦非機客夢初回歸家穩坐矣君子小人之稱有三種不同一者正直謂之君子邪癖謂之小人此古今所通用也二者在上謂之君子在下謂之小人如君子之德風小人之德草是也三者氣宇寬宏者謂之君子心量愜隘者謂之小人如硜硜然小人哉之類雖云小人而不失為有道之士此與孔子貶樊遲之小人同意蓋樊遲請學稼亦是見世道無可為遂欲高蹈避世學長沮桀溺一流殊不知孔子知其不可而為正是大乘菩薩攝化衆生之行決不許門弟子捨大向小作自了漢入獨覺道也下篇瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍南嶽思禪師說三番止觀由淺至深皆先觀而後止恰合三返晝夜之意此言破妄顯真之力用也前四句借言興起後二句正明力用搗無明窟滅煩惱賊非雄師不為功三返晝夜二語最難體會蓋晝者光明洞達喻如智慧夜者闃寂淵深喻如禪定學人鋭意精修返流全一六用不行言思路絶如同死人忽而爆地迸裂本智現前爾時慶快平生是謂一返晝夜夫絶利一源者已用師十倍此一返晝夜者則用師百倍如是二返則千倍三返則萬倍蓋愈靜而愈明愈明而愈利矣禪宗謂之三關透徹即此意也心生於物死於物機在目既言用師必知賊之所在方能禽之機即賊之出沒也上篇人心機也心之機難見借物以顯之物生心生物滅心滅生滅逐物妄心無體目之機即心之機也目見物而心隨之人心之機不亦顯而可見乎毗舍浮佛偈云心本無生因境有與上句同意禪宗云我有一機瞬目視伊亦示機在目也天之無恩而大恩生迅雷烈風莫不蠢然既得其機須觀天道執天行也無恩者斷除情愛也大恩者長養法身也若就利他言之即是無緣大慈迅雷烈風莫不蠢然以喻顯威神力起死回生也至樂性餘至靜性廉既行大道須防其弊若見殺活自由以為至樂則名性餘餘者盈溢之象也若捨樂而趣至靜則名性廉廉者儉仄之義也凡此二者皆不稱法性也天之至私用之至公直須與天合德方稱妙道會萬物為自己至私也澤及萬物而不居功至公也禽之制在氣上文所說修行法門儻不能隨順趣入須別設方便以漸導之蓋人心之不能定者以其放縱也今欲收攝身心以成大定其要在於氣耳禽之者制心一緣也氣者息也調息乃有多門凡夫外道大小三乘所通用者以數息為先極而至於獲無生忍楞嚴經內反息循空即證圓通又令觀鼻端白亦得心開漏盡成阿羅漢氣之為用大矣哉生者死之根死者生之根恩生於害害生於恩既明制心之法復示循環之理令人知所厭求也上文心生於物死於物妄心之生死剎那不停也此以調息為門息出曰生息入曰死生死輪回互為其根也斷生死入涅槃是謂恩生於害戀情緣淪生死是謂害生於恩古聖苦口誠言婆心濟世後之學者亦可以猛省矣前文為第三等人開示修行法門竟向下呵斥庸愚令其警悟愚人以天地文理聖我以時物文理哲天地文理形像昭明愚人見以為聖是見大而不見小與自己身心毫無交涉時物文理者生化之源緣起無性悟其義者能於小中見大大中見小方知天地與我同根萬物與我一體可以謂之哲人矣人以愚虞聖我以不愚虞聖人以奇期聖我以不奇期聖世俗之見不達真理見其體靜妄以為愚而不知其性離暗鈍見其用大妄以為奇而不知其性德本具沈水入火自取滅亡結前顯害蓋以愚虞聖者心趣昏昧故喻沈水以奇期聖者心貪高舉故喻入火自取滅亡者汩性喪真也上來呵斥庸愚竟下復統論世出世法以結全經自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推而變化順矣此段暢言流轉之理是世間法為下文返還張本自然之道靜故天地萬物生本性清淨而有無明不覺念起妄與法違變現根身器界為流轉之本案下文不可違之語則知此中隱含違字之意天地之道浸故陰陽勝浸者氤氳也勝者興盛也既有天地則二氣流行彌浸而彌勝矣於是乎日往則月來月往則日來寒往則暑來暑往則寒來是之謂陰陽相推而變化順矣循此道者後天而奉天時也凡夫心中最大者無如天地天地既與萬物同生必與萬物同滅天地尚有生滅世間何物得常住耶學道人大須著眼此下直至篇末詳演返還之道是出世間法是故聖人知自然之道不可違因而制之違自然之道即成流轉門聖人知其不可違是以因而制之使不起妄念也制而至於無念則會本體而為至靜之道矣下文以三觀顯三諦理證三如來藏為古今入道之正軌也至靜之道律歷所不能契此段以奢摩他顯真諦理證空如來藏壺子所謂地文杜德機均是此義至靜之道即奢摩他亦名體真止律歷法之至精者猶不能契而况於語言文字乎爰有奇器是生萬象八卦甲子神機鬼藏此段以三摩鉢提顯俗諦理證不空如來藏壺子所謂天壤善者機均是此義奇器即是不空如來藏老子比之橐籥出生萬象而無窮盡八卦以乾坤為本甲子以天干地支配之皆壺子天壤之義也神機鬼藏者深妙難測非淺見所能知也陰陽相勝之術昭昭乎進乎象矣此段以禪那顯中諦理證空不空如來藏壺子所謂太沖莫勝衡氣機均是此義壺子就果言故曰太沖莫勝此經就因言故曰陰陽相勝因果互舉二名合成一義衡氣機者止觀平等也何以名之陰者即前至靜之道也陽者即前生萬象也上文陰為體陽為用若謂陰陽均平尚不足以顯圓融之妙須以相勝顯之然相勝則不平等矣而不然也蓋陰勝陽則陰顯而陽隱陽勝陰則陽顯而陰隱相勝則兩奪互亡不可言有不可言無即對待而成絶待上文流轉門中言陰陽勝而不言相勝復言陰陽相推相推有前後相勝在同時可見隨流與逆流迥別也上文言全體大用此言體用俱泯而非無體用故以昭昭乎進乎象矣結之蓋古聖垂教至詳且盡能令後人昭然若揭如覩懸象奈何千百年來無人抉破直令微言奧旨湮沒於丹訣兵法中耶全經以天字為主天即道之體也內典所謂第一義天亦云性天非與地相對之天也凡篇中天地並稱者是有形象之天地與單稱天字有別以機字為用機即道之樞紐也上篇曰心機蓋指心源妄動之機未分能所屬第八識即三細中之第一業相也上等根器方能見之此機一轉立登聖位中篇曰盜機屬第七識內執見分為我外執相分以為我所將心取境故曰盜機此機稍露中等根器尚能見之得此機者趣大則入賢位向小則取滅度下篇曰目機屬前五識更顯露矣所云心生於物死於物者第六意識也專為下等根器就目前可見者點示此等根器縱能悟入多在信位亦有未入信位者作將來勝因所以不說證道之相又上篇直指人心之機與達摩西來同意中篇別指盜機因慈悲之故有落草之談下篇言機在目所謂借境觀心也自微而著法施乃普上篇開章十字是總冒下篇自然之道靜至篇末是總結中間三篇接引三等人又各分二等共為六等章法井然光緒二十二年春二月開雕板存金陵刻經處道德經發隱敘憨山清禪師解道德經歷十五年方成雖與焦弱侯同時而弱侯未之見也故其輯老子翼闕憨山解誠為憾事弱侯所採凡六十四家後之解者更有多種故經中奧義發揮殆盡矣豫閲道德經至出生入死一章見各家注解無一合者遂以佛教義釋之似覺出人意表復益二章繼陰符發隱梓之或問孔子既稱老子為猶龍何以其書不入孰課耶答曰漢唐以來人皆以道家目之不知其真俗圓融實有裨於世道人心若與論語並行家絃戶誦則士民之風當為之一變也光緒癸卯季春之月石埭楊文會識於白下深柳堂
