body:
  text: 周列禦寇撰石埭楊文會仁山注天瑞第一子列子居鄭圃子列子居鄭圃四十年人無識者國君卿大夫視之猶衆庶也有道之士和光混俗不衒其能不高其節國不足將嫁於衛弟子曰先生往無反期弟子敢有所謁先生將何以教先生不聞壺丘子林之言乎子列子笑曰壺子何言哉歎壺子神化氣象雖然夫子嘗語伯昏瞀人吾側聞之試以告女其言曰有生不生有化不化生與不生化與不化分而言之以為弄引不生者能生生不化者能化化不生而能生不化而能化進而言之本末一致生者不能不生化者不能不化極而言之生化無窮決非斷滅故常生常化常生常化者無時不生無時不化生化無盡同一真常陰陽爾四時爾陰陽四時之遷流皆不出一真法界也不生者疑獨一尚不立何有對待不化者往復往無所往復無可復無往無復強名往復往復其際不可終疑獨其道不可窮往復如循環故無終始疑獨則非一非多誰能究盡黃帝書曰谷神不死是謂玄牝玄牝之門是謂天地之根綿綿若存用之不勤此段語極精微已於道德經發隱詳釋之茲不贅故生物者不生化物者不化此二句補足上文自生自化自形自色自智自力自消自息謂之生化形色智力消息者非也雖從本源發生而無作者故以八箇自字演之結句最為超妙能令閲者悠然神往天瑞篇之首章述列子學道淵源即以壺子語告於門人並引黃帝書以證之可見列子之道確有師承非同臆説文中體用圓彰本末互顯誠為全書之綱領也列子適衛子列子適衛食於道從者見百歲髑髏攓蓬而指顧謂弟子百豐曰唯豫與彼知而未嘗生未嘗死也世俗之見以己為生以髑髏為死列子知己未嘗生故知髑髏未嘗死也此過養乎此過歡乎此二句雙關兩意以二此字屬己則過養過歡為前塵影事以二此字屬髑髏則過養過歡為往事無蹤生死既非真實受用皆如夢幻也種有幾種子在賴耶識中或多或少隨時發現則成生類下文備説情與無情互相轉變令世人無可執著若蛙為鶉得水為繼得水土之際則為蛙蠙之衣生於陵屯則為陵舄陵舄得鬱栖則為烏足烏足之根為蠐螬其葉為胡蝶胡蝶胥也化而為蟲生竈下其狀若脫其名曰掇掇千日化而為鳥其名曰乾餘骨乾餘骨之沫為斯彌斯彌為食醯頤輅食醯頤輅生乎食醯黃軦食醯黃軦生乎九猷九猷生乎瞀芮瞀芮生乎腐蠸以上十六種動物植物輾轉相生羊肝化為地臯馬血之為轉磷也人血之為野火也以上六種血肉變化鷂之為鸇鸇之為布穀布穀久復為鷂也燕之為蛤也田鼠之為鶉也以上七種禽獸介蟲各各轉變鶉見上文朽瓜之為魚也老韭之為莧也老羭之為猿也魚卵之為蟲以上八種動植各變亶爰之獸自孕而生曰類河澤之鳥視而生曰鶂純雌其名大腰純雄其名稚蜂思士不妻而感思女不夫而孕以上六種不交而生情識所感也后稷生乎巨迹伊尹生乎空桑以上二聖隨機應現即是菩薩意生身厥昭生乎溼醯雞生乎酒以上二種屬於溼生羊奚比乎不荀此二種相依而生久竹生青寧青寧生程程生馬馬生人以上五種久竹舊釋為草青寧陸釋為蟲程者豹之別名程馬人異類相生顯業道變化不可思議俗解以程蟲馬齒莧人參釋之殊覺膚淺人久入於機萬物皆出於機皆入於機機者玄牝之門也即是阿賴耶識具生滅不生滅二義萬物皆從此出名之曰生復從此入名之曰死出入不離此機生死皆假名耳同類相生人所共見異類相生人所難知自道眼觀之同一生也雖變化萬端莫不出於機而入於機也知異生之不異同生也始可與言生矣知生者即知死既知生死即知無生死文中變化離奇拉雜繁會而以出機入機二句收之應上文之未嘗生未嘗死列子之義微矣哉文中敘述共五十三種類而計之人五禽七獸六鱗二介一蟲十五草十一血肉之屬六以上皆言其變不言其常常變本無二致欲人知生死皆如幻化不至囿於見聞執為實法長時汩沒於三有之海也我尚何存黃帝書曰形動不生形而生影聲動不生聲而生響無動不生無而生有形必終者也天地終乎與我偕終無不生無猶之形不生形聲不生聲也無既妄動則不得不生有矣既生有而為形則必有終而歸於無者也天地與我並生我既有終天地豈得無終乎久暫雖異共終一也此上皆黃帝書以下則列子所演既名為無如何能動此義問取黃帝終進乎不知也道終乎本無始進乎不久由終而進論之歸於不知而已道之終極復於本無始進者自無而有也言雖有形亦不能久不過才生即滅耳有生則復於不生有形則復於無形此二句釋出上意攝末歸本也不生者非本不生者也無形者非本無形者也因生盡方顯不生因形銷方顯無形生者理之必終者也終者不得不終亦如生者之不得不生而欲恆其生畫其終惑於數也研窮生死之理以祛貪生之惑也精神者天之分骨骸者地之分屬天清而散屬地濁而聚精神離形各歸其真故謂之鬼鬼歸也歸其真宅天地有終不得謂之真宅真宅者平等法界也天地從此發生故神形歸天地即歸法界矣黃帝曰精神入其門骨骸反其根我尚何存究竟顯無我也門者玄牝之門也根者天地之根也漚滅歸海欲求我相了不可得此章歸宿在我尚何存一語世人與道相違者我執害之也今就生滅內反復研究以顯無我先後兩引黃帝書以為證據可謂探原之論矣黃帝之教有兩派一者度世二者經世經世之道學之者衆度世之道傳之者寡至秦時而盡失矣其存於簡篇者經世則有六經四子之書度世唯有陰符及老列莊三家而已三家之書度世經世錯雜而出非具擇法眼者不能揀別二千年來往往作文章讀過埋沒古人多矣杞人憂天地杞國有人憂天地崩墜身亡所寄廢寢食者不憂自身變壞而憂天地崩墜妄心但緣外境未嘗返觀假我也又有憂彼之所憂者因往曉之曰天積氣耳亡處亡氣若屈伸呼吸終日在天中行止奈何憂崩墜乎其人曰天果積氣日月星宿不當墜耶曉之者曰日月星宿亦積氣中之有光耀者只使墜亦不能有所中傷其人曰奈地壞何曉者曰地積塊耳充塞四虛亡處亡塊若躇步跐蹈終日在地上行止奈何憂其壞其人舍然大喜曉之者亦舍然大喜兩人説夢話舍然大喜醒人聞之不覺失笑長廬子聞而笑之曰虹霓也雲霧也風雨也四時也此積氣之成乎天者也山嶽也河海也金石也火木也此積形之成乎地者也知積氣也知積塊也奚謂不壞夫天地空中之一細物有中之最巨者難終難窮此固然矣難測難識此固然矣憂其壞者誠為大遠言其不壞者亦為未是天地不得不壞則會歸於壞遇其壞時奚為不憂哉長廬子之言似覺近理然亦只論天地未論自身故不足解其惑也子列子聞而笑曰言天地壞者亦謬言天地不壞者亦謬壞與不壞吾所不能知也雖然彼一也此一也故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉列子立論簡捷先將壞與不壞一筆抹過再將人之生死去來置諸度外遂得心境俱空超然於萬象之表何有壞與不壞之見存於其心哉三界無安猶如火宅杞人憂其壞非過慮也但未知天地雖壞而有不壞者存長廬子未明其理故為列子所笑列子既知有不壞者又能證得無心妙諦在火宅內遊戲神通了無罣礙所以出言吐氣不落常人蹊徑也東郭論盜齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盜始吾為盜也一年而給二年而足三年大壤自此以往施及州閭向氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手目所及亡不探也未及時以贓獲罪沒其先居之財向氏以國氏之謬己也往而怨之國氏曰若為盜若何向氏言其狀國氏曰嘻若失為盜之道至此乎今將告若矣吾聞天有時地有利吾盜天地之時利雲雨之滂潤山澤之産育以生吾禾植吾稼築吾垣建吾舍陸盜禽獸水盜魚鱉亡非盜也夫禾稼土木禽獸魚鱉皆天之所生豈吾之所有然吾盜天而亡殃夫金玉珍寶穀帛財貨人之所聚豈天之所與若盜之而獲罪孰怨哉向氏為盜而獲罪國氏為盜而致富雖然國氏之罪猶甚於向氏也陸盜禽獸水盜魚鱉殘害無數生命而益己之財産他生後世以自身血肉而次第償之其苦可勝言哉向氏大惑以為國氏之重罔己也過東郭先生問焉東郭先生曰若一身庸非盜乎欲免此盜更有何術曰破我執而已矣無始我執相續不斷世世受生皆由我見攬四大而成身若無我見誰為能盜盜陰陽之和以成若生載若形况外物而非盜哉誠然天地萬物不相離也認而有之皆惑也天地與我同生萬物與我一體本無可盜昧其理者於同體中妄見異體豈非大惑乎國氏之盜公道也故亡殃暫恕目前順凡情也若之盜私心也故得罪以公私二字分屬國向非盡理之論幸下文申明正義方將盜字抉破有公私者亦盜也亡公私者亦盜也有私便有公公私對待而盜生焉既有公私便有亡公私亡公私與有公私對待亦不免於盜也公公私私天地之德天地本亡公私公私出於人心人心無覆藏處即是天地之心是以公公私私萬有不齊無非天地之德也知天地之德者孰為盜耶孰為不盜耶天地之德者法界緣起也凡夫迷一真法界妄分能所故有盜機豈知能所本空實無可盜盜既非盜何有不盜之可説耶東郭答辭先用一口吸盡之法使世人無所逃於天地之間然後一縱一奪以啓下文之雙奪奪至無可奪處遂一概消融泯然無迹此為天瑞篇之結局也此章當與陰符經中篇合看盜與非盜其義甚微陰符發隱已詳言之黃帝第二夢遊華胥黃帝即位十有五年喜天下戴己養正命娛耳目供鼻口焦然肌色皯黣昏然五情爽惑又十有五年憂天下之不治竭聰明進智力營百姓焦然肌色皯黣昏然五情爽惑黃帝乃喟然歎曰朕之過淫矣養一己其患如此治萬物其患如此養身治國出於有心皆足為患於是放萬機舍宮寢去直侍徹鐘懸減廚膳退而間居大庭之館齋心服形三月不親政事大庭之館空曠無物之境也放下萬緣始與道會晝寢而夢遊於華胥氏之國華胥氏之國在弇州之西台州之北不知斯齊國幾千萬里蓋非舟車足力之所及神遊而已既云夢遊復云神遊可見黃帝非如世人之夢直是清明在躬隨往無礙耳其國無帥長自然而已其民無嗜欲自然而已不知樂生不知惡死故無夭殤不知親己不知疏物故無愛憎不知背逆不知向順故無利害都無所愛惜都無所畏忌入水不溺入火不熱斫撻無傷痛指擲無痟癢乘空如履實寢虛若處牀雲霧不硋其視雷霆不亂其聽美惡不滑其心山谷不躓其步神行而已華胥氏之國略似極樂世界黃帝既寤怡然自得心領神會召天老力牧太山稽告之曰朕間居三月齋心服形思有以養身治物之道弗獲其術疲而睡所夢若此今知至道不可以情求矣若以情求去道轉遠朕知之矣朕得之矣而不能以告若矣如人飲水冷暖自知又二十有八年天下大治幾若華胥氏之國而帝登假百姓號之二百餘年不輟法身大士應現世間豈待夢遊勝境方知無為而治之理不過示同前迷後悟以啓迪後人耳孔子曰我非生而知之者好古敏以求之者也與此同意列子乘風列子師老商氏友伯高子進二子之道乘風而歸所進之道不在乘風然非乘風則無人知尹生聞之從列子居數月不省舍因間請蘄其術者十反而十不告尹生懟而請辭列子又不命尹生退數月意不已又往從之尹生躁進非道器也列子曰汝何去來之頻尹生曰曩章戴有請於子子不我告固有憾於子今復脫然是以又來列子曰曩吾以汝為達今汝之鄙至此乎姬將告汝所學於夫子者矣先痛斥之然後告以為道之方自吾之事夫子友若人也三年之後心不敢念是非口不敢言利害始得夫子一眄而已圓覺經云居一切時不起妄念同初段意五年之後心庚念是非口庚言利害夫子始一解顏而笑經云於諸妄心亦不息滅同二段意七年之後從心之所念庚無是非從口之所言庚無利害夫子始一引吾並席而坐經云住妄想境不加了知同三段意九年之後橫心之所念橫口之所言亦不知我之是非利害歟亦不知彼之是非利害歟亦不知夫子之為我師若人之為我友內外進矣經云於無了知不辨真實同四段意而後眼如耳耳如鼻鼻如口無不同也六根銷復異性入同心凝返流全一形釋六用不行骨肉都融體合真空不覺形之所倚足之所履隨風東西猶木葉幹殼竟不知風乘我耶我乘風乎能所兩亡依正不二今女居先生之門曾未浹時而懟憾者再三女之片體將氣所不受女之一節將地所不載履虛乘風其可幾乎急躁之病至於此極無怪學道者多成道者少也尹生甚怍屏息良久不敢復言翻然改悔猶可教也列子真實學道循序而進由淺至深九年之功方臻妙境彼躐等者但求速效雖至百年亦終於無成而已孔子曰下學而上達又曰欲速則不達千古聖賢如出一轍也進道階級分為四段恰與圓覺四句義同若依起信論中雖説無有能説可説雖念亦無能念可念二語總合前之三段至第四段正合論中若離於念名為得入之語列子生於東土與西竺之道如此冥符謂非法身大士隨機影現乎商丘開信偽范氏有子曰子華善養私名舉國服之有寵於晉君不仕而居三卿之右目所偏視晉國爵之口所偏肥晉國黜之遊其庭者侔於朝子華使其俠客以智鄙相攻強弱相凌雖傷破於前不用介意終日夜以此為戲樂國殆成俗禾生子伯范氏之上客出行經坰外宿於田更商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘於飢寒潛於牖北聽之因假糧荷畚之子華之門子華之門徒皆世族也縞衣乘軒緩步闊視顧見商丘開年老力弱面目黎黑衣冠不檢莫不眲之既而狎侮欺詒攩㧙挨抌亡所不為商丘開常無慍容而諸客之技單憊於戲笑遂與商丘開俱乘高臺於衆中漫言曰有能自投下者賞百金衆皆競應商丘開以為信然遂先投下形若飛鳥揚於地骨無毀范氏之黨以為偶然未詎怪也因復指河曲之淫隈曰彼中有寶珠泳可得也商丘開復從而泳之既出果得珠焉衆昉同疑子華昉令豫肉食衣帛之次俄而范氏之藏大火子華曰若能入火取錦者從所得多少賞若商丘開往無難色入火往還埃不漫身不焦范氏之黨以為有道乃共謝之曰吾不知子之有道而誕子吾不知子之神人而辱子子其愚我也子其聾我也子其盲我也敢問其道商丘開曰吾亡道雖吾之心亦不知所以雖然有一於此試與子言之曩子二客之宿吾舍也聞譽范氏之勢能使存者亡亡者存富者貧貧者富吾誠之無二心故不遠而來及來以子黨之言皆實也唯恐誠之之不至行之之不及不知形體之所措利害之所存也心一而已物亡忤者如斯而已今昉知子黨之誕我我內藏猜慮外矜觀聽追幸昔日之不焦溺也怛然內熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝弗知乎夫至信之人可以感物也動天地感鬼神橫六合而無逆者豈但履危險入水火而已哉商丘開信偽物猶不逆况彼我皆誠哉小子識之此章能作念佛往生之實證故録之信仲尼之言以為往生正因世人所罕聞也其言謂何即彼我皆誠一語彌陀大願接引衆生是彼誠衆生念佛求生淨土是我誠彼我皆誠安有不生淨土者乎商丘開信偽誠闕一邊物猶不逆以證念佛求生決無不成也文中先敘子華之權勢次述商丘開之愚誠投地不傷泳水不溺入火不焦皆誠之所至不以高下水火動其心也心不動則高下水火直心外之幻影耳何害之有一旦説破追憶往事直怛惕之不遑奚能復近哉惟願世之學者苟能專心向道求脫輪回惟在自誠其心而已趙襄子狩中山趙襄子率徒十萬狩於中山藉芿燔林扇赫百里有一人從石壁中出隨煙燼上下衆謂鬼物火過徐行而出若無所經涉者妙妙襄子怪而留之徐而察之形色七竅人也氣息音聲人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火妙妙襄子曰而嚮之所出者石也而嚮之所涉者火也其人曰不知也妙妙若知之早已為石所傷為火所焚矣魏文侯聞之問子夏曰彼何人哉子夏曰以商所聞夫子之言和者大同於物物無得傷閡者遊金石蹈水火皆可也四大本無障礙障礙生於自心心若不生四大俱融是之謂和者大同於物物與自身性合真空不聞此空閡於彼空以空無彼此也文侯曰吾子奚不為之子夏曰刳心去智商未之能雖然試語之有暇矣文侯曰夫子奚不為之子夏曰夫子能之而能不為者也夫子現身人道不以神異駭俗此為忍力最大者方能終身不露也文侯大説寒山拾得之儔隱於山中偶然一現為化流俗耳襄子不能知而文侯問於子夏文侯其有動於心乎不然何輾轉相問而不已耶及聞夫子能之而能不為遂大悅文侯亦人傑也哉巫咸相壺子有神巫自齊來處於鄭命曰季咸知人死生存亡禍福壽夭期以歲月旬日如神鄭人見之皆避而走列子見之而心醉而歸以告壺丘子曰始吾以夫子之道為至矣則又有至焉者矣壺子曰吾與汝既其文未既其實而固得道與衆雌而無雄而又奚卵焉而以道與世抗必信矣夫故使人得而相汝文從實生但見其文而不見其實焉得謂之道猶之禽也雌喻生滅心文也雄喻真常心實也真常與生滅和合方能發生天地萬物汝未證此道奈何以道自居而為人所料耶嘗試與來以豫示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不可以旬數矣吾見怪焉見溼灰焉列子入涕泣沾衾以告壺子壺子曰向吾示之以地文萌乎不振不止是殆見吾杜德幾也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣灰然有生矣吾見杜權矣列子入告壺子壺子曰向吾示之以天壤名實不入而機發於踵此為杜權是殆見吾善者幾也嘗又與來明日又與之見壺子出而謂列子曰子之先生坐不齊吾無得而相焉試齊將且復相之列子入告壺子壺子曰向吾示之以太沖莫眹是殆見吾衡氣幾也鯢旋之潘為淵止水之潘為淵流水之潘為淵濫水之潘為淵沃水之潘為淵氿水之潘為淵雍水之潘為淵汧水之潘為淵肥水之潘為淵是為九淵焉嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之而不及反以報壺子曰已滅矣已失矣吾不及也壺子曰向吾示之以未始出吾宗吾與之虛而猗移不知其誰何因以為茅靡因以為波流故逃也壺子以四種三昧示巫咸巫咸皆不能知而壺子自釋之初示以地文三昧此三昧者既有所萌則如地之生物而成文也不振不動也不止不靜也動靜俱無故名杜德幾巫咸以為溼灰實未嘗見也次則示以天壤三昧此三昧者名實不入空無所有也而機發於踵微有動相也善者幾衆善之元也巫咸以為杜權略見一斑耳三則示以太沖莫眹三昧夫太沖至虛也莫眹無迹可見也衡氣幾如水之平也歷舉九淵以喻平等中之差別法深密難測變動無方巫咸謂其不齊實無可揣摩也四則示以未始出吾宗三昧此三昧者泯絶無寄也禪宗謂之祖父從來不出門者也即是自受用境界故不名幾下文現他受用虛而猗移不知其誰何巫咸焉得而不逃然後列子自以為未始學而歸三年不出為其妻爨食狶如食人於事無親雕琢復朴塊然獨以其形立㤋然而封戎一以是終列子言下知歸不但人我頓空而且萬物一體歸真返朴廢心用形凡聖情亡超然於萬象之表矣太古神聖太古神聖之人備知萬物情態悉解異類音聲會而聚之訓而受之同於人民故先會鬼神魑魅次達八方人民末聚禽獸蟲蛾言血氣之類心智不殊遠也神聖知其如此故其所教訓者無所遺逸焉法身大士隨機應現世道興隆則為皇為帝統治六道衆生舜禹以前代代出興世道衰微之際衆同分中不能得大聖主持行菩薩道者或現宰官居士身如老孔列莊書中所載隱君子不一而足也自俗眼觀之六道心智各別何能相通聞佛經所説異類受化之事駭而不信豈知太古神聖圓音布教早已行於東夏矣周穆王第三西極化人周穆王時西極之國有化人來穆王善根發現菩薩應時而至入水火貫金石反山川移城邑乘虛不墜觸實不硋千變萬化不可窮極以神通力化之既已變物之形又且易人之慮變物之形已可異矣易人之慮更為希有穆王敬之若神事之若君推路寢以居之引三牲以進之選女樂以娛之化人以為王之宮室卑陋而不可處王之廚饌腥螻而不可饗王之嬪御膻惡而不可親化人原無憎愛二見為破穆王世間貪著故現厭惡之情穆王乃為之改築土木之功赭堊之色無遺巧焉五府為虛而臺始成其高千仞臨終南之上號曰中天之臺簡鄭衛之處子娥媌靡曼者施芳澤正蛾眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環雜芷若以滿之奏承雲六瑩九韶晨露以樂之月月獻玉衣旦旦薦玉食化人猶不舍然不得已而臨之穆王竭國之財力以奉之猶不適化人之意竟不知其為何等人也居亡幾何謁王同遊王執化人之袪騰而上者中天乃止暨及化人之宮化人之宮構以金銀絡以珠玉出雲雨之上而不知下之據望之若屯雲焉耳目所觀聽鼻口所納嘗皆非人間之有王實以為清都紫微鈞天廣樂帝之所居王俯而視之其宮榭若纍塊積蘇焉王自以居數十年不思其國也引王上遊見忉利天境界化人居無定方隨所至處即謂自宮王俯視能見下界仗化人天眼之力也化人延短時為長時令王居數十年不思返國化人復謁王同遊所及之處仰不見日月俯不見河海光影所照王目眩不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還復引王上升光音天日月河海皆無所見離下界甚遠矣穆王報境未脫下界六根不能受上界光音所以悸而求還也化人移之王若隕虛焉全體脫落喪身失命既寤絶後再蘇初關透矣所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未昲人物宛然恍如隔世王問所從來相續心斷前不到後左右曰王默存耳本未嘗動何有去來由此穆王自失者三月七識已破即透重關而復更問化人穆王心猶未已更求進步化人曰吾與王神遊也形奚動哉且曩之所居奚異王之宮曩之所遊奚異王之圃化人曉以動靜不二淨穢一如之理蓋曩者以天界勝境示王為破人界之貪恐王又著天界之貪復以同一幻境破之令王離分別心王間恆疑暫亡變化之極徐疾之間可盡模哉化人責王疑情不斷亡失本明變化徐疾何庸措心王大悅言下大徹慶快平生八識頓開三關直透不負化人一番提撕也下文述穆王駕八駿馬登崑崙山謁西王母等事無關道要故節去穆王悟道無文可證何以判為三關直透答曰化人之來多方接引即其證也蓋化人他心道眼非見穆王根熟決不作此無益之事老成子學幻老成子學幻於尹文先生三年不告有此師有此弟子方堪傳道今時人不但弟子不能待即師亦不能待無堅忍耐久之心何能學出世之道老成子請其過而求退尹文先生揖而進之於室屏左右而與之言曰如此慎重祕密其道方隆五祖傳六祖雲巖傳洞山亦猶是也昔老聃之徂西也顧而告子曰學有淵源非同臆説有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深固難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉學幻真訣罄盡無餘老成子歸用尹文先生之言深思三月尹文之言由深而淺只有兩層一曰生死二曰幻化老成用其言而深思之須作三層由淺而深先明幻化之理次達生死之元後超生死之外若不能超生死必不能即生死而起幻化所以三月深思即是透徹三重關也遂能存亡自在憣校四時冬起雷夏造冰飛者走走者飛終身不著其術故世莫傳焉雖云不著其術而術已具於尹文之言矣世無傳之者因其未能深思也菩薩幻智法門即是自性本具之神境通斷惑證真遂得現前受用非如外道幻術有法可傳也尹氏治産周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣而使之彌勤晝則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢為國君居人民之上總一國之事遊燕宮觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝為僕虜苦則苦矣夜為人君其樂無比何所怨哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐昔昔夢為人僕趨走作役無不為也數罵杖撻無不至也眠中啽囈呻呼徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人遠矣夜夢為僕苦逸之復數之常也若欲覺夢兼之豈可得耶尹氏聞其友言寬其役夫之程減己思慮之事疾並少間此以夢覺二境喻今世後世苦樂循環也佛法未入中夏列子不能倡輪回報應之説以啓世人疑謗故假夢覺影而言之欲人自會其意而減損貪求之勞也先述役夫晝苦而夜樂客也後述尹氏晝勤而夜苦主也二者相形尹氏不如役夫遠甚蓋尹氏治産之勤未嘗受樂而夜夢之苦過於役夫世之以財産自豪者亦可以悟矣夢分人鹿鄭人有薪於野者遇駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉以蕉覆鹿為第一重夢順塗而詠其事傍人有聞者用其言而取之聞言取鹿為第二重夢既歸告其室人曰向薪者夢得鹿而不知其處吾今得之彼直真夢者矣歸告室人為第三重夢室人曰若將是夢見薪者之得鹿耶詎有薪者耶今真得鹿是若之夢真耶疑夫夢鹿為第四重夢夫曰吾據得鹿何用知彼夢我夢耶彼夢我夢同歸一鹿為第五重夢薪者之歸不厭失鹿其夜真夢藏之之處又夢得之之主爽旦案所夢而尋得之遂訟而爭之據夢爭訟為第六重夢歸之士師士師曰若初真得鹿妄謂之夢真夢得鹿妄謂之實彼真取若鹿而與若爭鹿室人又謂夢認人鹿無人得鹿今據有此鹿請二分之士師分鹿為第七重夢以聞鄭君鄭君曰嘻士師將復夢分人鹿乎鄭君騰疑為第八重夢訪之國相國相曰夢與不夢臣所不能辨也國相莫辨為第九重夢欲辨覺夢唯黃帝孔丘追思古聖為第十重夢今亡黃帝孔丘孰辨之哉且恂士師之言可也古聖既沒無覺夢者舉世同夢為之奈何此章夢有十重人有六位顛倒昏迷莫可究詰夢乎夢乎何日始覺列子憫世之心切矣華子病忘宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾其瘳乎於是試露之而求衣飢之而求食幽之而求明儒生欣然告其子曰疾可已也然吾之方密傳世不以告人試屏左右獨與居室七日從之莫知其所施為也而積年之疾一朝都除華子既悟乃大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不覺天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須臾之忘可復得乎子貢聞而怪之以告孔子孔子曰此非汝所及乎顧謂顏回記之人有三性曰善曰惡曰無記凡夫日用中非善即惡非善惡即無記唯無想外道恆住無記自以為樂華子病忘亦是無記性也室人延儒生治之而瘳儒生之術無非引起善惡二性以抵制無記而後華子思慮並起不若嚮之安樂無事矣操戈逐儒生固其宜也子貢告於孔子孔子令顏回記之記華子之忘未嘗合道若與道合雖十儒生亦不能轉其心志令起世俗之念入於塵網也逄子病迷秦人逄氏有子少而惠及壯而有迷罔之疾聞歌以為哭視白以為黑饗香以為朽嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉楊氏告其父曰魯之君子多術藝將能已乎汝奚不訪焉其父之魯過陳遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之言未必非迷而况魯之君子迷之郵者焉能解人之迷哉榮汝之糧不若遄歸也此章以一人之迷例舉世之迷其言出於老聃并將己之言與魯之君子統以一迷字概之其故何也良以三界六道衆生無一而非迷也福業勝者迷稍淺罪業重者迷愈深欲醒此迷除非黃面瞿曇盧注以上章之忘此章之迷皆謂合道因文中有向使天下之人其心盡如汝子汝則反迷矣之言盧氏執為證據殊不知老聃此言是反比例耳意顯二者俱迷不得言此醒而彼迷也仲尼第四仲尼間居仲尼間居子貢入侍而有憂色將以啓子貢之疑也子貢不敢問出告顏回顏回援琴而歌孔子聞之果召回入問曰若奚獨樂回曰夫子奚獨憂孔子曰先言爾志曰吾昔聞之夫子曰樂天知命故不憂回所以樂也孔子愀然有間曰有是言哉汝之意失矣此吾昔日之言爾請以今言為正也汝徒知樂天知命之無憂未知樂天知命有憂之大也今告若其實修一身任窮達知去來之非我亡變亂於心慮爾之所謂樂天知命之無憂也曩吾修詩書正禮樂將以治天下遺來世非但修一身治魯國而已而魯之君臣日失其序仁義益衰情性益薄此道不行一國與當年其如天下與來世矣吾始知詩書禮樂無救於治亂而未知所以革之之方此樂天知命者之所憂先將憂樂二途詳敘一番以啓下文雖然吾得之矣夫樂而知者非古人之謂所樂知也無樂無知是真樂真知故無所不樂無所不知無所不憂無所不為詩書禮樂何棄之有革之何為顏回北面拜手曰回亦得之矣聖人超世之詣除顏回以外無人領會出告子貢子貢茫然自失歸家淫思七日不寢不食以至骨立顏回重往喻之乃反丘門絃歌誦書終身不輟子貢疑情頓發窮參力究以求了悟幸得顏回一點則受用不盡矣列子書凡八篇仲尼篇居第四述仲尼之事有四章此第一章也樂之與憂兩相對待不入神化之域仲尼故為此言以啓無樂無知之妙境而後聖人之心和盤托出矣顏子言下大徹不覺五體投地子貢雖費苦功亦非他人所能及也觀列莊二書推尊孔子處豈可以異端目之陳大夫聘魯陳大夫聘魯私見叔孫氏叔孫氏曰吾國有聖人曰非孔丘耶曰是也何以知其聖乎叔孫氏曰吾嘗聞之顏回曰孔丘能廢心而用形陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老聃之弟子有亢倉子者得聃之道能以耳視而目聽魯侯聞之大驚使上卿厚禮而致之亢倉子應聘而至魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳目之用魯侯曰此增異矣其道奈何寡人終願聞之亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之內來干我者我必知之乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣魯侯大悅他日以告仲尼仲尼笑而不答孔子能廢心而用形既廢心矣用形者誰當知自性神用不涉思惟也陳大夫稱亢倉子能以耳視而目聽即是六根互用及亢倉子見魯侯一語抹過直云視聽不用耳目復申之曰我體合於心者融四大入識大也心合於氣者融識大入風大也風之為用掃除雲霧顯現真空者也又風者動性也由動中見不動則證常住真心矣氣合於神者風力無依即如來藏妙真如性也神合於無者妙覺圓明入寂滅海也其有介然之有唯然之音雖遠在八荒之外近在眉睫之內來干我者我必知之既在八荒之外又云來干我者非從極遠來至極近也乃物之小者音之微者動於遠方我已知之即名干我可見法身大我無處不遍清淨六根隨機顯現也近在眉睫之內凡體只覺其礙不能明了唯證道者方能知之不知是我七孔四支之所覺心腹六藏之所知者返觀幻身若存若亡何嘗為形體所拘耶其自知而已矣一語義味無窮圭峯稱荷澤得六祖之正傳因其見此真知也魯侯告仲尼仲尼笑而不答蓋亢倉子徹底吐露不必雪上加霜仲尼以無言印之上聖高真同一心法也此章專就用處顯道令人即用知體體用無二也西方聖人商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘博學多識者也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘弗知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者為聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖弗知真為聖歟真不聖歟商太宰默然心計曰孔丘欺我哉此指釋迦如來而言也先舉盛德之君自三王溯而上之以至五帝三皇皆不得稱為至聖獨西方之人可以稱之豈非佛之德智超過三皇五帝乎既欲稱為至聖而復作疑似之言以孔子未曾親見故也且釋迦之德非言語所能形容聖與非聖舉不足以稱之商太宰何人而能信解此言乎列子見南郭子子列子既師壺丘子林友伯昏瞀人乃居南郭從之處者日數而不及雖然子列子亦微焉朝朝相與辨無不聞子列子慈心濟世顯道之大而與南郭子連牆二十年不相謁請南郭子抗志絶俗顯道之尊相遇於道目若不相見者兩人俱到亡言絶慮境界所以相遇之時心迹落落無可交接也門之徒役以為子列子與南郭子有敵不疑有自楚來者問子列子曰先生與南郭子奚敵子列子曰南郭子貌充心虛耳無聞目無見口無言心無知形無惕歷舉南郭七德而以心虛為本虛至極處與空如來藏相應所謂無法可現非覺照義也往將奚為雖然試與汝偕往閲弟子四十人同行見南郭子果若欺魄焉欺魄無知之貌而不可與接顧視子列子形神不相偶而不可與羣形神俱喪與道合真南郭子俄而指子列子之弟子末行者與言衎衎然若專直而在雄者不論師資不簡首末言機一發鋭不可當唐時禪宗尊宿每有此風子列子之徒駭之反舍咸有疑色子列子曰以下分為七層得意者無言此第一層心領神會非言可喻進知者亦無言此第二層真智顯現言語道斷用無言為言亦言無知為知亦知此第三層由體起用無而為有無言與不言無知與不知此第四層攝用歸體無無亦無亦言亦知此第五層全泯不礙全彰亦無所不言亦無所不知此第六層應機無滯亦無所言亦無所知此第七層全彰不礙全泯如斯而已道體之妙盡於是矣汝奚妄駭哉此章顯有道之士非凡情所測也二子連牆而居不相交接外人焉得而不疑及列子率門徒以往又見南郭子言貌異常自非列子七番詳陳闡明言知之理世人那得釋其疑耶列子好遊初子列子好遊壺丘子曰禦寇好遊遊何所好列子曰遊之樂所玩無故人之遊也觀其所見我之遊也觀其所變遊乎遊乎未有能辨其遊者壺丘子曰禦寇之遊固與人同歟而曰固與人異歟凡所見亦恆見其變玩彼物之無故不知我亦無故務外遊不知務內觀外遊者求備於物內觀者取足於身取足於身遊之至也求備於物遊之不至也於是列子終身不出自以為不知遊壺丘子曰遊其至乎至遊者不知所適至觀者不知所眂物物皆遊矣物物皆觀矣是我之所謂遊是我之所謂觀也故曰遊其至矣乎遊其至矣乎列子未明唯識道理向外馳求觀其答壺子語自以為高出常人矣而不知物之變化雖多總不外乎唯心所現也壺子斥其不異於人而復示以物我同一無常令其返觀自心體備萬法以為遊觀之境列子心領神會而終身行之壺子歎為至遊蓋與老子不出戶知天下不窺牖見天道一章同意文摯視疾龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以為榮國毀不以為辱得而不喜失而弗憂視生如死視富如貧視人如豕視吾如人處吾之家如逆旅之舍觀吾之鄉如戎蠻之國凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕隸此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯自後向明而望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為疾者或由此乎非吾淺術所能已也龍叔修道於前生宿習力強心不偕俗自以為病文摯雖望而見之而不知治之之法其一孔不達者隔世之迷思惟心生障蔽正智也欲治此病在修習止觀以澄其識浪自然正智現前超凡入聖矣文摯術淺何足以治之生死道常無所由而常生者道也不假修習本覺常存道之體也由生而生故雖終而不亡常也依本覺有不覺依不覺有始覺幻軀雖壞自性不迷湛然常住由生而亡不幸也既能覺悟忽而亡失實大不幸有所由而常死者亦道也除滅無明而妄心永寂自然契道由死而死故雖未終而自亡者亦常寂而又寂身雖住世而我執已亡即證真常由死而生幸也由妄心死而真心生實大幸也故無用而生謂之道雖無作為而示現受生是菩薩道用道得終謂之常安詳順世千聖通規有所用而死者亦謂之道捨身布施是菩薩道用道而得死者亦謂之常為道而死亦利生之常事也此章分為兩段前段生死屬心專為自利就真諦説內分二門一顯性門二斷惑門後段生死屬身專為利他就俗諦説亦分二門一樂遊門二苦行門列子書中唯此一章最為難解今依佛教義釋之若與舊注參看孰得孰失必有能辨之者堯治天下堯治天下五十年不知天下治歟不治歟不知億兆之願戴己歟不願戴己歟顧問左右左右不知問外朝外朝不知問在野在野不知堯乃微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯喜問曰誰教爾為此言童兒曰我聞之大夫問大夫大夫曰古詩也堯還宮召舜因禪以天下舜不辭而受之此章描寫治道之極致後世賢聖之君所不能及也君不自知則君亡情矣左右不知則左右亡情矣外朝在野皆不知則均亡情矣堯無可問祇得遊於康衢忽聞童謠之辭恰似以空印空舉國臣民同入於太和之境矣堯欲不禪其可得乎舜欲不受其可得乎閲此章而不坦然忘我遊心於堯舜之世者則其人可知矣關尹論道關尹喜曰在己無居覓心了不可得即是如實空形物其著頭頭顯露法法全彰即是如實不空古人云見物即見心無物心不現與此同意其動若水性本無動而流動隨緣其靜若鏡空明之體雖現萬象而無所動其應若響響隨聲應而不自發故其道若物者也若字猶佛經之如字如事如理一切皆如謂之如如不動物自違道抉其根源咎由自取道不違物種瓜得瓜種豆得豆善若道者亦不用耳亦不用目亦不用力亦不用心欲若道而用視聽形智以求之弗當矣凡夫耳目心力為物所囿故違於道若能超越視聽形智之滅則勿求而自得矣瞻之在前忽焉在後道無方所用之彌滿六虛廢之莫知其所道非有無亦非有心者所能得遠亦非無心者所能得近心有心無道未嘗變唯默而得之不關語言文字而性成之者得之本性現成豈假外求知而亡情能而不為真知真能也發無知何能情發不能何能為無知者真知也真知現前自然亡情不能者真能也真能現前自然不為二發字由本源性地發現如花之開也何能情無妄情矣何能為無妄為矣言其妄情妄為自然永斷聚塊也積塵也雖無為而非理也申明情與無情之異有情斷惑證真而成道果無情轉為依報莊嚴眼前塵塊皆是衆生妄業所感雖無為而不同性地之無為以性地之無為能起神用所以異也列子引關尹語甚多以此章為最精世所傳關尹子九篇者偽作也得此章而讀之關尹子之面目見矣湯問第五湯問夏革殷湯問於夏革曰古初有物乎夏革曰古初無物今惡得物後之人將謂今之無物可乎殷湯曰然則物無先後乎夏革曰物之終始初無極已始或為終終或為始惡知其紀然自物之外自事之先朕所不知也殷湯曰然則上下八方有極盡乎革曰不知也湯固問革曰無則無極有則有盡朕何以知之然無極之外復無無極無盡之中復無無盡無極復無無極無盡復無無盡朕以是知其無極無盡也而不知其有極有盡也湯疑萬物有始革以無始答之湯會其意而知物無先後革即申明終始循環之妙復恐湯問物外事先預以不知杜其推求之心蓋思慮所不及處即是物之外事之先也湯又疑虛空有盡革答不知是截斷情識之利刃也湯不能領而固問之革以有無二門詳答所言無者十方虛空也有者天地萬物也虛空無極天地有盡人所共知而説不知者何也蓋有從無生無從有顯有無互攝總非意言分別所能楷定也故下文層層披剝以明無極無盡之義與內典所云虛空無邊世界無邊衆生無邊同意焦螟江浦之間生麼蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形䚦俞師曠方夜擲耳俯首而聽之弗聞其聲唯黃帝與容成子居空洞之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲佛制羅漢飲水只用肉眼觀不得用天眼觀若以天眼觀之欲求無蟲之水不可得矣黃帝容成得天眼天耳通能見焦螟之形聞焦螟之聲所謂同齋三月心死形廢者修通之方法也經云一一微塵皆有廣大法界佛與菩薩集會説法世人多不能信若以焦螟之説證之復何疑哉愚公移山大形人相王屋我相二山巍然對峙方七百里高萬仞本在冀州之南河陽之北適當其中北山愚公者不度德不量力稱之為愚年且九十面山而居閲厯既深方知二山為礙懲山北之塞出入之迂也二山亘於懷中不能直道而行聚室而謀曰吾與汝畢力平險指通豫南達於漢陰可乎忽起移山之計其愚不可及也雜然相許去塞就通人所樂從其妻獻疑曰以君之力曾不能損魁父之丘如大形王屋何且焉置土石愚公之心陽而直其妻之心陰而曲道心人心兩相違背是以獻疑而阻之雜曰投諸渤海之尾隱土之北消散於不可見之地遂率子孫荷擔者三夫道生一一生二二生三三生萬物今有三人即萬夫之漸也愚公之氣壯矣叩石墾壤箕畚運於渤海之尾不以己所惡者貽害他人鄰人京城氏之孀妻有遺男始齔跳往助之京城氏有大家風範助道緣也以孀妻弱子而能助力益堅愚公之志矣寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不惠以殘年餘力曾不能毀山之一毛其如土石何叟之心思如河流之屈曲盤旋障道緣也以世智辨聰巧言亂德幸愚公不為所動不然殆矣北山愚公長息曰汝心之固固不可徹曾不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子又有子子又有孫子子孫孫無窮匱也而山不加增何苦而不平愚公以生滅心為主凡夫意識也雖相續無窮而其力甚微河曲智叟亡以應操蛇之神聞之傳送識也懼其不已也告之於帝帝者真識也真識為主能起大用帝感其誠命夸蛾氏夸大也蛾能飛者也即是大乘亦名摩訶衍二子一名奢摩陀止也二名毗婆舍那觀也負二山一厝朔東一厝雍南以大乘止觀之力除人我二山頃刻都盡自此冀之南漢之陰無隴斷焉履道坦坦一望無垠愚公從此安享太平矣此章策勵世人精勤修道不存退志也人我二見為害甚巨令修行者不得自由故須除之然以思惟心除之甚難必由真智為主以止觀力而移去之中間許多周折形容初步艱難至止觀雙行而一道齊平矣愚公智叟判然兩途學愚公者能獲大益學智叟者終身無成世俗之人鮮不以此言為迂也夸父追日夸父不量力欲追日影逐之於隅谷之際渴欲得飲赴飲河渭河渭不足將走北飲大澤未至道渴而死棄其杖尸膏肉所浸生鄧林鄧林彌廣數千里焉此章人皆不識其意之所指合上章而觀之則曉然矣愚公身老力衰以子孫無盡之傳不限時代而建業移山竟得成功夸父恃其身強力大欲以崇朝之功追及日影遂致渴死世之學道者當以是為鑑起恆常心經久不懈綿密用功必能遂意若以急躁心求其速成雖有大乘根器亦不免於中途而廢也何則剋期太促用力太猛或遭邪魔或覯疾病以至退失初心與渴死何以異哉愚公所移之山人我障也移其可移者也夸父所追日影虛幻相也追其不可追者也發趣異途成壞立判矣兩兒辨日孔子東遊見兩小兒辨鬬問其故一兒曰我以日始出時去人近而日中時遠也一兒以日初出遠而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及其日中如探湯此不為近者熱而遠者涼乎孔子不能決也兩小兒笑曰孰謂汝多知乎此章與二僧論風幡相似所謂大小遠近炎涼皆是六識妄緣都無實義若離遍計性此等情見纖毫不起孔子見兩兒迷執太堅不能曉以大道故且置之而任其訕笑也今依天文格致家之理亦甚易解地為圓體半徑一萬二千里日初出時遠半徑日中時近半徑晨光橫射而來故涼午景直射而下故熱又依視學凡見遠物平視大於仰視如將紙鳶之線撒盡執於遠處則見其大放至空中則見其小此實證也日初出時蒙氣厚故顯大日漸高蒙氣漸薄故漸小此皆俗諦無關大道略述梗概以破兩兒之愚迷而已扁鵲換心魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志強而氣弱故足於謀而寡於斷齊嬰志弱而氣強故少於慮而傷於專若換汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室而有其妻子妻子亦弗識二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃已菩薩入俗利生須學五明文摯扁鵲皆醫方明者也此章述扁鵲之神技也以後世同類之事證之則不必剖胸換心專易二人之神識足矣嘗有道家者流自嫌衰老欲換少壯之身與人同寢即交易而去又晉時有梵僧曇無讖者人求其講涅槃經讖以不善華言祈禱觀音夜夢觀音易其頭遂通華言而頭之形容如故乃觀音之神力也悟真篇內有投胎奪舍并移居之句投胎者住胎十月方生也奪舍者胎中嬰孩本有識神於出胎時被有力者撞而奪之也世人臨産見有僧道或顯者來即此類也移居者必煉氣功深乘人之熟睡而換之文中剖換之術不必判其真假但以扁鵲之神技必有法互易神識而令二人均其志氣也師文鼓琴瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄遊柱指鈞弦三年不成章師襄曰子可以歸矣師文舍其琴歎曰文非弦之不能鈞非章之不能成文所存者不在弦所志者不在聲內不得於心外不應於器故不敢發手而動弦且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商弦以召南呂涼風忽至草木成實及秋而叩角弦以激夾鍾溫風徐回草木發榮當夏而叩羽弦以召黃鍾霜雪交下川池暴沍及冬而叩徵弦以激賓陽光熾烈堅冰立散將終命宮而總四弦則景風翔慶雲浮甘露降醴泉涌師襄乃撫心高蹈曰微矣子之彈也雖師曠之清角鄒衍之吹律亡以加之彼將挾琴執管而從子之後耳師文鼓琴三年而不成章固有異於常人矣文所存者數語非但常人不知恐師襄亦不能知及其有得而試之則變換四時何其妙也而疑之者則曰文中有當春及秋當夏及冬八字則知變換四時必依當時原有之氣候為本方能變為異時氣候是則欲試其技必分四時鼓之不能一時全試也解之者曰按此文意應在一時設鼓琴正當春時以商弦叩之則變而為秋既變而為秋矣即以所變之秋為本而叩之以角弦遂變而為春作者但取文便以春秋作一對夏冬作一對不暇計及夏之無本也應以秋變而為夏夏變而為冬皆以所變之景物為本而轉換之遂得一日之間備歷四時而毫無遺憾乃命宮而總四弦則祥瑞齊現妙用全彰宜乎師襄歎賞不置也或疑鼓琴何關乎道當知道體無所不在琴之妙即道之妙也薛談學謳薛談學謳於秦青未窮青之技自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲薛談乃謝求反終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之娥還復為曼聲長歌一里老幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之故雍門之人至今善歌哭效娥之遺聲上章鼓琴此章謳歌皆五明中之聲明也隨舉一技至造極時皆非思議所能及此何故耶因其本如來藏妙真如性也六根六塵莫不皆然故發為謳歌能振林木遏行雲遍虛空界顯妙用也以才生即滅之音聲而能繞梁三日其經於衆生耳根者何其深也至於哀哭長歌而令人悲喜轉變不能自主韓娥之聲學可謂至矣然比於佛之音聲猶其小焉者內典所載法界無邊佛音聲亦無邊佛以一音演説法衆生隨類各得解皆謂世尊同其語斯則神力不共法豈凡情所能測耶列子此章述音聲之妙出過常情以見本性德用隨處顯露令人起欣慕之心耳來丹報讎魏黑卵粗惡之名以昵嫌殺丘邴章丘邴章之子來丹誠篤之稱謀報父之讎丹氣甚猛形甚露計粒而食順風而趨雖怒不能稱兵以報之恥假力於人誓手劒以屠黑卵體弱志強宜得寶劒黑卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體無痕撻負其材力視來丹猶雛鷇也來丹之友申他曰子怨黑卵至矣黑卵之易子過矣將奚謀焉來丹垂涕曰願子為我謀申他曰吾聞衛孔周其祖得殷帝之寶劒有其人方有其器非殷帝不能用非孔周不能藏若入他人之手早已化龍飛去矣一童子服之卻三軍之衆以威神制之非在殺也奚不請焉來丹遂適衛見孔周執僕御之禮請先納妻子後言所欲孔周曰吾有三劒唯子所擇皆不能殺人內典云般若大火燒盡一切世間盡無有餘而不損一草即此義也且先言其狀一曰含光視之不可見運之不知有其所觸也泯然無際經物而物不覺二曰承影將旦昧爽之交日夕昏明之際北面而察之淡淡然若有物存莫識其狀其所觸也竊竊然有聲經物而物不疾也三曰宵練方晝則見影而不見光方夜見光而不見形其觸物也騞然而過隨過隨合覺疾而不血刃焉此三寶者傳之十三世矣而無施於事劒之為用非凡情所測匣而藏之未嘗啓封來丹曰雖然吾必請其下者孔周乃歸其妻子與齋七日晏陰之間跪而授其下劒與齋七日而於晏陰之間授之此何物也豈世間鋼鐵所鑄者耶其質在有無之間來丹若不慎密則失之矣來丹再拜受之以歸來丹遂執劒從黑卵時黑卵之醉偃於牖下自頸至腰三斬之黑卵不覺忒煞昏迷來丹以黑卵之死趣而退遇黑卵之子於門擊之三下如投虛人之形體本虛世人妄以為實今以宵練擊之方知其虛來丹可以悟矣何讎之足云黑卵之子方笑曰汝何蚩而三招豫來丹讎人也忽而三招子不悟何待來丹知劒之不能殺人也歎而歸來丹既悟人劒俱空報讎之念消矣黑卵既醒亦有悟時怒其妻曰醉而露我使我嗌疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支強彼其厭我哉章末餘波不關道意情與無情皆以真空法性為體證道之人物不能傷如別章所説至精之物亦不傷人如此章所明人皆以報讎不成為來丹惜我則以報讎事畢為來丹慶何也冤仇相報無已時也今知四大本空五陰非有則當處解脫轉熱惱為清涼豈非大快事哉或疑三劒必無此物今為釋之丙典所載忉利天王與修羅戰用種種兵四天王及護法諸天亦有執劒者證知此劒乃天人所授也殷帝御世用此劒以降服鬼神驅除惡魔去其害民者又若臨敵交戰仗此劒以往則敵兵威服自然退卻殷帝既沒入於孔氏之家惜乎來丹請下劒志在殺讎非其用也倘來丹請上劒以往數黑卵之罪而以劒臨之自然首下心悔過請宥從此黑卵改為良善則劒之為用大矣力命第六力不勝命力謂命曰若之功奚若我哉命曰汝奚功於物而欲比朕力曰壽夭窮達貴賤貧富我力之所能也命曰彭祖之智不出堯舜之上而壽八百顏淵之才不出衆人之下而壽四八仲尼之德不出諸侯之下而困於陳蔡殷紂之行不出三仁之上而居君位季札無爵於吳田恆專有齊國夷齊餓於首陽季氏富於展禽若是汝力之所能奈何壽彼而夭此窮聖而達逆賤賢而貴愚貧善而富惡耶力曰若如若言我固無功於物而物若此耶此則若之所制耶命曰既謂之命奈何有制之者耶朕直而推之曲而任之自壽自夭自窮自達自貴自賤自富自貧朕豈能識之哉朕豈能識之哉力者現世所用之才智也命者過去所作之業因也業因為種存於八識田中強弱不齊生熟不等先後發現即為果報世人不知稱之謂命自古以來莫不皆然列子此篇勸人安命損卻許多煩惱也文中歷敘壽夭窮達之差池不與其人賢愚善惡相稱令人欲問彼蒼而莫得其解徒以一命字了之章末自壽自夭等八箇自字隱含自種發現自身酬業之意非命所能制不過直推曲任而已不然彼造物者何能受廓然大公之名哉北宮子安命北宮子謂西門子曰朕與子並世也而人子達並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則裋褐食則粢糲居則蓬室出則徒行子衣則文錦食則粱肉居則連欐出則結駟在家熙然有棄朕之心在朝諤然有傲朕之色請謁不相及遨遊不同行固有年矣子自以德過朕耶西門子曰豫無以知其實汝造事而窮豫造事而達此厚薄之驗歟而皆謂與豫並汝之顏厚矣北宮子無以應自失而歸中塗遇東郭先生先生曰汝奚往而反偊偊而步有深愧之色耶北宮子言其狀東郭先生曰吾將舍汝之愧與汝更之西門氏而問之曰汝奚辱北宮子之深乎固且言之西門子曰北宮子言世族年貌言行與豫並而賤貴貧富與豫異豫語之曰豫無以知其實汝造事而窮豫造事而達此將厚薄之驗歟而皆謂與豫並汝之顏厚矣東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宮子厚於德薄於命汝厚於命薄於德汝之達非智得也北宮子之窮非愚失也皆天也非人也而汝以命厚自矜北宮子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣豫不敢復言北宮子既歸衣其裋褐有狐貉之溫進其茙菽有稻粱之味庇其蓬室若廣廈之蔭乘其蓽輅若文軒之飾終身逌然不知榮辱之在彼也在我也東郭先生聞之曰北宮子之寐久矣一言而能寤易怛也哉北宮子以世俗之見與西門子較量窮達宜乎為西門子所訕笑也幸東郭先生以天命曉之西門子既服北宮子亦釋然心安何其感化之速耶雖然此三子者皆未聞道也夫聞道者不為命之所囿而能造乎命者也且能斷己之命根以出沒於命所不及之處人天三界隨意寄托十方國土應願往生博施濟衆而不受福德永劫修行而不辭勞瘁菩薩有十力佛有十力皆以力勝謂之力波羅密何命之足云若規規然以聽天任命為宗亦終於隨業流轉而已楊朱第七此章恣情放逸非列子之書不足取也説符第八持後處先子列子學於壺丘子林壺丘子林曰子知持後則可言持身矣列子曰願聞持後曰顧若影則知之列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈伸任物而不在我此之謂持後而處先此以形影喻心法也形枉則影曲形直則影正以喻心邪則萬法皆惡心正則萬法皆善法從心生猶之影隨形現也學道之人心有主宰則萬法唯心所轉心則處先而能持其後矣非若世人心隨物轉不能自由以致後先倒置也屈伸任物而不在我一語是轉機恐後人執成死句不能超脫耳任物云者即是一切無心而已九方臯相馬秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天下之馬者若滅若沒若亡若失若此者絶塵弭𨅊臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纏薪菜者有九方臯此其於馬非臣之下也請見之穆公見之使行求馬三月而反報曰已得之矣在沙丘穆公曰何馬也對曰牝而黃使人往取之牡而驪穆公不説召伯樂而謂之曰敗矣子所使求馬者色物牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其粗在其內而忘其外見其所見不見其所不見視其所視而遺其所不視若臯之相馬乃有貴乎馬者也馬至果天下之馬也此章可作三種喻一者求經世之才須具九方臯眼目方能得伊尹太公其人者二者接超世之機須具九方臯眼目方能得六祖臨濟其人者三者讀載道之書須具九方臯眼目不在語言文字上計較短長心與古會而離言妙旨豁然顯露求文字相了不可得觀其言天下之馬若滅若沒若亡若失豈專論馬也哉其寄意遠矣唯九方臯觀之以天機始能見其神既得其神則牝牡驪黃何庸介意故伯樂以得精忘粗等四句稱之此四句義實為三喻之祕密心法也不死之道昔人言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死己所重者莫過乎生彼自喪其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而笑之曰夫所欲學不死其人已死而猶恨之是不知所以為學胡子曰富子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言而不能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚為不能言生術哉此章示學道之要門也知而未行者可以教人而得其傳者可以成道此理之當然者而世人每不信之以致當面錯過終身無學為治此病分作三層一者燕君不得其術而怒使者納幸臣之諫而釋然無悔可謂毫無灼見矣二者齊子恨言者之死而富子笑之胡子申其正義以解富子之誚三者胡子引衛人之事以實其説衛子得父之傳而不能行告之於人而人行之與其父同學道之人苟知此意則尋師訪友隨處獲益然亦須辨其邪正方不被外道所惑也不死之道出自黃帝戰國末時已失其傳秦皇漢武求之而不可得後來金丹之術行於世間真偽雜出梁隱士陶宏景得其真傳授之沙門曇鸞鸞遇菩提留支詳論不死之道遂焚仙經而修淨土以觀經為宗即得上品上生瑞應彌空人所共見六朝以來行此法者皆能往生淨土得不死之道無有終極此法以無量壽經觀經阿彌陀經往生論四種為本卷册具在不煩他求若不依此法而別求師傳誤入邪途深為可惜豈知不死之道即在目前人人可學祇須發起真實信心便能超出三界永脫輪回也簡子放生邯鄲之民以正月之旦獻鳩於簡子簡子大悅厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰然簡子之誤在厚賞獻鳩者即以啓網捕之害也客以正義曉之實探源之論為人上者所當學然不可以此言而遂廢放生之善舉也蓋力之所能禁者禁之力所不能禁者買而放之遠追流水長者之遺風而與業道衆生結未來出世因緣豈非菩薩道中之大方便乎鮑子進言齊田氏祖於庭食客千人中坐有獻魚鴈者田氏視之乃歎曰天之於民厚矣殖五穀生魚鳥以為之用衆客和之如響鮑氏之子年十二預於次進曰不如君言天地萬物與我並生類也類無貴賤徒以小大智力而相制迭相食非相為而生之人取可食者而食之豈天本為人生之且蚊蚋𠾱膚虎狼食肉非天本為蚊蚋生人虎狼生肉者哉田氏以世俗之見歎天之厚於人與西洋教意相同鮑氏之子突然而出如霜鐘破曉警醒昏迷非菩薩應化而何此等語言中夏未之前聞唯西竺婆羅門制斷肉戒釋迦降生演説六道輪回之苦一切有情無非過去世中父母六親尚忍食其肉以資一時之口腹哉故楞伽經終之以不食肉列子八篇將終亦有二章述救護生靈之道何其與佛經遙遙相應如出一轍耶板存金陵刻經處南華經發隱敘太史公言莊周作漁父盜跖胠篋以詆訾孔子之徒以明老子之術豈知漁父盜跖皆他人依托大違莊子本意觀其內篇推尊孔子處便可知矣司馬氏不於內篇窺莊子之學而據偽撰以判莊子宜其將老莊申韓合為一傳也至唐初尊之為南華經而作注解者漸多唯明之陸西星憨山清二家以佛理釋之憨山僅釋內篇西星則解全部今閲二書猶有發揮未盡之意因以己意釋十二章與古今著述迥不相同質之漆園當亦相視而笑嘗見宗鏡判老莊為通明禪憨山判老莊為天乘止觀及讀其書或論處世或論出世出世之言或淺或深淺者不出天乘深者直達佛界以是知老列莊三子皆從薩婆若海逆流而出和光混俗説五乘法人乘天乘聲聞乘菩薩乘佛乘能令衆生隨根獲益後之解者局於一途終不能盡三大士之蘊奧也光緒甲辰仲秋之月石埭楊文會識於金陵刻經處
