body:
  text: 清石埭楊文會仁山著與鄭陶齊官應書附來書伏處海隅耳盛名久矣人事牽擾道遠莫由瞻奉引領松鶴我勞如何下走嶺南下士碌碌因人船算濫司愧無建樹值此國步艱難翠華遠狩中原蒿目痛哭新亭此海內忠義之士心所同具者也竊思兼善之機既阻獨善之道可為下走雖混俗趨塵然好道之心童而習之至衰朽猶如一日祇以至人未遇口訣難逢仰視青霄每增浩歎側聽先生抱道在躬和光養性生平心得定有不凡問途必於已經自是求道者第一要義其祕密藏固不敢妄請賜教至若授受之陳跡初終之大旨正邪之分界天人之節次敢乞不棄顓蒙有以教之幸甚禱甚拙作詩草二冊聊用伴函頃奉賜函並大著二冊展誦之餘莫名欽佩去聖時遙人情澆漓誠心向道迥出塵凡非夙具大善根力曷克臻此承示時務多艱此皆衆生業力所感正是菩薩悲願度生之境修行人常以兼善為懷若存獨善之心則違大乘道矣鄙人學佛以來近四十年始則釋道兼學冀得長生而修佛法方免退墮之虞兩家名宿參訪多人證以古書互有出入遂捨道而專學佛如是有年始知佛法之深妙統攝諸教而無遺也蓋道家首重命功佛家直須命根斷命根斷則當下無生豈有死耶生死既不可得而假生死以行大願是以華嚴經中善財所參善知識比丘居士仙人天神錯雜間出皆是一真法界所流露也若認定金丹祕訣修成之仙或為仙官或為散仙總不出上帝所統之界不過高於人界一等耳雖壽至千萬歲亦有盡時也鄙人常以大乘起信論為師僅萬餘言遍能貫通三藏聖教凡習此論者皆馬鳴大士之徒奉贈一冊以備流覽又拙作陰符發隱十宗略說各一冊呈請教正起信論末提出淨土一門為超脫輪回之捷徑昔曇鸞法師捨陶宏景所傳之仙訣專修十六觀法往生淨土豈非人傑也哉願與同志者效之與夏穗卿曾佑書附來書夏間得手書並起信義記歡喜無量觀書目方知有地論暨識論述記之刻知仁者弘法度人本誓無盡何幸末法有此智燈當與六道衆生同作踊躍弟子十年以來深觀宗教流略而外金頭五頂之書基督天方之學近歲粗能通其大義辨其徑途矣惟有佛法法中之王此語不誣至斯益信而此道之衰則實由禪宗而起明末唯識宗稍有述者未及百年尋復廢絶然衰於支那而盛於日本近年來書冊之東返者不少若能集衆力刻之移士夫治經學小學之心以治此事則於世道人心當有大益知此理者其居士乎述記刻成幾何其原書論記別行古書皆爾然學者頗不便新刻似可相合地論文廣理賾此時讀者恐稀不如以因明論先之尊處所刻大疏尚恐其簡前見日本人所開現存因明學各家有七十餘種直當廣行十數種使人衍熟其法則以後可讀慈恩各種書矣近來國家之禍實由全國民人太不明宗教之理之故所致非宗教之理大明必不足以圖治也至於出世更不待言矣又佛教源出婆羅門而諸經論言之不詳即七十論十句義亦只取其一支非其全體而婆羅門家亦自祕其經不傳別教前年英人穆勒始將四韋䭾之第一種譯作英文近已買得一分分四冊二梵二英若能譯之以行於世則當為一絶大因緣又英人所譯印度教派與中土奘師所傳者不異惟若提子為一大宗我邦言之不詳不及數論勝論之夥又言波商羯羅非商羯羅主也源出於雨衆將佛教盡滅之而為今日現存婆羅門各派之祖此事則支那所絶不知者附上以廣異聞頃接手函得知公務之暇備研各教甚為希有金頭五頂之書未知說何道理便中祈示一二基督天方之學皆以事天為本其源出於婆羅門而變其規模也婆羅門教最古以大梵天為主或有宗大自在天者皆從人道而修天道不出六凡之表佛教興而婆羅門之明哲者多從佛教利根上智現證阿羅漢果即出六凡而為四聖之初門可見佛教非出於婆羅門也西人在印度考求各教但求形跡可據者載之謂佛教後出遂以婆羅門為其源信有聲聞法而不信有菩薩法以菩薩法係文殊阿難在鐵圍山結集諸大菩薩以神通力流傳世間凡夫始得見聞西人不明其理往往疑而不信也唯識古書亡於元末明季諸師深以不見為恨近從日本得來者有十餘種已將述記合論付梓現已刻至四分之三來歲五六月間可出書矣因明大疏之外尚有義斷前後記等皆唐人所作有款當續刻之地論百卷因無巨款久久未成尊示云佛教之衰實由禪宗支那固然而日本則衰於淨土真宗近閲真宗之書與經意大相違背層層辨駮冀得改正接得復函知彼決不能改亦無可如何耳與桂伯華念祖書一附來書違教數月渴想良殷前者普陀之遊本可旬日間即返金陵詎行至寧波舍戚處得江西家信言家中用度缺乏亟須早歸遂急往普陀草草遊歷僅住四日而返歸途金盡遂徑溯江而上不及更詣金陵趨聆教誨矣在普陀時晤後寺法師名印光者係陝西人道行深淺非某下愚所能窺測然其人亦素知夫子不知夫子亦知其人且悉其所造否日後出家擬即求其剃度師謂何如自贛返省見與李淡緣第一書歡喜無量自九江還又見與淡緣第二書又大歡喜淡緣勇猛同輩中實罕其匹又得吾夫子指示途徑其造詣寧可限量今又有黎君端甫者係豐城人同輩中聞佛法者以彼為最早氣質亦以彼為最純惟入門之始乃讀鄧厚菴書者厚菴之學吾師曾議其穿鑿故前自普陀回曾將此意函告往贛後彼曾以一書寄某代呈因亟為呈覽此人誠篤異常若不棄而辱教之當能荷擔大法非僅僅作自了漢者或即將所賜淡緣二書鈔寄示之未識可否江西僻處蠻荒聞法較晚然發心向道者時時有之近時浮慕佛名且以己意或世間法附會經義者亦不乏人惟李淡緣與其叔澄字靖瀾及黎端甫又九江城內一少年徐子鴻者宿根最深若有大善知識如夫子者時時開示之䇿勵之紹隆三寶未嘗不在是人惜緣分淺薄罣礙輒多即賜函中言淡緣若來金陵可暢談一切者此事亦大非易緣其尊人邪見甚深彼家近在城中而書疏往返必由某處轉達者亦以其父子異性多所妨礙故也今若無故專以求法而來金陵其父必大詫以為怪事欲求如願勢必假借一事乃可起身此非旦夕所能須緩緩謀之娑婆濁世生此者皆障深業重信然即如某者識揚神飛非出家離俗斷難一心而家貧親老又不得不勉彊從俗以博取升斗然既已從俗則目所見耳所聞身所接罔非退道之緣進退兩難無計可設普陀一比丘名真達者曾勸某一意出家謂家中諸事皆有夙因決不因某之出家而有損益某知其有理而未深知可否敬求吾師為某決之何去何從總以易得一心而不至增造惡因為至美某實愚癡深恐墮落惟吾師哀愍而教導之幸甚前接正月二十三日手函備悉一是普陀印光法師未曾晤面不能知其造詣淺深出家一事須父母聽許方可否則違佛制僕但勸人學佛而不勸人出家因出家者雖多而學佛者甚少也且投師最難曾有相識者為師所拘反不如在家之得自由也近時僧中有負盛名而未達佛意竟作人天師表受徒千百供養禮拜敬之如佛而所開導於人者實未能施對證之藥也足下嫌俗事為纍難得一心鄙見當以四弘願為本時時研究佛法深義徹見六塵境界當體空寂一切煩雜世務無非菩薩行門念念回向淨土信口稱佛一句孤孤另另無依無傍即是往生之捷徑也若必待屏除萬緣方能修行則佛法不普恐千萬人中難得一二矣黎端甫從鄧氏書入手未合大道今將駮斥鄧氏之言詳答黎君函內煩轉寄為荷黎君若能親到金陵罄其胸中所欲言自當為之決擇精粗指引歸元之正路也復淡緣二書可鈔示之淡緣之父不信三寶可勸淡緣持大悲呪以轉之往者先母亦不喜學佛曾以呪力冥熏數月之間釋然無事故以此勉淡緣也端甫欲得蓮池尺木著述併拙作現有雲棲法彙係功德主施送之書寄上一部以備同人觀覽尺木有一行居集專談出世法板在常熟難得其書拙作僅有陰符發隱十宗略說二種各贈五本以餉同志欲作論語老莊列四種發隱尚未脫稿擬將前人未曾發明者表而出之以新人耳目然不免俗儒之唾罵也若將孟子評論一番更為世所詬厲故祇與人談論而未曾形諸楮墨耳九江徐子鴻志趨若何出世法門能知路否便中示悉為盼與桂伯華念祖書二前接淡緣信知台從仍在興國拙函想已入覽矣茲有友人深願學佛者精通唯識一門以續千年之墜緒聞足下嚮道情殷願助贍養之資每月六元俾得前來金陵久住敝宅專心研究因明唯識二部期於徹底通達為學佛者之楷模不至顢頇儱侗走入外道而不自覺實振興佛法之要門且於淨土道理深為有益蓋莊嚴淨土總不離唯識變現也助資者有校書之事相煩每日不過三點鐘耳如合雅意請即附輪東下此係世出世法兩全之道較之捨親入山不尤心安理得乎與李淡緣息書一附來書屢聞桂伯華言及先生理解圓融導引懇切為當代昌明佛法第一導師不勝傾慕每以不得隨侍左右為恨然聞桂伯華所述先生指點之方已不啻耳提面命只患自身不能精進專一以解自纏縛致有負先生護念一切之懷耳息自聞先生誨人之旨又得桂伯華鞭策遂發一念歸西之心邇日更覺淨土一門為世尊方便度世之苦心衆生歸宗離濁之捷徑其他諸宗教雖善然當此時世有不暇為者矣想先生誨人心切淨課之暇可否誨息數言使歸西之心益加警策得以歸於淨土將來諸佛轉娑婆為淨土之際得以預於其間稍助微力曷勝幸甚頃接手函領悉種種發心向道已屬甚難專修淨土更屬難中之難閣下篤信不疑非宿根深厚曷克臻此雖未能覿面傾談而志同道合已不啻同堂晤對矣念佛法門普攝三根中人以上宜以三經一論為津梁無量壽經十六觀經阿彌陀經往生論更以大乘起信論為入道之門通達此論則楞嚴楞伽華嚴法華等經自易明了蓋彌陀因地修行不外此道往生西方之人在彼土修行亦不外此道是謂師資道合生品必高也或疑其為雜修不若專修之切蓋不知淨土一門括盡一切法門一切法門皆趨淨土一門此是純雜無礙利根上智所行之道也若不如是恐年久生疲不見升進必至退轉修淨業者不可不知尊函內有將來諸佛轉娑婆為淨土之際等語此是見道未深故作此想當知娑婆是衆生妄業所感猶如空華本無實體淨法界中極樂娑婆皆不可得而彌陀以大願力顯現極樂國土如鏡花水月攝受衆生入不退地若以質礙心求之去道遠矣娑婆世界釋迦佛大悲心所化之境一切菩薩修種種難行苦行均於此土修之菩薩入空三昧則世界了不可得入如幻三昧則世界宛然是謂空有無礙一念全收不待將來轉移也與李淡緣息書二附來書辱賜手書曲為開示先生之誨人不倦循循善誘於此益可見矣所云息前言轉娑婆為極樂之語為見道未深故有此想誠然如是當時蓋尚未達平等一法界之理而厭苦欣樂之心過勝也近遵來諭讀起信論漸知真如生滅粗跡於一切惟妄想造能明了無疑但其中真如生滅二門義極弘深難遽盡解竊擬自今以後凡讀起信論一遍後讀大乘經一部讀大乘經一部後復讀起信論一遍如是循環讀之似方可盡其義大乘諸經論來示但云楞嚴楞伽華嚴法華四部此外尚有幾部當看者即此四部中不知何家之注為最精要當看其餘如各家撰集不知亦有當看者否淨土法門讀誦大乘之外尚有嚴持戒律袁氏紀夢亦云乘急生最高戒急生最穩少戒者生邊地甚至墮天龍八部是戒亦淨業最要之事但如息輩尚係在家人出家之具足戒勢難盡守不知當受何等戒律方為允當律部諸書不知有幾部當看可看者受戒之時不知須請當代大師為授戒師否抑可於佛前自受之伏乞明示歲杪接手函得悉種種居士嚮道之切為近時所罕見應答各事條列於後起信論既能深究必得通達其注疏先閲纂注直解後閲義記海東此四家以賢首義記為主別記亦大有妙處閲之數過其義自顯也尊意將此論與大乘經循環讀之其法甚妙大乘經論前函所提四種內楞嚴閲正脈華嚴閲疏鈔法華閲會義楞伽須閲憨山筆記現無書購即閲宗泐注亦可此外尚有圓覺略疏金剛宗通心經五家注維摩注十二門論法界無差別論均可次第閲之各家撰集先閲蓮池憨山二家為近代之正法眼也戒律一門受持不易一受便不能犯在家人雖未受戒亦可學戒戒律多種當以梵網經內十重四十八輕為主有賢首疏可為準繩在家五戒即在十重之內至於比丘律儀專為出家人而設在家人不宜閲佛有定制他如菩薩戒本經最宜讀誦不但學道人宜遵即世俗人學之亦可漸入聖賢之域矣至於受戒一層必從師受若千里內無師許在佛前自受須要見相好否則不得戒以鄙意揆之與其受而不能持不如學而能遵也與李淡緣息書三附來書息不獲如伯華之親侍杖履日聆訓誨深自悲痛道力淺薄每為世務所障虛度時日不能精進唯願吾師哀我念我一策進之幸甚一近讀起信論於心真如已無疑義於心生滅無明起處仍未能徹見其根終有窒滯未知此義何經論中曾發明之乞一開示以便參究一無明起處極細微根雖非凡夫所能明了然其根之大端若不徹見覺一切功夫皆無著落矣不知以為何如一近擬讀起信論畢後將楞伽經細觀一遍使心體用益能明徹庶斷惑之功易於著力一近以為固執之心實不可無初學之人愈固執則愈堅忍愈堅忍則愈精進固執久久自無所執而執其所以有泥著之弊者蓋執之而不固耳不知以為然否並乞開示接閲手函情辭懇切雖隔千里志同道合夙世法緣非偶然也所問之事條答於左讀起信論既於真如無疑當知無明依真如起欲求起處不可得即是無明無始起之相也若無明有始則涅槃有終便違教意心經云無無明亦無無明盡即顯示無明本無也其用功處在照見五蘊皆空五蘊以色為首色蘊空則餘蘊自迎刃而解矣法界觀前十門專明此義無明有根本有枝末根本者住地無明也須至金剛後心才能斷之非凡夫所能了枝末者一切煩惱妄想也道業精純漸伏漸斷古人觀念頭起處一法亦可用之念頭起時才一觀照即不可得便知無根若求著落直須前後際斷徹見本來面目宗門所謂腳跟點地也讀起信論後研究楞伽經經論互相發明解悟最速固執之心在善用與不善用耳善用之則為堅忍為精進不善用之則拘泥不化難超情見也與李淡緣息書四附來書正月中奉到復函示以讀誦大乘次序慶幸無量自今正月以來憤自責修於淨業誓不退墮讀經念佛亦略有所會但恨根鈍障深不能直入佛之知見證我本來圓妙法身殊深自痛然以無始無明故兢兢業業唯有精進自勵而已謹將近所自課者條達於左伏願哀誨為禱一自遵前示讀起信論楞嚴正脈圓覺近釋華嚴疏鈔後少知毗盧法界體相然後於前示所謂空有無礙一念全收者豁然無疑矣近尚在讀華嚴兼閲彌陀疏鈔唯資質鈍甚每一義現前不能即斬然明了必數過後始能略詳端倪也一淨業修行現專以持名為主竊謂此事必先由念念相續心心相應雜念不起事一心後乃能念而無念無念而念孤孤另另無能無所信口稱佛一句皆是全體法身之理一心也未審以為何如一示伯華函中有云必待屏除萬緣方能修行則佛法不普此理極是息近日始見得息以為能否屏除萬緣亦有因緣前因既種安能無果果視其因不可易也行者但當慎現在因安受前果而已且萬緣皆是前孽前孽盡而後萬緣可除息以此故以四事自誓曰不得耽樂靜寂遇一切難事苦事但至心憶念於佛不得生畏避心遇一切難事苦事當念法界衆生所遇事更有甚於我者念畢即為自他懺悔遇一切福田更當勇猛為之但須憶念於佛至心代自他回向以此四事為世間屏緣助行未審可否某功德主所施之雲棲法彙如散未罄盡請再寄下一部息意欲存於撫州正覺寺以備是處淨業人閲也前接手函領悉種種略答數條以供法喜華嚴疏鈔既能全閲必得超越常情徹見一乘妙諦賢首所作一乘教義分齊章亦宜連類閲之經中深義未能當下明了者當於佛前至誠頂禮心念佛光灌頂久之自能豁然通達若以思惟心推究去道轉遠矣念佛法門欲得心心相續先事一心而後入理一心非屏除萬緣不可然在俗者此境難得前此復端甫信內有無後心無間心一段用當念一句為主截斷前後際是煩雜中念佛之捷徑請檢彼函閲之自知事一心理一心之妙境也來函所云前孽盡而後萬緣可除不知孽性本空但隨妄念而起若能觀心無念則罪福皆不可得儻心存孽盡緣除之見雖經無量劫亦無除盡之日也所發四誓皆作助道因緣但不可執執之則妨道雲棲法彙向功德主乞得兩部一施撫州正覺寺一施豐城同德書舍附寄起信正文十本分贈同人以資讀誦又流轉章十世章合訂十本係賢首之作在塵勞中用此法門最為巧妙行之既久冥契華嚴法界而不自覺古德法施之力有如是耶與黎端甫養正書附來書頃聞同參兄桂公述吾師悲願弘深淨功圓滿不勝渴慕養正久發出世心奈俗緣牽絆有名無實舍己藝人處極多加以宿業深重當應事之時心易走作誠恐頽隳日下光景易移不早辦前程自誤誤人伊於胡底常欲訪求名宿一問初津今遇吾師實為三生有幸吾師嚮來念佛得力果從何處下手幸詳示焉頃由伯華遞到手函得知足下嚮道情殷歡喜無量大凡此事入手切須純正聞君向閲鄧厚菴之書恐非學道正軌今略指數端請詳察焉鄧氏全書劉華軒軍門刻於金陵共百餘萬言其首卷性學語録第一篇立論近俗於第一關明言之第二關則隱言之使人不能曉而令其求真師外道作用大抵如斯也次章論性乃云心思總在性上用功是以六識緣八識見分以為真性也又云道中之法是於非道中強執為道並於非法中強執為法也孟子搏而躍之激而行之一章最不合性理鄧君奉為準繩可見其不知性矣鄧君每以孔孟並稱而未嘗稱孔顏是不知聖賢之階差也孟子未入孔聖堂奧書中歷歷可指宋儒以四子書並行俗士遂不能辨鄧君坐在宋儒窠臼中何足與論大道耶觀音閣語録第一百八十四葉云上帝為太極之總綱包羲為次總綱儒釋道為分見之總綱此等語言為西教之先導他日必有因此而捨三教專崇基督教者其害可勝言哉按儒家所說上帝即佛經帝釋道家所說元始天尊即佛經大梵天王佛未現身大梵天王自以天地萬物由我一念而生故亦名為大我慢天佛現身時梵王帝釋請佛說法恭敬供養是佛為十法界之尊帝釋但為欲界三十三天之尊梵王但為色界初禪之尊有世間出世間之別也性中天遺訓後集卷一第十三葉以儒為陽教以佛為陰教且云聚大地真陰之靈生一阿彌陀佛此種語言不知用何等心捏造而成也又第九十六葉釋家本旨一章言佛法如珠光從幽洞中引出儒教如日光出洞見日則不用珠光矣此章借牟尼宣說較之他人謗佛過百千倍十方泥犂不知何時得出也皖北有鮑老翁者盛稱鄧氏之道云鄧氏不假乩壇但心念某神神則附體信筆疾書皆神之所為以楞嚴證之即天魔飛精附人之類也信之者衆亦魔力所攝將好心學道之人牽入魔網而不自覺可不悲哉承問念佛下手處曇鸞法師有無後心無間心之語信內光景易移早辦前程等語是有後心也人命在呼吸間何能存此後心無論千念萬念只用當念一句以為往生正因前句已過後句正出亦在當念如是則心不緣過去不緣未來專注當念一句是謂事一心無論何時可以往生久久純熟當念亦脫便入理一心生品必高其無間心即是無後心之純一境界也欲明佛法深義須研究起信論併將淨土三經及往生論時時閲之於出世法門自能通達矣與梅擷藝光義書附來書去歲蒙教獲聞妙法億劫顛倒今始知歸此德此恩粉骨碎身未足報也自叩別尊顏倏忽逾月塵勞碌碌無得暫停濁世浮沈必將退墮茫茫後顧實為可危惟有仰求我師慈悲哀憫耳此間諸人宗旨各異妄想分別無量無窮弟子竊不自量頗欲為之講演而智慧辨才又不足以任之奈何奈何竊念今日娑婆世界現身人世破邪說立正義普救羣生者惟我師一人而已雖復衆生業重佛法當前不覺不知然以我師大慈大悲度必有哀其沈淪而為之垂救者弟子用是敢至心懇請轉大法輪於無說中方便開示竊聞相宗各書以成唯識論及瑜伽師地論為最要成唯識論已有窺基大師之述記而瑜伽師地論尚未見有注釋我師達一切法具一切智可否將此瑜伽師地論詳加注釋俾諸衆生有所仰賴此固我師之慈悲亦即弟子之所請求者也弟子擬於二月中旬乘輪入都承命查詢各種古逸佛書俟到京後當為詳詢如有所得再當報命桂君穆仲已抵金陵否現寓何處暇時尚乞致意前接二月十一日手書情詞懇切溢於墨楮世衰道微非具此等心腸焉能自他俱利所云防退之法無如念佛生西不論何等根器信入此門便能直超三界但智愚不等各有障閡欲破其障甚不容易惟以大悲願力隨機化導不以法緣通塞易其心也瑜伽師地論有唐僧遁倫作記八十萬言已從日本傳來可以發明論義若有刻資即當鐫板唯識述記頃已出書俟足下京寓來函再當郵寄穆仲於二月初旬到寧現居敝寓研究起信十二門論法界觀十玄六相漸通門徑現閲楞嚴正脈頗知經義之妙知注附及與呂勉夫佩璜書頃接手函領悉種種身居學舍而能專心向道誠為希有楞嚴維摩二經初學難得頭緒文約義豐者無過於大乘起信論熟讀深思必能貫通佛教原委承問堂課與讀經外操與坐禪有無妨礙云云堂課之暇研究內典毫無障礙惟坐禪一法只能專修與勞動之事兩相違背縱修亦不得力念佛法門則時時可行其得力甚速也入門方法以研究內典為本須將大乘起信論讀誦純熟再看纂注直解義記三種注解由淺而深次第研究此論一通則一切經皆有門徑矣坐禪之法祇能專修若有他事間雜決不得力唯有念佛一門無論作何事業皆可兼修且收效最速一生淨土即登不退地也臘月放假時若能到金陵度歲即在敝處下榻專心看經每日可抽一小時講解一月之內必能通達佛教大旨矣與王雷夏宗炎書接十七日手函領悉種種釋迦譜一書久欲刊板而無來款貴友欲刻此書可喜之至但敝處所擬刻者是藏經內十卷之本與現在流通之本繪圖二百餘幅者迥不相同此本原名釋迦如來應化事蹟世俗呼為釋迦譜也十卷之本弟有明刻二十年前交卓如兄至今未還若欲發刻須將原書索回否則無可借也刻資約在二百數十元閣下時閲壇經夢遊二書居塵勞擾攘之中欲求證入誠非易事且壇經所接之機惟在上根利智數十年來未見其人學者但貪其一超直入求之終身而不免於輪轉反不如專修淨土之為得也弟眼昏手顫復書甚難頃得代筆者始能作答前由郭小艇寄新作四經發隱二冊一贈令兄道農一請公餘流覽想已達到與陳大鐙心來書附來書先生現白衣身為如來使宣說法要撈摝人龍鐙等獲與同時幸甚幸甚鐙等聞靈峰大師言衆生無始而有終諸佛有始而無終審如是則未來九法界當成一佛界矣云何經說佛界不增生界不減耶若云三界外別有衆生始起者則是天魔外道之語若依台宗四不可說之例釋之又近乎顢頇佛性儱侗真如鐙等旁考深思終未得靈峰之意儻先生憫鐙等日罥疑網揮智刃以斷之則鐙等之所深願而不敢期矣接讀手函得悉二君向道情殷殊深欽佩靈峰之言就生滅門說其義出於三藏教典非臆說也經中所言佛界不增生界不減等義就真如門說蓋實際理地無佛可成無生可度而言有增減者皆衆生心中虛妄計度也賢首云非有滅度令有終盡非無終盡有不滅度台宗四不可說之例深契教義不可疑為顢頇儱侗此是甚深道理非法身大士不能說也蓋釋氏書中時而說有時而說無時而說權時而說實初學之時最難融會及至用力既久豁然貫通則語語印心毫無疑義豈非大快事哉大乘起信論一卷為學佛之綱宗先將正文讀誦純熟再將義記別記悉心研究於出世之道思過半矣鄙人年老手顫復書甚難若能於年假時到敝處面談亦出世法中之勝緣也與李質卿書江程千里一葦可杭弘經三十載消息未通小兒從公貴治始得法流相接因緣會合遲速有時瞻望楚雲曷勝神往頃接手函過承獎譽臨風展誦感愧殊深貴處同志集款請經以為公共清修之所此等勝舉非夙具超世善根何能興辦三界輪回中肯信出世妙法是為難中之難弟學佛以來將近四十載苦心孤詣流通經典為煩惱海中設一慈航普度含靈無如信之者寡縱有信心能虛心用功經久不退者更屬寥寥今知貴處信士衆多同心嚮道不禁歡喜踊躍讚歎不置將來研究內典深入佛海各抒所見以慰鄙懷則幸甚矣奉贈起信論正文十本請分贈同志學道之初首先熟讀再閲注解通達此論則一切經典易於入門矣與郭月樓道直書接奉手函敬悉一是細閲經本未能深信請為長者陳之俗間所傳高王觀音經古人已辨其僞謂高齊時誦觀音經而脫苦者應是普門品後人求觀音經而不可得因僞撰一本以實之而文理全不類經意也今來西域經冊全是梵語八字成句係梵本中之偈頌不知番僧何所據而指為高王觀音經也且譯經之例惟呪語不翻文義其餘長行偈頌均須翻作中國語言使人通曉今一律照梵音書之亦不合傳經之法是以未便承刻敝處創辦之始公議條例凡有疑僞者不刻文義淺俗者不刻乩壇之書不刻謹將原冊奉還方命之愆伏祈原宥與廖迪心世臧書頃接來信得悉種種前與李提摩太所譯大乘起信論英文函詢數次未曾刷印足下為塵勞所擾不能專修蓋由前生不求生西遂致投胎轉世無自主之權惟有頂禮觀世音菩薩求哀懺悔持誦大悲神呪消除宿障自能稍遂本願此時學佛法不能求證道若求證道反遭魔障但須專念彌陀求生淨土捨報之後不受輪回若欲斷絶世務方能學佛則舉世之人得出輪回者鮮矣我於二十六歲學佛二十七歲喪父擔任家務十餘口衣食之資全仗辦公而得日日辦公日日學佛未嘗懈退至五十三歲始能專求出世之道然不能求現證祇在弘法利生上用心以為往生淨土資糧此是超出三界之捷徑也若必欲參禪悟道心如止水亦不能免於轉世足下偶得玄解皆是宿習發現證知前學禪不求淨土以致轉世之後自由也函中所云收效於數十年之後非也一日念佛一日往生日日念佛日日往生無論何時命根一斷即生淨土矣何須數十年之後即邇來艱於運筆遠方來函皆不作答併以附聞與某君書鄙人初學佛法私淑蓮池憨山推而上之宗賢首清涼再溯其源則宗馬鳴龍樹此二菩薩釋迦遺教中之大導師也西天東土教律禪淨莫不宗之遵其軌則教授學徒決不誤人近年自遠方來就學於敝處者頗不乏人住時長短各聽其便有九江桂姓者相依最久用心懇切將來造詣未可量也貴處如有願就學者無論僧俗均可前來但須聰穎之姿若稟性魯鈍者不能受益鄙人所期於後學者將來可作人天師表開闡如來正教不入歧途不落權小則末法衰頽之象或可振興乎與陳栖蓮汝湜書一經云無我相無人相君之煩惱人我相害之也又云度盡衆生離衆生相雖名為妻祇是法界中一衆生耳教妻如教外人則毫無障礙矣行菩薩道者與世俗心路迥然不同所以慈悲喜捨人莫能測願君超脫俗情勿以凡夫自居則回翔自在何礙之有日本有冠注八宗綱要頗詳可以購閲與陳栖蓮汝湜書二昨晚接來信閲知種種公衡病重居士為之護持正念亦多生善根方有此勝緣也無量壽經云至心稱阿彌陀佛十聲即得往生何況平時向道心切臨終又仗他力必能往生無疑矣寄上唵字大寶樓閣呪各一張考經文以大寶樓閣為最宜若世壽未盡或轉危為安亦未可知代陳栖蓮答黃掇焦書一接讀尊示崇禪宗而輕淨土大凡學佛者往往有此見解仁山長者發心之初亦復如是直至用心既久閲歷較深始知舊日之非翻然改悔蓋淨土法門非大乘根器不能領會故華嚴經末普賢以十大願王導歸極樂為五十三參之極致也至於觀經在淨土經典中尤為超妙從凡夫地修至第九觀即蒙佛授記已入初住位矣若禪宗在唐時出現諸大宗師皆是菩薩應身非淺機所能企及近代自命大徹大悟為人天師者命終之後難免隔陰之迷隨業流轉較之往生淨土直登不退者相去奚啻霄壤哉初學課本內三十頁之前半及四十二頁之後半詳論此義祈閲之代陳栖蓮答黃掇焦書二道家之陽神乃佛經之業識也所證果位在欲界以下必須超出三界永脫輪回方稱大丈夫事業若論三教儒道之高者始能與佛理相通皆是菩薩影現行權方便耳至於呂祖全集無意求觀恐妨閲經功課也金剛五十三家注仁老言其駮雜勸人勿閲十六觀經法與禪定迥不相同蓋觀成得生極樂上品入正定聚修禪定者欲入初禪已屬難之又難況歷二三四禪以至滅盡定而得聲聞果但聞其語矣未見其人也所以閣下二十年之功尚未脫落根塵方諸祖師禪遠之又遠也以弟愚見單就淨土一門用功一生淨土無法不通豈非出世大英雄哉等不等觀雜録卷七目録與日本笠原研壽南條文雄書與日本南條文雄書一附來書與日本南條文雄書二附來書覆書與日本南條文雄書三與日本南條文雄書四與日本南條文雄書五與日本南條文雄書六與日本南條文雄書七與日本南條文雄書八附來書與日本南條文雄書九與日本南條文雄書十與日本南條文雄書十一與日本南條文雄書十二與日本南條文雄書十三與日本南條文雄書十四
