body:
  text: 劉宋西域三藏法師疆良耶舍譯清石埭楊文會略論如是我聞一時佛在王舍城耆闍崛山中與大比丘衆千二百五十人俱菩薩三萬二千文殊師利法王子而為上首此經從阿闍世王惡逆啓教而開章先列靈山法會者何耶良以一代時教皆從如來威光所顯故知十界差別若聖若凡若理若事無非毗盧遮那海印三昧一時頓現也爾時王舍大城有一太子名阿闍世隨順調達惡友之教收執父王頻婆娑羅幽閉置於七重室內制諸羣臣一不得往國太夫人名韋提希恭敬大王澡浴清淨以酥蜜和用塗其身諸瓔珞中盛蒲萄漿密以上王爾時大王食飲漿求水潄口潄口畢已合掌恭敬向耆闍崛山遙禮世尊而作是言大目犍連是吾親友願興慈悲授我八戒時目犍連如鷹隼飛疾至王所日日如是授王八戒世尊亦遣尊者富樓那為王說法如是時間經三七日王食蜜得聞法故顏色和悅時阿闍世問守門者父王今者猶存在耶時守門人白言大王國太夫人身塗蜜瓔珞盛漿持用上王沙門目連及富樓那從空而來為王說法不可禁制時阿闍世聞此語已怒其母曰我母是賊與賊為伴沙門惡人幻惑呪術令此惡王多日不死即執利劍欲害其母時有一臣名曰月光聰明多智即與耆婆為王作禮白言大王臣聞毗陀論經說劫初以來有諸惡王貪國位故殺害其父一萬八千未曾聞有無道害母王今為此殺逆之事汙剎利種臣不忍聞是旃陀羅我等不宜復住於此時二大臣說此語竟以手按劍卻行而退時阿闍世驚怖惶懼告耆婆言汝不為我耶耆婆白言大王慎莫害母王聞此語懺悔求救即便捨劍止不害母敕語內官閉置深宮不令復出時韋提希被幽閉已愁憂憔悴遙向耆闍崛山為佛作禮而作是言如來世尊在昔之時恆遣阿難來慰問我我今愁憂世尊威重無由得見願遣目連尊者阿難與我相見作是語已悲泣雨淚遙向佛禮未舉頭頃爾時世尊在耆闍崛山知韋提希心之所念即敕大目犍連及以阿難從空而來佛從耆闍崛山沒於王宮出時韋提希禮已舉頭見世尊釋迦牟尼佛身紫金色坐百寶蓮華目連侍左阿難侍右釋梵護世諸天在虛空中普雨天華持用供養時韋提希見佛世尊自絶瓔珞舉身投地號泣向佛白言世尊我宿何罪生此惡子世尊復有何等因緣與提婆達多共為眷屬唯願世尊為我廣說無憂惱處我當往生不樂閻浮提濁惡世也此濁惡處地獄餓鬼畜生盈滿多不善聚願我未來不聞惡聲不見惡人今向世尊五體投地求哀懺悔唯願佛日教我觀於清淨業處世間情愛最重之處無如母子阿闍世王即於母子之間逆行方便冒此惡名造阿鼻地獄業令其母厭離娑婆欣樂淨土啓此妙觀度脫羣生阿闍世王誠大權菩薩哉論至此不覺中懷酸楚以一副急淚供養阿闍世王阿闍世王亦當以淚雨酬我也爾時世尊放眉間光其光金色遍照十方無量世界還住佛頂化為金臺如須彌山十方諸佛淨妙國土皆於中現或有國土七寶合成復有國土純是蓮華復有國土如自在天宮復有國土如玻瓈鏡十方國土皆於中現有如是等無量諸佛國土嚴顯可觀令韋提希見時韋提希白佛言世尊是諸佛土雖復清淨皆有光明我今樂生極樂世界阿彌陀佛所唯願世尊教我思惟教我正受爾時世尊即便微笑有五色光從佛口出一一光照頻婆娑羅王頂爾時大王雖在幽閉心眼無障遙見世尊頭面作禮自然增進成阿那含爾時世尊告韋提希汝今知不阿彌陀佛去此不遠汝當繫念諦觀彼國淨業成者我今為汝廣說衆譬亦令未來世一切凡夫欲修淨業者得生西方極樂國土欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業佛告韋提希汝今知不此三種業乃是過去未來現在三世諸佛淨業正因佛告阿難及韋提希諦聽諦聽善思念之如來今者為未來世一切衆生為煩惱賊之所害者說清淨業善哉韋提希快問此事阿難汝當受持廣為多衆宣說佛語如來今者教韋提希及未來世一切衆生觀於西方極樂世界以佛力故當得見彼清淨國土如執明鏡自見面像見彼國土極妙樂事心歡喜故應時即得無生法忍佛告韋提希汝是凡夫心想羸劣未得天眼不能遠觀諸佛如來有異方便令汝得見時韋提希白佛言世尊如我今者以佛力故見彼國土若佛滅後諸衆生等濁惡不善五苦所逼云何得見阿彌陀佛極樂世界經中如執明鏡自見面像八字大須著眼明鏡者大圓鏡智也自見面像者不作他想也一切觀法不出此理非但觀境如是即王宮誕生住世說法之佛以及四禪天勝應佛華藏界實報佛凡有色相可見者無非他受用身皆隨衆生心現各各不同知此義者復何疑惑之有淨土宗旨三經為本大經推崇本願此經專重觀想小經專主持名近代諸師以觀法深微鈍根難入即專主持名一門若觀想徑可不用何以大小二經皆詳演極樂世界依正莊嚴耶此經專為具縛凡夫現世得證無生法忍而說的是至圓至頓無上法門從初觀入手修至第九觀即蒙諸佛現前授記豈可以情量測度也哉有以階級等差判此經者係認九品往生之位以為等級耳不知九品乃觀中攝化之行非修觀人由此品位往生也修至普觀成就時已超越上品上生豈有中下之流能入此觀乎佛告韋提希汝及衆生應當專心繫念一處想於西方云何作想凡作想者一切衆生自非生盲有目之徒皆見日沒當起想念正坐西向諦觀於日欲沒之處令心堅住專想不移見日欲沒狀如懸鼓既見日已閉目開目皆令明了是為日想名曰初觀人道光明屬於相分非日月燈不能見物閉目靜坐猶如黑夜欲觀勝境何由顯現須於心眼中自發光明非假日輪無從作觀此日現時爍破沈陰光雖極明亦不耀目因不與肉眼對也日若動時即知心動若有暗障即是心障障淨光純朗然安住能所兩忘身心空寂即入日光三昧此觀成時儻欲捨壽亦得往生何以故大光明中一心念佛豈有陰境得現前耶欲作此觀須趺坐西向先觀身中四大內外俱空地大散向西方水大散向北方風大散向東方火大散向南方身之空大即與十方虛空一合自身五大皆空唯有識大湛然凝住猶如圓鏡內外明照朗然清淨作此想已心漸凝定然後徐徐諦觀於日其利根者一坐即見以上摘録善導疏中語也是為作觀之前方便如密宗入壇行道先觀梵書㘕字變成三角火輪燒盡有漏之身及有漏世界然後建立金剛界身同一義趣經云閉目開目皆令明了者欲以驗觀力淺深也淺者閉目得見開目不見深者開目亦見觀境及出觀後方見外境唯心之旨於此益彰次作水想見水澄清亦令明了無分散意既見水已當起冰想見冰映徹作琉璃想此想成已見琉璃地內外映徹下有金剛七寶金幢擎琉璃地其幢八方八楞具足一一方面百寶所成一一寶珠有千光明一一光明八萬四千色映琉璃地如億千日不可具見琉璃地上以黃金繩雜廁間錯以七寶界分齊分明一一寶中有五百色光其光如華又似星月懸處虛空成光明臺樓閣千萬百寶合成於臺兩邊各有百億華幢無量樂器以為莊嚴八種清風從光明出鼓此樂器演說苦空無常無我之音是為水想名第二觀杲日光中覺少清涼之致故易之以水觀作水觀時日輪雖隱而無暗相水觀現前有二種勝妙一者澄靜二者明徹若泛動即心動渾濁即業障如日觀說此觀成時身心忽空水天一色與月光童子所得三昧相似然非此經意旨今此經中作水觀者取其紺碧漸凝變成琉璃地也土石為地不能徹視琉璃為地表裏通明一轉換間天壤之別矣經云一一寶珠有千光明一一光明八萬四千色此非緣心所行境界以緣心不能具見雖見亦不知數也惟鏡智現前者乃能了了知見耳此界風從火生彼界風從光出由極樂國土絶無火大所謂如來藏中性火真空性空真火者已化為無量光明矣蓋火有熱性冰有寒性寒熱相陵不得自在彼土無有寒暑故冰火皆不現行又亦無有土石則地大盡屬寶性水大如經可知四大迥異此界所以稱為極樂也此想成時一一觀之極令了了閉目開目不令散失唯除食時恆憶此事如此想者名為粗見極樂國地若得三昧見彼國地了了分明不可具說是為地想名第三觀佛告阿難汝持佛語為未來世一切大衆欲脫苦者說是觀地法若觀是地者除八十億劫生死之罪捨身他世必生淨國心得無疑作是觀者名為正觀若他觀者名為邪觀前觀雖能眼見妙色耳聞妙音猶屬粗想若得三昧則超出凡夫情量非語言分別所能及矣故佛於此三觀之後結讚勝益定得往生可無疑慮也佛告阿難及韋提希地想成已次觀寶樹觀寶樹者一一觀之作七重行樹想一一樹高八千由旬其諸寶樹七寶華葉無不具足一一華葉作異寶色琉璃色中出金色光玻瓈色中出紅色光碼瑙色中出硨磲光硨磲色中出緑真珠光珊瑚琥珀一切衆寶以為映飾妙真珠網彌覆樹上一一樹上有七重網一一網間有五百億妙華宮殿如梵王宮諸天童子自然在中一一童子五百億釋迦毗楞伽摩尼以為瓔珞其摩尼光照百由旬猶如和合百億日月不可具名衆寶間錯色中上者此諸寶樹行行相當葉葉相次於衆葉間生諸妙華華上自然有七寶果一一樹葉縱廣正等二十五由旬其葉千色有百種畫如天瓔珞有衆妙華作閻浮檀金色如旋火輪宛轉葉間涌生諸果如帝釋瓶有大光明化成幢幡無量寶蓋是寶蓋中映現三千大千世界一切佛事十方佛國亦於中現見此樹已亦當次第一一觀之觀見樹莖枝葉華果皆令分明是為樹想名第四觀次當想水欲想水者極樂國土有八池水一一池水七寶所成其寶柔軟從如意珠王生分為十四支一一支作七寶妙色黃金為渠渠下皆以雜色金剛以為底沙一一水中有六十億七寶蓮華一一蓮華團圓正等十二由旬其摩尼水流注華間尋樹上下其聲微妙演說苦空無常無我諸波羅密復有讚歎諸佛相好者如意珠王涌出金色微妙光明其光化為百寶色鳥和鳴哀雅常讚念佛念法念僧是為八功德水想名第五觀衆寶國土一一界上有五百億寶樓其樓閣中有無量諸天作天伎樂又有樂器懸處虛空如天寶幢不鼓自鳴此衆音中皆說念佛念法念比丘僧此想成已名為粗見極樂世界寶樹寶地寶池寶樓是為總觀想名第六觀若見此者除無量億劫極重惡業命終之後必生彼國作是觀者名為正觀若他觀者名為邪觀佛告阿難及韋提希諦聽諦聽善思念之吾當為汝分別解說除苦惱法汝等憶持廣為大衆分別解說說是語時無量壽佛住立空中觀世音大勢至是二大士侍立左右光明熾盛不可具見百千閻浮檀金色不得為比時韋提希見無量壽佛已接足作禮白佛言世尊我今因佛力故得見無量壽佛及二菩薩未來衆生當云何觀無量壽佛及二菩薩佛告韋提希欲觀彼佛者當起想念於七寶地上作蓮華想令其蓮華一一葉上作百寶色有八萬四千脈猶如天畫脈有八萬四千光了了分明皆令得見華葉小者縱廣二百五十由旬如是蓮華具有八萬四千葉一一葉間有百億摩尼珠王以為映飾一一摩尼珠放千光明其光如蓋七寶合成遍覆地上釋迦毗楞伽寶以為其臺此蓮華臺八萬金剛甄叔迦寶梵摩尼寶妙真珠網以為校飾於其臺上自然而有四柱寶幢一一寶幢如百千萬億須彌山幢上寶幔如夜摩天宮復有五百億微妙寶珠以為映飾一一寶珠有八萬四千光一一光作八萬四千異種金色一一金色遍其寶上處處變化各作異相或為金剛臺或作真珠網或作雜華雲於十方面隨意變現施作佛事是為華座想名第七觀佛告阿難如此妙華是本法藏比丘願力所成若欲念彼佛者當先作此華座想作此想時不得雜觀皆應一一觀之一一葉一一珠一一光一一臺一一幢皆令分明如於鏡中自見面像此想成者滅除五萬億劫生死之罪必定當生極樂世界作是觀者名為正觀若他觀者名為邪觀佛告阿難及韋提希見此事已次當想佛所以者何諸佛如來是法界身入一切衆生心想中是故汝等心想佛時是心即是三十二相八十隨形好是心作佛是心是佛諸佛正遍知海從心想生是故應當一心繫念諦觀彼佛多陀阿伽度阿羅訶三藐三佛陀上來是權設方便至此將欲觀佛即開權顯實一經宗旨全在於斯悟此理者方能稱法界性如實而觀至下文佛身相好現時自佛耶他佛耶於此證得身自在觀佛身故亦見佛心佛心乎自心乎於此證得心自在身心自在無礙融通宜乎十方諸佛現前授記矣想彼佛者先當想像閉目開目見一寶像如閻浮檀金色坐彼華上見像坐已心眼得開了了分明見極樂國七寶莊嚴寶地寶池寶樹行列諸天寶幔彌覆其上衆寶羅網滿虛空中見如此事極令明了如觀掌中見此事已復當更作一大蓮華在佛左邊如前蓮華等無有異復作一大蓮華在佛右邊想一觀世音菩薩像坐左華座亦作金色如前無異想一大勢至菩薩像坐右華座此想成時佛菩薩像皆放光明其光金色照諸寶樹一一樹下亦有三蓮華諸蓮華上各有一佛二菩薩像遍滿彼國此想成時行者當聞水流光明及諸寶樹鳧雁鴛鴦皆說妙法出定入定恆聞妙法行者所聞出定之時憶持不捨令與修多羅合若不合者名為妄想若與合者名為粗想見極樂世界是為像想名第八觀作是觀者除無量億劫生死之罪於現身中得念佛三昧佛告阿難及韋提希此想成已次當更觀無量壽佛身相光明阿難當知無量壽佛身如百千萬億夜摩天閻浮檀金色佛身高六十萬億那由他恆河沙由旬眉間白毫右旋宛轉如五須彌山佛眼如四大海水青白分明身諸毛孔演出光明如須彌山彼佛圓光如百億三千大千世界於圓光中有百萬億那由他恆河沙化佛一一化佛亦有衆多無數化菩薩以為侍者無量壽佛有八萬四千相一一相中各有八萬四千隨形好一一好中復有八萬四千光明一一光明遍照十方世界念佛衆生攝取不捨其光相好及與化佛不可具說但當憶念令心眼見見此事者即見十方一切諸佛以見諸佛故名念佛三昧作是觀者名觀一切佛身以觀佛身故亦見佛心佛心者大慈悲是以無緣慈攝諸衆生作此觀者捨身他世生諸佛前得無生忍是故智者應當繫心諦觀無量壽佛觀無量壽佛者從一相好入但觀眉間白毫極令明了見眉間白毫相者八萬四千相好自然當現見無量壽佛者即見十方無量諸佛得見無量諸佛故諸佛現前授記是為遍觀一切色身相名第九觀作是觀者名為正觀若他觀者名為邪觀行者初學觀時先空其身層層修習至第八觀皆不知有身相及至九觀成就諸佛現前授記方見自身蓋授記必摩頂若無身相誰得受記耶向後普觀文中起心生西蓮華開時淨光照身此時身相儻所謂菩薩意生身者非乎佛告阿難及韋提希見無量壽佛了了分明已次亦應觀觀世音菩薩此菩薩身長八十萬億那由他由旬身紫金色頂有肉髻項有圓光面各百千由旬其圓光中有五百化佛如釋迦牟尼一一化佛有五百化菩薩無量諸天以為侍者舉身光中五道衆生一切色相皆於中現頂上有毗楞伽摩尼寶以為天冠其天冠中有一立化佛高二十五由旬觀世音菩薩面如閻浮檀金色眉間毫相備七寶色流出八萬四千種光明一一光明有無量無數百千化佛一一化佛有無數化菩薩以為侍者變現自在滿十方世界臂如紅蓮華色有八十億微妙光明以為瓔珞其瓔珞中普現一切諸莊嚴事手掌作五百億雜蓮華色手十指端一一指端有八萬四千畫猶如印文一一畫有八萬四千色一一色有八萬四千光其光柔軟普照一切以此寶手接引衆生舉足時足下有千輻輪相自然化成五百億光明臺下足時有金剛摩尼華布散一切莫不彌滿其餘身相衆好具足如佛無異唯頂上肉髻及無見頂相不及世尊是為觀觀世音菩薩真實色身相名第十觀佛告阿難若欲觀觀世音菩薩者當作是觀作是觀者不遇諸禍淨除業障除無數劫生死之罪如此菩薩但聞其名獲無量福何況諦觀若有欲觀觀世音菩薩者先觀頂上肉髻次觀天冠其餘衆相亦次第觀之悉令明了如觀掌中作是觀者名為正觀若他觀者名為邪觀次觀大勢至菩薩此菩薩身量大小亦如觀世音圓光面各百二十五由旬照二百五十由旬舉身光明照十方國作紫金色有緣衆生皆悉得見但見此菩薩一毛孔光即見十方無量諸佛淨妙光明是故號此菩薩名無邊光以智慧光普照一切令離三塗得無上力是故號此菩薩名大勢至此菩薩天冠有五百寶華一一寶華有五百寶臺一一臺中十方諸佛淨妙國土廣長之相皆於中現頂上肉髻如鉢頭摩華於肉髻上有一寶瓶盛諸光明普現佛事餘諸身相如觀世音等無有異此菩薩行時十方世界一切震動當地動處有五百億寶華一一寶華莊嚴高顯如極樂世界此菩薩坐時七寶國土一時動搖從下方金光佛剎乃至上方光明王佛剎於其中間無量塵數分身無量壽佛分身觀世音大勢至皆悉雲集極樂國土𡍫塞空中坐蓮華座演說妙法度苦衆生作此觀者名為觀見大勢至菩薩是為觀大勢至色身相觀此菩薩者名第十一觀除無數劫阿僧祇生死之罪作是觀者不處胞胎常遊諸佛淨妙國土此觀成已名為具足觀觀世音大勢至見此事時當起自心生於西方極樂世界於蓮華中結跏趺坐作蓮華合想作蓮華開想蓮華開時有五百色光來照身想眼目開想見佛菩薩滿虛空中水鳥樹林及與諸佛所出音聲皆演妙法與十二部經合出定之時憶持不失見此事已名見無量壽佛極樂世界是為普觀想名第十二觀無量壽佛化身無數與觀世音大勢至常來至此行人之所善導和尚判此行人已超上品上生其故何也良以上上生者捨娑婆現極樂此位行人即娑婆現極樂又上上生者轉生受記此位行人現生受記如此比較勝劣可知此位行人入觀時即娑婆現極樂出觀時即極樂現娑婆娑婆極樂相即相入無礙無雜以華嚴十玄門準之豈非事事無礙法界耶佛告阿難及韋提希若欲至心生西方者先當觀於一丈六像在池水上如先所說無量壽佛身量無邊非是凡夫心力所及然彼如來宿願力故有憶想者必得成就但想佛像得無量福況復觀佛具足身相阿彌陀佛神通如意於十方國變現自在或現大身滿虛空中或現小身丈六八尺所現之形皆真金色圓光化佛及寶蓮華如上所說觀世音菩薩及大勢至於一切處身同衆生但觀首相知是觀世音知是大勢至此二菩薩助阿彌陀佛普化一切是為雜想觀名第十三觀此觀專為劣機而說以衆生機劣故佛現劣應經說先觀者以鄙意揆之未必在初觀之先似當先作日水二觀然後觀此方能顯現否則亦祇想像而已不能如日中目覩也問曰上根利智依次具修至普觀後還作此觀否答曰應作此觀何以故上來已見圓滿報身若不現應化身何由接引凡夫故作此觀以為過脈然後九品往生皆蒙接引矣梵網經盧舍那佛說法授千釋迦千釋迦授千百億釋迦在菩提樹下成道說法度生佛法僧寶方現於世直至今日我輩得聞無上正法皆由於此後之學者慎勿於法報化生優劣想也菩薩行門不出二種一者上求佛道二者下化衆生前文見佛聞法受菩提記是上求功極後文觀想九品往生是下化之行是故前之觀法全以自心投入彌陀願海後之觀法全攝彌陀願海歸入自心如是重重涉入周遍含容誰謂華嚴極樂有二致耶又觀行者從無始時來具有種種善惡之業無量差別今於一念觀中九品往生而度脫之所謂法界衆生即自性衆生無二無別非一非異如此妙法非入不思議解脫境界其孰能與於斯九品往生見佛有遲速上上品才生即見以至下下品十二大劫蓮華乃開作是觀者非得念劫圓融之旨何能延促自在至於如此也華嚴經中毗目瞿沙仙人執善才手經歷無數劫法華會上菩薩讚佛二十小劫大衆謂如半日同一義趣此經圓頓之中普攝權漸其作九品觀者即攝九界種性入一佛法界也上三品攝菩薩種性中品上生中品中生攝緣覺聲聞種性中品下生攝人天種性下品上生攝修羅畜生餓鬼種性下品中生攝有間地獄種性下品下生攝無間地獄種性但此九品生者均非修觀之人詳玩經文自知九品差別圖上品中品下品上生圓教通經上生二乘種性升進上生大乘種性退墮中生頓教通禪中生二乘種性持戒中生大乘種性破戒下生學大乘漸教而末透徹者下生世間善業下生世間惡業往生階差略說九品若廣演之為無量品以衆生心行無量差別也既攝而為九品又攝而為一品蓋往生者無論何品究竟皆至一生補處圓證佛果也問曰下品上中二位既是大乘退墮者回心得生未審小乘退墮者當生何品答曰以大例小亦生此品但聞法獲益有差別耳問曰何以不說小乘退墮專說大乘耶答曰大乘入俗利生易於造惡小乘專求自度造惡事希以多概少故專說大乘耳問曰下品上生中生二位既是修行門中造惡業者回心所生未知世俗惡業不至下下品者當生何等答曰世俗純善則生中下純惡則生下下其餘善多惡少者應生下上惡多善少者應生下中準例可知佛告阿難及韋提希上品上生者若有衆生願生彼國者發三種心即便往生何等為三一者至誠心二者深心三者回向發願心具三心者必生彼國復有三種衆生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念回向發願願生彼國具此功德一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大衆無量諸天七寶宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀世音大勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身衆相具足見諸菩薩色相具足光明寶林演說妙法聞已即悟無生法忍經須臾間歷事諸佛遍十方界於諸佛前次第受記還至本國得無量百千陀羅尼門是名上品上生者上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘以此功德回向願求生極樂國行此行者命欲終時阿彌陀佛與觀世音大勢至無量大衆眷屬圍繞持紫金臺至行者前讚言法子汝行大乘解第一義是故我今來迎接汝與千化佛一時授手行者自見坐紫金臺合掌叉手讚歎諸佛如一念頃即生彼國七寶池中此紫金臺如大寶華經宿則開行者身作紫磨金色足下亦有七寶蓮華佛及菩薩俱時放光照行者身目即開明因前宿習普聞衆聲純說甚深第一義諦即下金臺禮佛合掌讚歎世尊經於七日應時即於阿耨多羅三藐三菩提得不退轉應時即能飛行遍至十方歷事諸佛於諸佛所修諸三昧經一小劫得無生忍現前受記是名上品中生者上品下生者亦信因果不謗大乘但發無上道心以此功德回向願求生極樂國行者命欲終時阿彌陀佛及觀世音大勢至與諸菩薩持金蓮華化作五百佛來迎此人五百化佛一時授手讚言法子汝今清淨發無上道心我來迎汝見此事時即自見身坐金蓮華坐已華合隨世尊後即得往生七寶池中一日一夜蓮華乃開七日之中乃得見佛雖見佛身於衆相好心不明了於三七日後乃了了見聞衆音聲皆演妙法遊歷十方供養諸佛於諸佛前聞甚深法經三小劫得百法明門住歡喜地是名上品下生者是名上輩生想名第十四觀佛告阿難及韋提希中品上生者若有衆生受持五戒持八戒齊修行諸戒不造五逆無衆過患以此善根回向願求生於西方極樂世界臨命終時阿彌陀佛與諸比丘眷屬圍繞放金色光至其人所演說苦空無常無我讚歎出家得離衆苦行者見已心大歡喜自見己身坐蓮華臺長跪合掌為佛作禮未舉頭頃即得往生極樂世界蓮華尋開當華敷時聞衆音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫是名中品上生者中品中生者若有衆生若一日一夜持八戒齊若一日一夜持沙彌戒若一日一夜持具足戒威儀無缺以此功德回向願求生極樂國戒香熏修如此行者命欲終時見阿彌陀佛與諸眷屬放金色光持七寶蓮華至行者前行者自聞空中有聲讚言善男子如汝善人隨順三世諸佛教故我來迎汝行者自見坐蓮華上蓮華即合生於西方極樂世界在寶池中經於七日蓮華乃敷華既敷已開目合掌讚歎世尊聞法歡喜得須陀洹經半劫已成阿羅漢是名中品中生者中品下生者若有善男子善女人孝養父母行世仁慈此人命欲終時遇善知識為其廣說阿彌陀佛國土樂事亦說法藏比丘四十八願聞此事已尋即命終譬如壯士屈伸臂頃即生西方極樂世界經七日已遇觀世音及大勢至聞法歡喜得須陀洹過一小劫成阿羅漢是名中品下生者是名中輩生想名第十五觀佛告阿難及韋提希下品上生者或有衆生作衆惡業雖不誹謗方等經典如此愚人多造惡法無有慚愧命欲終時遇善知識為說大乘十二部經首題名字以聞如是諸經名故除卻千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀世音化大勢至至行者前讚言善男子以汝稱佛名故諸罪消滅我來迎汝作是語已行者即見化佛光明遍滿其室見已歡喜即便命終乘寶蓮華隨化佛後生寶池中經七七日蓮華乃敷當華敷時大悲觀世音菩薩及大勢至菩薩放大光明住其人前為說甚深十二部經聞已信解發無上道心經十小劫具百法明門得入初地是名下品上生者佛告阿難及韋提希下品中生者或有衆生毀犯五戒八戒及具足戒如此愚人偷僧祗物盜現前僧物不淨說法無有慚愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄衆火一時俱至遇善知識以大慈悲即為讚說阿彌陀佛十力威德廣讚彼佛光明神力亦讚戒定慧解脫解脫知見此人聞已除八十億劫生死之罪地獄猛火化為清涼風吹諸天華華上皆有化佛菩薩迎接此人如一念頃即得往生七寶池中蓮華之內經於六劫蓮華乃敷觀世音大勢至以梵音聲安慰彼人為說大乘甚深經典聞此法已應時即發無上道心是名下品中生者此品專為修行門中造惡之人而說毀犯五戒八戒者在家衆也犯具戒者出家衆也偷盜僧物者犯棄罪也不淨說法者障人淨信也此種罪業命尚未終獄火已至以宿習道種發現得遇善知識讚說彌陀威德光明及五分法身有如懸崖勒馬回臻坦途及至華開得聞大乘甚深經典發無上道心皆係造業以前受戒習經之力有以致之也修行人造惡至臨終時善心發現即見獄火爾時當有悔懼之心故一聞妙法猛利求脫也以為說大乘甚深經典一語證之知其大乘退墮者回心所生也佛告阿難及韋提希下品下生者或有衆生作不善業五逆十惡具諸不善如此愚人以惡業故應墮惡道經歷多劫受苦無窮如此愚人臨命終時遇善知識種種安慰為說妙法教令念佛彼人苦逼不遑念佛善友告言汝若不能念彼佛者應稱無量壽佛如是至心令聲不絶具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命終之時見金蓮華猶如日輪住其人前如一念頃即得往生極樂世界於蓮華中滿十二大劫蓮華方開觀世音大勢至以大悲音聲為其廣說諸法實相除滅罪法聞已歡喜應時即發菩提之心是名下品下生者念佛與稱名有異心中憶念名為念佛口稱名號名為稱名極惡衆生病苦所逼心不能念但能口稱佛名如呼父母痛切之聲與彌陀大悲相應故得往生也觀世音大勢至以大悲音聲至菩提之心與淨業障經同意是名下輩生想名第十六觀問曰下品生者何緣住華胎內經歷如許長時也其惡業重者習氣現時還退墮否答曰極樂國中無退墮之事彼華胎者彌陀願力所持如鎔金爐攝取礦質久久烹煉必使渣滓消融精金出現方許啓爐此亦如是又造惡人受三塗報苦不堪言罪畢得出造惡還入下品生者住華胎時譬如比丘入三禪樂習盡華開直趣妙果爭奈衆生業力障蔽信之者寡雖有苦切之言亦不能啓其心若能聞即信受一意求生者皆是夙世善根臨時發現也說是語時韋提希與五百侍女聞佛所說應時即見極樂世界廣長之相得見佛身及二菩薩心生歡喜歎未曾有豁然大悟獲無生忍五百侍女發阿耨多羅三藐三菩提心願生彼國世尊悉記皆當往生生彼國已獲得諸佛現前三昧無量諸天發無上道心爾時阿難即從座起白佛言世尊當何名此經此法之要當云何受持佛告阿難此經名觀極樂國土無量壽佛觀世音菩薩大勢至菩薩亦名淨除業障生諸佛前汝當受持無令忘失行此三昧者現身得見無量壽佛及二大士若善男子及善女人但聞佛名二菩薩名除無量劫生死之罪何況憶念若念佛者當知此人則是人中分陀利華觀世音菩薩大勢至菩薩為其勝友當坐道場生諸佛家佛告阿難汝好持是語持是語者即是持無量壽佛名佛說此語時尊者目犍連尊者阿難及韋提希等聞佛所說皆大歡喜爾時世尊足步虛空還耆闍崛山爾時阿難廣為大衆說如上事無量諸天天龍夜義聞佛所說皆大歡喜禮佛而退謹按先生晚年嘗欲撰觀經疏未就此其略稿也原稿每段標録經文數字或三四語亦未詮次先後茲為分録於經文之次以原稿有論至此云云因依玄文本論略注十宗略說之例題曰觀無量壽佛經略論云編者識無量壽經優波提舍願生偈略釋婆藪槃豆菩薩造即天親菩薩也清石埭楊文會釋先敘歸命願生說偈之意世尊我一心歸命盡十方無礙光如來願生安樂國我依修多羅真實功德相說願偈總持與佛教相應有三種觀察一者彼佛國土功德莊嚴有十七種事應知觀彼世界相勝過三界道一清淨功德成就二句究竟如虛空廣大無邊際二無量功德成就二句正道大慈悲出世善根生三性功德成就二句淨光明滿足如鏡日月輪四形相功德成就二句備諸珍寶性具足妙莊嚴五種種事功德成就二句無垢光焰熾明淨曜世間六妙色功德成就二句寶性功德草柔軟左右旋觸者生勝樂過迦旃鄰陀七觸功德成就四句寶華千萬種彌覆池流泉微風動華葉交錯光亂轉八莊嚴功德成就共十二句八之一莊嚴水四句宮殿諸樓閣觀十方無礙雜樹異光色寶欄遍圍繞八之二莊嚴地四句無量寶交絡羅網遍虛空種種鈴發響宣吐妙法音八之三莊嚴虛空四句雨華衣莊嚴無量香普熏九雨功德成就二句佛慧明淨日除世癡暗冥十光明功德成就二句梵聲悟深遠微妙聞十方十一妙聲功德成就二句正覺阿彌陀法王善住持十二主功德成就二句如來淨華衆正覺華化生十三眷屬功德成就二句愛樂佛法味禪三昧為食十四受用功德成就二句永離身心惱受樂常無間十五無諸難功德成就二句大乘善根界等無譏嫌名女人及根缺二乘種不生十六大義門功德成就四句淨土果報離二種譏嫌過一者體二乘人女人諸根不具人二者名乃至不聞此三種名也等者平等一相故衆生所願樂一切能滿足十七一切功德滿足成就二句故我願往生阿彌陀佛國二者觀察阿彌陀佛功德莊嚴有八種應知無量大寶王微妙淨華臺一座莊嚴二句相好光一尋色像超羣生二身莊嚴二句如來微妙聲梵響聞十方三口莊嚴二句同地水火風虛空無分別四心莊嚴二句天人不動衆清淨智海生五衆莊嚴二句如須彌山王勝妙無過者六上首莊嚴二句天人丈夫衆恭敬繞瞻仰七主莊嚴二句觀佛本願力遇無空過者能令速滿足功德大寶海八不虛作住持莊嚴四句即見彼佛未證淨心菩薩畢竟得平等法身淨心菩薩畢竟與上地同得寂滅平等略說八句示現如來自利利他功德莊嚴次第成就應知三者觀察彼諸菩薩功德莊嚴有四種正修行功德成就應知安樂國清淨常轉無垢輪化佛菩薩日如須彌住持一於一佛土身不動搖而遍十方種種應化如實修行常作佛事開諸衆生淤泥華故四句無垢莊嚴光一念及一時普照諸佛會利益諸羣生二彼應化身於一切時不前不後一心一念放大光明悉能遍至十方世界教化衆生四句雨天樂華衣妙香等供養讚諸佛功德無有分別心三於一切世界無餘照諸佛會大衆無餘廣大無量供養恭敬讚歎諸佛如來四句何等世界無佛法功德寶我願皆往生示佛法如佛四於十方一切世界無三寶處住持莊嚴佛法僧寶功德大海遍示令解如實修行四句後總結我作論說偈願見彌陀佛普共諸衆生往生安樂國向說佛國土功德莊嚴成就佛功德莊嚴成就菩薩功德莊嚴成就此三種成就願心莊嚴略說入一法句故一法句者謂清淨句清淨句者謂真實智慧無為法身故此清淨有二種應知何等二一者器世間清淨二者衆生世間清淨器世間清淨者向說十七種佛國土功德莊嚴成就是名器世間清淨衆生世間清淨者如向說八種佛功德莊嚴成就四種菩薩功德莊嚴成就是名衆生世間清淨如是一法句攝二種清淨應知此偈深妙難解須讀誦通利然後取曇鸞法師往生論注閲之自能了達古之修淨業者依三經一論為宗即是無量壽經觀經阿彌陀經及此論也壇經略釋東土禪宗六祖說門人法海等録石埭楊文會注刺史又問曰弟子常見僧俗念阿彌陀佛願生西方請和尚說得生彼否願為破疑師言使君善聽惠能與說世尊在舍衛城中說西方引化經文分明去此不遠若論相說里數有十萬八千當云國土有十萬億六祖不深求教相故誤說即身中十惡八邪便是說遠說遠為其下根說近為其上智人有兩種法無兩般迷悟有殊見有遲疾迷人念佛求生於彼此是華嚴教事能隱理門悟人自淨其心此是華嚴教理能奪事門所以佛言隨其心淨即佛土淨此是華嚴教理能成事門使君東方人但心淨即無罪雖西方人心不淨亦有愆未超上上皆名帶業稱性而談唯佛一人居淨土也東方人造罪念佛求生西方西方人造罪念佛求生何國一往以理奪事正與以事顯理相反淨土人不造罪故棲神微妙入華嚴之玄圓超東土西方何肯造罪人能以念佛心入無生忍六祖雖很決定罵不著凡愚不了自性不識身中淨土近代邪教用丹家糟粕作佛法會人人自以為修身中淨土個個自以為是六祖真傳盡成地獄種也願東願西悟人在處一般所以佛言隨所住處恆安樂使君心地但無不善西方去此不遙若懷不善之心念佛往生難到今勸善知識先除十惡即行十萬後除八邪乃過八千念念見性常行平直到如彈指便覩彌陀使君但行十善何須更願往生一往以理奪事故不說事能顯理門
