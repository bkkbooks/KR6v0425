body:
  text: 清石埭楊文會仁山著讀法華經妙音品此品義味幽深須以三法釋之初依四賓主次依四法界三依六相且初依賓主釋者釋迦如來主中主也多寶如來賓中主也妙音菩薩賓中賓也文殊菩薩主中賓也先由主中主放光東照妙音方發意來觀衆寶蓮華既現于靈山會前文殊乃問世尊欲知妙音所行三昧並願見其色相表二菩薩均在因位各有分齊非仗佛力不能融會釋迦乃蘄多寶為現表古佛雖久滅度神用常興故一呼即至乃賓中主召賓中賓也及至妙音到已先見釋迦不見多寶者表釋迦為此界宗主多寶現於釋迦界中非釋迦介紹不能見也次依四法界釋者妙音事法界也文殊理法界也釋迦理事無礙法界也多寶事事無礙法界也前文釋迦開多寶佛塔表理事無礙入事事無礙也多寶分半座與釋迦並坐正顯事事無礙之象也文殊表根本智顯示般若真空之義理法界也妙音得種種三昧淨華宿王智佛為彼説國土淨穢身量大小妙音未來時先現衆寶蓮華所經國土雨華動地天樂鳴空皆屬事法界也理事無礙方能契合故文殊白佛欲見妙音然非事事無礙不能隨心自在故釋迦蘄多寶現其相也三依六相釋者即華嚴經中總別同異成壞也靈山道場為總相四聖在會為別相皆證法華為同相因果差殊為異相師資道合為成相各住自位為壞相寂音尊者用各不相知之義釋此品專屬壞相於經意未能全合圓覺經清淨慧章別記第六章清淨慧菩薩問法世尊開示四種淺深證道之相復説居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實凡三十二字作四句讀古今諸師各申妙解今為同志宣揚特出新義以餉大衆初句不起妄念者若就思惟心言之則與下句不能聯合當知妄念即是第七識隨緣執我便成非量一切時不起則七識轉成平等性智矣第二句之妄心六識思惟心也七識為六識之根根既平等則依根所發之識必無我執是名妙觀察智何須息滅如永嘉答六祖云分別亦非意深契六祖之道也第三句住妄想境前五識也五根對境而有五識唯是現量因有同時意識為緣則成比量而現量隱故名加了知古人徹悟之時歎為山河及大地全現法王身若加了知則無此境不得名為成所作智矣第四句無了知者即是第八識無分別智辨之者第六意識也意識認為真實則違八識現量矣勝鬘經云煩惱隱覆真實意識不辨則不被其隱覆八識轉成大圓鏡智矣八識既轉四智全彰豈非一切種智乎故下文佛讚德本以結之彌陀報土古人以四土釋西方極樂世界復以互相該攝之言通之子細參詳似猶未愜蓋佛剎具四土者不可一概而論經中每云或有國土純是菩薩則下二土自無有矣今依淨土三經所説一切衆生往生彼國者皆得衣食自然究竟徹證無上菩提是往生者雖未證聖已非凡界既無凡界則不可説凡聖同居矣又二乘種性往生之後雖證小果畢竟趨入大乘是無實聲聞便不可説方便有餘矣統而言之無非彌陀報土隨往生者根器不同見彼國土淺深有異既入彌陀願海自業報境全捨豈有凡界能為牽繫耶又有高談淨土者喜提常寂光亦非本經意旨蓋十方諸佛所居常寂光平等無二尚非淺位菩薩所及何況下凡若能入常寂光則無此界他界之別又何必説西方耶既説西方自以彌陀報土為歸是為他受用土若論彌陀自受用土非常寂光而何起信論證果信成就發心者入圓初住位即得少分見於法身便能八相成道現劣應佛至十地位盡見滿分法身在色究竟天現勝應佛或疑初住所現劣應佛不具三身與妙覺果位有異又疑十地位盡所現勝應佛亦不説報身今為通釋夫初住位既見法身而法身遍一切處即名毗盧遮那不可以自他情量限之雖云少分見但以入理深淺言之非謂另有分法身在所見之外也法身者自受用身也報身名他受用身亦稱法界性遍一切處隨機顯現初住菩薩現佛身時即以毗盧遮那為自法身以盧舍那為自報身以色究竟天佛為自勝應身以一位遍攝一切位故至十地位盡現勝應身時亦復如是又勝應身即梵網所謂千華上佛彼經云盧舍那化為千釋迦千釋迦又化為千百億釋迦是謂從本起末若攝末歸本準例可知既入佛性海中釋迦現身一切法趨釋迦彌勒現身一切法趨彌勒無量諸佛莫不皆然三身義清淨法身圓滿報身千百億化身是之謂三身學佛者若不知三身義則真假二諦不能圓融世人所見釋迦牟尼佛從母胎出修行證道説法度生入於涅槃者皆化身之事也化身一名應身以其應衆生之機而出現也當知釋迦成道以來經久遠劫三身具足一時能現無量化身猶如月映萬川彼月之體性能現月形者法身也彼月之光明照耀無邊者報身也水中所現之月隨處可見者化身也若但知化身為佛而不知普遍平等之法身萬德莊嚴之報身則佛陀亦人中之傑出者而已矣豈能統十界而稱尊亙古今而常存者乎他教之言曰佛者受造者也上帝者造物者也是皆知有化身而不知有法身報身也法身者四聖六凡所同者也稱為本覺報身者萬劫修行所顯者也稱為始覺始本合一方證佛果然後現無量化身以度含靈六道凡夫雖有法身隱而不現隨業所受之身或為人或為畜即是報身無隨類現形之用故無化身此等衆生顛倒妄想輪轉無窮若欲脫此幻夢殊非深究內典不為功然內典繁多從何入手用功省而收效速也曰有馬鳴菩薩所作起信論文僅一卷字僅萬言精微奧妙貫徹羣經學者苟能熟讀深思如法修行從十信滿心得六根清淨證入初住見少分法身歷十住十行十回向十地等覺妙覺徹證滿分法身現圓滿報身以大悲心起隨類用即現千百億化身與十方諸佛無二無別也或疑六道衆生何能直證佛果不知衆生本性即是諸佛法身迷則輪回六道悟則超越三乘然須多劫修行方成佛道更有淨土一門不假勤修不廢俗諦一念淨信頓超彼岸可謂方便中之大方便直捷中之最直捷矣學者可不勉旃大乘律梁攝論戒學中引毗奈耶瞿沙毗佛略經説菩薩戒有十萬種差別如茲大本未沾此域又古德相傳云真諦三藏將菩薩律藏擬來此土於南海上船船便欲沒省去餘物仍不能起唯去律本船方得進真諦歎曰菩薩戒律漢土無緣深可悲矣或疑攝論所引戒相何至如此之多當知菩薩行門通十法界隨入一界皆具萬行故有十萬種差別也又疑九界現身可説戒相若現佛身豈得同例今為釋曰菩薩現佛身時亦有應作不應作之相以為戒藏故十法界莫不皆然又如大部律藏不能至東土者亦有深義蓋西土應化聖賢能應十界之機隨緣設化故應受持廣律若東土修大乘者局於人道未能現身他界故廣律非分且菩薩行折攝二化隨類現身迥出常情之表未入正位者或墮疑網若強效之恐致墮落故不入此土梵網十重四十八輕及菩薩戒本四重四十一輕乃大乘律之總綱凡發菩提心者皆應受持也謹案菩薩戒有十萬種差別見真諦譯攝論世親釋編者識佛法大旨佛法大旨在引導世人出生死輪回蓋世人生不知來死不知去靜言思之何以忽而有我未生以前我在何處既死以後我往何所茫茫昧昧誠可哀也有智慧者在自性內體究破妄顯真忽如夢覺六通具足得知過去世曾經無量生死或生天上或生人間或為畜生或墮地獄餓鬼苦樂千差未來世中亦復如是輪轉無窮遍觀一切衆生頭出頭沒無有了期遂發大願修菩薩道自度度他福慧圓滿得成佛果所説經法真實不虛無論何人依教修行皆得成佛但入門有難易之分證道有淺深之別及其成功一也如來設教義有多門譬如醫師應病與藥但旨趣玄奧非深心研究不能暢達何則出世妙道與世俗知見大相懸殊西洋哲學家數千年來精思妙想不能入其堂奧蓋因所用之思想是生滅妄心與不生不滅常住真心全不相應是以三身四智五眼六通非哲學家所能企及也近時講求心理學者每以佛法與哲學相提並論故章末特為拈出以示區別學佛淺説先聖設教有世間法有出世法黃帝堯舜周孔之道世間法也而亦隱含出世之法諸佛菩薩之道出世法也而亦該括世間之法世間法局於現生不脫輪回出世法透徹根源永脫輪回兼之世界成壞羣生變化凡情所不能測者佛門修士朗然大覺普照無遺豈不大快乎哉然則學佛者當若之何曰隨人根器各有不同耳利根上智之士直下斷知解徹見本源性地體用全彰不涉修證生死涅槃平等一如此種根器唐宋時有之近世罕見矣其次者從解路入先讀大乘起信論研究明了再閲楞嚴圓覺楞伽維摩等經漸及金剛法華華嚴涅槃諸部以至瑜伽智度等論然後依解起行行起解絶證入一真法界仍須回向淨土面覲彌陀方能永斷生死成無上道此乃由約而博由博而約之法也又其次者用普度法門專信阿彌陀佛接引神力發願往生隨己堪能或讀淨土經論或閲淺近書籍否則單持彌陀名號一心專念亦得往生淨土雖見佛證道有遲速不同其超脫生死永免輪回一也或曰同一證道何不概用普度法門令人省力答曰凡夫習氣最重若令其專念佛名日久疲懈心逐境轉往往走入歧途而不自覺故必以深妙經論消去妄情策勵志氣勇鋭直前方免中途退墮也又問上文所説出世法門如何能括世間法耶答曰佛法要在見性真性如水世事如漚有何漚不由水起有何事不由性起耶子但精勤一心究明佛法方信豫言之不謬矣金剛經四句偈説金剛經內每云四句偈等後人不達種種解釋殊失經旨豫讀法華至一四句偈恍然曰此即極少之説也金剛之四句偈等亦猶是也後閲智者大師疏云般若第一部六十萬偈乃至第八部三百偈即此金剛般若又閲華嚴經序有云龍樹菩薩誦得下部歸於竺乾凡十萬偈四十八品傳來此土者四萬五千偈三十九品乃知西土論經通以四句為一偈二句為半偈積若干偈為一品若干品為一經四句偈等之旨復何疑哉藏經字體不可泥古説東震旦自有佛經歷代書寫刊印流通字體皆隨時宜明萬歷間始刊書本藏經間用古字初學患其難曉後半遂不復用近代吳下江鐵君寫刻大乘教典改從説文字體好古者賞之然説文所有之字則改矣其無者仍聽之亦何貴乎其改也嘗試論之佛經字體不與説文合者最多何則翻梵成華但取義順不以文字論古今也且翻字不翻音者若此方之字與彼音未能全符則加口旁以別之便知非本字全音矣如謂説文無有盡行除去則密呪正音無從可得斷不可也又顯説中間靜從間中間從間因世俗相承已久一見而知分別也楞嚴楞伽之楞字説文作稜他書從之惟佛經內專用楞字疑係譯經時所定當從之不必更改也菩薩之薩字説文無之今有人改作謂是薛字之假借也又有寫作殺更可駭也考字典從薩與古經不符經中從廾從阜從立從生當是譯經時所撰良有以也經中淫字多從女旁專指男女事也今人欲依説文改從水旁書中淫字訓義甚多放也溢也甚也邪也經中專指男女事故從女為妥由此類推應改與否從可知矣鴉片説世人修善名曰白業世人造惡名曰黑業鴉片者黑業之所感也何以言之不觀夫雲棲施食儀乎作滅罪法時觀餓鬼身中所有罪業猶如墨汁以神呪之力令其墨汁從足心流出下入金剛際今時黑業強盛汲引此汁從地涌出化作鶯粟花鮮妍可愛及其漿滿剖而出之初見灰白俄而變色煮之熬之則純黑矣豈非餓鬼足下流出之墨汁乎所最奇者吸煙之筒名之曰鎗不知命名者何所取義也靜言思之乃恍然曰鎗者殺人之具也舉鎗欲殺人必以口對人而火門對己乃吸煙則反是誠舉鎗以自殺也嘗觀世人終日營營百計千方莫非損人利己惟吸鴉片一事則專以害己此所謂天壤間至公之道也往者與英人講論創法之巧英人曰熬煙之法吸煙之具皆造自華人益信業力招感非凡心所能思議者矣大凡世間毒物人皆畏而遠之鴉片之毒甚於他物生者為土熟者為膏少許入口即時斃命而嗜之者一見此物喜形於色誠不解其何故也忽憶經中以世人貪瞋癡為三毒始知內心之毒與外物之毒同類相攝其力最大斷無他力足以勝之雖父母撻楚妻孥詬厲至死不改或問吸鴉片人應得何報答曰觀現在形狀便可知矣口鼻之間臭煙出入面目焦枯殆無生氣命終以後必墮餓鬼道中焰口經中所救餓鬼即此類也待其墨汁從足流出又為後人所吸展轉相引無有已時非遇佛法教導往生淨土其能脫此苦海乎觀未來世間治亂莫能預知然自冷眼人觀之則有可以逆料者且就目前世界論之支那之衰壞極矣有志之士熱腸百轉痛其江河日下不能振興然揣度形勢不出百年必與歐美諸國並駕齊驅何則人心之趨向可為左券也不變法不能自存既變法矣人人爭競始而效法他國既而求勝他國年復一年日興月盛不至登峰造極不止也或問全球無衰壞之國可與增劫時世媲美乎答曰迥不相侔也增劫時世人心純善金玉棄而不取今時號為文明之國者全仗法律鉗制人心始能帖然牟利之徒機巧百出非極天下之豪富不能滿其所欲也又問壞極而興既聞命矣至於興之極能永久不壞乎答曰不能也或問何以知之答曰地球各國全盛之日兵戈不起生齒日繁諺云一人生兩人十世一千丁以三十年為一世至十世而添人千倍矣其中不無飢饉疾疫耗折人口且減半計之亦不下五百倍也歷年三百而添人五百倍地不加大何能容之彼時先壞商務繼壞工務蓋各國齊興貨物充溢皆欲阻止他國貨物不令輸入而輪船無用矣貨物既不運售他國則製造日減而工人賦間矣工商以外無生業者不計其數啼飢號寒哀聲遍野豈有不亂者乎先興者先壞後興者後壞統地球各國壞至不可收拾所有文學格致歷算工藝一切盡廢仍變而為野蠻向之人民五百倍者減而賸一分如現在之數亂猶不止必再減一半而亂事方了爾時人民敦朴如洪荒之世此為亂之極治之始也久之又久之而禮樂文章漸次興起治亂循環如是而已哀哉衆生營營擾擾果何為也或曉之曰此夢境也舉世皆夢也然則亦有覺者乎曰釋迦彌陀皆覺者也十方三世一切諸佛皆覺者也菩薩羅漢高僧上士覺而未至究竟者也欲醒此夢非學佛不為功三藏教典具在苟能用心無不得入而要以淨土為歸方可醒此大夢也支那佛教振興策一中國之有儒釋道三教猶西洋之有天主耶穌回回等教東洋之有神道及儒佛二教東西各國雖變法維新而教務仍舊不改且從而振興之務使人人皆知教道之宜遵以期造乎至善之地我中國何獨不然今日者百事更新矣議之者每欲取寺院之産業以充學堂經費於通國民情恐亦有所未愜也不如因彼教之資以興彼教之學而兼習新法如耶穌天主教之設學課徒日本佛寺亦擴充布教之法開設東文普通學堂處處誘進生徒近日創設東亞佛教會聯絡中國朝鮮以興隆佛法猶之西人推廣教務之意也我國佛教衰壞久矣若不及時整頓不但貽笑鄰邦亦恐為本國權勢所奪將歷代尊崇之教一旦舉而廢之豈不令度世一脈後人無從沾益乎為今之計莫若請政務處立一新章令通國僧道之有財産者以其半開設學堂分教內教外二班外班以普通學為主兼讀佛書半時講論教義半時如西人堂內兼習耶穌教之例內班以學佛為本兼習普通學如印度古時學五明之例如是則佛教漸興新學日盛世出世法相輔而行僧道無虛縻之産國家得補助之益於變法之中寓不變之意酌古準今宜情宜理想亦留心時務者所樂為也支那佛教振興策二泰西各國振興之法約有兩端一曰通商二曰傳教通商以損益有無傳教以聯合聲氣我國推行商業者漸有其人而流傳宗教者獨付缺如設有人焉欲以宗教傳於各國當以何為先統地球大勢論之能通行而無悖者莫如佛教美洲阿爾格爾曾發此議立佛教學會從之者十餘萬人然其所知僅佛教粗迹於精微奧妙處未之知也故高明特達之士仍不見信今欲重興釋迦真實教義當從印度入手然後遍及全球庶幾支那聲名文物為各國所器重不至貶為野蠻之國矣然開辦之始非籌款不為功儻得賢士大夫慨然資助收效於數年之後不但與西洋各教並駕齊驅且將超越常途為全球第一等宗教厥功豈不偉歟釋氏學堂內班課程芻議蓋自試經之例停傳戒之禁弛以致釋氏之徒無論賢愚概得度牒於經律論毫無所知居然作方丈開期傳戒與之談論庸俗不堪士大夫從而鄙之西來的旨無處問津矣今擬乘此轉動之機由各省擇名勝大剎開設釋氏學堂經費由菴觀寺院田産提充教習公同選舉酌定三級課程先令其學習文理然後教以淺近釋典約須三年學成者準其受沙彌戒是為初等再令學習稍深經律論三年學成準其受比丘戒給牒是為中等此後應學深奧釋典及教律禪淨專門之學三年之後能通大意講解如流者準其受菩薩戒換牒是為高等聰慧之流九年學成具受三壇大戒方能作方丈開堂説法升座講經登壇傳戒始得稱為大和尚僅學得初等中等者只能當兩序職事若全不能學仍令還俗不得入僧班也近時宗門學者目不識丁輒自比於六祖試問千餘年來如六祖者能有幾人擬令此後非學成初等中等者不得入禪堂坐香以杜濫附禪宗妄談般若之弊尼亦倣照此例略為變通學成等第方準受戒以上三等倣照小學中學大學之例能令天下僧尼人人講求如來教法與經世之學互相輝映豈非國家之盛事乎道家者流雖人數無多亦可倣此辦理是在隨時斟酌耳釋氏學堂內班課程普通學每日課程六堂每堂一點鐘上午第一堂佛教下午第一堂佛教其餘四堂分課本國文理史學地理算法梵文英文東文第一年四十二章經佛遺教經八大人覺經蕅益三經解守遂二經注佛教初學課本金陵刻經處刊釋迦如來成道記念佛伽陀徹悟菩薩戒本經蕅益箋要西方發願文蓮池自注以上春夏二季讀誦講解梁譯大乘起信論纂注義記直解唯識三十論高原蕅益因明論高原蕅益八識規矩憨山蕅益心經五家注阿彌陀經元照蕅益以上秋冬二季讀誦講解晨昏課誦隨時講解百法明門小止觀六妙門以上二種暇時細閲第二年楞嚴經用纂注正脈疏講解此經一年若未讀完下年接讀大乘止觀暇時細閲第三年圓覺經直解略疏近釋大疏金剛經宗泐蕅益憨山維摩經肇注折中疏十六觀經四帖疏七佛偈信心銘證道歌定慧相資歌萬善後偈願生偈曇鸞注以上十種分上下兩期讀誦講解地藏經顯密圓通原人論高僧傳釋氏稽古略暇時細閲專門學自第四年起或兩年或三五年不拘期限各宗典籍或專學一門或兼學數門均隨學人志願總須一門通達方可另學一門不得急切改換以致一無所成俱舍宗俱舍論普光記法寶記成實宗成實論現用俱舍較成實為優律宗大乘梵網經蕅益合注三昧直解智者疏蓮池發隱賢首疏小乘四分律行事鈔資持記道宣元照毗尼止持見月毗尼作持見月毗尼關要定菴毗尼集要蕅益天台宗法華經會義科注妙玄節要涅槃經疏刪定止觀釋禪波羅密四教儀集注教觀綱宗賢首宗華嚴懸談疏鈔澄觀行願品疏鈔澄觀宗密華嚴著述集要法界無差別論疏賢首大宗地玄文本論略注釋摩訶衍論慈恩宗成唯識論心要隨疏述記樞要相宗八要高原蕅益瑜伽師地論倫記因明論疏窺基法苑義林章解深密經密嚴經唯識開蒙三論宗中論吉藏疏百論吉藏疏十二門論宗致義記肇論大智度論三論玄義三論遊意寶藏論禪宗楞伽經憨山筆記蕅益義疏會譯思益經五燈會元六祖壇經禪源諸詮集宗鏡録萬善同歸集宗範禪林僧寶傳密宗大毗盧遮那成佛神變加持經一行疏釋蘇婆呼童子經蘇悉地羯羅經施食補注蓮池淨土宗無量壽經義疏慧遠無量壽如來會彌陀疏鈔蓮池無量壽三經論彭際清往生論注曇鸞淨土十要蕅益安樂集道綽往生集蓮池專門學者不但文義精通直須觀行相應斷惑證真始免説食數寶之誚教乘法數大明三藏法數宜購置案頭以備查考佛學研究會小引今時盛談維新或問佛學研究會維新乎曰非也然則守舊乎曰非也既不維新又不守舊從何道也曰志在復古耳復古奈何曰本師釋尊之遺教耳方今梵剎林立鐘磬相聞豈非遺教乎曰相則是矣法則未也禪門掃除文字單提念佛的是誰一句話頭以為成佛作祖之基試問三藏聖教有是法乎此時設立研究會正為對治此病頓漸權實偏圓顯密種種法門應機與藥淺深獲益由信而解由解而行由行而證欲一生成辦徑登不退要以淨土為歸此係最捷之徑也祇洹精舍開學記釋迦如來涅槃後二千八百六十年摩訶震旦國外凡學人建立祇洹精舍于大江之南建業城中興遺教也夫如來之教博大精微人莫能測外凡淺智何足以興之然當事者不暇計也輒語人曰人皆可以為堯舜儒門嘗言之矣我佛門何獨不然不見夫心佛及衆生是三無差別之偈乎以剎那三昧消其時量則靈山一會儼然未散以帝網法門融其方域則舍衛金陵鏡影涉入契此道者超乎象外何有於華梵何有於古今更何有於聖凡耶然理雖如是事須兼盡以英文而貫通華梵華梵既通則古今一致凡聖交參皆不離乎現前一念介爾之心於是乎振鈴開學正當光緒戊申孟冬之月闔堂大衆歡喜踊躍信受奉行金陵本願寺東文學堂祝文維光緒二十五年歲在屠維大淵獻陬月之吉金陵日本淨土真宗本願寺特設東文學堂以教華人一言語學課二普通學課誠如蓮經所云治世言語資生業等皆順正法也溯自二十年前創立本願寺於春申江上今者大法主現如上人屬其弟勝信公來華設本願寺於杭以十人居之復設本願寺於吳以三人居之金陵為南朝勝地而北方心泉上人與一柳等五人居焉上人傳七祖之衣鉢為四賢之領袖知道之所自在元魏則有曇鸞法師在唐則有道綽法師善導法師三師之著作不傳於華而傳於日本今則復播之於華豈非時節因緣耶留學諸君子或宣教旨或受和文微特出世之良因抑亦處世之勝緣也然則大法主之德其可限量乎爰為之頌曰真諦俗諦如車兩輪扶桑震旦齒之與脣駕車來遊以道傳薪方言奇字奧妙絶倫彌陀本願指示當人人人信受一入全真提唱洪名無間昏晨十萬億剎明鏡無塵大哉釋迦亙古常新五洲萬國一視同仁般若波羅密多會演説一今逢淨土真宗法主為振興佛教起見創開般若波羅密多會鄙人應召前來理宜演説支那佛教古今流傳之相溯自漢明帝時慧光東照崇信之人乘願而出至姚秦時廣譯經論佛教大興逮至有唐禪教律淨皆臻元奧禪則達摩一宗自六祖以下五派分立教則天台賢首慈恩各承家法律則南山正軌大小兼弘淨則善導懷感誠懇備至震旦佛教於斯為盛彼時著述雖多因刻板未興類多遺亡五季之時佛教稍衰至宋朝而復興所出人才以永明為巨擘提唱禪宗指歸淨土尤為古今所未有也元明二代四百年間方之唐宋似遜一籌本朝初年禪宗鼎盛著述家純疵間出近世以來僧徒安於固陋不學無術為佛法入支那後第一隳壞之時欲求振興惟有開設釋氏學堂始有轉機乃創議數年無應之者或時節因緣猶未至耶請以觀諸異日般若波羅密多會演説二此會由法主命名般若波羅密多會今請演説般若之義為開會之宗本夫般若者根本智也經稱般若為諸佛母一切佛法之所從生故大藏經以般若為首般若在衆生分中隱而不現蓋為無明妄想障蔽故也衆生思慮之心內典稱為生死根本乃六識分別念念不停雖極明利思想之用徹於玄微總不能證般若真智若欲親證須由三種漸次而入一者文字般若即三藏教典及各宗著述後學因此得開正見不至認賊為子二者觀照般若依前正見作真空觀及中道第一義觀三者實相般若由前妙觀證得諸法實相即與般若相應便是到彼岸可稱般若波羅密多矣達摩一宗專弘此法六祖稱為學般若菩薩此乃以第六度為禪非第五度之禪也近時根器下劣不能剿絶意識反以意識之明了處認為般若智慧譬如煮沙欲成佳饌豈可得哉般若波羅密多會演説三如來設教萬別千差末法修行難進易退有一普度法門速成不退直趣佛果者即念佛往生淨土法門也漢時經已傳至東土東晉廬山遠公盛弘此道千百年來相傳不絶宋永明大師有萬修萬人去之語言之不詳後人未知其方今請演其説以供衆聽竊窺永明之意深有見於淨土三經宗旨凡具信心發願往生者臨命終時皆仗彌陀接引之力故能萬修萬人去也然往生雖仗他力而仍不廢自力故以修字勉之蓋生品之高低見佛之遲速證道之淺深受記之先後皆在自力修行上分別等差後世有專重自力者令人疑慮不決有礙直往之機又有專重他力者以致俗緣不捨空負慈尊之望二者不可偏廢如車兩輪如鳥兩翼直趨寶所永脫輪回矣般若波羅密多會演説四立身成己治家齊國世間法也參禪學教念佛往生出世法也地球各國於世間法日求進益出世法門亦當講求進步支那國中自試經之例停傳戒之禁弛漸致釋氏之徒不學無術安於固陋今欲振興必自開學堂始五印度境為佛教本源大乘三藏所存無幾欲興正法必從支那藏經重譯梵文先須學習語言文字方可成此大業也日本佛教勝於他國三藏教典及古今著述最為詳備欲求進益須以漢語讀漢文則文義顯發必有勝於嚮時蓋漢文簡而明曲而達虛實互用言外傳神讀誦通利自能領會嚮以和語回環讀之恐於空靈之致有所未愜也南洋勸業會演説南洋勸業會為從來未有之創舉至今六箇月會期將滿各家演説均已齊備惟宗教一門尚屬缺典頃承同志諸君之意開會演説以作會場最後之勝緣鄙人勉承衆志略為演説考各國宗教源流以婆羅門教為最古自佛教出興而婆羅門高尚之士咸捨本教而學佛蓋自知其道義之不如也東漢時傳來東土至今一千八百餘年矣佛教所以勝於他教者在倡明真性不滅隨染緣而受六道輪回世間苦樂境界皆是過去世中因起惑而造業因造業而受報至受報時設法救濟已無及矣所謂定業難轉也不如以佛法導之令其不造惡因免受苦果漸漸增進以至成佛則久遠大夢豁然頓醒自度功畢度他不休此乃佛教濟世之方與世間法相輔而行非虛無寂滅之談也更有深妙道理須久閲內典潛心體究方能領會非一時所能演説地球各國皆以宗教維持世道人心使人人深信善惡果報毫髮不爽則改惡遷善之心自然從本性發現人人感化便成太平之世矣送日本得大上人之武林佛法傳至今時衰之甚矣必有人焉以振興之日本真宗教士航海而來建別院開學孰豈非振興之機乎但格於門戶未能融入大同見解不無差池耳然既稱釋迦弟子總期剖破藩籬上契佛心躋羣生於清泰之域截生死流登涅槃岸是則不求同而自同矣得大上人將赴武林為題數言以贈其行上人其勉之哉等不等觀雜録卷二目録佛學書目表
