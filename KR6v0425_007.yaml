body:
  text: 石埭楊文會仁山述法界無始終時劫遷流皆是衆生妄見證道之人長劫入短劫短劫入長劫故知無始終也無內外一塵現法界法界入一塵何內外之有強立名本無可名為化衆生強安名耳為法界即有之空一法不立即空之有萬法齊彰法界性真妄平等同一體性即法身十界同具無有差別因不覺以不達一法界故心不相應號無明忽然念起名為無明空色現楞嚴經云晦昧為空空晦暗中結暗為色又云空生大覺中如海一漚發有漏微塵國皆依空所生情器分有情世間器世間由此建立三世間并正覺世間是謂三世間從此生從如來藏變為阿賴耶從阿賴耶變起根身器界又從轉阿賴耶而顯如來藏則成正覺世間所謂無不從此法界流無不還歸此法界也迷則凡迷之則為六凡悟則聖悟之則為四聖真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故須親證唯證乃知難可測若以思惟心推求如取螢火爇須彌山終不能著釋迦佛生證者誰隨分證入者則不問專問證入究竟者是為誰耶釋迦尊釋迦牟尼如來為三界獨尊是賢劫千佛中第四佛也大悲願諸佛因地皆以大悲願力而行菩薩道示誕生釋迦應迹從兜率天退降神迦維羅衛國父名淨飯母名摩耶處胎十月從右脅生名為薩婆悉達在周昭王二十四年四月八日也此是應身佛八相成道一從兜率天退二入胎三住胎四出胎其餘四相詳在下文大乘見佛在母胎中住大寶樓閣度無量衆生故有住胎相小乘不見處王宮求出離悉達太子在王宮中種種技藝迥超凡流五欲之樂無不具備十九歲時遊觀四門見老病死生厭離心忽遇沙門生欣慕想遂欲出家父王防衛嚴密夜踰城人不知淨居諸天令彼軍士綵女悉皆昏睡至夜半時太子乘馬四天王捧馬足踰城而去人不覺知遂得剃髮易服而為沙門此是第五出家相入雪山修苦行既出家已五年遊歷遍訪諸仙種種論議知非正道遂入雪山日食一麻一麥勤修苦行六年間習寂定在雪山中結跏趺坐先學不用處定三年知非遂捨又學非想定三年知非亦捨從定起出山來即出雪山詣尼連河沐浴受食時年已三十矣坐樹下心鏡開菩提樹下有金剛座賢劫千佛皆坐此座入金剛喻定天龍喜諸天龍王歡喜讚歎大興供養魔膽落魔王波旬見其宮殿無故隳裂先遣魔女媚之再遣魔軍怖之皆不能動魔王震懾舉衆降服大乘有住胎無降魔小乘有降魔無住胎乃大小二乘所見八相成道之異也覩明星成正覺忽覩明星廓然大悟即成無上正覺歎曰奇哉一切衆生具有如來智慧德相但以妄想執著不能證得若離妄想一切智無師智自然智即得現前此是第六成道相啓大教説華嚴佛初成道首演大法是謂第一時教塵剎海現寶蓮華嚴會上佛現法界無盡身雲住華藏莊嚴世界海有佛剎微塵數大寶蓮華一時出現身剎互融無盡重重重重無盡惟法身大士方能見之愍凡愚不能聽凡小之機不見不聞如來愍之為説小法隱尊特顯劣應尊特者剎塵相好之身也佛非隱顯隱顯隨機耳劣應者丈六身也在色究竟天所現之高大身名為勝應身教化菩薩居鹿野苑現丈六身教化凡夫二乘若是圓機見此丈六即見無盡相好之身説阿含第二時阿含經後人集為四部增一阿含中阿含長阿含雜阿含也一一部內有多種經四諦法接小機苦集滅道四諦為接小機而説證四果出生滅修聲聞法證入四果以為究竟即阿羅漢是也既證此果生滅滅已寂滅為樂演方等第三時教彈偏斥小歎大褒圓即維摩楞伽等經是也破法執二乘但破人我執出分段生死佛説方等經破法我執出變易生死入菩薩地第四時談般若般若如大火聚觸著即燒般若如清泠水滌除塵垢佛説此法燒之滌之令一切世間法出世間法究竟清淨其經即八部般若等是也二乘轉教菩薩般若會上羅漢弟子當機請法佛為廣談般若妙諦令其轉教菩薩此是法華會上佛付家業之先導也開顯圓法華會第五時説法華經開權顯實為純圓之教學無學得授記三果已還皆名有學唯第四果名為無學他經唯菩薩蒙佛授記法華經授聲聞記不但無學即有學亦蒙授記誠為希有授記者佛記弟子當來成佛名字若何國土若何法住時劫等事聞者慶幸無量涅槃經最後説説法華後即説涅槃通為第五時教即是臨涅槃時所説也顯真常真常不變是名涅槃扶戒律佛敕弟子以戒為師戒律精嚴則佛法能久住也五時教如是説釋迦如來一代聖教天台判為五時如上文所説亦融通通而言之五教中隨一一教皆遍五時所謂一切時中説圓融無盡法皆名華嚴教説聲聞法皆名阿含教乃至説會三歸一之法皆名法華教餘可類推亦分別別而言之佛初成道三七日中説華嚴經十二年説阿含經八年説方等經二十二年説般若經八年説法華經一日一夜説涅槃經共成五十年説法度生也以上三十二句是第七轉法輪相化道圓化度衆生之道圓滿具足歸真際攝末歸本也雙樹間吉祥逝佛在拘尸那城娑羅雙樹間右脅而臥默然示寂右脅名為吉祥是時大地震動日月無光雙林變白江湖枯涸人天號泣聲震大千是為第八入涅槃相闍毗後分舍利依法闍毗凡火皆不能燃佛從胸中自發聖火乃能化盡得舍利八斛四斗遵佛遺囑分為三分諸天得一分龍王得一分八大國王共得一分八王均分阿闍世王得八萬四千粒藏恆河中作千歲燈供養阿育王變古制佛滅度後一百年天竺有鐵輪王名曰無憂即阿育王也取阿闍世王所藏舍利分布南洲碎寶末造浮圖碎七寶末造八萬四千塔役鬼神遍閻浮役使鬼神遍閻浮提同時安置在震旦國有十九處此時所能見者唯明州鄮山一處耳優填王始造像佛升忉利天為母説法三月安居優填王渴仰如來無由得見發意造像目連尊者攝三十二匠升天瞻視佛光耀目乃至池側令匠觀水中影凡三返像始造成後佛從天而下像自出迎佛摩頂記之令後人修供養自此以後王臣士庶造佛像者不可勝數去佛久遠能於像前供養瞻禮皆優填王發起之力也結集三藏大迦葉命阿難結集經石窟間摩訶迦葉集諸比丘得神通者悉詣耆闍崛山畢鉢羅窟結集法藏無令斷絶阿難未得漏盡拒而不納後證阿羅漢果乃能入會修多羅是經藏迦葉尊者先命阿難結集經藏契理契機故名契經毗奈耶是律藏次命優波離結集律藏止惡修善如世法律阿毗曇是論藏復命阿難結集論藏問答決擇諸法性相故名論也正法隆三藏教典流傳世間能令正法常住不滅外道喪佛教盛行於世西竺九十五種外道漸漸消亡利根者轉邪歸正而證道果矣藏分三藏即含藏之義也謂經律論三各含文理故名三藏部十二一曰長行直説法相隨其義理長短不以字數為拘也二曰重頌應前長行之文而重宣其義天竺八字成句四句為偈翻譯華文或五字句或七字句各隨其便三曰授記如來為諸菩薩聲聞授成佛記四曰孤起不頌長行直説偈句亦四句為一偈五曰無問自説如來以他心智觀衆生機而自宣説六曰因緣如來所説一切根本緣起之事七曰譬喻如來假譬喻以曉示之令人開解八曰本事説諸菩薩弟子因地所行之事九曰本生説佛菩薩本地受生之事十曰方廣大乘方等經典其義廣大猶如虛空十一曰未曾有現大神變不思議事十二曰論議問答辨論諸法之事以上十二部經亦名十二分教或有一經只具一分或有兼數分具足十二分者則未之見也遇有緣作佛事如來以平等大悲普度衆生衆生受化因緣千差萬別因緣不具者佛在當處不聞不見佛滅度後三藏十二分教流布世間遇有緣者即能作如來度生之事業也大法東來漢明帝夢金人求聖教遣蔡愔東漢明帝永平七年帝夢金人身長丈餘項有圓光飛至殿庭旦問羣臣太史傅毅奏曰臣覽周書異記載昭王時有五色光入貫太微太史蘇由奏曰有大聖人生於西方故現此瑞一千年後聲教及此王勒石記之陛下所夢將必是乎帝納其言即遣中郎將蔡愔等十八人往西域求佛法騰蘭來經像至愔等至中天竺月氐國遇梵僧攝摩騰竺法蘭二人奉佛經像返至洛京館於鴻臚寺後建精舍因白馬馱經而來因名之為白馬寺初譯經四十二最初譯出四十二章經是為法寶流傳震旦之始也道教徒興惡念請焚經為試驗道經燬佛經全光熾盛耀人天五嶽道士褚善信等千二百人上表求試真偽帝許之乃築三臺分置釋道經典舉火焚之道經頃刻俱燼佛經光焰煥發纖毫無損攝摩騰竺法蘭踊身虛空而説偈曰狐非師子類燈非日月明池無巨海納邱無嵩嶽榮法雲垂世界法雨潤羣萌顯通希有事處處化羣生道士中六百餘人皈依佛教善男女皆生信求出家期現證司空劉峻等二百六十人京師士庶三百九十人後宮陰夫人王倢妤并綵女等一百九十人見此神異俱求出家期於現證聖果也建十寺安僧尼明帝許可敕建十寺城外七寺安僧城內三寺安尼三寶備始於茲住世三寶從此備矣十宗溯源流知宗派佛為本源後學為流派各家所宗不同所謂歸元無二路方便有多門也宗有十分小大略舉十宗有小乘有大乘下文詳述成實宗成實宗六代盛高僧傳可為證如來滅後九百年中訶梨跋摩取諸部所長作成實論釋成三藏中之實義姚秦鳩摩羅什譯出震旦諸師多造章疏見於高僧傳後代式微矣俱舍宗俱舍宗陳至唐五代後漸微茫世親菩薩造俱舍論在聲聞對法藏內最為精妙陳真諦三藏譯出并作疏釋之佚失不傳唐玄奘法師重譯三十卷門人普光作記法寶作疏盛行於世有專門名家者遂立為一宗焉至五代後學者競習禪宗俱舍一門置之高閣矣此二宗是小乘成實俱舍律小大十誦四分等是小乘梵網瓔珞等是大乘七大乘禪宗天台宗賢首宗慈恩宗三論宗密宗淨土宗禪宗傳心印為禪宗佛之心印即是般若波羅密五祖令人誦金剛般若經六祖稱為學般若菩薩皆以般若為心印也後人名為禪宗是出世間上上禪言語道斷心行處滅始有少分相應佛拈花迦葉通世尊在靈山會上拈花示衆是時衆皆默然唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉問曰如來心印獨付迦葉何也答曰佛在世時悟道之人佛為印證佛滅度後若無正傳恐落偏邪故以迦葉為初祖次第相傳并付衣鉢表信世人悟道必受祖師印證方可自信列祖住世雖悟道弟子如麻似粟而付法傳衣必待其人可見三十三代祖師皆於靈山會上一時印定矣授阿難為二祖阿難尊者多聞第一持佛法藏乃迦葉以別傳之旨授之蓋以二門不相離也次第承皆可數載在付法藏因緣傳茲不具述第十二號馬鳴應佛懸記於六百年時生於中印度摧伏外道興隆正法繼富那夜奢尊者之後而紹祖位若剋其本大光明佛若校其因八地菩薩造起信大乘興馬鳴大士宗百部大乘經造起信論以一心二門總括佛教大綱學者能以此論為宗教律禪淨莫不貫通轉小成大破邪顯正允為如來真子矣十四祖名龍樹唐譯楞伽經如來懸記云未來世當有持於我法者南天竺國中大名德比丘厥號為龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生安樂國魏譯楞伽亦同此文龍樹菩薩證得初地傳佛心宗又生安樂國承事阿彌陀佛禪宗後學可不以此為法乎入龍宮華嚴遇華嚴經亦名大不思議經尊者入龍宮見有三本上本有十三千大千世界微塵數偈一四天下微塵數品中本有四十九萬八千八百偈一千二百品此二本皆非閻浮提人心力能持乃誦下本十萬偈四十八品而出傳世間法雨澍返至人間寫成梵策五天竺國方知有華嚴經出現於世僧俗二衆奉為至寶造諸論施甘露龍樹菩薩造大不思議論十萬偈釋華嚴經今所傳十住毗婆沙論即是彼論釋十地中初之二地又造無畏論十萬偈中論出其中又造釋摩訶衍論闡揚馬鳴菩薩起信論云該攝百洛義契經奧義勉後學研究也草八祖達摩尊來東土示性真菩提達摩尊者南天竺國香至王第三子也姓剎帝利得法於般若多羅尊者承師遺命泛海達廣州在梁普通元年刺史表聞於朝武帝迎至金陵帝問曰朕造寺寫經度僧不可勝紀有何功德答曰並無功德此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德答曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義答曰廓然無聖帝曰對朕者誰答曰不識帝不悟祖知機不契遂渡江屆洛陽止於嵩山少林寺面壁而坐人莫能測後世稱為東土初祖離文字要親證達摩尊者見東土有大乘氣象應時而來專接利根上智令脫名言習氣識自本心見自本性直下與諸佛無異此是頓超之法非小機所能領會也有慧可得心印二祖慧可原名神光武牢姬氏子少通世典長習竺墳出家後善大小乘定中見神人指示南詢得參初祖於少林勤懇備至莫聞誨勵冬夜侍立積雪過膝繼而斷臂求法祖始易其名曰慧可問曰我心未寧乞師與安祖曰將心來與汝安可良久曰覔心了不可得祖曰我與汝安心竟後付袈裟以表傳法即説偈曰吾本來茲土傳法救迷情一花開五葉結果自然成又曰有楞伽經四卷亦用付汝即是如來心地要門令諸衆生開示悟入不立文字是一種方便若執為定法則自誤誤人矣當知摩訶迦葉承佛付囑為第一祖至佛滅後即以結集法藏為當務之急及其傳心不傳之他人而傳之多聞總持之阿難後來世世相承莫不造論釋經宗説兼暢達摩西來得其傳者為精通內典之慧可儻慧可未通教義豈能識達摩之高深哉及至六祖始示現不識文字之相以顯無上道妙要在離言親證非文字所能及也後人不達此意輒以不識字比於六祖何其謬哉不觀夫達摩隻履西歸乎魏主聞而啓棺僅隻履存焉其表法之意殆以宗教兩門傳於東土者只一門耳否則宋雲所見之相豈無所表而然哉當時宋雲問達摩何處去答曰西天去志公已説達摩是觀音化身所云西天去者即阿彌陀佛極樂世界也觀其付法之後并付楞伽其方便善巧豈凡情所能測耶傳僧璨為三祖二祖在北齊時有一居士年踰四十不言姓氏來問祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺士良久曰覔罪了不可得祖曰與汝懺罪竟宜依佛法僧住祖知是法器即為剃髮受具命名僧璨疾亦漸愈執侍二載付以衣法信心銘超今古後住舒州皖公山往來於太湖縣司空山作信心銘六百言流傳於世第四祖名道信知無縛解脫竟道信為沙彌時謁三祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信於言下大悟服勞九載祖試以玄微知其緣熟乃付衣法信蘄州人姓司馬氏後住蘄春破頭山五祖忍祖名宏忍黃梅人也前生為破頭山栽松道者請於四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶儻若再來吾尚可遲汝乃去至水邊乞浣衣女子寄宿女歸而孕父母大惡逐之後生一子棄港中明日見其泝流而上氣體鮮明驚異育之童時遇四祖祖問曰子何姓答曰姓即有不是常姓祖曰是何姓答曰是佛性祖曰汝無姓耶答曰性空故無祖默識其法器即令出家付以衣法居黃梅東山上道場恢繼四祖住破頭山後遷黃梅東山宗風大振第六祖名慧能姓盧嶺南新州人家貧鬻薪供母聞人誦金剛經問所由來遂往黃梅參五祖祖驗知根性太利令入碓坊舂米人稱盧行者經於八月祖敕會下各述一偈以表心得上座神秀題壁曰身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃盧行者聞之亦作一偈請張別駕書於秀偈之側偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃傳衣鉢祖潛詣碓坊示以密機盧即三鼓入室祖付囑心傳并授袈裟盧問法則既受衣付何人祖曰昔達摩初至人未之信故傳衣以明得法今信心已熟衣乃爭端止於汝身不復傳也是夜南邁衆莫之知道大行六祖既至嶺南隱於四會獵人隊中經十五載一日至廣州法性寺夜間風揚剎幡二僧對辨一曰幡動一曰風動祖曰不是風動不是幡動仁者心動一衆竦然乃集諸名德為祖剃髮授滿分戒升座説法聞者傾心別傳之道由此大行六祖下二禪師得法弟子見於記載者四十三人其中最顯著者有二大德南嶽讓懷讓禪師金州杜氏子由嵩山往曹溪禮六祖祖曰何處來曰嵩山祖曰什麼物恁麼來曰説似一物即不中祖曰還可修證否曰修證即不無汙染即不得祖曰只此不汙染諸佛之所護念汝既如是吾亦如是後往衡嶽居般若寺青原思行思禪師參六祖問曰當何所務即不落階級祖曰汝曾作什麼來曰聖諦亦不為祖曰落何階級曰聖諦尚不為何階級之有祖深器之後住吉州青原山靜居寺南嶽下一馬駒踏殺人遍寰區道一禪師漢州什邡縣人姓馬氏故俗稱馬祖習定於衡嶽遇讓和尚發明大事先是六祖謂讓曰西天般若多羅讖汝足下出一馬駒踏殺天下人馬祖應讖而出住洪州開元寺得法弟子八十餘人分化十方水潦和尚初參馬祖問如何是西來的的意祖曰禮拜著師才禮拜祖乃當胸踏倒師大悟起來拊掌呵呵大笑曰也大奇也大奇百千三昧無量妙義祇向一毫頭上識得根源去青原下一石頭石頭路滑似油南嶽石頭希遷禪師端州陳氏子在曹溪剃染得法於青原衡山有石狀如臺乃結庵其上時號石頭和尚著參同契二百餘言行世鄧隱峯辭馬祖祖曰甚麼處去曰石頭去祖曰石頭路滑曰