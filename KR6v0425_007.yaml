華嚴疏鈔慶快平生遂承清涼法脈後人稱為華嚴第五祖疏圓覺為沙彌時授經得圓覺讀之心地開通義天朗耀後作疏釋經成一家獨步大鈔詳小鈔略大疏三卷大鈔十三卷略疏兩卷小鈔六卷後人以萬言為一卷則卷數衆多矣此一派賢首宗開宗判教至賢首而大備故以賢首名宗亦行布亦圓融説行布法圓融即在行布之內説圓融法行布即在圓融之中非但不相礙亦不相形智眼觀之行布圓融皆假名耳慈恩宗一名法相宗一名唯識宗唐玄奘遊西域師表請往西域求經帝不許遂私遁出關備歷艱苦始抵印度學瑜伽祖彌勒瑜伽師地論彌勒菩薩造無著菩薩升兜率天請彌勒菩薩降世傳授但聞其聲不見其形流傳西竺未達東土奘公特往求之依戒賢大論師西竺稱為正法藏居那蘭陀寺座下萬衆奘公往依之居上首十人之列親傳授歷年時依戒賢學瑜伽歷五年之久歸長安往返之間已十七年矣傳窺基尉遲敬德之猶子也從奘公出家英敏絶倫深得奘公之道通因明善三支奘公譯瑜伽論未畢有僧盜聽歸而宣講門人以告奘曰彼雖能講未通因明不足取也乃以因明傳於窺基基師善用三支比量之法能立能破盜聽者無如之何矣三支者宗因喻也廣如因明論説成唯識作述記成唯識論西竺作者有十家基師乃啓奘公欲擷十家之精華糅成一部奘公許之基師自任纂輯之事而成此書故梵策中無此本也又以平時所聞於師者多西竺口授之義作為述記以釋論文破邪宗伸正義此書一出邪宗盡破正義全伸釋門之偉烈也有現量無分別智了法自相名真現量有分別智於義異轉名似現量有比量藉相觀義有正智生名真比量虛妄分別不能正解名似比量究竟依聖教量聖教所説現量比量印證無違方可自信遍計執遍染淨法上執我執法故名遍計所執性屬非量依他性依他衆緣而起故名依他起性屬比量二者離圓成證遠離依他及遍計執識心圓明入圓成實性屬現量即是真如自性也此一宗號慈恩因玄奘法師住慈恩寺得名先談相後顯真相不自相全從識變識不自識全依性起相識俱空不真何待三論宗一名性宗一名空宗一名破相宗三論宗傳最古秦羅什來茲土鳩摩羅什龜茲國人東晉太元七年秦主苻堅遣將迎師至姚興時始抵秦為譯經師宏三論宗真空義為第一般若為諸佛母顯第一義空一切賢聖莫不由此門而得解脫也羣弟子競傳習道生僧肇道融僧睿曇影惠觀道恆曇濟皆羅什門下高弟並習此宗生公所著論議與禪宗相同惜已亡失肇公諸論至今傳誦人謂達摩未來以前通達性宗者實出羅什之門也曰中論有五百偈龍樹菩薩造青目菩薩釋破二邊之見顯中道之理曰百論有百偈提婆菩薩造正破外道傍破自餘十二門此論有十二觀門龍樹菩薩作偈自釋並破小乘外道正顯大乘深義為三論三部均是宗經論若加大智度論即為四論智論是釋經論釋大品般若經故唐吉藏姓安先世安息人後遷金陵而藏生焉為道生法師五傳弟子講三論一百餘遍法華大品智論華嚴維摩等各數十遍曾住會稽嘉祥寺人稱嘉祥大師施大功三論疏傳海東嘉祥作三論疏四十萬言傳於海東今已取來惟十二門論缺前之二門聞海東刊板時已無全本矣法藏釋十二門宗致記至今存唐法藏即賢首國師作十二門論宗致義記卷帙完全可補嘉祥之缺今已刻板流行矣密宗一名真言宗天竺屬灌頂部善無畏中印度人事達摩掬多為師通達密教受灌頂法至長安遵掬多之命入唐行道於開元四年齎梵策始屆長安適符玄宗之夢唐一行受真傳一行禪師姓張巨鹿人久依善無畏三藏盡得其傳神異顯著作疏釋大日經毗盧遮那佛密宗稱為大日如來善無畏三藏譯大毗盧遮那成佛神變加持經七卷一行筆受密宗稱為大日經一行作疏二十卷又作釋十四卷共六十萬言皆從三藏口授之義而纂集成文者也真言教始得明後之學密教者皆以大日經疏釋為宗凡稱神變疏鈔者即此本也金剛智南印度人開元七年泛海達廣州行道作法皆著奇驗翻譯祕密經典多部及不空北印度人依金剛智為師盡傳其道接踵來廣流通以上四尊者皆宏密教神異超羣當時君臣士庶奉之若佛灌頂法不輕授非法器轉獲咎受灌頂法者毗盧遮那五智灌頂頓入佛乘非具金剛種性不能傳受立禁令自明始祕密宗敕停止去聖遙遠人情澆漓能受此法者甚為難得明時特申禁令不準傳授密教恐非其人反有害於法門也佛制建壇行道若非金剛阿闍黎傳授即名盜法淨土宗一名蓮宗晉慧遠姓賈氏雁門樓煩人博極羣書尤善老莊為道安法師之高弟住匡廬見廬山間曠可以息心欲立精舍感山神闢地輸材因名其殿曰神運即東林寺也結蓮社德不孤師專倡淨土法門道俗皈依者日衆共結蓮社得一百二十三人同願往生極樂國土魏曇鸞雁門人家近五臺歷觀聖迹發心出家念世壽短促欲求仙術以永其年渡江而南訪陶隱居盡得其傳修妙觀還至洛中逢天竺三藏菩提留支問以長生之道留支曰此方何有不死之法縱得成仙終受輪轉乃以觀經授之曰此真不死法也鸞遂焚仙方而修妙觀作往生論注二卷支那蓮宗著述推為巨擘生品高瑞相現臨終之日華蓋幢幡高映庭宇異香芬郁天樂盈空人皆見之知其生品最高也唐道綽姓衛并州汶水人十四歲出家講大涅槃經二十四遍景慕曇鸞淨土之業繼其後塵住玄中寺道俗赴者彌衆講觀無量壽佛經將二百遍瑞應甚多不可具述著有安樂集二卷現行於世暨善導不知何處人見西河綽禪師九品道場講誦觀經大喜曰此真入佛之津要也長安道俗受化往生者不可勝數人見其念佛一聲有一光明從口中出百聲千聲亦復如是著有觀經疏及各種淨土典籍傳世唱專修為妙道綽善二公提唱專修其言曰修餘行業多劫方成唯此法門速超生死誠為蓮宗要訣也此法門三經説大藏之中專説彌陀淨土者有三部經大經該無量壽經二卷人稱為大本説彌陀因地修行果滿成佛國土莊嚴攝受十方念佛衆生往生彼國等事該括無遺所攝之機通於聖凡凡位具攝三輩唯除五逆誹謗正法其餘均為所攝可謂廣矣小經切阿彌陀經一千八百餘言人稱為小本略説西方淨土依正莊嚴等事令人執持名號一心不亂即得往生最為切要此經所攝揀除小善根福德因緣唯攝一類純篤之機觀經語最驚人許五逆得往生觀無量壽佛經攝機最廣十惡五逆臨終苦逼十聲稱名即得往生或疑十惡五逆之人善根全無佛云何接答曰即五逆中已可見夙世善根矣若不見佛不能出佛身血若不與羅漢相遇不能殺阿羅漢若非自身出家不能破和合僧既能出家見佛見阿羅漢然後五逆方能具造其夙世善根正非淺鮮所以聞教回心其力甚大也唯誹謗正法者自生極重障礙雖聞善知識教亦不信從倘能聞即信服痛自懺悔亦得往生但謗法而能改悔者實難中之難是故經文略而不説一切衆生本源性地與十方諸佛無二無別雖造極重惡業受無量苦報而本性未嘗染也一念回光如來悉知悉見以同體大悲攝歸淨域決非業力所能牽纏世人云帶業往生者隨情之言耳實則善惡因果皆如空花空本無花捏目所成豈有業之體相為亡人所帶而往生淨土者哉三藏教所不攝遍尋教典唯華嚴經隨好光明功德品阿鼻獄中夙根成熟蒙光頓超觀經下品下生罪大惡極能於急迫之際脫離極苦往生極樂一切教典所未曾説也佛願力誠難測彌陀願力非但凡小不能測度即多劫修菩薩道者亦不能知一稱名衆罪滅至心稱彌陀名號一聲能滅八十億劫生死重罪何况淨念相繼長時無間也臨終時佛來接彌陀光明遍照十方念佛衆生攝取不捨衆生淨眼未開不能知見至臨終時意根命根齊斷後念未起剎那之間佛現在前即脫三界火宅矣下中上根不齊衆生品類萬別千差彌陀願力平等無二一句佛同生西千句萬句即是一句前句已滅後句未生當念一句剎那不住念佛之心不緣過去不緣未來但緣現前一句以為往生正因此是萬修萬人去之法也久久純熟能緣之心忽然脫落無念而念念即無念即名理一心生品更高既生西皆不退此土修行難進易退隔陰之迷言之可怖修習信心必經萬劫入初住位方得不退具縛凡夫一生淨土即得不退所以超勝他宗也親見佛得授記見佛遲速在乎此生修行之巧拙耳既得見佛聞法歡喜證無生忍即蒙佛授記得授記已回入娑婆慈悲度世圓滿種種波羅密門證入種種菩薩智地何有一法能出此宗之外耶淨土宗真簡要差別中之平等各宗一致平等中之差別各宗不同求其至簡至要者無過此宗他宗難而此宗易他宗緩而此宗速曷不擇其易而速者行之而以一門攝一切法門耶協時機法運盛衰古今易致當今之世求其協時逗機者無如此法妙中妙佛法無一不妙而淨土法門尤衆妙中之最妙也問曰佛法平等君獨稱讚淨土何也答曰今時有識者莫不以學堂為重取喻而言西方淨土是極大學堂耳彌陀接引十方衆生往彼就學供給飲食衣服不需學費不定人數不限年時其地界廓徹無邊其建立長遠無極入其校者無論何等根器至證入無生忍時為初次畢業或在彼土進修或往他方教化均隨其願自此以後歷十住十行十回向三賢位滿將入初地時為第二次畢業再從初地以去至等覺後心證入妙覺果海為第三次畢業此論次第門若論圓頓門一修一切修一證一切證圓頓次第互攝互融極而言之十方三世種種教法無一不備是故一切諸佛莫不讚歎奈何世人流浪生死之中頭出頭沒不求出離其愚為何如耶懺法上十宗已説完結上起下懺悔法更須探普賢行願品懺除業障文云過去世中所作惡業無量無邊若此惡業有體相者盡虛空界不能容受末云我此懺悔無有窮盡學者慎勿以此生未造惡業而不修懺悔法也慈悲懺東土懺法此為最古後人呼為梁皇懺何人集徵問也志公等高僧十寶志禪師與高僧十人共集此懺梁武帝心至誠度故妻脫蟒形蕭梁武帝之原配郗夫人嫉妒為因死墮蟒類現形宮中訴之於帝求脫苦果帝請高僧撰集懺法建壇行道後見郗氏冠服來謝云仗懺力已生天矣唐悟達名知玄姓陳眉州人唐懿宗封為悟達國師有夙業師在漢時為袁盎説景帝殺朝錯以謝七王朝錯死後世世欲報此讎以盎十世為高僧不得其便人面瘡生於膝至唐時師膺帝王寵遇榮幸念起怨家得便遂附其膝而為人面瘡痛不可忍遇神僧為洗冤師憶嚮時調護癩僧供給備至僧臨別囑曰子後有難可往西蜀茶籠山相尋至是往訪之僧出而相迎告以所苦僧曰巖下有泉明旦濯之即愈三昧水澆即痊黎明引至泉所瘡作人言具述夙因且曰蒙迦諾迦尊者洗我以三昧之水從此不與汝為冤矣掬水一澆其瘡即愈回顧僧寺已失所在作水懺後世傳因作慈悲三昧水懺法三卷傳之後世如法行利無邊世人但能至誠懺悔解冤釋結捷如影響此懺及前文所述梁皇懺并依佛經所集各種懺法皆是利生之寶筏也諸法為學者須知法世間法出世間法略説萬法廣説無量染與淨隨生死流名染法六凡法也逆生死流名淨法四聖法也善分別智慧觀察捨染還淨方是修行之正軌也五蘊色受想并行識色即質礙受即領納想即思想行即遷流識即了別初一是色後四是心此五蘊蘊者積聚義亦名五陰陰即蓋覆義總名積集有為蓋覆真性也本空寂心經云照見五蘊皆空度一切苦厄先以色不異空空不異色色即是空空即是色四句顯色蘊空次云受想行識亦復如是二句例四蘊空既五蘊皆空則當處寂滅矣六根眼耳鼻舌身意眼能見耳能聞鼻能嗅舌能嘗身能覺意能知此六根根即能生之義以能生六識故有浮塵根勝義根之別浮塵根者眼如蒲萄朵耳如新卷葉鼻如雙垂爪舌如初偃月身如腰鼓顙意如幽室見勝義根者即如來藏性顯發妙用寄於六根而能見聞嗅嘗覺知也應須記當知浮塵根因四大假合而成若非勝義根即同死人六塵色聲香味觸法色謂明暗質礙等聲謂動靜美惡等香謂通塞香臭等味謂鹹淡甘辛等觸謂離合冷暖等法謂生滅善惡等此六塵塵即染汙之義以能染汙情識而使真性不能顯發故又名六賊以能劫奪一切善法故亦須識識得塵即是賊不被他染汙劫奪則賊為我用能以六塵而作佛事矣十二處前六根與六塵十二處常相親處者方所也言根在內塵在外眼唯對色耳唯對聲等各有一定方所若融歸真性則無方所可得矣亦名十二入以內六根外六塵互相涉入故也十八界根塵接有六識眼識耳識鼻識舌識身識意識十八界從此立界者各成界限也六根為內界六塵為外界六識為中界眼根色塵內外相對於其中間生於眼識則成三界六根六塵相對而生六識則成十八界若融歸真性則無界限可得矣轉八識成四智末那識為第七阿賴耶第八識八種識為心王上文六識眼耳鼻舌身為前五識意為第六識末那為第七識即染汙意也阿賴耶為第八識即含藏識去後來先作主公者也此八種識名為心王以染淨諸法由此而生故上明八識下明四智轉成智性發光如來藏性為識所障其光不顯若轉成四智則性地發光矣下列四智名大圓鏡轉第八識為大圓鏡智平等性轉第七識為平等性智妙觀察轉第六識為妙觀察智成所作轉前五識為成所作智此四智一心圓四智皆從一心圓現八識轉體用全八識未轉體用狹劣八識既轉體用全彰大圓鏡智體也餘三智用也問楞嚴經中説五陰六入十二處十八界之後即説七大此中何以不説答曰雖不列七大名而七大已具足矣下文世界相中地水火風空即是五大上文之六根即是根大八種識即是識大若再標出便成賸語三身曰法身梵語毗盧遮那此云遍一切處法身佛也曰報身梵語盧舍那此云淨滿報身佛也曰應身一曰化身梵語釋迦牟尼此云能仁寂默應身佛也是三身世人但知應身不知法報二身故見解狹劣不能領會全體大用必須透徹三身之義方可與談此道也自受用謂諸如來內智湛然照真法界盡未來際常自受用廣大法樂他受用為他機所感而現此身謂諸如來由平等智為十地菩薩現大神通轉正法輪令他受用大乘法樂一報身説二用因自他受用説為自報身他報身胎生身即八相成道之身八相者從兜率天退入胎住胎出胎出家成道轉法輪入於涅槃變化身無而忽有種種異相此二種皆應身應衆生根隨緣示現約為三法身報身應身開為五法身自報身他報身胎生身變化身相無定隨機覩法身無相可見菩薩見報身隨位增進相好轉勝二乘凡夫見應身隨於六道各見不同五眼有肉眼假父母氣血所成即人中能見之眼見近不見遠見前不見後見內不見外見晝不見夜見上不見下因有色質障礙故也有天眼諸天因修禪定而得此眼遠近前後內外晝夜上下皆悉能見以無色質障礙故也有慧眼二乘之人以所得慧眼觀一切法皆空不見有衆生相及滅一切異相捨離諸著不受一切法也有法眼菩薩為度衆生以清淨法眼遍觀一切諸法能知能行亦知一切衆生種種方便門令修令證也并佛眼佛具前四眼之用無不見知如人見極遠處佛見則為至近人見幽暗處佛見則為顯明乃至無事不見無事不知無事不聞聞見互用無所思惟一切皆見也名五眼人只一種天具二種二乘具三種菩薩具四種佛具五種見所見皆無限別而言之肉眼見現前色天眼見障外色慧眼見真空法眼見俗諦佛眼見第一義諦似有分限通而言之皆無分限何則五眼皆是如來藏中性見覺明覺精明見清淨本然周遍法界所以十信位中父母所生肉眼徹見大千世界能見所見皆無限量矣六通天眼通能見六道衆生死此生彼苦樂之相及見一切世間種種形色無有障礙天耳通能聞六道衆生苦樂憂喜語言及世間種種音聲他心通能知六道衆生心中所念之事宿命通能知自身一世二世三世乃至百千萬世宿命及所作之事亦知六道衆生各各宿命及所作之事神境通身能飛行山海無礙於此界沒從彼界出於彼界沒從此界出大能作小小能作大隨意變現神通自在漏盡通漏即三界見思惑也阿羅漢斷見思惑盡不受三界生死是名漏盡聖與凡各不同外道鬼神天仙凡通也聲聞緣覺菩薩如來聖通也凡位除漏盡只有五通各各大小不同聖位具六通唯菩薩不證漏盡隨位淺深神通各別四諦曰苦集苦即生死苦果集即惑業苦因此二者世間法也曰滅道滅即涅槃樂果道即道品樂因此二者出世間法也四諦法四法通名諦者審實不虛聲聞法也須尋討誡令衆生厭苦斷集慕滅修道離苦得樂也十二因緣自無明至老死無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死此十二因緣亦名十二有支緣覺法也舉初後以該中間耳十二因為緣起一曰無明亦名煩惱二曰行謂造作諸業此二支乃過去所作之因也三曰識謂起妄念初託母胎也四曰名色從託胎後生諸根形也五曰六入於胎中而成六根也六曰觸出胎後六根對六塵也七曰受謂領納世間好惡等事此五支乃現在所受之果也八曰愛謂貪染五欲等事也九曰取謂於諸境生取著心也十曰有謂作有漏之因能招未來之果此三支乃現在所作之因也十一曰生謂受未來五蘊之身也十二曰老死謂未來之身既老而死此二支乃來世當受之果也此十二因緣該三世因果展轉因依互為緣起無有休息順流轉衆生順之為流轉門逆還滅緣覺逆之為還滅門當處空無分別菩薩見其本性空寂無流轉還滅之可得故心經云無無明亦無無明盡乃至無老死亦無老死盡六度布施度梵語檀那波羅密此云布施到彼岸言布施度者省文也有三種施一財施二無畏施三法施行施者治慳貪也持戒度梵語尸羅波羅密此云持戒到彼岸戒有三聚一攝律儀戒二攝善法戒三饒益衆生戒持戒者治雜染也忍辱度梵語羼提波羅密此云忍辱到彼岸忍有三種一耐他怨害忍二安受衆苦忍三法思勝解忍行忍辱者治嗔恚也精進度梵語毗梨耶波羅密此云精進到彼岸精進有三種一擐甲精進二攝善法精進三饒益有情精進行精進者治懈怠也禪定度梵語禪那波羅密此云靜慮到彼岸禪有三種一世間禪二出世間禪三出世間上上禪修禪定者治散亂也智慧度梵語般若波羅密此云智慧到彼岸般若有三種一文字般若二觀照般若三實相般若修般若者治愚癡也自他苦從此度既能自度又能度他離苦得樂莫不由此道也又有説十度者從第六度開出四度七曰方便度八曰願度九曰力度十曰智度或疑智度與般若度有何分別答曰第六根本智第十差別智開之則為十約之仍為六要以第六為宗本法也四無量心慈與悲慈名愛念即與樂之心悲名愍傷即拔苦之心喜與捨見人離苦得樂其心悅豫名之為喜於所緣衆生無憎愛心名之為捨四無量所緣衆生既無量能緣之心亦無量稱聖者此即菩薩利益衆生之廣大心也涅槃四德曰常樂窮三際而無改曰常在衆苦而不干曰樂曰我淨處聖凡而莫拘曰我歷九相而非染曰淨此四德涅槃證如來所證故名涅槃四德十界有情界説六凡三惡道三善道輪回不息説名有情世間三途苦須先論論平聲三途即三惡道先論者令人聞而生畏速求出離也曰地獄八大地獄皆受火燒亦名八熱次則八寒地獄又有小地獄其數衆多皆是五逆十惡謗法衆生所生問曰今時既以大地為圓球此等地獄當在何處答曰八寒地獄應在兩極彼處半年為晝半年為夜堅冰成山高崖深谷人不能至地獄衆生在彼受苦至日出時橫繞地平而轉漸轉漸高至二十餘度冰山因融化而移動有時相觸則成合山地獄至於八熱及無間等獄應在地球之內蓋地球裏面有堅固石殼殼內大火充滿火中有流質如煬銅如沸鐵即是受苦衆生灌口炙身之物也此汁隨火山溢出變而為鐵石黑色光亮統地球而論火山不下數百處歷歷可驗也曰餓鬼種類甚多略説有三十六廣説無量皆是慳貪衆生所生曰畜生此道種類極多經中説有三十四億差別約而言之不出飛禽走獸鱗介昆蟲等類以衆生雜業感果而生其中苦無比地獄極苦餓鬼次之畜生又次之皆非言語所能形容也曰天道欲界六天自下向上説四王天忉利天夜摩天兜率天化樂天他化天色界四禪初禪三天梵衆天梵輔天大梵天二禪三天少光天無量光天光音天三禪三天少淨天無量淨天遍淨天四禪九天福生天福愛天廣果天無想天無煩天無熱天善見天善現天色究竟天無色界四天空無邊處識無邊處無所有處非非想處三界共二十八天欲界諸天放逸過度天王示以未來世苦聞者竦然色界依禪定住報盡亦受輪轉無想是外道天力盡決定墮落唯無煩以上名五不還天修聖道者之所寄托至於無色四天或成鈍阿羅漢或窮空不歸迷漏無聞轉入輪回而不自覺曰人道人有八苦生時苦老時苦病時苦死時苦怨憎會苦愛別離苦求不得苦五陰熾盛苦若能知此八苦早求出離則念佛往生之心萬牛莫挽矣曰修羅梵語阿修羅此云非天福力等天而無天德為多嗔慢故又有稱五道而不列修羅者以修羅攝於四趣也楞嚴經云從卵而生鬼趣所攝從胎而出人趣所攝因變化有天趣所攝因溼氣有畜生趣攝樂事少諸天防退人多憂惱修羅多瞋道眼觀之何者而可樂耶曰聲聞入道次第從五停心四念處以至四加行而證四果初果須陀洹二果斯陀含三果阿那含四果阿羅漢名無學位聲聞之極果也曰緣覺亦名辟支佛觀十二因緣而證道果居聲聞之上出有佛世名為緣覺出無佛世名為獨覺取滅度為獨樂斷見思惑盡證有餘無餘涅槃出三界分段生死居方便有餘土曰菩薩凡夫發四宏願精勤向道直至十信位名凡夫菩薩漸教行人從十住以去直至等覺位名菩薩菩薩圓頓行人從十住初心便成正覺自此以去位位圓修三十二應隨機示現名佛菩薩曰如來亦名婆伽梵極果之稱共有十號如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊撫衆生如嬰孩諸佛菩薩等觀衆生猶如一子常以大悲水饒益衆生願一切衆生同成正覺此四聖聲聞緣覺菩薩如來并六凡天人阿修羅地獄鬼畜生為十界一性含十種法界不出真如自性器世間既論身上文説十界正報須論土下文説依報經中言土者即所住之世界也土為依土為所依身為主身為能依四大洲東弗于逮此云勝身南閻浮提此云勝金亦名南贍部洲西瞿耶尼此云牛貨北鬱單越此云勝處亦名北俱盧洲共鐵圍四大部洲在須彌山四面大鹹水海中外有鐵圍山圍之七金山一雙持山二持軸山三擔木山四善見山五馬耳山六象鼻山七持地山繞須彌七重金山七重香水海圍繞須彌山須彌山高八萬四千由旬四王天居山腰忉利天居山頂為大地一須彌山四大部洲大海鐵圍共成大地風力持大地之外皆是虛空無所依傍為風力所持而得安住水火金不相離水輪火輪金輪互相依持成此地輪水輪含十方界楞嚴經云寶明生潤火光上蒸故有水輪含十方界性流動如何載既云含十方界則八方上下無不遍矣水是流質豈不散入空中何能常附於地業力持得自在乃衆生業力所持水能含裹十方不至散漫無歸也風金摩火現彩經云風金相摩故有火光為變化性此相摩而生之電氣遍於寰宇激則現出火光近北極處有時見半圓光彩照耀空中名北方曉最為奇觀變化性者以電氣最能變化物質故也此非上蒸之火蓋上蒸之火在地內有時地裂而出則為火山聲震天地燼灰漫空而下熱汁奮迅而流埋沒城市斃人無算古時發現者火焰至今不息近時又有幾處發現矣菴摩果比閻浮經云阿那律見閻浮提如觀掌中菴摩羅果果體圓圓如毬彼上下與四周人與物如何留地圓如毬則上下四周人物如何安住今時環遊地球之人向東而去則從西歸向西而去則從東歸是地形果為圓球矣始知羅漢天眼早已見之佛偶然一説令後人知種種形狀皆隨衆生意樂所聞如來未嘗指為定相也楞嚴經祕密説善會通不可執楞嚴經文隱含地球之意當知佛語皆是活句若執此非彼則自生窒礙矣或問今時地球之説與釋典迥異何也答曰世界形狀皆是衆生同業妄見猶如幻化無有定實佛出世時隨衆生機感而為説法印度婆羅門教先行於世所説地形是日月繞須彌山環照四大部洲之境界佛若改變其説則是以世界為實有矣世界如果實有當現華藏時此濁惡世界置於何所若同處則相礙若異處則相形蓋華藏現時娑婆即隱業道衆生仍見娑婆而不見華藏法身大士普見華藏而復見娑婆互相涉入無雜無障可知依正二報如幻如化了無質礙也邇來地球之説世人信以為實遂疑佛經所説為非而不知楞嚴經中早已隱而言之經文深密善巧後人若會其意自能行住坐臥如處虛空不作質礙想并不作虛空想矣問須彌山如何理會答曰君不聞芥子納須彌須彌納芥子之言乎須彌既能納於芥子之內須彌不小芥子不大而法身菩薩親見須彌入芥子中會得此意則須彌山王顯於大海正是妙明心中所現影像忉利四王諸天何一而非性色真空性空真色之所發現執為實有者墮凡夫見執為實無者墮外道見離此二見心境脫然日與月繞虛空肇論云日月麗天而不周雖運行不息而未嘗動也不墮落誰之功楚辭天問之意也有過去過去如夢了無朕迹有現在現在如電剎那不停有未來未來如雲歘爾而起三世改妄念遷流故有去來之相真心絶待本無今古之殊華嚴經云一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力金剛經云過去心不可得現在心不可得未來心不可得會此意者方不被三世轉而能轉三世矣又華嚴經中説十世賢首十世章中廣明南與北西與東四正并四維東南西南東北西北謂之四隅上下通四正四隅為八方加上下通為十方觀十方人在中中無定所即以自所立處為中普觀十方不出一心所攝可謂坐微塵裏轉大法輪矣人居地據近時所測地為圓球人居地面足對地心頭皆向外故經中有仰世界覆世界側世界之説又測得地球每日自轉一周每年繞日行一大周而成四季之寒暑也經云佛坐道場地神作證言我此地是金剛臍餘方悉轉此地不動云云可為地球轉動之證地居空地乃空中一彈丸耳人在其上眇乎小哉數此地至大千世人所居之地為一世界數此大地至一千名為小千世界又數小千至一千名為中千世界又數中千至一千名為大千世界共有十萬萬大地通為一佛剎皆是釋迦佛攝化之境也凡聖居各有緣六凡以罪福因緣而居此土四聖以慈悲因緣而居此土或問經中所説他方世界無量無數凡夫未得天眼亦能略窺影像乎答曰近時天文家所測者可以比量而知其説以日為宗有多數行星繞日而轉地球其一也自體無光仗日光以為明照即以此繞日之多數地球作為一小千世界空中之恆星與日相同每一恆星有多數地球繞之即是中千世界推而至於大千世界莫不皆然凡地上之人目所能見者通為娑婆大千世界西人謂之一星林用最大天文鏡窺之空中有無數星林即是無數大千世界又有鏡中但見白迹不能察知星點者西人謂之星氣更有極大天文鏡所不能見者尤不可思議經中所謂十方微塵數大千世界可於凡夫眼中略見端倪矣同居土具云凡聖同居土即上文所説娑婆世界是也方便土具云方便有餘土佛力所現為二乘休息之處亦名化城實報土具云實報莊嚴土報身佛所居三賢十聖菩薩方能見之寂光土具云常寂光土法身佛所居菩薩隨分見於法身漸次證入分四土自台教各宗判教不同分土亦異此四土天台教所説也前二粗同居土方便土後二妙實報土寂光土法性土即理土也為法身所依謂此身土體無差別俱非色相所攝淨化土攝受一類清淨衆生染化土攝受一類雜染衆生分三土賢首教如是説從本源法性土也生枝節淨化染化二土也娑婆界染化土極樂界淨化土華藏界華藏莊嚴世界海乃毗盧遮那佛所攝實報無障礙土也華藏界內有十不可説佛剎微塵數香水海一一海中有一世界種一一世界種中有二十重世界一一重中有無量世界於中安住中央世界種第十三重極樂娑婆均在其內及餘界例十方世界海無極無盡也界非界依真諦説界即非界非界界依俗諦説非界而界重重涉各無礙入不思議解脫法門則重重涉入圓融無盡皆無障礙矣勸學學佛者首在信信為道原功德母長養一切諸善根信而解若非正解信則不真解而行解路既通非行莫階由解行至於證解行雙圓可臻實證識次第信解行證四門次第出起信論賢首宗之釋華嚴經此古今不易之法也後人不達師心自用不求正解而起邪行強制妄念以為真修縱能得定轉世便失辨邪正非但佛法之外易入邪途即學佛者不閲經論不遇明師往往走入邪途而不自覺慎之慎之宗説通靈光獨耀迥脫根塵名為宗通深入教海辭辨縱橫名為説通理事融凡夫執事而昧理二乘見理而忘事若知全理成事全事即理則得入於圓融法界破我執第一功障道之深無過我執金剛經中四相以我為首我相若破四相全消起信論顯示正義之後即説對治邪執邪執謂何即人我執法我執也二執若除二空頓顯是為入道之要門四句離凡舉一對便成四句且就有無言之若云有是增益謗若云無是損減謗若云亦有亦無是相違謗若云非有非無是戲論謗既俱有過故須遠離他如一異斷常等例此應知百非遣上文四句中每句演有無亦有亦無非有非無四句便成十六句十六句中有過去現在未來三世共成四十八句每句分已起未起便成九十六句帶根本四句即成百句皆無實義故云非也由破我執之功則四句百非纖毫不起矣妄念消真性顯真性為妄念所障隱而不現妄念若消真性自然顯露此為修行之極則也上來十六句皆就凡位解釋若通凡聖須分二門先就次第門依起信論説信即十信位解即十解位亦名十住位行即十行位并十回向位證即十地位歷位進修須經三阿僧祇劫方證佛果次就圓頓門依起信論説若離於念名為得入古德云一念相應一念佛念念相應念念佛經云不歷階位而自崇最名之為道若欲知二門同異之旨須閲大宗地玄文本論敘述古德古之人行履篤處世純厚言不誑出言誠實心不曲居心正直守清素如慧開梁時吳郡人以講經名世住揚都彭城寺竭盡施不積財豫章太守謝譓請師講經厚加嚫遺晉安太守劉業知師屢空施錢一萬師散給貧窮頃刻都盡自潔者如道林同州人居太白山屢詔不出臨終天樂鳴空異香盈室入深山遠女人師匿迹幽巖路絶攀躋終身不見女人以成其清潔之志也尊師者如道安服苦役心自甘魏常山人十二歲出家性敏形陋師輕視之使服苦役曾無怨容讀經萬言一日而畢背誦無差後遇神僧佛圖澄深入堂奧佛法由此大行孝親者如道丕為養母自忍飢後周道丕唐宗室也七歲出家年十九長安亂作負母入華山值歲大飢丕自辟穀乞食供母父捐軀為報國丕苦求骨躍出其父從征歿於戰地遵母命往收遺骸至則白骨遍野無從辨識丕竭誠祝之注想不移有骷髏從骨聚中躍出奉之歸葬其精誠所感如此高尚者如道恆避榮命入山深道恆藍田人年二十出家秦主姚興欲奪其志𢌿之高位雖令羅什道二大德勸諭亦不肯從避入深山以終老焉感應者如道生石點頭聽講經姓魏巨鹿人為羅什門下四聖之一時涅槃經來文未全師獨唱一闡提人亦有佛性衆僧以其違經而擯之師至吳郡虎丘山聚石為徒為之講經至闡提有佛性處師曰如我所説契佛心否羣石皆點頭後居廬山於講經時踞師子座而逝求通經如靈辨骨肉穿妙義顯後魏沙門靈辨博通三藏惟於華嚴不能明徹乃入清涼山求文殊開示戴經行道肉盡骨穿忽聞空中有聲教以研究經文遂豁然大悟造論一百卷演義釋文窮微洞奧沖舉者尼淨檢凌霄去身冉冉晉淨檢本姓仲彭城人聞法信樂先受十戒同志二十四人共立竹林寺後受具戒晉土有比丘尼自檢始檢蓄徒養衆清雅有則説法教化如風靡草至年七十忽聞殊香芬馥并見赤氣有一女人手把五色花自空而下檢見欣然與衆話別騰空而上所行之路有似虹霓直屬於天神解者李通玄華嚴論千古傳李長者通玄唐宗室子也學無常師迹不可測嘗遊五臺逢異僧授以華嚴大旨長者將著論釋經遇一虎導至神福山下就土龕居焉長者夕吐白光以代鐙炬有二女子執侍供饌著論畢女子遂去不復見年九十六端坐示寂白光從頂而出上徹於天後人稱為方山長者機捷者靈照女老龐公徒延佇唐靈照襄陽人龐蘊居士之女也隨父母市鬻竹器以自活其父將入滅謂靈照曰視日早晚及午以報靈照遽報曰日已午矣而有蝕也其父避席臨窗靈照即據榻趺坐而逝其父笑曰吾女機捷矣乃拾薪燔之展期七日而化舉十德歷舉古德十人七比丘一比丘尼一居士一女人四衆備矣勵初學以古德高風策勵後進依此修成正覺若能效法先德一意勤修雖根有利鈍證有遲速畢竟能成無上菩提餘韻三字偈釋典中偈頌有四字五字七字成句者三字六字偶一見之今以三字成句四句為偈凡一百八十三偈隨分説就初學所應知者約略言之如風過萬籟歇上來衆多句義如風起時萬籟齊發至此將完如風過時萬籟都息此語出莊子齊物論非有言真空觀非無言妙有觀會此意是真詮空有圓融入中道第一義諦石埭胡惠時施龍銀四十八圓刊板願誦此課本者發菩提心生極樂國見佛了生死如佛度一切光緒三十二年夏四月金陵刻經處識
