body:
  text: 石埭楊文會仁山注道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其竅此兩者同出而異名同謂之玄玄之又玄衆妙之門開章十二字直顯離言之妙若以不可道者謂是常道不可名者謂是常名則活句翻成死句矣洋洋五千言無一而非活句不知此義何能讀道德經無名天地之始無而忽有有即非有有既非有始亦無始有名萬物之母有名無體依無名起起即無起誰為其母天地萬物當體空寂也故常無欲以觀其妙承無名句來妙者緣起萬有也即無以觀於有則常無而常有矣常有欲以觀其竅承有名句來竅者空洞無物也一作徼物之盡處也即有以觀於無則常有而常無矣二者俱常不壞理而成事不離事而顯理名雖異而體則同也無亦玄有亦玄度世經世皆無二致乃此經之正宗可謂理事無礙法界矣更有向上一關若不透過猶未造極直須玄之又玄者方稱衆妙之門也此重玄法門乃神聖所證之道世人罕能領會故未詳言後世闡華嚴宗旨者以十玄六相等義發明事事無礙法界方盡此經重玄之奧也此章用有無二門交互言之以顯玄旨為道德五千言之綱領猶之心經用色空二門兩相形奪以顯實相為般若六百卷之肇端大凡載道典籍文義雖廣必有簡要之言以為樞紐耳谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤谷者真空也神者妙有也佛家謂之如來藏不變隨緣無生而生隨緣不變生即無生生相尚不可得何有於死耶玄者隱微義牝者出生義佛家名為阿賴耶此二句與釋典佛説如來藏以謂阿賴耶同意從阿賴耶變現根身器界或謂之門或謂之根奚不可者綿綿若存者離斷常二見也用之不勤者顯無作妙諦也此章言簡義幽列子以為出自黃帝書信然出生入死生之徒十有三死之徒十有三人之生動之死地者亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地釋典云生者諸根新起死者諸根壞沒又云無不從此法界流無不還歸此法界所以謂之出生入死也生之徒三句最難發明須用華嚴十世法門釋之則句句有著落矣一切釋典皆論三世獨華嚴論十世於過去世中説三世所謂過去過去過去現在過去未來於現在世中説三世所謂現在過去現在現在現在未來於未來世中説三世所謂未來過去未來現在未來未來共成九世攝歸一念則為十世此之一念非現前剎那不停之念乃是無念之念不生不滅元清淨體所以能攝九世而為十也此中生之徒十有三即是三世未來死之徒十有三即是三世過去人之生動之死地者亦十有三即是三世現在徒者類也若如前人所釋則動之死地一句與死之徒一句互相混濫且三股均分不曰三之一而曰十之三是以十為總匯舊注雖用攝生一語足成十數而三箇三字反覺浮泛故不能謂之確解也夫何故以其生生之厚此言起妄之由性本無生而生生不已者以業識恆趨於生而背於無生也既厚於生生則九世相仍流轉無極其害可勝言哉善攝生者於生起之元制其妄動也心不妄起則生相全無所以謂之善攝生也兕虎甲兵數語乃其實效不可作譬喻解破生相無明者內外一如自他不二即此幻化空身便是清淨法身尚何死地之有哉沖虛經發隱敘列子書八篇唐時尊為沖虛經與道德南華並重注道德者多於南華而注沖虛者特少在晉則有張湛在唐則有盧重元此二種現行於世考書目所載有唐殷敬順宋江遹二解求而未得也甲辰夏索居避暑取列子讀之妙義顯發多出於張盧二家之外如開寶藏如涌醴泉實與佛經相表裏信筆直書得四十二章約計全書三分之一因名之為沖虛經發隱云光緒三十年歲次甲辰秋七月石埭楊文會識目録天瑞第一列子居鄭圃列子適衛我尚何存杞人憂天地東郭論盜黃帝第二夢遊華胥列子乘風商丘開信偽襄子狩中山巫咸相壺子太古神聖周穆王第三西極化人老成子學幻尹氏治産夢分人鹿華子病忘逄子病迷仲尼第四仲尼間居陳大夫聘魯西方聖人見南郭子列子好遊文摯視疾生死道常堯治天下關尹論道湯問第五湯問夏革焦螟愚公移山夸父追日兩兒辨日扁鵲換心師文鼓琴薛談學謳來丹報讎力命第六力不勝命北宮子安命楊朱第七不録説符第八持後處先九方臯相馬不死之道簡子放生鮑子進言
