body:
  text: 清石埭楊文會仁山注孟子全書宗旨曰仁義曰性善立意甚佳但見道未徹其所言性專認後天而未達先天以赤子之心為至善殊不知赤子正在無明窟宅之中其長大時一切妄念皆從種子識內發出所説仁義亦以情量限之謂與利為反對之事以致遊説諸王皆不能入若説仁義為利國之大端而説利國當以仁義為首務則諸王中或有信而樂從者矣孟子見梁惠王王曰叟不遠千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家萬取千焉千取百焉不為不多矣苟為後義而先利不奪不饜未有仁而遺其親者也未有義而後其君者也王亦曰仁義而已矣何必曰利利者害之反也王曰何以利吾國是公利非私利也孟子曰上下交征利則專指聚斂矣與梁王問意不合故非真能破告子下篇宋牼欲罷兵將言其不利孟子以去仁義懷利斥之可見孟子以利與仁義決非並行亦不合孔子之道觀子適衛一章先言富而後言教又足食足兵民信之矣亦以富強與信交相為用至必不得已之時方去兵去食而留信未有專言信而概廢兵與食也燕人畔王曰吾甚慙於孟子陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而況於王乎賈請見而解之見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦宜乎以弟兄二字為周公文過實不足以折人心蓋周公以剛健正直之心行大公無我之事豈有私情縈懷而行賞罰於其間乎孟子曰道在爾而求諸遠事在易而求諸難人人親其親長其長而天下平上下千古縱橫萬里欲得人人親其親長其長豈可得哉然則天下無太平之日乎曰非也致亂之根在於妄想破妄顯真天下太平矣子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政歲十一月徒杠成十二月輿梁成民未病涉也君子平其政行辟人可也焉得人人而濟之故為政者每人而悅之日亦不足矣子産見人徒涉即以乘輿濟之乃偶爾之事耳孟子好責人於此可見孟子曰大人者不失其赤子之心者也從無明妄想受生而成赤子孟子不知直以此為純全之德故所談性善蓋不能透徹本原也徐子曰仲尼亟稱於水曰水哉水哉何取於水也孟子曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾苟為無本七八月之間雨集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之仲尼之歎水勿論其有本無本也觀其重歎乃歎其性德耳水性常清雖泥混之使濁而清性不改水性常靜雖風鼓之使動而靜性不改恰似人之本性是以仲尼亟稱之也孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人愛人者人恆愛之敬人者人恆敬之有人於此其待我以橫逆則君子必自反也我必不仁也必無禮也此物奚宜至哉其自反而仁矣自反而有禮矣其橫逆由是也君子必自反也我必不忠自反而忠矣其橫逆由是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉於禽獸又何難焉菩薩見此等人益加憐愍孟子乃以輕慢之心視之去聖道遠矣萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而掩之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜宮舜在牀琴象曰鬱陶思君爾忸怩舜曰惟茲臣庶汝其于豫治不識舜不知象之將殺己與曰奚而不知也象憂亦憂象喜亦喜曰然則舜偽喜者與曰否昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智豫既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道彼以愛兄之道來故誠信而喜之奚偽焉大聖應現非凡所測完廩浚井皆以神通得出瞽瞍與象均是大權菩薩成全舜之盛德孟子所解全無交涉萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉萬章曰舜流共工于幽州放歡兜于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可謂親愛之乎以世俗之情而觀古聖想帝舜在天之靈當發一笑也敢問或曰放者何謂也曰象不得有為於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接于有庳此之謂也象若怙惡不悛天子尚不畏何有於吏萬章曰堯以天下與舜有諸孟子曰否天子不能以天下與人然則舜有天下也孰與之曰天與之天與之者諄諄然命之乎曰否天不言以行與事示之而已矣曰以行與事示之者如之何曰天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫故曰天不言以行與事示之而已矣上天之載無聲無臭此善於言天者也孟子言天迹涉有為是高於天下一等耳西教盛行當以孟子為證據也萬章問曰人有言至於禹而德衰不傳於賢而傳於子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者舜薦禹於天十有七年舜崩三年之喪畢禹避舜之子於陽城天子之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之喪畢益避禹之子於箕山之陰朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也與賢與子皆天主之後世與暴與虐亦天主之天既能主何不盡棄暴虐而與聖賢則永遠太平不見亂世矣丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歷年多施澤於民久啓賢能敬承繼禹之道益之相禹也歷年少施澤於民未久舜禹益相去久遠其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也以子之賢不肖均歸於天不解天何薄於此而厚於彼耶告子曰性猶杞柳也義猶杯棬也以人性為仁義猶以杞柳為杯棬孟子曰子能順杞柳之性而以為杯棬乎將戕賊杞柳而後以為杯棬也如將戕賊杞柳而以為杯棬則亦將戕賊人以為仁義與率天下之人而禍仁義者必子之言夫告子不知自性本空故以杞柳為喻孟子以戕賊破之僅破其妄計而未顯其本原也告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人無有不善水無有不下今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也人之可使為不善其性亦猶是也告子又認隨物流轉者為性是知有妄緣而不知有真常也孟子立性善為宗就先天説則可而孟子專指後天説故非真能立亦非真能破且以搏躍激行喻人之為不善試問普天下蒼生不搏不激其能人人嚮善乎告子曰生之謂性孟子曰生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白雪之白猶白玉之白與曰然然則犬之性猶牛之性牛之性猶人之性與性本無生而以生謂性孟子即就生字上判犬牛與人性有差別是以隨業受生之識為性豈知六道智愚雖判若天淵而本原之性未嘗異也告子曰食色性也仁內也非外也義外也非內也孟子曰何以謂仁內義外也曰彼長而我長之非有長於我也猶彼白而我白之從其白於外也故謂之外也曰白馬之白也無以異於白人之白也不識長馬之長也無以異於長人之長與且謂長者義乎長之者義乎曰吾弟則愛之秦人之弟則不愛也是以我為悅者也故謂之內長楚人之長亦長吾之長是以長為悅者也故謂之外也曰耆秦人之炙無以異於耆吾炙夫物則亦有然者也然則耆炙亦有外與食色牽引妄識認作自性故有仁內義外之執孟子所辨根於內心是為得之告子初以杞柳喻性是不知性空也次以湍水喻性是不知性本無動也三以生謂性是不知性本無生也四以食色為性是不知逐物者為妄情非本性也孟子答初章以戕賊對破恰合正理其第二章告子只認隨物流轉者為性是知有妄緣而不知有真常也孟子亦祇知後天性不知先天性故此章答詞皆不合真理夫以搏躍激行喻人之為不善試使聚天下蒼生不搏不激其能嚮善者有幾人乎第三章孟子舉犬牛與人以顯差別是以隨業現行之識為性而不知六道受生雖判若天淵而本原之性未嘗異也第四章告子以仁義分內外是大錯誤孟子皆以非外辨之似頗為有理公都子問曰鈞是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者不能奪也此為大人而已矣莊子云夫徇耳目內通而外於心思鬼神將來舍而況於人乎等語正與此章相反凡人因耳目而蔽於物心蔽之也見色聞聲剎那已過心緣色聲謝落影子方造惡業孟子不知強分大小直以能思之心為大人之體未明心體無思之妙也孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫此人爵也古之人修其天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵則惑之甚者也終亦必亡而已矣須知有要人爵之心則修時已非真天爵否則豈肯棄之耶孟子曰五穀者種之美者也苟為不熟不如荑稗夫仁亦在乎熟之而已矣此喻不洽蓋為仁無論熟不熟總勝他道不知孟子心中以何為仁耶孟子曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也良知良能之語陸王之徒翕然從風然孟子此言實未見自性之用觀下文童愛親長敬兄二語申明此理可見孟子專論後天性未嘗知有先天性也謹案論語孟子二書先生欲加闡發各章均於原書加以標識未遑屬稿間有批於原書上幅者實其少分茲為最録如上蓋皆未竟之稿也編者識陰符經隱微難見故名為陰妙合大道名之為符經者萬古常法也後人撰述如緯黃帝公孫軒轅著考古之家稱陰符經廣成子授之黃帝或稱黃帝所作或稱玄女或稱風后莫綜一是唐李筌得於嵩山石壁一云驪山老姥授之李筌後人疑為李筌所為誠屬謬論統觀經意非大聖不能作上古鴻荒未闢文教之興始於黃帝故老列莊所引用者多黃帝之言此經無論何人所傳其微言奧義必出於黃帝故以題黃帝作為正上篇觀天之道執天之行盡矣天有五賊見之者昌五賊在心施行於天宇宙在乎手萬化生乎身天性人也人心機也立天之道以定人也天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆天人合發萬變定基性有巧拙可以伏藏九竅之邪在乎三要可以動靜火生於木禍發必剋姦生於國時動必潰知之修煉謂之聖人中篇天生天殺道之理也天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才既安故曰食其時百骸理動其機萬化安人知其神之神不知不神之所以神日月有數大小有定聖功生焉神明出焉其盜機也天下莫能見莫能知君子得之固躬小人得之輕命下篇瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍心生於物死於物機在目天之無恩而大恩生迅雷烈風莫不蠢然至樂性餘至靜性廉天之至私用之至公禽之制在氣生者死之根死者生之根恩生於害害生於恩愚人以天地文理聖我以時物文理哲人以愚虞聖我以不愚虞聖人以奇期聖我以不奇期聖沈水入火自取滅亡自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推而變化順矣是故聖人知自然之道不可違因而制之至靜之道律歷所不能契爰有奇器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭乎進乎象矣此經四百四十六言向稱三百言者誤也閔氏刻本立三章名目核與經意不稱顯係後人增置今不用之仍以上中下分篇學者須將正文熟讀深思體究古聖垂言之意先後脈絡一氣貫通然後披閲後之注解與自己見處是同是別方有意味若於經文未嘗措心即先閲發隱恐墮依他作解之誚想善讀書者當不以豫言為河漢也
