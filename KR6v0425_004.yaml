body:
  text: 馬鳴菩薩造陳真諦三藏譯清楊文會略注不可思議不可稱量俱俱微塵本大山王大決擇分第十二如是已說無盡無窮塵塵數量道路大決擇分次當說不可思議不可稱量俱俱微塵本大山王大決擇分其相云何偈曰不思議海中則有三種法謂三重倍故配釋應了知論曰就不可思議本大山王體性中則有三種云何為三一者法寶數量倍二者僧寶數量倍三者佛寶數量倍是名為三增幾數量作倍義耶謂增益億億十方世界之微塵數量三寶海故如其次第依道路十增一種倍應審觀察前分廣說因果位位有佛出興此分說三寶數量倍依道路十增一種倍前分之末說萬億此分說億億即是十倍也如偈不思議海中則有三種法謂三重倍故配釋應了知故末末三倍依本家說五十一位為本增益數量為末三倍者即前之三種法倍而又倍故稱末末也應廣通達引經第二十二心地修多羅中作如是說俱塵無上不可思議根本性海分中具足圓滿億億大方三德大海以大方分建立大方乃至廣說故不可思議俱俱微塵一切山王道路大決擇分第十三如是已說不可思議不可稱量俱俱微塵本大山王大決擇分次當說不可思議俱俱微塵一切山王道路大決擇分其相云何偈曰微塵道路中有十方界量五十一本位名與前說等一五十一中一一皆各各有十方界量障治三寶海如一餘亦爾配此應了知論曰就俱俱微塵道路中則有一十方世界之數量五十一根本位其名字量與前說等無有差別如偈微塵道路中有十方界量五十一本位名與前說等故就一五十一種位中一一各各有十方世界之數量煩惱大海對治大海僧寶大海法寶大海佛寶大海具足轉故如偈一五十一中一一皆各各有十方界量障治三寶海故如說一五十一種位餘一切位亦復如是如偈如一餘亦爾配此應了知故如是已說現示本體安立門次當說現示上末轉相門其相云何偈曰今此道路佛出興小無量法及化大海第二轉覺者出興中無量法及化大海第三轉覺者出興大無量法及化大海後後諸轉中如次第無超漸漸增數量論曰依一本信出興覺者總有一十方世界之數量其中一佛成道已訖則便出興小無量十方世界之微塵數量無礙自在化身大海如是數量信心大海如偈今此道路佛出興小無量法及化大海故依此佛身出興化身總有小無量十方世界之微塵數量其中一佛出興已訖則便出興中無量十方世界之微塵數量無礙自在化身大海如是數量信地大海如偈第二轉覺者出興中無量法及化大海故依此化身出興化身總有中無量十方世界之微塵數量其中一佛出興已訖則便出興大無量十方世界之微塵數量無礙自在化身大海如是數量信地大海如偈第三轉覺者出興大無量法及化大海故如是如是隨隨如如後諸轉中如次無超漸漸增數如偈後後諸轉中如次第無超漸漸增數量故舉此一隅應廣通達三重無量皆說信地大海是則舉一信位例五十一位也第一信位即能出興無量化佛故名金剛信心俱是門中亦依次第無超漸漸增進雖云漸轉而信位無有窮盡與一切位皆無窮盡也引經第二十三本品足地智修多羅中作如是說大地微塵譬喻大海履行無住法門第一轉中小無量大方微塵之數品第二轉中中無量品第三轉中大無量品第四轉中無邊無量品第五轉中無數無量品第六轉中無量無量品第七轉中不可計量無量品第八轉中具足無量品第九轉中不可說無量品第十轉中不可思議無量品乃至廣說故一切虛空一切微塵數量高王大決擇分第十四如是已說不可思議俱俱微塵一切山王道路大決擇分次當說一切虛空一切微塵數量高王大決擇分其相云何偈曰虛空微塵中則有十方量十方塵空量五十一本位一五十一中一一皆各各有如前說量障治三寶海論曰就一切虛空一切微塵數量高王分中則有十方世界之塵量十方世界之塵量五十一種根本位十方世界之塵量十方虛空之塵量五十一種根本位如偈虛空微塵中則有十方量十方塵空量五十一本位故就一五十一種根本位中一一各各有十方世界之塵量十方世界之塵量十方世界之塵量十方虛空之塵量煩惱大海對治大海僧寶大海法寶大海佛寶大海具足轉故如偈一五十一中一一皆各各有如前說量障治三寶海故如是已說現示本體安立門次當說現示上末轉相門其相云何偈曰此本王覺者前數倍十重興化宣說法大聰明能了後後諸轉中如次第無超漸漸增數量轉勝廣大轉論曰今此門中為明何義為欲現示依一本信出興覺者其中一佛譬喻譬喻之數量增益十重出興變化宣說信地既云依一本信又云宣說信地可知以初位例後位與前分同意也後後轉中漸漸增數百千萬億乃至無量無窮盡故如偈此本王覺者前數倍十重興化宣說法大聰明能了後後諸轉中如次第無超漸漸增數量轉勝廣大轉故引經第二十四地智修多羅中作如是說可一總持大周遍王之自體轉相無量無邊譬喻量說轉化時中漸增數量滿玄數量乃至廣說故以上四分應屬一切諸法俱是位十一分中說十種因果法門參差錯落千變萬化非通途教義所能該攝十二分說三寶增益數量十三分說煩惱對治大海三寶大海十四分即就障治三寶轉增數量皆屬有門且四分命名一則曰塵塵數量二三均云俱俱微塵四則曰虛空微塵夫微塵為有形之原始極而至於觸目皆是無非微塵所成故此四分判屬俱是位也獨地非亂一定一定道路大決擇分第十五各住自位名為獨地不相淆混故稱非亂一定一定者上一本一有定位也如是已說一切虛空一切微塵數量高王大決擇分次當說獨地非亂一定一定道路大決擇分其相云何偈曰非亂道路中亦有金剛位一一位各各有本存一故一百二數成位依立轉相則有五種重謂上一本一俱轉及不雜圓滿具足位論曰就獨地非亂一定一定道路分中亦有五十一種真金剛位一一位位皆悉各各有本存一以此義故一百二數成立而已位位有上一本一故成一百二數如偈非亂道路中亦有金剛位一一位各各有本存一故一百二數成故依如是位建立轉相則有五種云何為五一者上上一一轉相門二者本本一一轉相門三者俱行不離轉相門四者區區不雜轉相門五者圓滿具足轉相門是名為五如偈依位立轉相則有五種重謂上一本一俱轉及不雜圓滿具足位故第一轉相形相如何偈曰五十一種位一各攝五十一時一處轉然不可合一論曰云何名為上一一門所謂五十一種位一一位位各攝五十一時處轉若爾合集應作一體各別一轉不可合一如偈五十一種位一各攝五十一時一處轉然不可合一故如是已說上上一一轉相門次當說本本一一轉相門其相云何偈曰五十一本一一各攝五十一時一處轉然不可合一論曰云何名為本一一門所謂五十一種本一一種本一各攝五十一時處轉若爾合集應作一體各別一轉不可合一如偈五十一本一一各攝五十一時一處轉然不可合一故如是已說本本一一轉相門次當說俱行不離轉相門其相云何偈曰本一及上一互各攝諸位俱轉不捨離然不可合一論曰云何名為俱行轉門所謂本一五十一法一一各各攝上一五十一法上一五十一法亦能攝彼本俱行俱轉不相離故然各別別一時處轉不可合一如偈本一及上一互各攝諸位俱轉不捨離然不可合一故如是已說俱行不離轉相門次當說區區不雜轉相門其相云何偈曰本上一切位一一皆各各安住自家中不攝他法故論曰云何名為區不雜門所謂所有一切種種本上諸位一一各各唯安住自家中亦不移轉亦不出入亦不攝他亦不定常常恆具足遍廣大故如偈本上一切位一一皆各各安住自家中不攝他法故故以上四門皆說各住自位不可合一之法如是已說區區不雜轉相門次當說具足圓滿轉相門其相云何偈曰前所說四門一切時處等無礙自在轉名具足圓滿論曰云何名為具足轉門所謂如前所說四門一時轉一處轉異時轉異處轉一轉離轉總轉別轉無礙自在故如偈前所說四門一切時處等無礙自在轉名具足圓滿故上文既言不可合一此言具足圓滿仍不雜亂也引經第二十五摩訶衍大陀羅尼金剛神呪修多羅中作如是說一一各住自位一切一切位位各攝五十位離雜有無一稱一量法藏門海中總有二法云何為二一者是總二者是別言別者四種俱輪地故言總者四種俱輪自在轉故乃至廣說故獨地獨天一種廣大無二山王大決擇分第十六獨地者自性門也獨天者本本門也如是已說獨地非亂一定一定道路大決擇分次當說獨地獨天一種廣大無二山王大決擇分其相云何偈曰此山王體中則有二種門謂自性本本如次應觀察論曰就此獨地獨天一種廣大無二山王體中則有二門云何為二一者本一自性位地門二者本一之本位地門是名為二如其次第應審觀察如偈此山王體中則有二種門謂自性本本如次應觀察故自性位地形相如何偈曰彼本一法中不待他自然有五十一位是名自性位如是五十一一一皆各各有五百法門周遍廣大轉論曰云何名為自性位地所謂如前所說五十一種本一法中一一各各不待他力自然自性有五十一真金剛位是故說言自性位地不待他力自然各有五十一位即是自性本具為此分獨地法門如偈彼本一法中不待他自然有五十一位是名自性位故如是各各五十一位一一各各有五百法門之大海亦周遍轉亦廣大轉如偈如是五十一一一皆各各有五百法門周遍廣大轉故於此位中亦如前說五種大門具足具足圓滿圓滿應審思擇如是已說本一自性位地門次當說本一之本位地門其相云何偈曰五十一本法亦各有本法名空空空一此中亦有位論曰本一所依空空空一中亦有諸位一一位位皆悉各各十萬法門具足圓滿無闕失轉空空空一為本一所依即是獨天法門前門各有五百法門稱之為地此門各有十萬法門故稱為天於此位中亦有前說五種大門具足具足圓滿圓滿應審思擇引經第二十六品論修多羅中作如是說禪定摩訶衍體中則有三大門云何為三一者上地安立廣大海會門二者宗本有有有一門三者根本空空空一門如是三門皆有諸位具足圓滿同轉異轉等乃至廣說故上地者位位超勝也宗本者本一自性也根本者本一之本也獨一無二山王自在道路大決擇分第十七從獨地獨天法門所得之果名為獨一無二山王如是已說獨地獨天一種廣大無二山王大決擇分次當說獨一無二山王自在道路大決擇分其相云何偈曰自在道路中總有千重轉謂本上一中各各五百故論曰就此無二山王自在道路分中總有千重差別轉相所謂本上中各各五百故如偈自在道路中總有千重轉謂本上一中各各五百故故本轉形相當如何耶偈曰向本一下轉一空一有轉乃至第五百餘位亦如是論曰今此偈中為明何義為欲現示依本一門向下下轉有一金剛空一金剛如其次第一一現前漸漸轉入乃至第五百如是亦復餘諸位中漸漸轉入乃至第五百無有窮盡無有邊際無有始終具足具足圓滿廣大常恆轉故如偈向本一下轉一空一有轉乃至第五百餘位亦如是故上轉形相例此應知一空一有向下下轉至五百重向上上轉至五百重則成千重轉相引經第二十七因明性德修多羅中作如是說無二一天父子法藏本一自性子也本一之本父也上上轉去有其始終無有窮盡下下轉入有其始終無有窮盡有始終者從信等位起至五百量故無窮盡者法藏之海極廣大故乃至廣說故摩訶無二山王最勝高頂一地大決擇分第十八如是已說獨一無二山王自在道路大決擇分次當說摩訶無二山王最勝高頂一地大決擇分其相云何偈曰本上無窮盡建立如是名所餘一切位亦如是應知論曰今此偈中為明何義為欲現示本本無窮上上無窮本上無窮上本無窮一一無窮多多無窮同同無窮異異無窮等等無窮別別無窮有窮無窮無窮無窮周遍廣大具足圓滿故如偈本上無窮盡建立如是名所餘一切位亦如是應知故引經第二十八摩訶衍海修多羅中作如是說禪定摩訶衍海中一千二百無窮盡品具足俱轉乃至廣說故說十二無窮引經一千二百無窮盡品以為四分歸宿金剛經云發阿耨多羅三藐三菩提心者於法不說斷滅相亦此義也所云有窮無窮者如東坡言自其變者而觀之則天地曾不能以一瞬自其不變者而觀之則物與我皆無盡也苟知此義則無一法而有窮盡矣以上四分核其文義應屬一切諸法俱非位或疑俱非位無可演說何故四分之中重重闡揚五十一位極而至於各各五百各各十萬法門與俱非義云何得通答曰第六分云五位之中各具五位位位各有根本五十一位則知俱非位中具餘五位位位亦有五十一位依此義判於理無違且以獨地獨天命名中間屢說不可合一之語既云本一自性復云本一之本玄而又玄故知屬於俱非位也𭺔𣅍陀尸梵迦諾道路大決擇分第十九𭺔丙英切𣅍方膺切𭺔等七字梵語未翻如是已說摩訶無二山王最勝高頂一地大決擇分次當說𭺔𣅍陀尸梵迦諾道路大決擇分其相云何偈曰𭺔𣅍道路中七變對修行以為道路量無有餘行相論曰今此偈中為明何義為欲現示𭺔𣅍道路中唯以七變對為其界量無餘相故如偈𭺔𣅍道路中七變對修行以為道路量無有餘行相故云何名為七變修行形相如何偈曰七變有三種功德過患等五十一位中上下七變轉增長功德品及諸煩惱海論曰七變修行總有幾數有三種故云何為三一者功德七變二者過患七變三者等量七變是名為三如偈七變有三種功德過患等故言變相者五十一種金剛位中向上上轉向下下轉具足七變增長功德增長過患廣大轉故如偈五十一位中上下七變轉增長功德品及諸煩惱海故且過患七變形相如何耶偈曰最第一變中上各增百數下各增千數各障一二德後六變如次增倍倍數轉論曰第一變中增幾數轉障幾淨法謂上轉時中一一位位各增百數煩惱品類障一淨法若下轉時中一一位位各增千數煩惱品類障二淨法如偈最第一變中上各增百數下各增千數各障一二德故後六變中功德過患如其次第增倍數故如偈後六變如次增倍倍數轉故如是已說現示過患七變門次當說現示功德七變門其相云何偈曰最第一變中上各增一億下各增二億漸漸次第轉後六變如次增倍倍數轉不壞患數量為功德變作論曰第一變中增幾數轉謂上轉時中一一位位各增一億數功德品類漸漸而轉若下轉時中一一位位各增二億數功德品類漸漸轉故如偈最第一變中上各增一億下各增二億漸漸次第轉故後六變中如其次第增倍數故如偈後六變如次增倍倍數轉故如是功德煩惱品類為斷不斷上問下答唯變作轉不動壞故如偈不壞患數量為功德變作故如是已說現示功德七變門次當說現示等量七變門其相云何偈曰最第一變中各上增一千各下增二萬等數量漸轉後六變如次增倍倍數轉無斷障差別唯對量建立論曰第一變中增幾數轉謂上轉時中一一位位各增一千如次第轉若下轉時中一一位位各增二萬如次第轉如偈最第一變中各上增一千各下增二萬故其數量品有增減不上問下答唯平等量非差別量如偈等數量漸轉故後六變中如其次第增倍數轉謂一倍故如偈後六變如次增倍倍數轉故如是七變亦無照相亦無覆相唯平等量分分建立如偈無斷障差別唯對量建立故此中次第功德七變以為其終應審觀察引經第二十九甚深種子修多羅中作如是說明達裏藏中唯有三變以七為量不增不減譬如七步蛇七葉樹法爾道理初唯染品中染淨俱後唯淨品乃至廣說故三種變相由染品轉成淨品七變之後照相覆相俱無泯同法性矣𭺔𣅍陀尸梵迦諾本王本地大決擇分第二十如是已說𭺔𣅍陀尸梵迦諾道路大決擇分次當說𭺔𣅍陀尸梵迦諾本王本地大決擇分其相云何偈曰此本王體中有三種百變名次第如前等無有差別論曰就此本王體中則有三種百變修行名及次第如前所說如偈此本王體中有三種百變名次第如前等無有差別故如是三變形相如何偈曰如是三變中初各如次第十千百億數後九十九變如次增倍數漸漸次第轉論曰就過患百變門中上及并下第一變中增十億數次第漸轉就功德百變門中上及并下第一變中增千億數次第漸轉就等量百變門中上并及下第一變中增百億數次第漸轉如偈如是三變中初各如次第十千百億數故後九十九變中皆悉各各如其次第增倍數轉如偈後九十九變如次增倍數漸漸次第轉故引經第三十大海山王地地品類修多羅中作如是說如來藏體中有三流轉品以百數為量無超次第漸漸轉去如是三中初功德少其過患多中數量等後唯功德乃至廣說故經中稱為流轉品順流而趨薩婆若海故𭺕尸梵諾本王道路大決擇分第二十一𭺕甘火切𭺕等四字梵語未翻如是已說𭺔𣅍陀尸梵迦諾本王本地大決擇分次當說𭺕尸梵諾本王道路大決擇分其相云何偈曰本王道路中有三種千變名如前說量各初變如次增百千萬億各後一切變如次倍數轉住心應觀察論曰就𭺕尸梵諾本王道路分中則有三種千變修行其名次第同前所說如偈本王道路中有三種千變名如前說量故如是三種第一變中如其次第增百億千億萬億數上下一量漸漸轉故如偈各初變如次增百千萬億故各後諸變如其次第增倍數轉應審思擇如偈各後一切變如次倍數轉住心應觀察故引經第三十一則修多羅中作如是說如來藏佛上下門中有三種修行數以千為量如是三品以多億轉出生增長廣大周遍法門海藏乃至廣說故摩訶𭺕尸梵諾母原主天王大決擇分第二十二如是已說𭺕尸梵諾本王道路大決擇分次當說摩訶𭺕尸梵諾母原主天王大決擇分其相云何偈曰摩訶天王中有三種億變名次第如前各初變如次一二三十方世界數量轉所餘一切變如次倍數轉論曰就摩訶主天王體中則有三種億變修行名字次第同前所說如偈摩訶天王中有三種億變名次第如前故如是三種第一變中如其次第增一十方二十方三十方數轉如偈各初變如次一二三十方世界數量轉故餘一切變如其次第倍數轉故如偈所餘一切變如次倍數轉故引經第三十一總字法轉大輪修多羅中作如是說佛陀摩訶本藏王即原主天王地地中則有三行云何為三一者下億轉行二者中億轉行三者上億轉行初行出生一大方界量下眷屬海中行出生二大方界量等俱轉海後行出生三大方界量上眷屬海乃至廣說故上來四分以意揆之應屬無餘究竟總持位蓋此四分中唯以變對為修行即是總持法門也偈云無有餘行相即是無餘究竟也但論文變相甚難領會准楞伽經中有不思議熏不思議變之語乃真如內熏之力能令無明妄心變成智慧德相始從七變以至百變千變億變極而至於妙覺果海皆從熏變而成也更有灌頂部內即身成佛之義亦此位攝一種功德純純無雜大圓滿地道路大決擇分第二十三如是已說摩訶𭺕尸梵諾母原主天王大決擇分次當說一種功德純純無雜大圓滿地道路大決擇分其相云何偈曰功德道路中有二千五百五十法門海五十一位中一一皆各各具五十位故亦一一位中有性相本末一萬二百數修多羅中說總一萬二千七百五十數取彼總本數如法應觀察以如是數量為道路分界論曰就一種功德純純無雜大圓滿地道路分中總有二千五百五十法門大海甚深甚深廣大廣大如偈功德道路中有二千五百五十法門海故以何義故數如是成應可了知所謂五十一種位中一一各各具五十故此義云何所謂五十信心五十念心乃至五十如來地各差別故如偈五十一位中一一皆各各具五十位故故亦一一位位各各具足性相本末之四法故一萬二百數成立而已如是四事云何差別謂如其次第不可思議說故性明了現覺說故相能生長因說故本所生長果說故末如偈亦一一位中有性相本末一萬二百數故無量法門不出性相本末四事故以四事為方說也若爾此方說文云何通耶引經第三十三謂金剛等地一行三昧修多羅中作如是說無雜無亂一一同同非惡非患吉祥地地軌則門中總有一萬二千七百五十法門彼修多羅中如是說者總別總故二千五百五十法門為總一萬二百法門為別總與別合而計之共有一萬二千七百五十法門如偈修多羅中說總一萬二千七百五十數取彼總本數如法應觀察故今此道路以之為量有別法門道路無量法門亦無量唯以此數為其極量無別法門以此數量總括一切無缺無餘如偈以如是數量為道路分界故一種功德摩訶本地明白離惡品藏大決擇分第二十四如是已說一種功德純純無雜大圓滿地道路大決擇分次當說一種功德摩訶本地明白離惡品藏大決擇分其相云何偈曰以下本地品藏中起至二十五分一者橫轉遍到止共三百二十九字明藏闕今從麗藏增補完全本地品藏中有六億三萬七千五百數廣大法門海前說諸位中一一皆各各攝別五十位法門如是廣性相本末四例此廣通達六億麗藏誤作一億今改正下同論曰就一種功德摩訶本地明白離惡品藏中總有六億三萬七千五百數廣大法門海甚深甚深周遍周遍如偈本地品藏中有六億三萬七千五百數廣大法門海故以何義故數如是成如前所說一切位中一一各各攝差別轉五十位故法門之海如是廣大如偈前說諸位中一一皆各各攝別五十位法門如是廣故前文總有一萬二千七百五十法門各各攝別五十位則成六億三萬七千五百法門性相本末四種事中以例配當更復增數轉勝廣大應審思擇如偈性相本末四例此廣通達故摩訶本地具足品藏非患道路大決擇分第二十五如是已說一種功德摩訶本地明白離惡品藏大決擇分次當說摩訶本地具足品藏非患道路大決擇分其相云何偈曰本地道路中則有二種門謂橫轉豎轉以之為門量論曰就摩訶本地具足品藏非患道路分中則有二門云何為二一者橫轉遍到俱行門二者豎轉無雜一路門是名為二如是二門以為門量如偈本地道路中則有二種門謂橫轉豎轉以之為門量故且橫轉門形相如何偈曰四種事位中有總及別中各增十重轉無前後一時其法門數量例前應了知論曰今此偈中為明何義為欲現示性相本末四種事中各各有總別之位中一一位位皆悉各各增十重數無前無後一時俱轉則是橫轉遍到俱行門形相故一乘教中圓融法如偈四種事位中有總及別中各增十重轉無前後一時故此中數量亦復轉勝超過前量配例應了如偈其法門數量例前應了知故如是已說橫轉遍到俱行門次當說豎轉無雜一路門其相云何偈曰前說諸位中如次不超過各增十重轉一明究竟故論曰今此偈中為明何義為欲現示如前所說總別位中如其次第無有超過一一各各增十重轉一事明了一事究竟亦無雜亂亦無合集一向明轉豎轉無雜一路門形相故一乘教中行布法如偈前說諸位中如次不超過各增十重轉一明究竟故故引經第三十四大金剛寶王法界印藏修多羅中作如是說復次文殊師利寶王道品者以二事轉云何為二一者一區轉二者具面轉言一區者道雖廣多先一道量永究竟故豎轉門言具面者所有諸道一時行故橫轉門乃至廣說故摩訶寶輪王廣大圓滿無上地地大決擇分第二十六如是已說摩訶本地具足品藏非患道路大決擇分次當說摩訶寶輪王廣大圓滿無上地地大決擇分其相云何偈曰總別無盡故建立本法體論曰今此偈中為明何義為欲現示本法體中以總攝別以別攝總以總攝總以別攝別能攝所攝無有窮盡法門大海甚深廣大義理詮趣周遍圓滿究竟自在故如偈總別無盡故建立本法體故引經第三十五摩訶衍地藏無上極說不可思議心地品論修多羅中作如是說寶山海中同類無盡別類無盡具足圓滿無有窮盡無有始終無有邊際無有分界亦廣大相亦小狹相乃至廣說故此分攝前總別諸法無有窮盡也以上四分與華嚴經義相同即是周遍圓滿廣大位文義甚顯不煩詮釋
