body:
  text: 清石埭楊文會仁山箸佛學書目表書名箸者譯者卷數刻版處識語華嚴部華嚴經唐實义難陀譯八十卷揚州藏經院佛初成道時七處九會說圓融無盡法門為諸經之王非閱疏論著述鮮能通其義也華嚴懸談唐澄觀撰八卷長沙上林寺懸敘十門統明全經大旨即疏鈔之首華嚴疏鈔同二百二十卷金陵刻經處以四分科經發揮精詳後人得通華嚴奧旨者賴有此書也華嚴合論唐李通玄撰一百二十卷同提倡圓頓法門與禪相為表裏華嚴著述集要刻經處輯同薈萃各家撰述學華嚴者萬不可少方等部圓覺經近釋唐佛陀多羅譯明通潤釋六卷同十二菩薩各別請問佛一一答之維摩經註姚秦鳩摩羅什譯僧肇註八卷同維摩示疾諸大菩薩往問說不可思議解脫法門金光明最勝玉經唐義淨譯十卷同四卷金光明經廣行於世此十卷者文義詳備最宜流通心地觀經唐般若譯八卷同純顯真如一心兼明萬行修證文言流暢旨趣幽深勝鬘經寶窟劉宋求那跋陀羅譯唐吉藏作寶窟十五卷同唐以前盛弘此經後世無人提倡因其奧義難通也今幸寶窟來自扶桑學者可得門徑矣思益梵天所問經姚秦鳩摩羅什譯四卷同學禪宗者宜閱此經觀佛三昧海經東晉佛陀跋陀羅譯十卷同此經事理交含依文修觀現身得見釋迦如來佛報恩經失譯人名出後漢錄七卷同如來往劫修行皆是證無生忍以後之事非凡情所能測度其中表法可以理喻地藏本願經唐實义難陀譯二卷同說地藏菩薩因地發心併地獄可畏之相以儆愚頑而開覺路淨土部方等部內開出無量壽經義疏曹魏康僧鎧譯隋慧遠疏六卷同說彌陀因地發四十八願莊嚴淨土此疏從日本傳來觀無量壽佛經疏鈔劉宋畺良耶舍譯陳隋智顗疏宋知禮鈔四卷揚州藏經院佛說十六觀門利根上智依之修行速超上品疏鈔用三觀釋之顯圓妙理觀無量壽佛經四帖疏唐善導疏四卷金陵刻經處從日本傳來內分玄義分序分義定善義散善義故名四帖阿彌陀經義疏姚秦鳩摩羅什譯宋元照疏一卷同佛說淨土法門令眾生一心念佛即得往生不受輪轉阿彌陀經疏鈔明袾宏撰四卷同用賢首家法一事一理逗機正說往生論註婆藪槃頭菩薩造論元魏菩提留支譯魏曇鸞註二卷同唐以前談淨土之書除十疑論外僅見此本其精妙處後人所不能及淨土十要明智旭集十卷揚州藏經院上起智者下至袁宏道皆係精要之作往生集明袾宏輯三卷金陵刻經處略錄古今往生事蹟加以讚論省庵語錄國朝實賢作二卷揚州藏經院專弘淨土時人稱為蓮宗第九祖法相部方等部內開出楞伽經劉宋求那跋陀羅譯四卷金陵刻經處性相並談文義簡古入楞伽心玄義唐法藏撰一卷同此卷從日本得來全疏既失觀此可知大意解深密經唐玄奘譯五卷同學法相者以此為宗大乘密嚴經唐大廣智不空譯三卷同長行甚少五言偈居多瑜伽師地論彌勒菩薩說無著菩薩傳唐玄奘譯百卷同內有五分說十七地奘師譯成太宗大為讚賞因作聖教序成唯識論護法等菩薩造唐玄奘譯十卷同梵本十種奘公會為一部剖析精微學法相者最宜深究成唯識論述記唐窺基撰六十卷同此書元末失傳後人以不見為憾今從日本得來慈恩一宗其再興乎因明論疏商羯羅主菩薩造唐玄奘譯唐窺基疏八卷同用三支比量簡辨真似能立能破不為他宗所破也相宗八要解明明昱解八卷同雪浪恩公採集明昱補古註所未備開相宗之初門般若部金剛經註解姚秦鳩摩羅什譯明宗泐解一卷金陵刻經處宗天親二十七疑解釋最便初學金剛宗通明曾鳳儀撰九卷同引證淵博會通宗旨文義暢達震醒聾瞶心經五家註唐靖邁法藏明宗泐德清智旭撰五卷同此經註解甚多俗解無益邪解有害擇正解之精當者彙為一編仁王護國經唐大廣智不空譯二卷同波斯匿王請問佛說般若護國法門六波羅密多經唐般若譯十卷同前五度一一與般若相應方成無漏善也大智度論龍樹菩薩造姚秦鳩摩羅什譯百卷揚州藏經院釋摩訶般若經九十品初品具譯全釋有三十四卷餘皆十倍略之法華部妙法蓮華經姚秦鳩摩羅什譯七卷金陵刻經處開權顯實統收一代時教法華會義明智旭撰十六卷揚州藏經院智者大師法華文句文義繁多閱者每難卒業智旭刪繁就簡以便初學妙玄節要明智旭節二卷同節略智者大師法華玄義而成此本尼犍子授記經元魏菩提留支譯十卷同宣說世出世法曲盡其妙涅槃部大般涅槃經北涼曇無讖譯後分唐若那跋陀羅等譯四十二卷金陵刻經處扶律談常顯佛不滅涅槃玄義隋灌頂撰二卷同開為五重統說全經大意集一切福德三昧經姚秦鳩摩羅什譯三卷揚州藏經院受持此經令三寶種永不斷絕佛遺教經節要姚秦鳩摩羅什譯宋淨源節要明袾宏補註一卷金陵刻經處佛說此經猶後世之遺囑後代學人皆宜遵守祕密部楞嚴經唐般剌密帝譯十卷金陵刻經處無法不備無機不攝學佛之要門也楞嚴正脈明交光撰四十卷同披剝陳言獨申正見發揮經義超越古今準提陀羅尼經唐金剛智譯一卷同治病卻魔祈福修真四種神呪隨宜大悲陀羅尼經唐伽梵達摩譯一卷同奉持尊勝陀羅尼經唐佛陀波利譯一卷同穢迹金剛呪經唐無能勝譯一卷同顯密圓通宋道㲀集二卷同略明顯教廣明密教以準提為宗欲知呪術功能須閱此集施食儀軌補註明袾宏述二卷同三業相應力用無邊閱此補註方知施食非易事也阿含部小乘經增壹阿含經符秦曇摩難提譯五十卷揚州藏經院此經明人天因果從一增一義豐慧廣長阿含經姚秦佛陀耶舍共竺佛念譯二十二卷同辨邪正明報應以長為目者開斥修途所記長遠也雜阿含經劉宋求那跋陀羅譯五十卷金陵刻經處此經說事既雜別為一部內有小半與中阿含增壹阿含相同而文順暢大乘律小乘律專為出家者設故不載梵網經姚秦鳩摩羅什譯二卷金陵刻經處上卷說四十心地下卷說十重四十八輕戒梵網經菩薩戒疏唐法藏撰十卷同此疏從日本傳來學菩薩道者最宜深究菩薩戒本經箋要北涼曇無讖譯明智旭箋一卷同廣明開遮持犯在家出家均宜受持大乘論小乘論未刻大乘起信論義記馬鳴菩薩造論梁真諦譯唐法藏記七卷附別記一卷金陵刻經處此論總括羣經要義法藏作記曲盡其妙學者熟讀深思自能通達三藏教海大乘起信論纂註明真界註二卷同取賢首疏長水筆削記刪繁就簡纂輯成文以便初學大乘起信論直解明德清解二卷同稱性直談雅合禪門之機以上二種可作義記先導中論龍樹菩薩造青目菩薩釋姚秦鳩摩羅什譯六卷杭州慧空經房中論百論十二門論六朝僧專門學習是為三論宗般若燈論龍樹菩薩偈本分別明菩薩釋論唐波羅頗密多羅譯十五卷金陵刻經處般若明燈照破幽暗顯真空理當處無生凡夫與佛平等一如十二門論宗致義記龍樹菩薩造姚秦鳩摩羅什譯唐法藏記四卷同此論意旨即孔子所云空空如也我叩其兩端而竭焉法藏義記發揮盡致於此會得即入三空解脫門法界無差別論疏堅慧菩薩造唐提雲般若等譯唐法藏疏二卷同論中深義人不能曉得法藏疏方知法界平等之妙旨也發菩提心論天親菩薩造姚秦鳩摩羅什譯二卷揚州藏經院非菩提心無由作佛慨發大心兼行六度而後佛果可期矣西土撰集四十二章經解後漢迦葉摩騰竺法蘭同譯明智旭解三經合本金陵刻經處佛教東來首譯此經賢愚因緣經元魏慧覺譯十三卷揚州藏經院慧覺等八人在于闐大會共記所聞集為一部皆係佛及弟子化度眾生之事諸經要集唐智嚴譯三卷同集諸經中菩薩行門六十六條法珠之寶聚大乘之鑑坐禪三昧經僧伽羅剎造姚秦鳩摩羅什譯二卷金陵刻經處說五種觀門以治五障併說四禪四空念佛等法禪宗以下支那撰述御選語錄雍正朝梓行十九卷金陵刻經處自肇公至蓮池凡十六家繼以歷代禪師前後二集以當今法會為殿指月錄明瞿汝稷集三十二卷杭州慧空經房上起七佛下至大慧採集偈頌普說機鋒語句成一家言續指月錄國朝聶先集二十卷金陵刻經處起自南宋訖於國初恰與前錄相接肇論略註姚秦僧肇作六卷同達摩未來以前提倡宗乘者肇公與竺道生二人而已生公作論數篇不傳於世惜哉寶藏論姚秦僧肇作一卷同此等寶藏人人有之一經指出即能受用爭奈窮子執迷不悟可哀也已六祖壇經唐慧能大師說門人記一卷同達摩西來直指人心見性成佛傳至六祖其道大行禪源諸詮集唐宗密述四卷同融通宗教會成一味此其序也全書久亡求之東瀛亦不可得矣宗鏡錄宋延壽述百卷揚州藏經院以一心為宗照萬法如鏡凡各家互相是非者皆以深理通之誠圓融無礙法門也萬善同歸集同三卷金陵刻經處一心具萬善萬善歸一心不滯有為不住無為行菩薩道之正軌也心賦註同四卷同心無形相而可賦乎既賦矣而又註之誠描寫虛空之妙手也高峰語錄元原妙撰一卷同直截根源脫落窠臼最足激發參學人志氣中峰廣錄元明本撰三十卷揚州藏經院刊華就實因事明理其間煅煉之穩密勘辨之明確無假借無回護凜凜然烈日嚴霜誠宗門之巨擘也天台宗大乘止觀釋要陳慧思述明智旭釋六卷揚州藏經院詳明三番止觀皆先觀而後止大師自證之法也唯引起信論能生一切世間出世間善因果故之言於善下添一惡字蓮池大師辯之詳矣釋禪波羅密隋智顗說弟子法慎記十卷長沙上林寺廣明各種坐禪法門小止觀隋智顗述二卷杭州慧空經房欲學坐禪此法最為切近天台四教儀集註元蒙潤集十卷同學天台教觀者以此為圭臬教觀綱宗明智旭述二卷金陵刻經處簡要不繁最便初學傳記釋迦如來應化事蹟國朝永珊集四卷揚州藏經院採集各經繪圖二百八幅大致依如來成道記高僧傳初集梁慧皎撰十四卷金陵刻經處自漢迄梁正傳二百五十七人附見二百三十九人高僧傳二集唐道宣撰四十卷揚州藏經院自梁迄唐正傳三百三十一人附見一百六十人高僧傳三集宋贊寧撰三十卷同自唐迄宋正傳五百三十人禪林僧寶傳宋惠洪撰三十卷金陵刻經處取宋代宗門之傑出者八十有一人各為傳而繫之以贊比丘尼傳梁寶唱撰四卷同自晉迄梁凡六十五人居士傳國朝彭際清述五十六卷揚州藏經院自漢以來正傳二百二十七人附見七十九人善女人傳同二卷金陵刻經處自晉以來正傳一百三十八人附見九人雜集龍藏目錄乾隆三年定一卷金陵刻經處統計七百二十四函七千二百四十卷十五萬三千三百七十四紙閱藏知津明智旭輯四十四卷同分別部類先後次序與藏本不同每部之下但載品中事理大概使人自知綱要法苑珠林唐道世撰百卷常熟小石山房以佛經故實分類編排凡一百篇大旨推明罪福之由以生人敬信之念翻譯名義集宋法雲編二十卷金陵刻經處內分六十四類以梵語譯華言並釋其義教乘法數雍正十三年重訂十二卷杭州慧空經房從一數至八萬四千備列教中名相俾學者易於尋討慈悲道場懺法俗名梁皇懺梁誌公寶唱等集十卷金陵刻經處內分四十品禮懺法門此為最古禪門日誦寧波天童寺增輯一卷同早晚課誦為僧家所必需此外有可刪者存之以順俗也後附十宗略說用開初學知見耳弘明集梁僧祐撰十四卷同薈萃漢魏六朝高僧名士辯論三寶之作文既遒雅義亦切要鐔津文集宋契嵩撰二十卷揚州藏經院內多護教之言續原教論明沈士榮著二卷金陵刻經處辯論宋儒謗佛之言最為透徹雲棲法彙明袾宏述同內分三類一釋經二輯古三手著門人裒集大師遺書盡於此矣夢遊集明德清著五十五卷揚州藏經院憨山老人著作甚多解釋經論數百卷各別流行門人搜其遺稿彙成此集道家與佛法相通者附錄於此老子翼明焦竤輯八卷金陵刻經處採輯古註六十四家增以自作筆乘為解老者最為詳備之書道德經解明德清著二卷同憨山此解歷十五年而成句斟字酌極臻玄妙莊子內篇註明德清著四卷同莊子三十三篇以內七篇為精要故憨山註之陰符經發隱石埭楊文會註一卷同以佛法解釋與舊註迥不相同謹案此表曾由新安汪氏於清光緒壬寅歲用活字版印於滬瀆蓋就彼時已刻版者列表故壬寅後續出之書均未之及編者識等不等觀雜錄卷三目錄彙刻古逸淨土十書緣起會刻古本起信論義記緣起天竺字母題詞梵網經菩薩戒本疏題詞心經淺釋題詞代梅擷芸作歐陽母朱生西行述題詞大藏輯要敘例賢首法集敘日本續藏經敘大乘中觀釋論敘中論疏敘成唯識論述記敘普賢菩薩圓妙方便總持法門敘大宗地玄文本論略註自敘釋摩訶衍論集註自敘佛教初學課本自敘道德經發隱自敘沖虛經發隱自敘南華經發隱自敘重刊淨土四經跋華嚴一乘十玄門跋起信論法數別錄跋起信論真妄生滅法相圖跋西方極樂世界依正莊嚴圓圖跋西歸直指跋書起信論海東疏記後書華嚴念佛三昧論後書居士傳汪大紳評語後
