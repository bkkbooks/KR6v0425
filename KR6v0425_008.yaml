body:
  text: 清石埭楊文會仁山述長白如冠九年伯作八宗二行自書條幅刻於武林豫欲附入禪門日誦之末而未果頃見日本凝然上人所著八宗綱要引證詳明而非初學所能領會因不揣固陋重作十宗略說求其簡而易曉也以前之九宗分攝羣機以後之一宗普攝羣機隨修何法皆作淨土資糧則九宗入一宗生淨土後門門皆得圓證則一宗入九宗融通無礙涉入交參學者慎勿入主出奴互相頡頏也律宗一名南山宗有另立頭陀行者此宗所攝佛住世時以佛為師佛滅度後以戒為師戒有大小乘之別大乘則宗梵網戒本等小乘則宗十誦四分等大則七衆同遵小則專制出家以出家為住世僧伽非嚴淨毗尼無以起人天皈敬也唐道宣律師盛弘此宗著述甚富時人稱為南山宗近代寶華山三昧律師專以此法軌範僧徒師資相傳代有聞人夫戒定慧三學次第相須未有不持戒而能驟得定慧者而學者往往置之何也蓋律學檢束身心持之者違背凡情隨順聖道不持者違背聖道隨順凡情安見其脫生死關斷輪回路耶楞嚴經中優波離尊者云我以執身身得自在次第執心心得通達然後身心一切通利斯為第一後之學者其以是為法焉可俱舍宗一名有宗世親菩薩造俱舍論在聲聞對法藏內最為精妙專弘有宗源出毗婆沙論陳真諦三藏譯出併作疏釋之佚失不傳唐玄奘法師重譯三十卷門人普光作記法寶作疏大為闡揚當時傳習有專門名家者遂立為一宗焉後來通方大士莫不詳覽及至今日則無人問津矣竊以大小二乘不可偏廢如此妙典豈可終祕琅函耶有志之士其亦措心焉可耳成實宗成實論譯於姚秦羅什三藏其中具明二空立二種觀謂空觀無我觀有二十七賢聖以攝階位於小乘中尤為優長六朝名德專習者衆別為一宗至唐而漸衰後世則無聞焉夫古人崇尚之典必有可觀好學英賢試取而閲之亦知一家門徑也三論宗一名性空宗中論百論十二門論是為三論破外道小乘以無所得而為究竟正合般若真空之旨故亦名為性空宗文殊師利實為初祖馬鳴龍樹清辨等菩薩繼之鳩摩羅什至秦盛弘此道一時學者宗之生肇融睿並肩相承生公門下曇濟大師輾轉傳持以至唐之吉藏專以此宗提振學徒三論之旨於斯為盛天台亦提中論其教廣行於世而習三論者鮮矣吉藏有疏若干卷今從日本傳來或者此宗其再興乎天台宗一名法華宗陳隋間智者大師居天台山後人因以山名宗稱為山家蓋自北齊慧文禪師悟龍樹之旨以授南嶽慧思思傳之智者而其道大顯以五時八教判釋東流一代聖教罄無不盡正宗法華旁及餘經建立三止三觀六即十乘等法為後學津梁其著述有三大五小等部輾轉演暢不可具述智者大師親證法華三昧見靈山一會儼然未散其說法之妙從旋陀羅尼流出無有窮盡人問其位居何等乃曰圓五品耳臨捨壽時念佛生西可見佛果超勝非思議所及才登五品已不能測其高深而猶以西方為歸世之我慢貢高不學無術者其亦稍知愧乎賢首宗一名華嚴宗華嚴為經中之王祕於龍宮龍樹菩薩乘神通力誦出略本流傳人間有唐杜順和尚者文殊師利化身也依經立觀是為初祖繼其道者雲華智儼賢首法藏以至清涼澄觀而綱目備舉於是四法界十玄門六相五教經緯於疏鈔之海而華嚴奧義如日麗中天有目共覩矣後之學者欲入此不思議法界於諸祖撰述宜盡心焉慈恩宗一名法相宗奘師雖生兜率不別立宗其徒著述仍以極樂為勝也天竺有性相二宗性宗即是前之三論相宗則從楞伽深密密嚴等經流出有瑜伽顯揚諸論而其文約義豐莫妙於成唯識論也以彌勒為初祖無著天親護法等菩薩相繼弘揚唐之玄奘至中印度就學於戒賢論師精通其法歸國譯傳是為慈恩宗窺基慧沼智周次第相承論疏流傳日本今始取回宋以後提倡者漸希至明季而大振著述甚富皆有可觀此宗以五位百法攝一切教門立三支比量摧邪顯正遠離依他及遍計執證入圓成實性誠末法救弊之良藥也參禪習教之士苟研究此道而有得焉自不至顢頇佛性儱侗真如為法門之大幸矣禪宗一名心宗達摩西來不立文字直指人心見性成佛歷代相傳人皆稱為禪宗其實非五度之禪乃第六般若波羅密也觀六祖盛談般若則可見矣自釋迦如來付囑迦葉為第一祖二十八傳而至菩提達摩為東土初祖又六傳而至慧能適符衣止不傳法周沙界之記厥後五家鼎盛各立綱宗臨濟則提三玄三要曹洞則傳五位君臣以至溈仰之九十六圓相雲門之三句法眼之六相門徑雖殊其𠞰絶情識徹證心源無有異也嘗考古今參學之徒開悟有難易證契有淺深其言下便徹立紹祖位者法身大士隨機應現也如臨濟遭三頓痛棒及見大愚而後悟者大心凡夫之榜樣也自宋元至今莫不窮參力究經年纍月不顧身命始得契入者根器微小故也或疑禪宗一超直入與佛祖同一鼻孔出氣無生死可斷無涅槃可證何有淺深之別不知此宗不立階級的是頓門以夙因言之不無差降淺深屬人非屬法也慨自江河日下後後遜於前前即有真參實悟者已不能如古德之精純何況杜撰禪和於光影門頭稍得佳境即以宗師自命認賊為子自誤誤人豈惟淺深不同亦乃真僞雜出蓋他宗依經建立規矩準繩不容假借惟禪宗絶跡空行縱橫排蕩莫可捉摸故黠慧者竊其言句而轉換之粗魯者仿其規模而強效之安得大權菩薩乘願再來一振頽風也哉密宗一名真言宗如來滅後七百年時龍猛菩薩開南天竺鐵塔遇金剛薩埵受職灌頂祕密法門方傳於世金剛薩埵親承大日如來即毗盧遮那佛也龍猛授之龍智唐初善無畏三藏東來是為此方初祖又有金剛智不空及一行惠果皆係金剛阿闍黎大闡密教此宗以毗盧遮那成佛經金剛頂經等為依立十住心統攝諸教建立曼茶羅三密相應即凡成聖其不思議力用惟佛能知非因位所能測度至於祈雨治病等法其小焉者耳然此法門非從金剛阿闍黎傳受不得入壇行道此方久已失傳惠果之道行於日本至今不絶西藏喇嘛亦崇密乘今時學者但持誦準提大悲等呪至心誠懇亦得密益欲知其中奧妙須閲大日經疏釋及顯密圓通大藏祕要等便悉淨土宗一名蓮宗有立般舟行者此宗所攝以果地覺為因地心此念佛往生一門為圓頓教中之捷徑也四生六道蒙佛接引與上位菩薩同登不退非佛口親宣誰能信之既信他力復盡自力萬修萬人去矣華嚴經末普賢以十大願王導歸極樂故淨土宗應以普賢為初祖也厥後馬鳴大士造起信論亦以極樂為歸龍樹菩薩作十住智度等論指歸淨土者不一而足東土則以遠公為初祖其曇鸞道綽善導三師次第相承宋之永明明之蓮池其尤著者也以念佛明心地與他宗無異以念佛生淨土惟此宗獨別古德云生則決定生去則實不去者一往之辭奪境不奪人也應作四句料揀如云去則決定去生則實不生者奪人不奪境也去則實不去生亦實不生者人境俱奪也去則決定去生則決定生者人境俱不奪也依淨土三經及天親論應以人境俱不奪為宗方合往生二字之義後人喜提唯心淨土自性彌陀之說撥置西方彌陀以謂心外取法欲玄妙而反淺陋矣豈知心外無境境外無心應現無方自他不二現娑婆而顛倒輪回汩沒於四生六道之中現極樂而清涼自在解脫於三賢十聖之表彼修唯心淨土者直須證法性身方能住法性土非入正定聚登初住位不可其或未然仍不免隔陰之迷隨業輪轉耳此宗以觀想持名兼修為上否則專主持名但須信願切至亦得往生也出世三學以持戒為本故首標律宗佛轉法輪先度聲聞故次之以小乘二宗東土學者羅什之徒首稱興盛故次以三論宗建立教觀天台方備賢首闡華嚴慈恩弘法相傳習至今稱為教下三家拈花一脈教外別傳灌頂一宗金剛密授故列於三家之後以上各宗專修一門皆能證道但根有利鈍學有淺深其未出生死者亟須念佛生西以防退墮即已登不退者正好面覲彌陀親承法印故以淨土終焉
