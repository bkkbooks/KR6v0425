body:
  text: 清石埭楊文會仁山著大藏總經目録辨嘗見行腳禪和佩帶小摺經目奉為法寶閲其名目卷數與藏內多不相符欲究其根源而未得也一日檢西遊記見有唐僧取經目次即此摺所由來矣按西遊記係邱長春借唐僧取經名相演道家修煉內丹之術其於經卷數目不過借以表五千四十八黃道耳所以任意托拾全未考核也乃後人不察以此為實居然鈔出刊行廣宣流布雖禪林修士亦莫辨其真僞良可浩歎余既知其源流遂記之以告夫來者一藏數目辨今時僧俗持誦經呪動稱一藏問其數則云五千四十八也嘗考歷代藏經目録惟開元釋教録有五千四十八卷之數餘則增減不等至今乃有七千二百餘卷矣世俗執著五千四十八者乃依西遊記之說耳夫持誦者量自心力如法定數或以一百為藏表大乘百法也或以五百為藏應五位進修有五百波羅密也或以一千為藏顯百界千如也或以三千為藏闡三千性相也或以五千為藏以五百波羅密一一具十也或以一萬為藏乃萬德齊彰也或以八萬四千為藏轉八萬四千塵勞成八萬四千法門也上來廣略多般行之均合教意又何必專依丹書黃道之數為定法耶評佛祖統紀宋僧志磐所作佛祖統紀收入大藏流傳已久豫閲之覺其尊崇本宗實有違乎佛祖之本意也夫瞿曇捨金輪王位而作沙門是棄世間之榮而就山林之寂也傳其道者莫不皆然而志磐立一派以為正宗作本紀尊之為帝王近支謂之旁出作世家尊之為諸侯遠支作列傳等之於士大夫佛祖世繫表內之祖十四祖以下反同旁出全是世俗知見自迦葉受佛囑付而為初祖歷代傳衣至曹溪而止此三十三代皆從靈山會上一時印定法身大士應運而出主持正法也今志磐以慧文大師遙宗龍樹一語遂將後之十九祖判為旁出稍知佛法者斷不出此近聞台家後裔欲續統紀自四明以下立一正宗接至近代以本紀尊之無知妄作至於如此尚得謂之如來真子乎其貶賢宗則曰有教無觀其貶慈恩則曰立義疏闊自以降四明以還其中平平無奇者亦尊為正統若不論道德而論世繫則禹湯之傳而為桀紂文武之傳而為幽厲謹案原稿附此數語似欲增入前文而屬稿未竟者今亦照録於此以存其真編者識評楞嚴指掌疏楞嚴經以阿難示墮發起大教專為正路修行人欲漏未除者作榜樣也若為邪僻之徒尋常教誡不一而足指掌疏以詐現威儀等語貶斥阿難大失經意蓋誤墮之由非阿難起意貪欲乃摩登以呪攝入若非阿難正直則摩登以色鉤引已足何待呪攝阿難內心清淨未動淫念但力不自由難以擺脫耳評阿彌陀經衷論此論宗旨在閉關念佛現證三昧也省一大師所證之定古人往往有之不以為奇修般舟三昧者更勝於此矣蓋般舟三昧以九十日為期不坐不臥初入關時七日之內必得三昧現前以後八十餘日常在三昧中精進行道所以不疲也儻七日不得必不能勉強撐持所以今時無有能行之者以省公所證稱為根本三昧似覺太高夫根本三昧必至初住地位始能稱之又以澍公所證稱為究竟三昧則更過矣澍公以持呪之力得一種通慧亦精誠所感耳若云究竟三昧必至佛地方能稱之等覺以下所證之法皆不能稱為究竟且澍公所證非淨土法門若回向淨土方能往生若不回向仍在人天受生或進或退未可料也豈得判為聲聞極果震旦國中凡夫而現證四果者未之前聞也自西竺來者除迦葉摩騰外餘僅三果耳應化菩薩往往有之不在此例衷論第三十二頁云由色界天以上以次遞上復有四空天統為無色界以並無色身惟有魂識如鬼神也無色界惟有魂識如鬼神之言非也蓋鬼神亦有色身及境界相彼此互見非如無色界但有空定而無身境也衷論第三十二頁又云六欲天之下復有地居三天以次遞上復有空居一天空居天以上即欲界之初天矣空居天以上即欲界之初天誤矣按經說四王天王是欲界之初天居須彌山腰忉利是欲界之二天居須彌山頂併以上之空居四天共為欲界六天衷論第三十二頁又云惟修羅王執持世界力洞無畏能與梵天及天帝釋四天爭權惟修天福不修天慧其所卜居鄰於日月修羅不能與梵王爭權僅能與帝釋四王爭權耳其所卜居鄰於日月四王之境也衷論第五十二頁云權戒者惟持具戒不能進修三福也實戒者既持具戒復進修三福如觀經所陳也權定者惟能終身念佛未證一心不亂也實定者閉關專念現證一心不亂內則伏除見思二惑外則面見阿彌陀佛依正莊嚴及十方諸佛也權戒云惟持具戒不修三福戒有止作二持若止而無作即缺一邊何得謂之具戒又以未證一心者名為權定誤也豈有散亂心而名定者乎伏除見思二惑談何容易若思惑除盡即證阿羅漢果三明六通具八解脫六通人所能見若不具六通而云思惑除盡即是大妄語當墮地獄衷論第五十三頁云心業既在雖獲往生終非淨土之究竟故本經所示惟得謂之權定也此蓋不深究經文而以己所證者駕於經文之上已犯慢經之過當知經中所言一向專念即是一心不亂若非一心不亂之極致何能得上輩生上輩生者見佛之時即證圓教初住位又心業猶在一語亦缺斟酌心業者根本業識從初信漸除至等覺位方能除盡而謂證一心不亂者心業已亡乎謹案原稿未録衷論本文但標頁數行數今為補録論文略去行數其所云第幾頁者仍依原稿蓋據揚州流通本云編者識評金剛直解講義合參此本以蓮池解為主蓮池實無此解乃淺見之徒作此俗解假託蓮池之名以誑惑世人耳至於採録諸家大都出於五十三家注而真正發揮金剛妙義者此本未嘗採録可見纂輯之人祇宗俗解而不知正解若執此本以求佛法遠之遠矣評方植之向果微言方君自命通儒每以堯舜孔孟周張程朱並稱為道統之正宗而以佛學遷就斷章取義改變文辭謂與聖學相同不但不通佛理抑亦不識儒宗也孟子尚不能與孔子並稱何況宋儒宋儒性理之學自成一派不與孔子一貫之旨相同所謂窮理者正是執取計名二相也推尊孟子與孔曾思同列取其求放心善養氣道性善稱堯舜不知孟子我執未破離孔顏尚隔兩重關何以知之即就萬物皆備於我一章便可知也或以此我字是常樂我淨之我非七識所執之我再就說大人則藐之一章便曉然矣蓋孟子才智過人又能用功一旦六識開豁透第一關大末那識現前即是總相主宰慶快平生所以有樂莫大焉之語若在孔子門下立刻抉破令其亡我透第二關便能虛心用功再求進步向八識上破一分無明根本智現前則三關齊透與顏曾諸人並駕齊驅矣至於周張程朱心學分際僅在明了意識上用功初關尚未破其寂然不動感而遂通之說皆是靜中景況若果與佛法無異早已六通具足斷不說無輪回矣今方氏將佛家實效盡行抹煞單取性理之言與儒家拉雜湊泊非讚佛也實毀佛也若佛法僅與宋儒相等則過量英豪誰肯捨身命以求之故知此書流布世間非特無益於佛學而且有損於佛學不能令人生難遭之想也又其中每以儒佛二教皆出於天忽有以天教壓之者則無出頭之地矣評日本僧一柳讀觀經眼大著以三鏡喻眼取譬甚巧得在是失亦在是夫顯微鏡與望遠鏡蓋因折光反射而成倒影如昆蟲之頭本向上而鏡中則向下新月之缺本向東而鏡中則向西且因顯力展大能見一段而不見全體如昆蟲見其尾則不見其頭新月見其缺而不見其邊有智之士知其倒影在鏡而即知物之正形知其所見少分而即知月之全體決不執定倒與少而闢正與全也至於青色鏡之喻其青在鏡而不在物以青鏡視物則物物皆青而不能得物之正色須以自己正眼視之以正智照之則物之正形全體本色畢露而不為鏡所改矣然則三鏡皆不可用乎曰非也是在善用之而已善用者鏡為我用而我不為鏡用物之微者以鏡顯而大之物之遠者以鏡攝而近之日光耀目之際以鏡減而暗之如是便無失而有得則亦庶乎其不差矣觀經末云佛告阿難汝好持是語持是語者即是持無量壽佛名好持是語一句囑其持上文所說之觀法即是持無量壽佛名一句明觀想與持名互攝也佛恐後人視觀想與持名判然兩途故作此融攝之語以曉之善導謂望佛本願意在專稱佛名若執此以為定判則佛所說觀法翻成賸語且佛儻專重持名而告韋提希以觀想之法是心口相違也凡夫且不出此而況於佛乎至於像觀真身觀之念佛三昧即是結束本文之觀法如必欲判為稱名之念佛則與上文不貫譯經者斷無如是之錯謬也評日本僧一柳純他力論純他力教一家之私言非佛教之公言也請以經文證之大經明三輩觀經開九品惟修觀者別為一途而論觀行之淺深亦入三輩九品中攝貴宗概以自力棄而不取另立一種往生之法以駕於三輩九品之上名曰純他力教此乃貴宗獨創之教非通途之教也蓋佛教所說接引往生皆是他力之教而仍不廢自力廢自力則有無窮過失已於真宗教旨內辨之詳矣夫以自力往生必至圓初住別初地而後可凡夫往生全仗佛力而以自力為階降之差此千古不易之定論也儻不以為然則亦各行其是而已答釋德高質疑十八問問志公永嘉皆言恰恰用心時恰恰無心用無心恰恰用常用恰恰無在吾人空寂之體以心為用夫既曰恰恰用心時何以又曰無心用則用者寧非心乎既無心矣又言恰恰用夫心既無又以何者為用哉既常用矣又曰恰恰無則常用者復是何物似此即用即無不立心相即無即用不是無知此處不明而言用心不用心皆是妄作但其中關捩子究何所據而為日用望詳切指迷庶明自本心方可見自本性也答志公永嘉均是法身大士與凡夫相去天淵觀永嘉答六祖云分別亦非意六祖即讚善哉可見所用之心不但超過凡夫亦且超過二乘矣君以現前明了意識為心正楞嚴經中所破斥者無怪乎湊泊不上當知志公永嘉已轉八識成四智非特近時淺學宗徒不能領會即宋元以來名重一時者亦難企及欲問日用是罷參以後之事儻牢關未透亟須離心意識參絶凡聖路學庶本心可明而本性可見矣問經言真妄同源忠國師又謂真心妄心名同體異究竟真妄之體是同是異若言是同何以有真有妄若言是異究於何處異起況真如性體乃一真法界無二無雜此箇妄心究從何而生因何而有敬求指示端倪免成鑄錯答真妄二字皆是假名因妄言真妄既非有真亦不立若妄有根源生相可見則不得謂之妄矣問魏府老洞華嚴云佛法在喫飯穿衣處屙屎放尿處應事接物處若生心動念即不是金剛經又云應無所住而生其心六祖亦云不斷百思想對境心數起夫應事接物等若不起心動念何以能到恰好去魏府言不是固為珍重向上不動尊但與金經六祖有似相違學者於中如何取則始得握住定盤針使動靜不至走作惟望明示指南答三處所說皆明當體全真之義以生心動念即乖法體無住生心者照體獨立不涉思惟也六祖二語分別亦非意也魏府言不是與金剛六祖全不相違此等語句須是證到深處方能親見佛祖機用問根塵相接能分別能了明智與識莫不皆然當根塵瞥然相值之際此分別了明者般若與昭靈混作一起究竟孰為智孰為識若辨析不清即奴郎錯認望施鵝王擇乳之能指抉的當以為後學明導答根塵相接能分別明了智與識大不相同識則隨物轉智則能轉物觀六祖風幡語便可知矣般若與業識從來不相混衆生迷惑顛倒隱覆真實而成妄識智者徹悟自性一切施為無非般若妙用豈有纖毫業識與般若作對哉問人死則四大分離色身變壞其中並無所謂我者何以而有中陰之身此中陰身是我乎非我乎究由何而成耶且既有中陰身而法身又何在也請示事理究竟答現前四大色身即是法身所變經曰法身流轉五道名曰衆生不待壞時方知無我即強盛時亦無我也我者凡夫妄執也生前既妄執我死後亦妄執我猶之生也若非法身常住不滅何得有中陰身又何得有後世耶問生死根本者業識也但真如性體究竟無朕此箇業識於何地容受於何處發生於何時成就請抉其根源俾後學知脫生死窠臼答真如在纏名為如來藏不變隨緣而有無明業識隨緣不變雖有無明業識而體性清淨經中每稱無始無明若無明有始則涅槃有終與一切經論皆不合心經云無無明亦無無明盡乃是般若部中究極之談也問空心靜坐六祖所訶默照邪禪妙喜所斥然則坐香時如有心則帶起亂想而難得寂靜若無心又墮入陰界為諸祖所訶必如何作活計始得請明示機緘答坐禪之法門徑甚多有世間禪有外道禪有次第禪有圓頓禪有祖師禪有如來禪若空心靜坐默照邪禪皆是外道禪也離佛法懸遠僧徒學禪必揣其根器利鈍於出世四種禪隨宜學習不依古法能透禪關無有是處問夫識心達本明心見性唯心為王即心是佛制心一處聖人求心乃佛祖語也心之所以為貴也而心是工伎兒心不是佛損法財滅功德莫不由此心意識離心意識參難得無心道人亦佛祖語也又視心為賤矣是心也執之斯結想成色為幻妄之根去之又蠢然不靈即同於木石必如何不壞身心相而得見本來況不有此心則見性將從何而見參悟從何而參所謂取不得捨不得不得之中恁麼得此宗乘之樞紐體道之奧竅也此若分疏不下終必居於惑地然則心之所以為心究係若何請指示機括使後學直下分曉不至有歧途之泣答心有真有妄楞嚴經二種根本最為分明即心是佛者真心也心不是佛者妄心也心意識三者八識七識六識也離此三識便見本性所以謂之無心道人尊意或執或去之心皆六七二識於第八阿賴耶識尚未體會何論如來藏心初參時用此妄心參到無知無識田地妄心不行憤起根本無明驀地掀翻徹見本源性地非此妄心所見也乃大死大活無纖毫障翳強名為見也問經云若能轉物即同如來祗如三門外石法幢物也如何轉法同於如來請明示法要答古德云轉得山河歸自己轉得自己歸山河又云老僧轉得十二時汝諸人被十二時轉又云拈一莖草作丈六金身拈丈六金身作一莖草皆轉物之義也若不明此義無論門外石幢即手中柱杖拂子均被他轉矣又依教義羅漢得六通時地水火風空皆能轉變自由菩薩神通過於羅漢見山河大地皆如幻影芥納須彌毛吞巨海亦尋常事也問唯識家言阿賴耶識為真妄和合即今諦思真如性海無二無雜寂靜如虛空堅密勝金剛於何處容受此妄且妄乃虛幻之相於天真佛性又何能和合得入況和合則真妄角立第一義中無此二法若謂不和合如來有言汝一動念塵勞先起每於根塵相接時驗之當境物倏然值遇妄即瞥然而興舊習宛然如電光石火之捷速不可窮詰究竟此妄如何而有如何而來如何而發如何而滅如何混真如用如何作生死本求其根源體性總屬茫然設一辨認不真則起足下足無非錯也敬求不吝慈悲垂語道破答君言境物值遇時妄即瞥然而興豈知不接物時妄亦未曾息滅如平水暗流人不能見古德大徹之後求絲毫妄念不可得所以在淫坊酒肆中遊行人問之則曰我自調心非干汝事雖終日應事接物而不見有動相也真妄和合之語依生滅門說也若依真如門說妄本非有真亦假名衆生則全真成妄菩薩則了妄全真如來則即妄即真非妄非真君以容受和合為疑乃是凡情計度於佛法全無交涉也問身與心是一耶是二耶如人身患病此病到心不到心如言到夫心虛而無相也四大有形之病何能害及空寂虛體若言不到當痛深癢劇之時心即為之昏迷顛倒苦楚欲死不得謂之無相干涉也然則心之所以為心究係如何身病究竟能否涉入此心而為過患望決所疑俾知心要答阿賴耶識變起根身器界山河大地皆是心變何況自身妄心局於身內真心則非內非外非中間君所言之心全是衆生妄心妄心隨境轉所以昏迷苦楚不能自由也問圓覺云於諸妄心亦不除息夫真心本無妄也有妄即染汙實為真源眚翳若欲起心除息則一妄未去二妄又成不二門中無如是事若總不除息聽其橫流即日在妄中而業識茫茫無本可據則又非也吾人所以不能返本還源者妄纍之也除之既增病任之又成迷必如何使心得清淨而無障礙尚望肩荷大法者不吝明誨焉答圓覺經有四句初句居一切時不起妄念君略初句而拈二句所以不能通也若無初句則下之三句皆不應理因初句已證則下之三句便如六祖所言不斷百思想等句也又初句破妄顯真十住法也二句了妄即真十行法也三句回真入俗十向法也四句真俗俱融十地法也問經云真心遍一切處謂無知無不知也如何往昔悟道祖師居菴內不知菴外事究竟遍乎不遍乎望賜以定論答悟道有淺深淺者初開正見尚未齊於乾慧何能知庵外事須與十信位齊方能得六根清淨肉眼觀見大千世界非近世參禪人所能企及也問古云無心是道於心無事又云生心即犯戒動念即破齊此際其嚴乎故歷代祖師訓學人多以無心無事為行履也然又丁寧告誡不可入無事甲居陰界在鬼窟裏作活計畢竟如何無心無事始不入無事甲不居陰界鬼窟望大德抽關啓鑰示以程途答迷悟有別迷中無心無事即入陰界鬼窟悟後出息不隨衆緣入息不落陰界祗論悟處真僞不論有事無事也問人於夢中所見人物紛雜不一而言論動作宛然秩然各各不同似各有靈知自主之相究竟與我是一是二若是一何以夢中彼人言語動作與夢中之我迥不相侔若是二則夢中空洞晦昧只有一獨頭意識自為起滅別無他物也是彼我一二既難以區分而知覺是非又雜而不渾這箇悶葫蘆情形若此究竟其理若何請俯賜剖判以作黑暗夢中明燈之導答醒時夢時所接外境皆是唯識所變醒時所見屬八識相分報境也夢時所見屬六七識妄緣幻境也既能變自相又能變他相變幻極速或有條理或無條理足徵妄想之無主也孔子答子路曰未知生焉知死今亦答之曰未知醒焉知夢問宗門下有電光石火之機至捷速親切歷代祖師傳為家風皆執之以為當場殺活正令究之此一機也於何處驗之於何處見之學人如何體會始得腳根點地而為超凡入聖張本古德公案以何者為最親切捷速請拈示一二則以直揭綱宗而益後進答凡夫念念生滅剎那不停剎那極促之時也喻如石火電光參學人用功得力時忽然前後際斷徹見本來面目即名腳跟點地爾時緣心不續便能保任此事儻斷而復續仍須切實用功大慧禪師所謂大悟十八次小悟無數者此也師家勘驗學人用石火電光之機使人不及起念便能知其真僞稍一涉念便訶為思而得慮而知鬼家活計古德公案本無定法若以定法與人醍醐變成毒藥請閲馬祖接人機緣便不落近時窠臼矣問識有分別智亦有分別前人多以有分別屬識無分別屬智是否可為定論且同一分別如何是智如何是識其分途處合轍處究以何為界限以何為著落更於何地何時證其體性真假辨其作用是非設有毫釐之差即有千里之謬具精明眼者必能決擇的當使金鍮不相混也答識之分別凡情計度也智之分別性自神解也根本智無分別後得智有分別若未得根本智則分別全是識非智也因其比量與非量相濫即名似比量非真比量也根本智現量也有真現量便有真比量決不流入非量此即識智之分齊也問心者性之用也知覺者心之官也故性體空寂必藉心之靈知以為作用所謂須臾不能離者也乃歷代祖師反貴無心而又禁其不廢功用不入斷滅不同木石則是無而不無其密行妙旨究何在也請示樞要使參學宗徒敢於放膽休去歇去也答君之所謂知覺乃六識緣慮心也非自性之真知也真知即是無知而無不知達摩答梁武帝云不識即顯示真現量也孔子曰吾有知乎哉無知也開迹顯本之旨也到此境界儒釋同源諍論都息矣常用常寂常寂常用正當知時不違無知非無知之外別立有知也以上數則皆學人疑處大善知識如不吝慈悲逐條剖示請筆之於紙附郵寄示開我迷雲俾得稍窺法要不至錯認定盤針則感荷法施永志不忘也統觀質疑十八條其弊有二一者錯認六塵緣影為自心相以為現前知覺之心即是教外別傳之心若果此心即是祖師心印何待達摩西來始傳二祖又何待五祖門下七百餘僧衆獨傳一六祖乎當知祖師心印超越常情非過量英傑不能領會近代根器淺薄動輒以禪宗自命究其旨趣茫無所知何論凡聖情盡體露真常耶二者但閲宗門語録於經論未曾措心不分解行不明淺深處處扞格無由通達欲除前之二弊須將大乘起信論讀誦通利深究賢首義記起信論者馬鳴菩薩之所作也馬鳴為禪宗十二祖此論宗教圓融為學佛之要典再看楞嚴正脈唯識述記楞嚴唯識既通則他經可讀矣從前學禪見解一概丟開俟經論通曉後再看禪宗語録自然處處有著落矣答廖迪心世臧偈附問偈願生極樂國何法最簡便願淨娑婆土何道最尊勝在彼華嚴經普賢行願品有人如說行可以生極樂可以度衆生是否此為上有因必有果佛說萬法然但此因果者為以善惡判為尚有他緣若以善惡定衆生始何罪而困於此苦若不依善惡而從機緣生一切諸善法不可謂資糧即如讀書論此因生何果設以所費時而思惟正道或能得神通是亦未可知以此神通力宜知世間法今以參禪時而勤讀世書其用未必多而於道大害於此疑惑結惟願為解說法華與金剛及以華嚴經何經最殊勝聞有真言宗其旨為何等達摩東來時云曾傳二書一為易筋經其一為洗髓請聞其事實又有楞伽經與上三經者云何而相比佛制諸比丘有病不服藥豈以服藥因不得病愈果近今泰西醫考得諸疾病多由微生物佛制不服藥為恐殺微蟲抑尚有別故昔釋尊出世當時天竺人以比今支那程度為何如高僧得道人於今遇見否今時之佛法在日本何如像法昌隆時支那之高僧率居何等位銅輪與鐵輪先生何所居自迷而問他神會所受責若知解宗徒非所敢自足略舉一二端敬以質高明欲生極樂國持名仗他力欲淨娑婆界勸人常念佛華嚴行願品極樂為歸宿既得生極樂必能度衆生因果自相感定不爽毫髮欲知罪苦因無明為根本根本甚微細習氣成瀑流現前讀書業成就世俗諦猶如虛空花復結虛空果翳目者妄見淨眼無所有惟知無所有而不著斷滅真性離有無如如而應現不瞋亦不貪不取亦不捨清淨遊世間是謂菩薩道若以名利心與人相爭競計較得失間是則為粗行非但障正道實增無量苦貪求神通力恐被魔所牽若欲通佛教起信論為最既通起信論然後讀楞嚴此一經一論簡要便初學華嚴與金剛及以法華經深奧難通達久後方能讀欲知真言宗是謂祕密教大小三乘外別為一法門達摩從西來不立文字教末後傳心印唯指楞伽經易筋與洗髓皆後人僞作醫藥療衆病四供養之一制僧不服藥佛無如是說釋尊出世間聖哲同時生滅度二千年利根漸漸稀今昔若相比高下大懸殊現前比丘衆參禪者最多根法不相宜得道甚為難日本傳佛教共有十四宗唯淨土真宗弘揚最為盛純提他力教全廢聖道門與支那蓮宗判然分二途在昔南嶽思自居鐵輪位天台智大師唱言登五品志公觀音現杜順文殊來此等應化尊時時常出現下凡與上聖判若天淵隔鄙人自忖量名字位中人循循依佛教不敢欺自心承君殷勤問約略答如是印施西方接引圖回向發願偈稽首無量覺願舒白毫光普照法界衆念佛得清涼現身行願足命終赴蓮邦尤恐宿障重昏迷業力強念佛因此阻六道路茫茫隨業而牽往升沈本無方昏迷顛倒苦何日覩覺皇頂禮彌陀佛觀音大醫王勢至諸海衆同垂大悲光照諸昏迷輩臨終皆吉羊身心俱在定待佛駕慈航接此念佛衆普載歸西方願見此圖者敬禮不暫忘平時觀行熟得回清泰鄉等不等觀雜録卷五目録謝客啓南洋勸業會開設佛經流通所啓報告同人書與釋幻人書一與釋幻人書二附來書與釋惟靜書一與釋惟靜書二與釋遐山書與釋式海書與釋自真智圓國瑛書與周玉山馥書一與周玉山馥書二附來書與周玉山馥書三與馮華甫啓文書附來書與陳仲培書附來書與陶矩林森甲書與陳南陔采蘭書與李小藝國治書一與李小藝國治書二與馮夢華煦書與沈雪峰豐瑞書附來書與劉次饒紹寬書
