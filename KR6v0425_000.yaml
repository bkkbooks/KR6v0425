  text: 楊仁山居士遺著總目遺像塔圖金陵刻經處圖塔銘事略楊氏分家筆據大宗地玄文本論略注四卷金剛五位圖附佛教初學課本一卷注一卷十宗略說一卷觀無量壽佛經略論一卷願生偈略釋壇經略釋附論語發隱一卷孟子發隱一卷陰符經發隱一卷道德經發隱一卷沖虛經發隱一卷南華經發隱一卷等不等觀雜録八卷闡教編一卷此卷遵居士遺命緩刻以上均居士手著尚有居士手輯大藏輯要一千數百卷賢首法集一百數十卷華嚴著述集要二十九種淨土古佚書十種淨土經論十四種大乘起信論疏解彙編釋氏四書釋氏十三經釋氏十三經注疏暨佛教中學古文課本甲乙丙丁四編及其他編會經論均別行丁巳夏編者識楊居士塔銘聖教之興以聲為體言語文字三身五心聖凡生佛感應之道莫切於斯佛寶絶思量僧寶有隆替宏濟萬類傳佛種性者其法寶乎其在西土以結集為決擇滅後七日迦葉阿難為一結集於畢鉢羅窟而四含經定後一百年優波麴多為第二結集於毗舍離城而五部律出後三百年脅尊者為第三結集於弗樓沙國而大小二乘十二部三藏備全四含五部之流為六足為婆沙十二部立而方等瑜祗般若法華華嚴涅槃大日顯密具焉蓋一度結集即一度光明於西土成事既然其在東土始以敘録為甄綜繼以雕刻為宏布自宋遼元明爰暨我朝敕刊經藏不具論其人間僧俗發願雕刻者則隋靜琬刻石於雲居宋馮楫王求從鋟木於閩東禪浙思溪明密藏刊方冊於浙徑山而今時楊居士刊輯要兼刻全藏於金陵上下千年作者五人甚難希有卓哉然靜琬受付屬於南嶽思大師馮王生五宗四家禪席風行之世密公有憨山紫柏陸五台馮開之相助激揚獨居士奮起於末法蒼茫宗風歇絶之會以身任道論師法將藏主經坊四事勇兼畢生不倦精誠旁薄居士事蓋視前人為倍難景與嚮相承因與果不二以法運通塞驗之華嚴極盛於隋唐天台中興於南宋淨土普行於明末國初皆非刻經人所及見而今者諸方競進賢首嘉祥慈恩之微言絶學浸昌浸熾金胎教令朕兆萌芽佛日光明重昭壞劫居士實親見之非創刻時所預期則居士之效視前人倍疾乎居士於三學教典搜集於藏外若干種選擇大藏輯要若干種校刻大藏全經已成者若干卷寓決擇於甄綜宏通之中至精且當又非前人比嗚呼盛已經坊始在北極閣後徒所居延齡巷宅中治命捨宅為坊建塔坊中以葬諸子門人敬遵將事昭其志也居士名文會字仁山安徽池州府石埭人其學以馬鳴為理宗以法藏為行願以賢首蓮池為本師性相圓融禪淨徹證所著書若干卷目世系出處在墓表不具書居士示寂後七年歲在戊午塔成故人浙西寐叟為著銘辭曰馬鳴道統前婆須密後閼剌那是宣法性次第法相逮阿僧伽摩訶衍論義該般若識阿梨耶南北兩宗文殊彌勒平等無差洋洋道岸信為舟楫念極津涯華嚴證信彌陀證念生佛陀家有始有卒以易以簡萬荂一茄五教五宗攝之二論自在開遮大宗地本師說不傳講樹無花科葉義枝先生創通有聖冥加回此法施總持法寶醫世𤻲瘥萬卷萬德萬行所則普賢願嘉十二部經十二門智文殊悅𨲠此窣堵波靈骨歸存昔講堂些滿字之都有音如雷有氣如霞萬歲不騫或來瞻敬福等唵嘛楊仁山居士事略石埭楊居士文會生于道光丁酉年十一月十六日丑時母孫太夫人娠居士時夢入一古剎庭有巨甕覆以箬笠啓視則有蓮花高出甕口旋驚寤是年居士生居士父朴庵先生適於是年舉於鄉先生因是益鍾愛之明年成進士授職西部舉家北上居士童時示現游戲條理秩然九歲南歸十歲受讀甚穎悟十四能文雅不喜舉子業唐宋詩詞時一瀏覽間與知交結社賦詩為樂性任俠稍長益復練習馳射擊刺之術年十六夫人蘇氏來歸次年洪楊起事鄉里俶擾不遑安居計自朴庵先生以次老幼幾十人轉徙徽贛江浙間往還十年屢瀕于危然卒未嘗遭險者居士部署之力也里居襄辦團練在徽寧則佐張小浦中丞周百祿軍門理軍事跣足荷槍身先士卒日夜攻守不倦論功則固辭不受生平好讀奇書流離轉徙舁敝簏貯書以隨凡音韻曆算天文輿地以及黃老莊列靡不領會同治元年壬戌皖省平由江西遷居安慶逾年秋朴庵先生捐館舍時居士年二十七家無儋石儲曾文正檄委穀米局甲子歸葬朴庵公于鄉事畢回省感時疫病久自是厥後率為居士學道之年矣先是有不知誰何之老尼授居士金剛經一卷懷歸展讀猝難獲解覺甚微妙什襲藏弆嗣於皖省書肆中得大乘起信論一卷閣置案頭未暇寓目病後檢閲他書舉不愜意讀起信論乃不覺卷之不能釋也賡續五遍窺得奧旨由是遍求佛經久之于坊間得楞嚴經就几諷誦幾忘身在書肆時日已斂昏肆主催歸始覺悟此後凡親朋往他省者必央覓經典見行腳僧必詢其從何處來有何剎竿有無經卷一心學佛悉廢棄其向所為學乙丑來金陵得經書數種明年移居寧于時董江寧工程之役同事真定王公梅叔邃于佛學相得甚歡復與邵陽魏剛己陽湖趙惠甫武進劉開生嶺南張浦齊長沙曹鏡初諸君子遊互相討論深究宗教淵源以為末法世界全賴流通經典普濟衆生北方龍藏既成具文雙徑書本又燬于兵燹于是發心刻書本藏經俾廣流傳手草章程得同志十餘人分任勸募時發心最切者為江都鄭學川君鄭君未幾即出家名妙空子創江北刻經處于揚州東鄉之磚橋雞園刻經甚夥居士乃就金陵差次擘畫刻經事日則董理工程夜則潛心佛學校勘刻印而外或誦經念佛或靜坐作觀往往至漏盡就寢所辦工程費省工堅軼其儕輩曾李諸公咸以國士目之知其淡于名利每列保獎不令前知夙著勤勞身兼數事頗以障礙佛學為苦癸酉歲屏絶世事家居讀書北洋李文忠函聘辦工辭不往是歲參考造像量度及淨土諸經靜坐觀想審定章法延畫家繪成極樂世界依正莊嚴圖十一面大悲觀音像並搜得古時名人所繪佛菩薩像刊布流通以資供奉甲戌泛舟游歷蘇浙禮舍利朝梵音聞洞庭西山有古剎度多舊經隻身獨往搜求殆遍迄無所得而資斧缺乏幾至不成行時家計亦艱窘因復就江寧籌防局差綜計數年以來所刻之經漸次增益擇定金陵北極閣集資建屋為藏庋經板地延僧住持供奉香火旋為人所覬覦起爭端乃移藏家中延友人專司其事居士後雖暫離金陵而刻印不輟光緒元年乙亥經理漢口鹽局工程明年曹君鏡初約赴湘議長沙刻經事兼受曾惠敏聘襄辦傳忠書籍因獲覽南嶽之勝登祝融峰頂戊寅惠敏奉使使歐洲隨赴英法考求法國政教生業甚詳精究天文顯微等學製有天地球圖併輿圖尺以備將來測繪之需期滿假歸辭不受獎仍以刻經為事壬午至蘇州覓藏板之地于元墓山香雪海經費未集購地未成比輟議丙戌春應劉芝田星使召隨往英倫考察英國政治製造諸學深明列強立國之原三年既滿先行假歸仍不受保獎居士時年已五十有三嘗語人曰斯世競爭無非學問歐洲各國政教工商莫不有學吾國倣效西法不從切實處入手乃徒襲其皮毛方今上下相蒙人各自私自利欲興國其可得乎復以世事人心愈趨愈下誓不復與政界往還乃于東瀛購得小字藏經全部閉戶誦讀庚寅夏走京師禮旃檀佛像並求藏外古德逸書適居士內弟蘇少坡隨使節東渡則寓書南條文雄君廣求中國失傳古本南條學梵文于英國與居士素稔厥後由海外得來藏外書籍二三百種因擇其最善者亟付剞劂資不給則出售西洋賚回之各種儀器充數甲午與英人李提摩太君譯大乘起信論譯成英文以為他日佛教西行之漸乙未晤印人摩訶波羅于滬瀆緣其乞法西行興復五印佛教志甚懇切居士於是提倡僧學手訂課程著初學課本俾便誦讀一以振興佛學一以西行傳教庶末世佛法有普及之一日是時日本真宗設本願寺于金陵幻人法師建講席于江南相與辨論教宗書牘往來不憚萬言期以補偏救弊為宗丁酉年築室于金陵城北延齡巷為存經板及流通經典之所是夏孫太夫人壽終闋服詔其三子曰我自二十八歲得聞佛法時欲出家徒以有老母在未獲如願今老母壽終自身亦已衰邁不復能持出家律儀矣汝等均已壯年生齒日繁應各自謀生計分炊度日所置房屋作為十方公産此後毋以世事纍我也居士自此得安居樂道然會釋經疏維持法教日無暇晷嘗語人曰吾在世一分時當于佛法盡一分時之力戊戌夏患頭風電召長子自新由滬歸來囑曰我病如不起楞嚴正脈科判可託陳樨庵成之以完此書嗣幸醫藥奏效得以漸痊丁未秋就刻經處開佛學學堂曰祇桓精舍冀學者兼通中西文以為將來馳往天竺振興佛教之用國文英文同志任之佛學居士自任之就學者緇素二十餘人日有進益未及兩稔因經費不給而止宣統庚戌同人創立佛學研究會推居士為會長月開會一次每七日講經一次聽者多歡喜踊躍居士憫宗教之頽衰悲大道之沈淪非具擇法眼難免不為邪見所誤見日本重印續藏經多至一萬餘卷似駮雜特加以選擇歸于純正詳訂書目編輯提要以示門徑志願未遂慧燈輟照悲哉辛亥秋初示疾自知不起回憶往時刻經事艱苦備嘗而大藏輯要未睹成書心頗戚戚及得同志三人承認分任則熙怡微笑佛學研究會同人擇于八月十七日開會集議維持保護金陵刻經處之法併議舉會長一席會席未散居士已于申刻去矣是日上午猶與同人詳論刻經諸務及聞近得古本注釋數種歡喜不已曰豫幸得聞此書之存也午刻囑家人為之濯足翦指甲至時乃曰此時會友當已齊集會所矣須臾小解身作微寒向西瞑目而逝面色不變肌膚細滑不冰所謂吉祥而逝者非歟病中囑其子媳曰我之願力與彌陀願力吻合去時便去毫無繫纍惟乘急戒緩生品必不甚高但花開見佛較速耳爾等勿悲慘一心念佛送我西去如願已足居士弘法四十餘年流通經典至百餘萬卷印刷佛像至十餘萬張而願力之弘所屬望于將來者更無有窮盡也著有大宗地玄文本論略注四卷佛教初學課本陰符道德莊列發隱諸書久已風行海內又等不等觀雜録論孟發隱各若干卷待梓居士卒年七十有五配蘇夫人先居士十八年卒子三人長自新次自超次福嚴孫七人庭芬桂芬穎芬智生緣生雨生祥生曾孫時逢時中楊氏分家筆據立分家筆據楊自新自超福嚴今奉父命兄弟三人家口日衆理宜分居各圖生業俾得人人振作家道日昌擇於光緒二十七年三月十九日三房分爨所有祖遺房屋在嶺下二甲住宅內僅得正房一間廚房一股堂心公用菜園一股均與琴軒二叔共業歸長孫庭芬執管祖遺及添置熟田二十畝作為先祖朴庵公支下祭掃田契據歸長房收執金陵城內延齡巷父置屋宇一所圍牆東至西二十四丈西邊南至北二十丈東邊南至北十六丈與漆匠店毗連此屋專作刻經處公業係父親三十餘年經營所成永遠作為流通經典之所三房均不得認為己産目前家眷暫住在內以十年為限十年之後照例起租不得自添屋宇以杜占踞俟各房自造住宅即當移居經局刻板之資係十方善信捐助永遠作為公業經管之人公同選舉近年家用不敷積有缺債通盤清算所缺各處債項計銀三千八百一十兩以目前進款大小分認歸還計大房一千二百七十八兩又浮橋地基房屋歸大房收受值銀六百兩共銀一千八百七十八兩二房計銀一千零五十七兩三房計銀八百七十五兩共認債款三千八百一十兩彼此商議均無異言公同憑中寫立分家筆據一樣三紙各執一紙永遠存照光緒二十七年三月十九日立底稿留存以備查考仁山志序說大宗地玄文本論建立金剛五位以衆生無量劫來業果相續非三僧祇修證之功不能盡除故立無超次第漸轉位以衆生一念相應即同諸佛故立無餘究竟總持位以衆生心含法界普融無盡故立周遍圓滿廣大位以衆生念念著有違解脫門故立一切諸法俱非位以衆生棄有著空趣於斷滅故立一切諸法俱是位上之五位為佛法之總綱攝盡一切破障法門該括一切稱性法門纖毫無遺若明此義則談宗談教說有說空皆不相妨何有分河飲水互相是非之弊哉奈何千餘年來無人提唱遂使無上妙法祕而不宣誠不解其何故也或以論中名義玄微皆是法身大士行相非凡位所知師家艱於應對故不以此論示人然一切悉知必至佛果等覺以還隨分演說不害其德望也儒門所謂知之為知之不知為不知是知也會竊取此義略加注釋所未知者斷不強解庶幾後學得一隙明或有利根上智頓入甚深法界徹底通達是所望也其文義明顯者亦不詮釋閲者自能領會耳光緒三十二年冬十月石埭楊文會仁山氏識時年七十目録卷第一歸依德處無邊大決擇分第一歸依德處因緣大決擇分第二一種金剛道路大決擇分第三金剛寶輪山王大決擇分第四金剛山王道路大決擇分第五獨一山王摩訶山王大決擇分第六卷第二大海部藏道路大決擇分第七深里出興地藏大龍王大決擇分第八深里出興地藏大龍王道路大決擇分第九大龍王重重廣海無盡大藏大決擇分第十無盡無窮盡塵數量道路大決擇分第十一卷第三不可思議不可稱量俱俱微塵本大山王大決擇分第十二不可思議俱俱微塵一切山王道路大決擇分第十三一切虛空一切微塵數量高王大決擇分第十四獨地非亂一定一定道路大決擇分第十五獨地獨天一種廣大無二山王大決擇分第十六獨一無二山王自在道路大決擇分第十七摩訶無二山王最勝高頂一地大決擇分第十八𭺔𣅍陀尸梵迦諾道路大決擇分第十九𭺔𣅍陀尸梵迦諾本王本地大決擇分第二十𭺔𣅍尸梵諾本王道路大決擇分第二十一摩訶𭺕尸梵諾母原主天王大決擇分第二十二一種功德純純無雜大圓滿地道路大決擇分第二十三一種功德摩訶本地明白離惡品藏大決擇分第二十四摩訶本地具足品藏非患道路大決擇分第二十五摩訶寶輪王廣大圓滿無上地地大決擇分第二十六卷第四繫縛地地品類不吉祥道路大決擇分第二十七繫縛地地自然本王摩訶𦅂品大決擇分第二十八自然本王廣大轉地無障無礙俱行道路大決擇分第二十九最極廣大俱行山王無盡海海大決擇分第三十出離繫縛地清白解脫道路大決擇分第三十一解脫山王根本地地無礙自在大決擇分第三十二解脫山王大道路大決擇分第三十三廣大無盡解脫海海摩訶山王大決擇分第三十四摩訶空塵海藏王道路大決擇分第三十五大不可思議重重不可稱量阿說本王大決擇分第三十六校量功德讚歎信行現示利益大決擇分第三十七校量過患訶責誹謗現示罪業大決擇分第三十八現示本因決定證成除疑生信大決擇分第三十九勸持流通發大願海大決擇分第四十高麗古藏作二十卷與起信論序相符宋元藏皆未收入明藏作八卷復併作四卷今從之此論窮微極妙專接利根上智兼為凡小權漸之機作一乘勝因伏願見者聞者熏習成種久久純熟心光發宣即能頓入金剛信位圓修圓證五位齊彰與論主大願注者誠心交光相羅如寶絲網輾轉開導無有既極略標大意第一分歸依德處八門佛法僧有情無情假有空無普融第二分歸依德處十種因緣已上序分已下正宗分第三分金剛五位名相根本五十一位梵名第四分說八轉相同時異時同處異處各種差別第五分五位各有三用共十五種作用第六分金剛五位根本五十一位各各互具成立一千二百七十五位以上四分為一論綱宗第七分內有六門五種非空決定住法五種無常虛假轉法共為第一建立名字不同門第二所詮義理差別門第三依位決定安立門內有十種別建立位第四依位法數具闕門第五德患對量現宗門第六隨次別釋廣說門第八分地藏大龍王有功德過患二義從七分來第九分功德過患二藏之中各有十法通為建立名字門次說所詮義理門內分治障對量差別門安立金剛位地門第十分說三種重廣大數量令修止觀斷惑證真以上四分說對治法門屬漸轉位第十一分說十種變對法門詳示出世因果差別之相第十二分說三種數量倍一法寶二僧寶三佛寶第十三分現示本體安立門現示上末轉相門引經說次第十轉至不可思議無量品第十四分二門同前數量倍增百千萬億乃至無窮盡故以上四分屬俱是位第十五分建立五種轉相說不可合一之法一者上上一一轉相門二者本本一一轉相門三者俱行不離轉相門四者區區不雜轉相門五者圓滿具足轉相門第十六分一者本一自性位地門二者本一之本位地門第十七分本轉形相上轉形相第十八分說十二無窮引經一千二百無窮盡品具足俱轉以上四分屬俱非位第十九分七變修行總有三種一者功德七變二者過患七變三者等量七變均有上轉下轉以為變相第二十分三種百變過患功德等量名義同前增倍數轉第二十一分三種千變名義同前增倍數轉第二十二分三種億變名義同前增倍數轉以上四分屬總持位第二十三分五十一位各具五十成二千五百五十法門位位具足性相本末四法成立一萬二百法合總數有一萬二千七百五十法門第二十四分如前所說一切位中各各攝差別轉五十位則成六億三萬七千五百法門第二十五分一者橫轉遍到俱行門二者豎轉無雜一路門第二十六分總別相攝以上四分屬圓滿位第二十七分入道初門全仗對治與第七分後先相映建立智理障果四法以為斷證公據第二十八分障輕理顯有無齊運上轉下轉至小無量第二十九分行藏海中常無常德漸漸增進至中無量第三十分行常山王海中有三種大無量一者常大無量二者無常大無量三者轉變大無量以上四分說信住行向進道階差第三十一分十空無為十有無為依二十無為五十一位建立二種轉相一者重重該攝無障礙門二者次第亂轉超過門第三十二分空有互生十空無為一一出生十有無為常法十有無為一一出生十空無為常法第三十三分一者空空轉十空各生十空二者有有轉十有各生十有三者位位轉五十一位各生五十第三十四分通結體相用歸於無盡以上四分說地上德用自二十七分以來凡八分屬漸轉位第三十五分統前三十二法無不自在第三十六分三十三法沒同果海不可思議不能窮了以上二分因圓果滿已上正宗分已下流通分第三十七分說十二喻讚歎論之勝用第三十八分先說三喻警醒愚迷次說十偈令離誹謗後說一偈丁寧誥誡第三十九分馬鳴菩薩自說往因并隨佛發願及遵敕造論緣起第四十分普勸受持
