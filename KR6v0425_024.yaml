body:
  text: 清石埭楊文會仁山著闡教芻言古來闡教大士莫不以佛經為宗橫說豎說皆不違經意余與真宗教士往還有年矣而未知其旨趣所在頃因北方上人自日本來建立本願寺於金陵城內欲將祖書刊板流行爰取選擇本願念佛集閲之覺其中違經之語甚多已略加批評復取真宗教旨詳覽一遍逐細辨論歸之北方君請其轉致同人商榷彌縫之道并進以芻言曰今日所期於真宗者無他唯在乎闡教之言不背淨土三經耳夫菩提心為淨土正因今欲往生淨土而唱言捨菩提心是南轅而北其轍也嘗觀南條上人航西詩稿有斷章取義大師眼三經之要二三策等語可謂深知本宗教旨者矣南條之意欲將本宗教旨譯布天下萬國美則美矣而未盡善也夫所謂斷章取義者果與全經意旨不相違乎若與全經不相違則不得謂之斷章取義若相違則不得謂之釋迦教即謂之黑谷教矣然則若之何而可也一切教規概不更動但將捨聖道之語隱而不言不過少小轉移之間便成契理契機之教或以違祖訓為疑而不知非也且以世法論之五伯之子孫豈不能學三王三王之子孫豈不能學二帝以出世法論之聲聞之門徒豈不能學緣覺緣覺之門徒豈不能學菩薩此理不待辨而明矣若必守成法而不許變通則地球各國亦不能有維新之氣象矣或曰其如正像末三時所限何答曰今時正當末法之初分非其中分後分也若初分即將經意抹盡則中分後分將如之何末法尚有七千餘年此時不將經意昌明豈能延至如許長時耶且三時有互攝之義於末法內亦攝正像是在根器不同亦因時無實法耳或曰真宗之教重在難易之分其斷章取義者捨其難而取其易也余應之曰非也西方淨土佛力所成順佛意則往生易違佛意則往生難若說法不順經義則是捨易而就難矣豈有謗法之人而能生淨土者哉近代以來門戶之見牢不可破支那境內禪宗一派空腹高心西來大意幾成畫餅台教一派尚能講經惟泥於名相亦非古法且諸方名藍向無學堂造就人才所以委靡不振也真宗既有學寮講肆又開普通學館是世出世法兼而習之人才輩出何可限量惟願善學者不為成法所拘則妙契佛心允為如來真子矣鄙人護持正法過於身命故不避忌諱冒昧陳言倘不以為然笑而置之可也向後學徒研究淨土三經精通其義必有與鄙意暗合者將拭目俟之隨文辨論書於選擇集及真宗教旨內者茲不重出請閲批本為盼評真宗教旨十餘年前獲真宗教旨一卷悉心研究覺與經意不合處頗多遂參注行間以備芻蕘之採真心論道不避忌諱所謂個中人方談個中事也近時泰西各國辦理庶務日求進益總不以成法為足貴宗廣布佛教勢將遍於地球伏願參酌損益駕近古而上之故不憚繁言陽似辨駁陰實資助祈大雅鑒之極樂淨土由彌陀願力所成彌陀既發大願勤修聖道方得圓滿經云住空無相無願之法無作無起觀法如化此即聖道之極則也以聖道修成本願若云捨聖道則是違本願矣因果相違豈得往生經云深信因果不謗大乘良有以也以淨土為入聖道之門生淨土後則一切聖道圓修圓證若在初修時唱言捨聖道便是違背淨土宗旨矣淨土門以三經一論為依切須體究經論意旨方名如來真子也真宗教旨第一號云第一祖龍樹菩薩祖其作易行品而不祖其講布華嚴中論存上句刪下句可免掃拂聖道之弊龍樹作易行品祗分難易不顯立掃今真宗立淨土而掃聖道與論意不符龍樹說難行易行二道是活法於聖道中開出淨土一門接引後學此為同中別也利根於現生中得念佛三昧即證入聖道門鈍根於往生後華開見佛亦證入聖道門此為別中同也闡揚聖教者須將死法說成活法不得將活法說成死法佛教命脈僅如懸絲可不懼哉又第二號云本宗名淨土真宗據念佛成佛是真宗之語以親鸞上人為始祖大織冠鎌足公之裔而藤原有範公之男也夫人玉日氏攝政關白兼實公之女也初源空大師倡淨土宗海內風靡門人三百餘上人實為其上足關白歸大師為大檀越一日曰大師持戒而念佛弟子噉肉畜妻而念佛無乃有勝劣耶大師曰同一念佛何差之有曰弟子有女屈一上足為壻以斷天下後世之疑大師以上人應上人辭不可是為開宗之緣由於佛教門中專重淨土於淨土門中專重他力信心可謂簡而又簡捷而又捷矣此法在家二衆行之相宜出家五衆自有清規若一概效之則住世僧寶斷矣末法萬年儀表不可廢也又第三號云以聖道淨土二門判一代教大小半滿權實顯密為聖道門是係此土入聖之教大無量壽經阿彌陀經是係往生淨土之教又聖道門中有豎出豎超法相三論為豎出華天密禪為豎超淨土門中有橫出橫超以諸行往生為橫出是係自力以念佛往生為橫超是係他力聖道為十方剎土解脫之門徑生西方淨土之人亦由聖道而證妙果修諸行者若不念佛回向亦不得往生又第四號云方今係佛滅度二千八百二十五年人劣才暗不能踐聖道而登大果是所以聖道不振也以不可行之法強於不能行之人迫雞入水豈理哉道綽逼雞入水之喻為留形穢土之人而說非為修聖道者說也迫雞入水即遭淹沒未聞修聖道而墮落者蓋聖道雖難速證亦作淨土資糧與彌陀因地同一修途自然與果位光明相接也專修淨土之語可說不修聖道之語不可說蓋淨土亦是聖道無量門中之一門修淨土即攝一切聖道入一門所謂他力信心者廢自顯他也不許自他相對即成絶待圓融法門矣剋實論之信心者自心所起也他力者自心所見之他力也除卻現前一念復何有哉自他皆是假名廢假名之自而立假名之他妙用無方以龜毛易兔角幸勿執為實法也又第六號云於四十八願中以第十八願為真實其所被之機為正定聚生真實報土十九二十為方便十九之機回向諸行止至化土故為邪定聚二十之機或進入第十八或退墮第十九故為不定聚開說第十八為大經開說第十九為觀經開說第二十為小經大經機教俱頓觀經機教俱漸小經教頓機漸生淨土者蓋入正定聚絶無邪定及不定聚經有明文處處可證若以觀經所攝判為邪定聚則是聚九州鐵鑄成一大錯矣觀經被大機最極圓頓一生可證初住位與善財龍女齊肩於觀中蒙佛授記是也何得判為機教俱漸又第七號云大經係真實教無隱顯義觀經係方便教故有隱顯以顯見之為日想水想之觀以隱取之為觀佛本願之觀一文兩義是為隱顯觀經從第三觀以去皆是極樂妙境無一非佛願力所成不待隱取方為觀佛本願也又第八號云方今居大叢林稱大和尚外標賢善內實貪吝被綢緞坐氍毹尊大養望瞞人自欺豈稱君子不但此等人非正修行即終身修苦行衲衣一食科頭跣足晝夜不眠或處禪堂或居山洞自負修行不肯虛心看經學道但以除妄念為功日久功深一念不起便謂證道殊不知恰成就一個無想外道離佛法懸遠矣功行淺者命終之後隨業輪轉豈不哀哉又第九號云信心從他力而發名他力信心佛力為他力明信佛智為信心祖師曰歸命之心非從我生從佛敕生故名他力信心自力之徒修雜行雜修他力之徒不修之自力之信有九品所生之土亦有九品經曰胎生他力之信一相無別所生之土亦一無量光明土經曰化生經云十方衆生至心信樂欲生我國發此三心者仍係自力也若云從他力生他力普遍平等而衆生有信不信豈非各由自力而生信乎倘不仗自力全仗他力則十方衆生皆應一時同生西方目前何有四生六道流轉受苦耶能領佛敕者自心也故仍從自心生所云不修者如禪宗之無修無證乎抑如世俗之隨波逐流乎下文俗諦非雜行雜修而何九品之中上品上生者立刻見佛得忍受記以下諸品均無胎生之事大經所說之胎生以疑惑無智所感與上品之超越中品之純篤大相懸殊矣又第十號云真俗之名有重重之義本宗假以安心門為真諦以倫常門為俗諦本宗既開許畜妻不能無五倫既有五倫不能不履其道是為俗諦凡夫之罪雖大較諸願力不啻滄海一粟所以不問噉肉畜妻也衆生之善為有漏彌陀之報土為無漏有漏之善不可以生於無漏土第十號所說盡是雜行雜修何以前文力掃諸行豈所掃者是出世行而不掃者是世間行乎夫世間行長生死業而出世行逆生死流孰正孰反必有能辨之者倫常門是世善世善尚不廢何為偏廢出世善耶一切世善均在菩薩萬行中攝但能回向淨土則成往生業否則人天果報而已發菩提心者一切世善皆成無漏不發菩提心雖修五度總屬有漏又第十一號云諸式入社之後口授面稟華地時有外道邪宗祕密傳授不令他人得知貴宗卷尾有口授面稟之語令人見而生疑似宜編輯成書入社之人各領一冊以便遵行貴宗所奉者大經第十八願今先録願文隨後解釋經云設我得佛十方衆生至心信樂欲生我國乃至十念若不生者不取正覺唯除五逆誹謗正法文此中有乃至二字可見七日持名減至一日又從一日減至十念是最少最促之行也向下更無可減矣大經下輩生者正是此機其上輩者是十九願所被之機今云十八願為正定聚十九願為邪定聚此即大違經意十八願末言五逆謗法不得往生凡與經意相違者均是謗法觀經下品下生十惡五逆回心即生未收謗法蓋謗法者與彌陀願光相背也今判十八願所被之機生真實報土十九之機止至化土此等抑揚未知何所依據請將經文確證一一指出以釋羣疑評選擇本願念佛集貴宗道友惠贈七祖聖教已將往生論注安樂集觀經疏刊板流行頃承心泉大師屬刊全書因逐一檢閲見得此集與經意不合處頗多略加評語就正高明倘不以為然請逐款駁詰可也本集第一云道綽禪師立聖道淨土二門而捨聖道正歸淨土此一捨字龍樹道綽皆不說說之則有病蓋聖道與淨土一而二二而一者也本集第一又引道綽安樂集上云當今末法現是五濁惡世唯有淨土一門可通入路故大經云若有衆生縱令一生造惡臨命終時十念相續稱我名字若不生者不取正覺縱令一生造惡經文中無此六字本集第二引善導疏云衆生起行口常稱佛佛即聞之身常禮敬佛佛即見之心常念佛佛即知之衆生憶念佛者佛亦憶念衆生彼此三業不相捨離故名親緣也此說是比量屬依他性本集第二又云衆生口不稱佛佛即不聞之身不禮佛佛即不見之心不念佛佛即不知之衆生不憶念佛者佛不憶念衆生彼此三業常相捨離故名疏行也如是翻對是世俗見即是非量屬遍計性以彼此之界揣度如來十萬億佛土如何得去佛以無緣大慈攝化衆生平等普遍無親疏之別而言親疏者屬衆生邊事若佛因衆生而有親疏則亦衆生而已矣烏得稱為佛耶本集第三云無量壽經上云設我得佛十方衆生至心信樂欲生我國乃至十念若不生者不取正覺觀念法門引上文云若我成佛十方衆生願生我國稱我名字下至十聲乘我願力若不生者不取正覺往生禮讚同引上文云若我成佛十方衆生稱我名號下至十聲若不生者不取正覺兩段引文皆作下至十聲可見十念是至淺之行而真宗教旨反以此行駕九品之上何也本集第三又云壽經云中略於是世自在王佛即為廣說二百十一億諸佛剎土天人之善惡國土之粗妙應其心願悉現與之時彼比丘聞佛所說嚴淨國土皆悉覩見超發無上殊勝之願其心寂靜志無所著一切世間無能及者具足五劫思惟攝取莊嚴佛國清淨之行阿難白佛彼佛國土壽量幾何佛言其佛壽命四十二劫時法藏比丘攝取二百一十億諸佛妙土清淨之行中略經意亦有選擇義謂云攝取二百一十億諸佛妙土清淨之行是也選擇與攝取其言雖異其意是同攝取專屬取而不言捨選擇則有取有捨語意不同攝取二百一十億諸佛妙土清淨之行從上文思惟攝取莊嚴佛國清淨之行語來法藏比丘當時聞說二百一十億諸佛剎土一時融入心境逮永劫修行之後一時發現非如世俗造作須選精美者作模樣方能成就也譬如春蠶食葉大小老嫩一概食盡及其吐絲變為一色非復桑葉形樣矣本集第三又云夫約四十八願一往各論選擇攝取之義者中略乃至第十八念佛往生願者於彼諸佛土中或有以布施為往生行之土或有以持戒為往生行之土中略或有以般若為往生行之土或有以菩提心為往生行之土中略及以孝養父母奉事師長等種種之行各為往生行之國土等或有專稱其國佛名為往生行之土中略如是往生之行種種不同不可具述也即今選捨前布施持戒乃至孝養父母等諸行而選取專稱佛號故云選擇也以選擇取捨之心測度彌陀因地彌陀因地果如是乎般若為諸佛母般若現時命根意根俱不相應即證無生忍不但不起淨穢二見即佛見法見亦不起也菩提心為因果交徹之心諸佛極果名阿耨多羅三藐三菩提此集並菩提心而捨之不知以何為佛也本集第三又云念聲是一何以得知觀經下品下生云令聲不絶具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪今依此文聲即是念念即是聲其意明矣念者心念也稱者口稱也今云聲即是念念即是聲誤矣觀經之文明明可考經曰此人苦逼不遑念佛善友告言汝若不能念彼佛者應稱無量壽佛可見念與稱有別也下文具足十念之念字是稱名之時一心專精無他念間雜惟有稱名之念十念相續即得往生此人苦極心猛命根斷時前後不接金蓮明耀忽然在前心力佛力皆不思議也本集第四云上輩之中雖說菩提心等餘行望上本願意唯在衆生專稱彌陀名而本願中更無餘行三輩俱依上本願故云一向專念無量壽佛也一向者對二向三向等之言也中略雖先說餘行後云一向專念明知廢諸行唯用念佛故云一向此段所論一向之言甚違經意經中所說菩提心及諸功德皆是念佛行門良以一切法入一法一法攝一切法方見純雜無礙妙用即得名為一向專念也若如此中所說為廢諸行歸於念佛而說者則經中有自語相違之過何以故經文明明一聯說下絶無廢歸之意也且著衣喫飯亦是雜行便利睡眠亦是雜行必須不食不眠一口氣念到死方合此集引證一向之言也佛經何等深妙而以淺見測之豈不貽誤後人哉本集第十一云凡九品配當是一往義五逆回心通於上上讀誦妙行亦通下下十惡輕罪破戒次罪各通上下解第一義發菩提心亦通上下一法各有九品若約品即九九八十一品也五逆以下三行解說若約懺罪猛鈍修證淺深則可以九品互通此中說解第一義發菩提心亦通上下者除非中途退墮作諸惡業臨終回心如經文下品中說如此三行未免令初心人無所適從所謂矯亂論議也本集第十三引善導頌云極樂無為涅槃界隨緣雜善恐難生故使如來選要法教念彌陀專復專七日七夜心無間長時起行倍皆然臨終聖衆持華現身心踊躍坐金蓮坐時即得無生忍一念迎將至佛前法侶將衣競來著證得不退入三賢善導此頌重日夜精持一心無間下文得無生忍入三賢位皆是證聖道也本集第十四云何故六方諸佛證誠唯局念佛一行乎局字大錯蓋佛法雖無量門而修習者必從一門深入方得遍通一切佛法譬如一室四面開門欲入室者必從一門若擬從東入又欲從西或兼南北則終無入室之時矣本集第十六云選擇讚歎者上三輩中雖舉菩提心等餘行釋迦即不讚歎餘行唯於念佛而讚歎云當知一念無上功德故云選擇讚歎也菩提心即正覺心也成正覺方名佛今重念佛而輕菩提心大違教義念佛有多門念佛名號念佛相好念佛光明念佛本願念佛神力念佛功德念佛智慧念佛實相隨念一門即攝一切門方入十玄法界若存取捨之見則全是凡夫意想與佛界懸遠矣本集第十六又云善導觀經疏者是西方指南行者目足也觀經所說十六法門無一不是念佛此文所判似專局乎持名也此集專以持名為念佛而觀想等法均判在念佛之外非經意也評小粟栖陽駁陰資辨佛說接引往生皆是顯他力之教三輩九品皆仗佛力而得往生若全仗自力必至圓初住別初地始能十方世界隨意往生故知淨土三經勸進往生全仗他力而仍以自力為階降之差我佛慈悲所以誨人者至為圓妙若以三輩九品為自力往生則失經意矣辨云聞貴國黃衣派挾天威而恣尊大毫無學問之志其青衣各派乃甘卑屈而視國家之興敗如秦人於越人肥瘠故政府亦處之度外棄而不顧也僧俗二衆佛有遺規僧則守出家律儀不干世務俗則依在家道理致君澤民二者不相濫也辨云龍樹之開難易二道非難中開易也非聖道中開淨土也聖淨二門井井區別矣天親之淨土論正明淨土而龍樹之易行品傍明淨土耳不識佛法開合之妙見聖道淨土判然兩途不得不改變經意以合於自宗也天親往生論於依正莊嚴後攝入一法句明淨土不外乎聖道也曇鸞釋之甚詳辨云同中別者佛教中見二門也別中同者二門雖異其所證之真如一也真如即是聖道既知同證真如奈何唱言捨聖道耶辨云方今聖道之一門不合時機獨我真宗何肉周妻為國家奔走不啻說出離之法併亦說忠君愛國之事毫不賸坐深山悉達太子捨金輪王位入山修道為後人榜樣我輩雖不能學心常羡之今知貴宗如是存心所謂道不同不相為謀也辨云彌陀本願不取諸行獨取念佛四十八願普攝諸行何云不取耶念佛即是諸行中之一行專修念佛所謂一門深入也而以世俗事務夾雜其間欲得往生不亦難乎辨云本宗有二門一學門二行門約學門則一切經可學也不學一切經則不可解淨土之法門也若約行門則單據念佛之一行豈攘排一代佛教乎學與行兩不相干則學成無用之學閲教典須一一銷歸自性方為有益栖君之言以閲經為所學而非所行則學與行兩不相涉所學即屬無益謹按此條評本未録茲依手稿增入編者識不學下三十五字恰合我意辨云此土入聖為聖道門他土得生為淨土門歷歷區別矣不可一混也聖道即淨土何用往生十萬億之西哉栖君非但不知聖道亦復不知淨土大凡闡揚淨土者須知淨土因何而成既以大經為真實豈不見法藏比丘白佛言我發無上正覺之心非菩提心而何發大願後修行文中自行六波羅蜜教人令行經文彰彰可考證知彌陀報土皆因修行聖道而得成就奈何定要捨聖道判修行者為邪定聚生於化土不修行者為正定聚生於報土顛倒謬亂莫此為甚豈日日持誦經文循行數墨全不解義耶辨云本宗以二門之判判一代教曰聖道門曰淨土門於淨土門有二門曰正明淨土教曰傍明淨土教於正明淨土教有二門曰真實教曰方便教真實教者大無量壽經是也方便教者觀無量壽經阿彌陀經是也從上諸師開宗判教必將所依之經全體透徹方能破立自由縱橫無礙未有將本宗之經任意掩抑令前後文意不相聯屬者如貴宗以無量壽經為主而此經中三輩往生之相則判為自力棄而不取以致全經血脈不能貫通矣辨云本宗之釋三聚以順本願者為正以不順本願者為邪第十八不以諸行為往生之因單以念佛為往生之因善導曰一心專念彌陀名號是名正定之業順彼佛願故順彼佛願必得往生是為正定聚觀經定散諸行不順佛願是為邪以邪而願生故為邪定聚也觀經是佛說何云不順佛願尊善導而慢釋迦是何居心辨云此邪之言顯非本願之行如天台之以小乘為邪見小乘佛教豈邪乎望之圓教得邪名耳以小乘為邪見方等經中破小顯大之語非天台臆說也若經中無此語天台斷不敢杜撰辨云作九鐵鑄錯之大惡口何不反省之甚若照此本判斷僅云大錯猶不足以盡之辨云淨土無九品為真實報土有九品為方便化土也定散諸行非本願之行以非本願之行願生淨土必得九品之化生也從此化土一轉往生真土故判觀經往生為機教俱漸也淨土蒿目仔細玩索必覺妙味津津無盡焉不顧佛經之本意強作一解以合於自宗苦心思索而得之此所以津津有味也非但釋迦教中無此道理即十方三世一切諸佛教中亦無此道理用凡夫意想捏造一法以駕於佛經之上罪過彌天辨云報土也者一種真妙而無九品之差別往生即成佛無一轉入報之迂回也判他力信心者駕於九品之上往生即成佛大經內無此義猶如空拳誑小兒也辨云依觀經三昧見淨土依正其所見之土非報土是化土也此化土亦願力所成懈慢界釋迦佛何故說此懈慢界教人往生此真可謂謗佛謗法矣辨云以第十八願為弘願以定散為要門善導之釋皎如日星定散非本願單念佛為弘願善導流通照人顏色善導落筆時不料後人有此等執見也善導施之是藥後人執之成病辨云支那僧大抵不學佛書多見坐禪或頭陀者一念不生誠為佛果然至此一念不生之域難矣若誠至此域者非是無想外道判誠至一念不生者非是無想外道何其見之淺也且不知無想定與滅盡定差之毫釐謬以千里外道生無想天自謂證大涅槃不知報盡決定墮落也辨云名號之入衆生心中是為他力信也得此信者據宿善焉宿善者恆值佛也過去修習念佛也闕此宿善則不能得信此言成就我宗宿善是自力所作尊意只許前生之自力不許此生之自力誠不解其何義也辨云觀經之九品係淨土之化土彌陀以方便之願成此九品之化土以應九品自力之機此機往生此化土而後一轉入一種真妙之報土也經中實無此語或貴國所傳之本與支那現行本不同歟辨云本宗釋三輩菩提心有二門一者以為聖道自力之菩提心是可廢也第十八不許自力菩提心故也二者以為他力之菩提心第十八之三心是也三輩之菩提心即至心信樂所生也四弘誓如錠子金三心如葉子金乃諄諄誨人曰錠子金不可用必須用葉子金豈知錠子金與葉子金體本無二用亦無二也辨云本宗以第十八願為真實願以十九願為方便願十八願不許諸行是為真實十九願許諸行是為方便第十八願既為真實佛又何故要說第十九願之方便令人捨易而行難既往生而更須轉進方入十八之真實也若方便易而真實難佛則令人從易進難豈有從難進易以為方便乎總之以立異為高不立異不足以動人也辨云觀經序正開十九願也至流通而廢諸行單屬念佛始與第十八同其歸也貴君之眼未能徹其紙背一片之婆心促君反省尊目力透紙背所以能作反語拙目不徹紙背故祇作正語古人云依文解義三世佛冤離經一字即同魔說彼此各坐一邊病若二邊不著則無病辨云十九願許諸行非彌陀本意也既非本意何得發此一願豈非違心之願乎此等判斷實屬膽大有識者決不敢出此語也謹按此條評本未録茲依手稿補入編者識辨云見真大師之開淨土真宗以法然上人為師法然依善導立一宗善導五部九卷並明觀佛念佛使初心不知其所歸法然探知其意之所在筆之於文章使天下萬世知唯念佛之可依焉此是不滿善導之處證知法然並非全宗善導乃取善導之片言而文飾之耳辨云第十八願之十念諸師誤為觀念意念善導楷定之為口稱法然依之見真依之小彌陀經專主持名豈至二千年後法然始指出哉辨云善導散善義以別解別行喻之羣賊據其以諸行障往生之行也經中以諸行資助往生斷無障往生之理善導所說別解別行退失往生之業者喻之羣賊若以菩提心及諸功德喻之羣賊則本疏中自語相違矣嘗憶十年前上海傳教西人引我至講堂有本國演教者大聲宣言曰基督教如杲日之光儒釋道等教或如星月之光或如流螢之光杲日一出諸光皆隱君何不捨佛教而歸我基督教乎豫笑而不答知其不可與言也孔子云可與言而不與之言失人不可與言而與之言失言嘗見貴宗諸君子藹然可親謂其可與言也今閲辨答之辭祗樹自宗之門庭不顧佛經之意旨前此一番狼藉豈非墮失言之過乎評小粟栖念佛圓通原書云源空上人世以為大勢至菩薩化身故名此解以念佛圓通勢至自云我無選擇源空專主選擇勢至念佛都攝六根源空專主口念意根且不攝遑及眼耳鼻身乎以圓通目之恐不稱也原書云本宗以念佛為大乘無上之法勢不可降喬入幽也源空上人去天台入弘願是不守成法而能變者閲至此處乃恍然曰我過矣我過矣彼直欲駕佛經而上之立義在三藏教典以外而我方以遵崇佛語相期豈不令人嗤笑哉原書云源空上人母秦氏夢吞剃刀而有孕夢吞剃刀即是割斷聖道之兆也原書云上人從黑谷移吉水日稱名六萬遍猛利念佛亦恐涉於自力原書云攝政關白大政大臣兼實乞上人作選擇集上人說法於月輪殿其歸兼實拜之地上人頭現圓光中有寶瓶兼實驚喜以知其勢至之化今而後方知釋迦教外別有勢至之教流傳人間深自愧其見聞之不廣也原書云建久九年正月二日水想觀成矣七日琉璃地現二月水想地想寶樹寶池宮殿皆現元久三年正月四日彌陀觀音勢至現余按非是入定而得之稱名念佛之力自然感此好相也余按下二十餘字恐其涉於雜修雜行所以作此出脫之語而稱名念佛仍不免自力也原書云建曆二年正月在大谷得疾見佛菩薩化身二十五日寂紫雲降焉假如有佛現於空中放光說法倘不與修多羅合亦不足信也原書云上人之閲一代時教在以其所得之要路而自利利他耳曰真言止觀三論法相之教道幽理邃利智聰明之者可以行焉方今暗於三密而登遍照之位乏於戒律而居持律之職是謂虛假虛假非可以出離也將來親見勢至當問此事若真勢至化身仍須切實辨論過於此番之言百千萬倍請彌陀釋迦并十方諸佛證明原書引善導法事讚土云弘事多門四十八偏標念佛最為親人能念佛佛還念專念想佛佛知人佛還念及專念想佛等語可見善導以念字通於心口貴宗判定屬口稱亦不合善導意也原書云問單曰十念何以知其為口稱哉答據善導觀念法門以十聲稱名釋乃至十念往生禮讚亦以十聲稱名釋乃至十念十念之非心念意念者皎如白日稱名本在念佛之內若執定念佛必局於稱名則於經意不貫此段願文須查考梵本若原文仍屬意業即不得從善導改作口業譯師最為慎重不許任意竄改也若口稱與心意無涉則口稱佛名心念五欲心口兩歧尚得入彌陀願海乎偏邪之見至於此極何足與辨原書云本宗以第十九願為方便以其取菩提心等行也此十九之成就為三輩三輩皆舉菩提心十九之菩提心自力則三輩之菩提心亦自力也開十九為觀經以十九為方便則觀經亦方便也三輩九品開合之異三輩菩提心自力則九品菩提心亦自力也散善有二一者三福二者九品此三福九品亦開合之異九品菩提心自力則三福菩提心亦自力也三福者世戒行也行福中有發菩提心上下品有發無上道心十九三輩三福九品一切屬散善之行非本願之行又云自力菩提心有多種末代凡夫豈得發此菩提心哉彌陀因位捨之據其難行也謂觀經之定散大經之三輩不順佛願是謗釋迦謂彌陀因位捨菩提心是謗彌陀吾不知栖君是何等人也彌陀因位捨之一語不怕拔舌泥犂何敢出此語釋迦教中實無此語勢至教中有之乎吾不得而知也彌陀因位捨之一語不知栖君出於何心鄙人返己自忖假令刀鋸在前斧鉞在後以威力逼之我亦情願粉骨碎身決不忍出此一言也謹按以上兩條評本未録茲依手稿補入編者識原書云選擇集廢菩提心據善導善導曰上來雖說定散兩門之益望佛本願意在衆生一向專稱彌陀佛名選擇集之廢據此善導實無廢菩提心之語真宗強指其廢菩提心借疏末一句用之費盡無限心力亦可哀也原書引善導觀經疏序分義曰發菩提心者此明衆生欣心趣大不可淺發小因自非廣發弘心何能得與菩提相會唯願我身身同虛空心齊法界盡衆生性我以身業恭敬禮拜迎送來去運度令盡又我以口業讚歎說法皆受我化言下得道者令盡又我以意業入定觀察分身法界應身而度無一不盡我發此願運運增長猶如虛空無所不遍行流無盡徹窮後際身無疲倦心無厭足又言菩提者即是佛果之名又言心者即衆生能求之心故云發菩提心也此是善導所說何得判其捨菩提心原書云如是菩提心亂想凡夫豈能發得哉此言闢善導凡夫定是凡夫攝歸淨土如何化導蓋凡夫之本心與諸佛無二無別所以蒙佛接引即脫輪回之苦也原書云十九願自力菩提心生乎化土深自悔責轉入真土故為橫出十八之信樂順次往生證大涅槃故為橫超此判大違經意經文第十八願普攝羣機也如法華之一稱南無佛皆已成佛道者是也第十九願別攝上品機也今抑十九為化土揚十八為直證涅槃一切經內皆無此義原書云均是觀經也天台以之為心觀為宗實相為體善導以之為念佛觀佛為宗往生淨土為體本宗依善導誰以善導為違教乎以疏輔經不以疏掩經慎之慎之原書云此捨一字所以開淨土宗於聖道各宗之外也以此一字使天下萬世知標準之所在也暗藏滅法之機原書云聖道難行不可行也故斷斷乎捨之既不能行又何必言捨原書云安樂集曰聖道一種今時難證乃至大集月藏經曰我末法時中億億衆生起行修道未有一人得者此等語句均是活機策勵後學之言也原書云欲開一宗風動天下者必須鮮明其旗幟而令知其方針不顧經意之所在只圖動人之觀聽欲出新奇其途甚多支那境內且有數十種而未已也原書云此土入聖為聖道他土得證為淨土栖君實未嘗知聖道淨土同別之源語語以此土入聖為聖道他土得證為淨土所知盡於此矣豈知聖道者十方三世同行之道娑婆極樂均如是修證佛說淨土門是防退之法仗彌陀願力往生西方永無退緣必至成佛也是以專修淨土即得圓成聖道門若唱捨聖道即是捨淨土蓋淨土由彌陀修聖道而成也如來善巧方便或說自身或說他身或示己事或示他事而以世俗情見固執不解欲入佛界不亦難哉原書云居士曰縱令一生造惡經文中無此六字解曰余以居士為信道綽今則以道綽為違道余不知居士之意在何處道綽於願文內加此六字開後人放肆之門不可不辨豈有刻其書而不檢其過耶即如南嶽大乘止觀引起信論之語添一惡字蓮池已舉其錯敝處刻藕益書甚多亦時時論其錯處不能為之回護也原書云道綽以觀經下下品釋大經第十八願也大經十方衆生之言不知何等衆生道綽以為下下品之機是道綽之為天下後世彰彌陀願王之本意也第十八願末明言唯除五逆誹謗正法道綽加六字於願文之中顯違經意遵經乎遵道綽乎原書云善導曰衆生起行口常稱佛佛即聞之身常禮敬佛佛即見之心常念佛佛即知之心常念佛之語與口常稱佛一耶二耶原書云居士以善導為比量為依他以集主為非量為遍計居士以唯識視淨土門乎遍計空依圓有居士以集主之言為龜毛兔角乎此中微細分別心粗氣暴者何足以知之淨土若缺唯識則彌陀佛法為有缺矣集主翻對之語全是凡夫情謂妙覺位中決無此理非龜毛兔角而何原書云居士曰佛以無緣大慈攝化衆生平等普遍無親疏之別而言親疏者屬衆生邊事若佛因衆生而有親疏則亦衆生而已矣烏得稱為佛耶解曰居士單知有平等門而不知有差別門也無緣大悲平等普遍是為平等門若以願行來收非無因緣以三心十念為往生之因是為差別門據此差別門開淨土之一門彌陀偈經曰發願踰諸佛誓二十四章是彌陀本願之所以超諸佛也順其本願為親行不順其本願為疏行也以水為能感以月為所感月豈不照外物哉然非水則不能感月影也親疏之行可以知矣以三心十念之因為差別門正屬衆生邊事下文水月喻恰成就我宗如因衆生而佛有親疏則佛應無邊之機應有無邊親疏之別有心則不普無心則不差請細思之觀經云光明遍照十方世界念佛衆生攝取不捨又云以無緣慈攝諸衆生此兩句須善融會若執定一邊則互相違矣水清則月明水濁則月暗明暗在水而不在月是以親疏屬衆生邊事原書云居士以十念為至淺之行何其破法之甚前引道綽釋十方衆生以為下下之機則道綽亦破法矣原書云善導曰上來雖說定散兩門之益望佛本願意在衆生一向專稱彌陀佛名以此觀之序正之定散非彌陀本願流通之持名是為本願也誠如此言則善導疏觀經數萬字大可不必即佛說三部經法亦屬虛設單說第十八願一條足矣原書云集主以大阿彌陀經之選擇釋大經之攝取是以異譯釋本經誰敢非之漢譯吳譯皆用選擇魏譯唐譯皆用攝取因古之二譯字句未能妥洽是以重復譯之俾成善本若後譯不能勝於前譯當時亦毋庸費此筆舌矣細味攝取二字義理深長請以梵文證之原書云居士之所嫌唯在選擇二字集主之開一宗唯在取選擇二字取者與嫌者相反不必望居士之隨我也唯祈居士捨彌陀所捨之行取彌陀所取之行而往生真實報土彌陀所捨者無明煩惱也我亦捨之彌陀所取者菩提涅槃也我亦取之彌陀以三輩九品攝受衆生我亦願往生焉原書云大經曰二百一十億諸佛剎土天人之善惡國土之粗妙既有善惡須捨惡取其善既有粗妙須捨粗取其妙五劫思惟在捨其粗惡而取其善妙永劫修行之後其精妙之物集而成彌陀淨土是彌陀淨土之所以超出諸佛淨土也法藏比丘見果知因思惟修行因圓果滿自然顯現淨妙國土豈以精妙之物集而成土如世俗造作之相耶原書云春蠶吐絲之譬亦不外於風流人之假想也八功德水七寶樹林豈一色蠶絲之可擬者耶春蠶喻以為不確復以作文喻之譬如聰慧之士讀盡古今書籍欲作一篇大文章必由自己胸中流出絶不蹈襲陳言方成妙文若一一採自他書縱將一切佳句採盡祗成一片碎錦豈得稱為妙文彌陀淨土亦復如是原書云集主之言般若者信第一義也是因行而非般若現時也六度中般若波羅蜜是也不現何得名般若謹按此句評本未録茲依手稿補入編者識以六度中般若波羅蜜為淺是全不知般若亦并不知波羅蜜非般若現前不名六度以其不到彼岸也支那禪宗專學般若其造詣之深豈門外漢所能知耶原書云此集菩提心者因行也非佛果也無因如何得果以菩提心之正因方能契無上妙果句義且不能通何能論佛法原書云下下品不能念彼佛者之念心念也應稱無量壽佛口稱也具足十念之念亦口稱也何不曰具足十稱而曰十念耶蓋猛利稱名之時心亦隨之以口攝心也必欲掃除心念是障往生之路矣原書云居士以著衣喫飯便利睡眠為雜行佛者之口氣須禁此不祥語矣宗門參禪者每云除喫飯便利是雜用心律中在著衣喫飯睡眠上制戒數十條何謂佛者不應說豈不聞粗言及細語皆歸第一義乎不祥之語莫大於違經意原書云居士曰五逆以下三行解說若約懺罪猛鈍修證淺深可以九品互通此中說解第一義發菩提心通上下者除非中途退墮作諸惡逆臨終回心如經文下品中說解曰居士已許修證淺深矣解第一義發菩提心豈無淺深差別乎發菩提心解第一義亦通上下之語拙評已說明除非中途退墮方落下下以其退菩提心失第一義故也十惡五逆亦通上上者除非作實相懺徹證罪性本空方能超升上上也故此互通之義皆須轉機轉則失上而趣下失下而趣上若不失仍不互當以經文為正也台教後人說橫說豎說逆說順祗逞鋪排之富麗往往語中有病而不自知耳雜評久知真宗之名而未知其實自小粟栖君力辨之後始知真宗之所以為真宗矣彼此答覆意在言外觀此番辨論之言貴宗之骨髓見矣佛經且任意廢棄何況凡位學者之言而不肆口詆訶率意陳言可謂不度德不量力也我輩篤信他力仍不廢自力諸經之公義也公等單說他力不許稍涉自力黑谷之私見也欲樹一家之門庭盡廢千佛之正軌吾不知其可也君謂他力信以為屬他力我謂信他力仍從自力起必欲強分自他則自他亦假名而已佛教衆生必以破我執為先蓋人我對待則生佛懸隔如空有雲水中不能見月也經言衆生處處著引之令得出貴君之病祗在處處執著也貴宗不能合於經義即此固執之病也以凡夫情量判如來聖教遠之遠矣將佛法妙用作凡夫見解十萬億佛剎何時得到不達佛教開合之妙所以觸途成滯也觀經有九品大經有三輩而說淨土無九品請於三經內指出明顯之文如是之教不但娑婆世界有一無二即十方世界亦恐無有何以故不費功力速得成佛迥出思議之表若在四十年以前聞之我亦樂從也睜開眼放平心將淨土三經挨次閲竟必須前後文義相貫知一經終始絶無矛盾之說自然不為成見所囿矣貴宗所別於通途者摘其大綱一曰取一願廢諸願貴宗以第十八願為宗本判十九願為非佛本意則佛有違心之語故取一願令人專修可也貶諸願謂非佛意不可也二曰專他力而盡廢自己力考經中佛說云云平心論之雖以他力為所信仍以自力為能信也三曰貶經中所說三輩九品之相為不足貴而另立一往生之相駕於九品之上云往生即成佛是修行者生品反低而不修者生品反高也四曰判聖道為此土成佛之教夫聖道為十方三世成佛之教極樂世界亦在其內所勝者無退緣常與諸上人同會一處耳然在淨土得忍以後度生願切者必回入娑婆或往他方世界行大悲利生淨土菩薩若闕大悲彌陀亦應訶斥也近年見貴宗賢士好學不倦試一言之冀有少年英俊突圍而出佛法不其昌明乎往者選擇集入手偶一翻閲置於架上今因屬刻不得不閲即進言之機也非但黑谷之書評其瑕疵即道綽善導之書亦有檢點處如安樂集下卷支那見之皆以為不足訓而刻板已成無可如何善導觀經疏以三福九品判作散善夫三福乃修觀之前方便九品係所觀之境元照已辨其錯故不贅言至於南嶽思禪師大乘止觀引起信論中能生一切世出世間善因果故於善字下加一惡字蓮池屢指其錯大凡違經之語有識不能默然從古如是也唐信行禪師人皆稱其菩薩應化而所作之書大違經意當時即禁止流傳佛由菩提心成猶之飯由米成今欲喫飯而不準用米試問可得飯乎今欲念佛而不準發菩提心試問可見佛乎佛者究竟菩提也捨菩提心則無由得佛猶之捨米無由得飯也此論如金剛十方三世無能破壞請細思之黑谷語録釋經道滅盡持留此經之文舉淨影以後勸今之語遂欲將萬年來燈焰欲滅之象提至今時用之是釋迦教本有萬年住世而黑谷直欲促而短之是何意也且淨影之旨重在勸人篤信淨土非欲盡廢一切經教而作萬年後之行也黑谷章末云若有片言契合佛意於菩提果得不退轉等語此公先將菩提因廢盡焉能得菩提果耶又云若於文理有所錯謬願仰後賢校正可惜六百年來無人校正不知誤卻幾許人矣黑谷以菩提心及六度等皆判為雜行悉應廢捨誠如彼言則不發菩提心者是為正行廢布施則慳貪者為正行廢持戒則恣縱者為正行由此推之瞋恚懈怠散亂愚癡者皆為正行顛倒說法至於此極如師子身中蟲自食師子肉故知佛法非外人所能破也衆生違於法性則樂著生死慳貪恣縱瞋恚懈怠散亂愚癡如來愍之教令發菩提心修六度行逆生死流順涅槃道求生淨土無非為此而已必欲廢之不知求生淨土為何事也或曰求生淨土必須發菩提心修六度行不亦難乎答曰無難也凡信淨土法門者發願自度度人同證佛果即是菩提心矣專修念佛見得世間財物無一可樂不起慳貪想念即與施度相應矣專修念佛逆境現前不生瞋恚之心即與忍度相應矣專修念佛心不散亂即與禪度相應矣專修念佛不受世俗愚迷即與智度相應矣初行之即是日用尋常漸次增進便成菩薩妙行何必立意掃除定將出世善法歧而二之不幾作釋教中之罪人哉且此七法惟布施一門就名相言之似有施作其餘六門皆無施作不過就治習上立此名目耳奈何判為雜行謂念佛人必不可修耶三輩九品所發菩提心皆是四弘誓即不知發此誓者亦隱含三心若必指無上菩提之心是在十信滿時一發此心即入圓住便能現八相成道上品上生者見佛之時即發此心然凡夫發四弘誓亦徹於究竟必至究竟位弘誓方滿也所以為因果交徹之心三輩九品以外別有一類是修觀者往生之相十六觀以第九為絶頂可分為九品然觀成之人勝於上品上生以其現生受記也後之七觀推而廣之以盡聖凡之際思惟攝取莊嚴佛國清淨之行一語須善會通蓋法藏比丘見果知因其所修菩薩道皆是莊嚴淨土之因若捨聖道何得有淨土耶此中是非當在彌陀會下證明然恐往生後亦不得見面蓋我輩所生是經中已說之土三輩九品種種莊嚴即同居而談實報寂光之土也公等所生是經中未說之土貴論所謂一種真妙往即成佛之土也圓融不妨差別差別不妨圓融是也小粟栖君祗許差別不許圓融所以差別與圓融相妨矣圓融妙理皆以果法目之此台教後人之語賢首嘗云果位不可說所可說者皆因妨耳蓋諸佛妙用即在凡夫日用中儒書所謂百姓日用而不知也弟於佛法最為慎重與人接納不輕談論雖有新學問道亦不收作門徒南條北方諸君往返二十年未嘗講論佛法茲因機緣觸發不惜一番話墮引出無限是非然愈辨而愈明彼此均有利益幸承詳細開示得見貴宗之底蘊自此次答復後決不再參末議矣除非好學之士夙根發現負笈前來虛心請益仍當善言開導拚取雙眉拖地也三歸優婆塞顯湛為父敬刻願仗此勝因心契菩提身獲安隱癸亥仲秋月北京西城臥佛寺佛經流通處識
