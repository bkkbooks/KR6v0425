body:
  text: 清石埭楊文會仁山著與日本南條文雄書十五頃接手函如親道範回環展誦欣慰無涯弟近年來漸形衰老眼昏手顫艱於作書而代筆者又無其人以故遠方來函往往不能作答實出於無可如何耳謹將奉報之言條列於後一貴國藏經書院欲購敝處內典須函託僑寓南京之日本人代辦所有郵寄事件均由貴國代辦人一手經理方能穩妥因敝處管事者僅一人庸碌無能除本處售書外無承辦他事之才力也二藏經書院欲刊續藏實為極大法緣半載以前接到大藏經報第二十四號係續藏目錄一冊鄙意稍有參議須另得一冊以硃筆標記寄呈台端以備采擇支那同志收藏內典者遇有可入續藏之本亦能代借但用過即須寄還耳三續藏開刷之先弟擬圈出數十種商請多刷一部以散頁寄南京計頁數償價此事能允與否恭候賜答悤悤不盡欲言與日本南條文雄書十六接六月十六日手函讀悉種種今歲敝邦酷暑異常衰老之軀不能作事惟有揮汗消夏而已茲將所應復者條陳於後一續藏經目錄內硃筆標記之處逐細查閱第三四三慧能金剛解敝處有刻本郵寄尊處以備印造但此本前代高僧疑其為贗作敝處故未刊板二第四二四法華擊節一卷在憨山夢遊集中敝處流通書籍內有之三第二一一華嚴合論簡要已覓得一部呈閱內缺一頁已補足矣四第一二一七禪燈世譜四卷未見敝處覓得佛祖宗派世譜八卷大約與禪燈相同呈備採擇五第八九七徹悟禪師語錄是乾隆年間所作弘揚淨土之書非禪宗也敝處有刻本呈閱六第一二六八法藏司南四十一卷既係寂曉所作卷數與義門同恐即義門之別名他日當向揚州萬壽寺借義門全書寄上但收藏家甚為珍惜不易得也七第九一一指月錄原本三十二卷其末後兩卷即是大慧語要非兩種書也八第五二三釋摩訶衍論疏有三種寫本批為偽疑書若將原本寄至敝處一閱是否偽作當能辨之閱畢即當寄還以定去取與日本南條文雄書十七前接九月二十六日賜函久覊未復又接十一月十七日手書今併答之於左一接得書院寄來金剛直解寫本一冊舊刻本二冊支那刻本一冊逐細對閱寫本略而刻本詳疑其略本作於前後人增補其文而為詳本二者皆贋作考古人記載併無六祖作金剛解之說也今將四冊寄還書院二藏經書院寄到新刷華嚴行願品疏二部歡喜頂受祈轉告書院代申謝悃宋時已有刻本七百年間無人得見同志諸君謀會刊之舉他日完成再當奉贈三藏經書院寄還佛祖宗派世譜二本華嚴合論簡要二本併新刷二本均已登收四書院來日本金幣二十圓欲購之書除敝處本有之外轉購諸揚州流通處彼處現已增價照新單核算經籍已作小包五箇圖卷一箇徑寄藏經書院矣五樂邦文類一書貴邦刊本弟未得見無從評定六唯識開蒙以下十六部俟數日後向各處取來交郵便局寄至尊處閱後轉達藏經書院七大明釋教彙目義門全書已託人向揚州萬壽寺商借再寄八敝處新刻憨山大師觀楞伽記寄呈三部一贈台覽一贈真宗大學校一贈藏經書院祈分致為荷九大藏經報第四十七號二十部已分送借書各家皆大歡喜十編書者之姓氏實難查考一松大師疑是明朝人然不能指定也與日本南條文雄書十八接三月二十日手函領悉種種茲將應復之事條列於後一書目中未得者無從覓購只有戒律二部照墨圈寄上二貴國僑寓南京之人現無相識者緣弟有足疾外交全疏也三敝邦藏書之家求覓數處得二十餘種先將目錄開呈台鑒擬將經律論註疏先行借來寄至尊處以備刷印俟刷印後將原書寄還再將他種續寄緣收藏之家甚為寶貴不輕出借也四借書之友欲有所求願得續藏經目錄內第一九七貞元新譯華嚴經疏十卷唐澄觀述又第二一四圓覺經大疏鈔二十六卷唐宗密述此二種請藏經書院刷印時多刷一部以酬借書之美意能否應允由藏經書院主之五續藏目錄內第一二六一大明釋教彙門標目四卷東吳寂曉撰此書除標目之外另有目錄四卷義門四十一卷弟在揚州見此全部他處全無今見目錄內第一二六八法藏司南四十一卷疑即義門之別名也義門第一卷第一頁第八行右清涼敘曰等文至四十一卷末十五頁八行右數集並義如名題止若書院所得之本與此相同即是義門若不相同擬向友人處借義門全書以備書院刷印之用也六目錄內第三八三無垢子註解心經一卷係外道所作宜撤去與日本南條文雄書十九附覆書頃接惠函藉悉起居佳勝承代購經籍十部圖二幅欣喜之至前月由蘇君寄到經籍七十四部內有町田君見贈景祐天竺字源三冊乞代為致謝讀大著序文感佩何極天竺梵文有古今之殊以鄙意揆之貴國所傳之古體如三代以上蝌蚪之類明藏及近時喇嘛所傳者如篆隸之類現在所行之梵文如行草之類質諸高明以為何如比年以來承代購經籍千有餘冊上自梁隋以至唐宋併貴國著述羅列滿架誠千載一時也非閣下及東海君大力經營何能裒集法寶如此之宏廣耶前明刻書本藏經正藏之外有續藏三千餘卷其板燬於兵燹矣此次弟等募刻藏經擬將貴國傳來之本擇其精要刊入續藏以為永遠流傳之計區區鄙懷未知能否如願全仗護法天龍神力默佑也探玄記已得全本慶喜無量其彌陀義記等四部承代借原本寄至敝處鈔寫尤為感荷寫成後原璧歸趙不至遺失敝單內未得之書且作緩圖偶有所得隨時代購法緣隱顯非思議所能及也時序遷流寒威增劇伏維珍攝不盡欲言附南條文雄覆書接惠信悉道體無恙前代購經籍已達貴處大慰敝懷弟當致貴意於町田君抑梵文字體固有古今之殊尊說論得頗好然地方之異亦如大有所關繫者日本所傳之古體即一千年前唐之日本僧弘法大師慈覺大師等之所將來而唐智廣悉曇字記實用此體是為支那梵字也明藏及近時喇嘛所傳者即西藏梵字也現在所行之梵字即印度梵字也英人維廉斯氏曾附其梵語文典以古今梵字沿革表表中列十餘種之異體而不載所謂支那西藏梵字蓋未及見也日本所傳之古體稍與現在尼波羅國所行之梵字相似敢附記鄙說以備參考與日本南條文雄書二十陽歷五月十六日寄上一函併舊本經籍五包想已達到茲接大藏經報第四十三號內第八頁下層載有華嚴綱要德清提挈之本計二十四冊華嚴合論簡要李卓吾述之本計二冊均在敝友處覓得善本藏經書院若需此本印入續藏經弟可代借但敝友所要求者有三種即在續藏經目錄內第五二三釋摩訶衍論疏二卷隋慧遠述第五二四同二卷唐法敏述第五二七同通贊疏十卷守臻述以上三種如能允許在刷印時多刷一部以酬借書之美意弟即當向友人處取此綱要簡要二書共二十六冊郵寄尊處轉交藏經書院俟印入續藏經之後仍將原書寄回與日本南條文雄書二十一前接陽歷五月十九日賜函得悉大駕將赴暹羅迎釋尊遺骨後有自扶桑來者知已東歸又有高麗之行法緣所至裨益良多曷勝欣羨所迎佛骨是何勝相伏乞示悉前田君欲得之書已照單購去惟三大部敝處僅有其二玄籤一種在杭州昭慶發售三部均係合本欲全得者須分兩處購之法藏所作華嚴三昧觀崔致遠作別傳已用其直心中十心名目貴國所刻發菩提心章錄十心之文與崔同併有三十心而與法界觀及他種湊合而成謹知華嚴三昧觀當有全本流傳高麗也祈請駐韓道友訪之併能得唐宋高人別種著作是所深盼鳴道集說經友人索去祈代購二本釋淨土羣疑論七卷正擬發刻原書硃抹太多寫者易誤請再購未經塗抹之本為幸從前孫君購書之款餘存九圓有零請併入弟款作購書之用用完之後示悉續寄中村醒處君住所問北方君便知茲有敝處新刊雲棲法彙奉贈一部計三十四本祈鑒收與日本南條文雄書二十二客冬北方君到金陵得接賜函併承代假起信義記別行古本喜出望外隨即參校屬手民謄寫刻本遲之數月即將原本奉還併呈新刻之本也又承惠贈華嚴策林寫本銘感無涯島田君所問之事王宇泰唯識證義未見其本頃求得高原所作唯識俗詮一部計五冊託北方君郵寄尊處轉致島田君閱後仍乞寄還為幸一柳君持尊函造訪聰穎可嘉足稱法門偉器定能光顯師門也月前北方君續交手函併華嚴遊意五蘊觀二寫本展誦之餘如親雅範本願寺開設之事弟實衰老照料未得周詳復蒙稱譽歉仄彌深前因北方君屬敝處將七祖聖教刻全遂檢閱選擇本願念佛集覺其中違經之語甚多已略加批評復將真宗教旨詳覽一徧逐細批評送與北方君將來回國時當呈台覽弟與閣下交近二十年於佛教宗趣未嘗講論今因貴宗將徧傳於地球深願傳法高賢酌古準今期與如來教意毫不相違則淨土真宗普度羣生無量無邊矣近代以來門戶之見牢不可破支那境內禪宗一派空腹高心西來大意幾成畫餅台教一派尚能講經惟泥於名相亦非古法且諸方名剎向無學堂造就人才所以日趨於下也貴宗既有學寮講肆又開普通學館是世出世法兼而習之人才輩出何可限量惟願善學者不為成法所拘則妙契佛心允為如來真子矣奉贈憨山解老莊四冊新刻元照彌陀疏四冊安樂集四冊祈鑒收弟久有東遊之志近因目足均有微疾憚於遠行儻台駕惠然西來暢敘於鍾山淮水間討論佛教門庭古今得失之故豈非釋迦遺教中一大事因緣乎敝處求而未得之書尊處已登宗報儻能得之或購或寫總祈代辦錢款自當續寄附呈闡教芻言一篇深悉閣下智周四海學貫古今想能剖破藩籬虛心采納故敢以直言奉獻也與日本南條文雄書二十三附來書客月北方君自金陵歸日本得接賜函及闡教芻言等深知為法之高志欣喜靡已一柳君屢受教尊處何幸加焉今有小粟栖君所草念佛圓通併陽駮陰資辯君實編輯真宗教旨故自任答辯若猶不滿高意則請更指摘之使弟等盡心於此舊歲疊接兩函併書籍數種欣喜靡已承示小粟栖君所作二文徹見貴宗之底蘊仍不能默然略加辨論復呈台覽既為釋迦遺教弟子不得不爾也又接後藤葆真君寄示辯駮之文弟避繁就簡稱性而出作一篇答之均請尊處轉交為禱茲將新刻梵網戒疏起信義記海東疏各二部寄呈台覽奉還起信義記別行原本計三冊附贈新刻義記海東疏各一部祈歸之島田君併述謝意唯識述記現已開雕本年可成支那學佛者得貴邦郵來古本同深欣慶咸感大德弘通之益東嚮禮謝於不既也中村醒處君施刻資二圓今刊入義記之內併海東疏寄呈請轉交中村君是幸近聞貴宗同人往高麗布教者頗多唐法藏所作華嚴三昧觀華嚴世界觀二種高麗或有存者乞寄信求之與日本南條文雄書二十四前接賜函併書三種歡喜無量辰維道履增綏為頌法駕迎佛骨於暹羅觀軍容於燕都過朝鮮而覲韓皇聞母訃而返鄉國世出世法曲盡無遺實令人景仰不既也感懷詩出於至情不堪卒讀華嚴三昧章與發菩提心章同而闕法界觀之文始知二書同出一本即華嚴三昧觀無疑矣別有華藏世界觀若能得之高麗幸甚蕅益大師所作周易禪解貴國有刻本祈代購一部茲奉贈金剛略疏三論玄義各二本皆從貴國得來之書又唯識心要一部計十本係揚州所刻用供法喜傳聞貴國新立東亞佛教會如已印出章程祈寄示為荷與日本南條文雄書二十五前接到五月二十七日惠函得知寄贈書籍均已達到並承抄補成佛經疏欣喜之至上海匯款已寄信時務報館託其催交儻仍未收到祈示悉以便另寄茲因友人孫君竹如託購經籍數種由松林君匯寄金三十圓作購書及寄費之用敝寓已於三月前移居信面祈寫南京延齡巷馬路池州楊公館便可達到華地新設郵政局已與各國相通信函可逕寄敝寓免由上海轉折也惟書籍重大似須仍由松林君轉達為要頃閱明宋濂所作大般若經通關法序云雪月大師太隱創為通關法演忠律師省悟重為編定畫十二圖用十三法二十九界八十四科為之不過一千言總攝初分一百三卷無一字或違云云因憶三年前尊示云由內部錄出此書果與宋濂序文相符即請屬書手代寫一部是為至禱揚州僧觀如刊成般若綱要奉贈二部祈鑒收與日本南條文雄書二十六接讀十二月九日手書併詳單領悉種種承寄釋典十一部內有寫本四部益見弘法情殷嘉惠支那學人無既再拜頂受如獲至寶此次書籍不取價值實抱不安俟刻成即當奉贈嗣後無論刻本寫本均求開列價目以便匯寄密嚴疏現蒙謄寫寫完乞郵寄他日若得初卷則更妙矣肇註金剛般若已承謄寫欣喜之至赤松前田二君祈代伸謝悃東西二京有諸公代購釋典實為莫大因緣若遇支那六朝唐宋人著述敝單內所未開者均求代購以擴見聞收藏古本之家其現存者除弘教院書目外別有幾種請鈔目示知以便求覓從前赤松君欲得法海觀瀾今揚州僧觀如已獲舊本刻成即當奉贈敝處新刻楞嚴經正脈疏為註本之最善者近代已收入大藏特寄二部以廣其傳貴國寄來之因明大疏有比丘松巖者愛而刊之併寄四部唯識述記等續有人刻法相一宗晦而復明非上人購寄之力曷克臻此揚州新刻大乘止觀蕅益釋要附呈四部分贈同人時值嚴冬雪意正濃梅花欲吐仙山風景想在高人奚囊中矣與日本南條文雄書二十七寒暑頻更未通寸柬非懶也實精力有所不逮耳有自扶桑來者述閣下教育之廣通國信服聞之實深欣慰弟所作玄文本論略註現已完成寄呈十冊就正有道併請分贈知交藏經書院已另寄十冊矣頃從友人處得見明治二十七年本願寺室內部印度撮影帖一冊於佛教古跡具備見者恍如親歷其境也冊尾載明非賣品如能求而得之以生人敬仰之心則三萬程途如對目前矣敝邦僧家學校纔見肇端欲得貴國佛教各宗大小學校種種章程以備參考非仗大力不能多得此等章程雖係和文敝處亦有能譯之者與學諸僧甚為盼望也與日本南條文雄書二十八疊接賜函久未作答抱歉之至鄙人日就衰老百事廢弛三年前刊一箋以謝俗緣於佛法相關之處則不寄呈以免消息斷絕也然事過輒忘又無精明人代理祇得聽之而已奉贈新刻楞嚴纂註法華通義各二部又證道歌竺源註即是續藏經目錄內標記為未發見之書今已刻成奉贈十冊以俾公諸同好前承貴友赤松連城君惠我印度撮影帖一冊無以報之請以纂註通義證道歌各一部酬答以伸謝悃貴國續藏經內大日經義釋演密鈔十卷遼覺苑撰敝處欲得大字刻本以俾合纂經疏之用祈徧覓書肆如得此書祈交郵便局用代金引替之法送至敝處交易不勝拜禱之至與日本藏經書院書一頃接尊處惠寄貞元華嚴疏圓覺大鈔各二部拜領之餘歡喜無量同志傳觀始知南宋時與貞元華嚴疏同刻於江蘇元明以來竟無人見今由貴書院刷印流傳實釋氏教中之偉烈也敝邦新開僧學堂相繼而起者已有四處苦於啟蒙無書因作初學課本三字韻語便於讀誦併作註解以伸其義寄呈十冊聊供瀏覽儻收入續藏經雜著部內亦可備一格也與日本藏經書院書二接讀惠函領悉種種敬將奉復各件條列於左一貴院雅意欲彙拙作以為全集入續藏中心感無涯鄙人著述甚少已刊成者有陰符道德沖虛南華四經發隱一冊佛教初學課本一冊正當發刻者有大宗地玄文本論略註一冊數月後可成另有等不等觀雜錄一冊稍遲當刊擬作釋摩訶衍論集註一部論語發隱一冊尚須時日也貴院若欲翻刻拙作均可聽許不論版權奉贈肖像一紙係四十三歲在佛京巴黎映出爾時精力強健非近年衰老之相也二前番貸送章疏候續藏印出之日次第寄還不求速返以俾貴院對照之用免其譌舛耳三角虎集缺字已補完與楞嚴宗通同交郵便局寄上祈鑒收四東吳寂曉所撰義門四十一卷係揚州人所藏甚為祕惜俟託人求得即當寄上五貴院所需宋祖心集冥樞會要均未見過當畱意尋覓六釋論法敏疏已奉到檢閱一通全無疏文惟將原本刪去大段本論以釋論中所提本論分別排成小段減損釋論字句甚多惟發趣道相內增補解行發心證發心二科是法敏所作也核計釋論有十一萬餘字法敏本祇有六萬餘字謹識其大略如此七前接貴院印版信函徵續藏經序文暇時撰成再當奉寄與日本藏經書院書三前承惠贈三色套印楞嚴廣解一部徧示同人歡喜讚歎得未曾有又承寄還楞嚴宗通一部加以布套併賜新刷宗通二部拜領謝謝茲有友人家藏批點套印維摩經一部係明朝吳興閔氏刻本與套印楞嚴同出一處也寄呈台端以備維摩疏中增此一格敝友欲購三色套印楞嚴廣解一部如有單行之本祈郵寄南京照代金引換之法交易弟所作大宗地玄文本論略註現已刷成寄呈十部請分贈同志將來刷印續藏經至五二九釋摩訶衍論記之後可將玄文本論略註編入以補往時所未有也南條上人處已另寄十冊矣與日本松林孝純書一接讀手函併南條君信緘書籍感謝之至辰維起居多福至以為頌承示貴院有鉛木板大藏經數部備請弟但見過鉛板其木板者全部若干本價值幾何乞函示以便布告同志諸友日後如有願請者令其親到上海面談俾得流通便捷茲有寄南條君信一件書籍一包乞代為轉寄為幸附呈英洋一圓作為寄費前此墊付寄費祈示悉以便奉繳諸費清神心感不盡與日本松林孝純書二兩月前接讀賜函併南條君手書領悉種種彼時正當移居忙冘萬狀繼而老母棄世喪事近日方畢二三月來未理雜務以致久疏音候抱歉奚如辰維秋祺多福至以為頌尊示內云南師遲日有書寄到未知曾否發來誠恐移居之時信局或有舛誤祈示復為幸茲因敝友孫君竹如欲購經籍數種懇尊處代匯日本金三十圓裝入敝函寄交南條君收用另有書一包併求代寄所需寄費由孫君手奉繳與日本東海書娑婆界中共為釋迦遺教弟子雖未把晤而志同道合如出一轍也往者聞貴國印造小字藏經遂購全部閱之歡喜讚歎得未曾有惜年近衰老尋行數墨目力不及耳近由南條君轉遞貴贈書目三種拜領之餘感謝無既藏外經籍百餘種所欲得者甚多但卷帙繁重祇可求覓刻本耳其略者有刻本則購之否則請人書寫酬以工資想易為力寫出後乞細心校對一道以便刊印流佈也另開甲乙二單附南條君函內奉贈新刻內典二十本用伸法供祈鑒納為荷與日本町田書身為顯宦而能抗志出塵非具大丈夫作略曷克臻此盈盈一水未得趨談殊深惆悵黎公鐘銘已由陳君鏡清為之箋釋寄呈台鑒陳君係敝處校經友也南條君函述西京有景裕天竺字源上人擬寫一本見賜不勝翹盼其中梵字請照原本影寫以存其舊又承代覓道林道生等論感荷無既其餘藏外經籍亦請代為尋求苟有所遇隨時函示以便酌購前聞雅意欲得敝處新刊經籍茲將流通單內擇大藏所無者奉贈二百五十六本以硃筆記於單內裝一木箱由南條君轉達到時鑒收與日本後藤葆真書接讀來書洋洋數千言得知閣下博覽羣籍融會貫通而於台賢二家尤能深入堂奧惜乎囿於先入之言未能擺脫自由亦出於無可如何耳弟所學處總以聖言格量合者遵之否者置之雖晉宋以來諸大名家間有出入亦必指摘如彌勒馬鳴龍樹天親等諸大菩薩造論弘經何等嚴謹處處以佛語為宗故能作萬古法式也鄙人懍遵其意與人談論未敢稍逞己見偶失片言立即救正見人肆口妄談壞佛正法如三百鉾刺心千刀萬杖打拍其身等無有異前此辯論之言十方三世諸佛菩薩實共鑒臨儻違悖佛意願令此身碎如微塵若契佛心則文字語句當現於極樂世界七寶幢上菩薩見之歡喜讚歎赤心耿耿不敢默然略舉十端以伸鄙懷知我罪我聽之而已一報佛深恩故釋迦如來說法度生流傳經教普應羣機淨土真宗斷章取義直欲舉三藏教典而盡廢之豈不孤負佛恩哉二彰佛本願故彌陀因地發四十八願攝受無遺貴宗單取一願以為真實則餘願非真實矣既非真實彌陀何必發此等願也蓋佛之本願願願真實互攝互融取一願為宗可也判餘願非真實不可也三光顯教道故如來教法三界獨尊一切異教所不能及良以出世妙法極盡精微無有能過之者今若將深經妙論棄而不學則異教道理駕於佛門之上聰明才智之士將視佛法如弁髦視異道為拱璧矣四令法久住故佛滅度後二千九百餘年現當末法之初實證者雖覺罕見而信解觀行者不乏其人若除稱佛名號外一概遮盡是行末法萬年後之道也豈非將釋迦遺教促短七千餘年哉五普被三根故十念往生大經觀經皆屬下品發菩提心修諸功德方生中上今廢菩提心及諸行是專攝下輩而不攝中上矣根有利鈍不可一概而論也六令僧和合故在家出家同為釋迦弟子同遵釋迦遺教隨根授法各有專修互不相違若是一非餘則於大法中別闢一門不得謂之和合矣七提獎後學故初學佛者心志勇銳教導無方不進則退若捨佛法不學而學世法雖有他力之信亦恐為俗習所染豈能與彌陀清淨光明相接耶必於淨土三經內深究其義知念佛一門為圓頓教中超勝之法時有進境方能增長信心也八融攝十方故淨土一門為十方諸佛所共讚十方菩薩所願往下自凡夫上至等覺皆在其內蓋凡夫心體與諸佛法身無二無別若執凡境與聖境判若天淵者則不能生淨土以佛眼所見是假名凡夫是故生一佛土即生十方諸佛國土豈世俗情見所能思議者哉九貫通三世故一念念佛全念是佛佛無古今念亦無古今說自說他方便施設執之成對待法不執即絕待法絕待之法一念融三世新佛即舊佛全自成他全他即自入平等真法界矣十究竟成佛故世出世法不出因果二字無因得果不應道理菩提心者佛果之因也大經三輩往生皆以菩提心為本接鈍根人雖未能令其速發菩提心亦當示以發心之相蓋發心有二種凡位以四弘願為發心至信滿時發真實菩提心即是初發心時便成正覺若以初住之心教凡夫發似覺甚難然發四弘願即菩提之因也往生淨土仗此因究竟成佛亦仗此因是以可勸而不可捨也來書所辯者僅選擇集內評論之語另有闡教芻言一篇評論真宗教旨一卷可向南條上人處取而閱之與日本龍舟書前接惠函備承獎譽臨風盥誦感愧交併弟一介俗流未全道力惟有丹心一點可對十方諸佛際此大法衰微發心護教雖粉骨碎身在所不惜故於前歲有闡教芻言及選擇集真宗教旨之辯逮頂師二書寄到又不能已於言既而思之講論佛法者期有益於人也聞者既不見信則所言便為無益若再置辯不休豈非同於流俗爭論是非乎故於奉到大著二冊之後但閱其意趣所在不贊一詞也深知彼此志願不同弟以釋迦遺教為歸不敢𮈔毫踰越貴宗另出手眼獨樹一幟雖欲強而同之其可得乎前於復後藤葆真君函內曾發誓言請君取而閱之幸甚信已寄去復代彼宗立量云往生淨土是有法他力信心為宗因云彌陀第十八願所成故喻如汽機船此量非真能立以其廢自力雖有汽船誰其乘之則知至心信樂欲生其國者皆係自力也自宗立量云念佛往生是有法自力他力為宗因云因果相感故喻如車兩輪代余同伯答日本末底書一附來書頃有印度婆羅門師欲至中土傳吠檀多哲學其人名蘇蕤奢婆弱以中土未傳吠檀多派而摩訶衍那之書彼土亦半被回教摧殘故懇懇以交輸智識為念某等詳婆羅門正宗之教本為大乘先聲中間或相攻伐近則佛教與婆羅門教漸已合為一家得此扶掖聖教當為一振又令大乘經論得返梵方誠萬世之幸也先生有意護持望以善來之音相接併為灑掃精廬作東道主幸甚幸甚末底近已請得一梵文師名密尸邏印度人非人人皆知梵文在此者三十餘人獨密尸邏一人知之以其近畱日本且以大義相許故每月祇索四十銀圓若由印度聘請來此者則歲須二三千金矣末底初約十人往習頃竟不果月支薪水四十圓非一人所能任貴處年少沙門甚眾亦必有白衣喜學者如能告仁山居士設法資遣數人到此學習相與支持此局則幸甚來書呈之仁師師復於公曰佛法自東漢入支那歷六朝而至唐宋精微奧妙之義闡發無遺深知如來在世轉婆羅門而入佛教不容𮈔毫假借今當末法之時而以婆羅門與佛教合為一家是混亂正法而漸入於滅亡吾不忍聞也桑榆晚景一刻千金不於此時而體究無上妙理遑及異途問津乎至於派人東渡學習梵文美則美矣其如經費何此時祇桓精舍勉強支持暑假以後下期學費未卜從何處飛來惟冀龍天護佑檀信施資方免枯竭之虞耳在校僧徒程度太淺英語不能接談學佛亦未見道遲之二三年或有出洋資格也仁師之言如此代余同伯復日本末底書二仁師接尊函朗誦一過笑而置之人問其故答曰此信所詬厲者與我毫無干涉何恚之有復囑檢初次奉答之信稿閱之不知見怒於台端者在何語句信口所答無非護法深心師言直起直落無𮈔毫委曲尋常接人莫不如是弟相依三載甘苦同嘗學焉方知不足外間交遊漸形疏略招學梵文啟送去多紙亦無人願往傳吠檀多教者縱來此間弟亦無力接待也施刻楊仁山先生遺著功德人名周暹助銀壹百圓梅光羲助銀陸拾圓龐澤恩助銀拾圓徐甫陳助銀貳圓楊時中助銀肆圓程福慶助銀貳圓姚東彥助銀伍圓張潤普助銀伍圓金煥章助銀肆圓朱慶椿助銀肆圓衛渤助銀貳圓董溥銘助銀貳圓朱延昱助銀伍圓鍾世銘助銀貳圓姚詒慶助銀壹圓朱祖鋐助銀壹圓梁耀宗助銀壹圓汪振家助銀壹圓徐行恭助銀壹圓李心靈助銀拾圓費保彥助銀壹圓王璟芳助銀伍拾圓洪震助銀貳圓張鴻鈞助銀壹圓陳洪氏德麟助銀壹圓洪松明助銀壹圓倪洪氏瑜助銀壹圓張炳楨助銀貳圓沈雲章助銀壹圓沈豐瑞助銀肆圓熊正琦助銀肆圓張競仁助銀拾圓雷光宇助銀伍圓羅文莊助銀貳圓黃灼生助銀拾圓通悟徐文璚助銀肆拾捌圓徐肇宜助銀拾貳圓周明詒助銀肆圓周明保助銀貳圓徐國治助銀貳圓歐陽柱助銀肆拾圓陳之碩助銀壹圓楊時彥助銀肆圓孫度助銀肆拾捌圓陳義助銀伍圓周學淵助銀拾圓徐新六助銀伍圓陳威助銀伍拾圓周學暉助銀拾圓馬振憲助銀伍圓陳惟壬助銀拾圓陳汝湜助銀叁拾貳圓陳克立廣之行之生之克治助銀伍圓計共收現銀陸百拾圓敬刻等不等觀雜錄觀經略論無量壽經優婆提願生偈略釋壇經略釋金剛五位圖十宗略說論孟發隱暨全書卷首總目塔圖塔銘事略分家筆據並封面籤條共付刻資銀二百九十四元三角八分六厘又印送功德書五十部計銀八十元連舊刻彙印全書等不等觀雜錄各五十部餘資添印新刻各種單行本分贈尚餘二百元撥付楊居士塔工訖中華民國八年己未冬十一月金陵刻經處識闡教編目錄闡教芻言評真宗教旨評選擇本願念佛集評小粟栖陽駁陰資辯評小粟栖念佛圓通雜評石埭楊仁山先生評論日本真宗之言詳矣歲丁巳距先生西歸纔六年而稾已瀕於散佚懼其久而失傳乃掇拾叢殘彙為一冊尋繹遺稾知先生嘗取彼宗所出真宗教旨及選擇本願念佛集二書加以評語並撰闡教芻言一篇郵寄東國彼宗小粟栖因作陽駁陰資辯及念佛圓通二書稱陽駁陰資辯者以先生評真宗教旨有陽似辯駁陰實資助語也稱念佛圓通者彼謂撰選擇集創立真宗之源空為勢至化身也先生復逐條痛駁之又有後藤葆真者作應於楊公評駁而呈卑見一書有龍舟者作陽駁陰資辯續貂念佛圓通續貂二書先生答書已與評一柳讀觀經眼純他力論二篇刊入等不等觀雜錄中茲編所錄皆一再搜求而始得之其評選擇集一篇則從念佛圓通及後藤書中錄出別有先生手稾九紙即評陽駁陰資辯念佛圓通底稾之少分亦有為前評所無者如干條彙為雜評一篇附焉錄成謹以闡教芻言冠首因即題曰闡教編云丁巳仲夏編者謹識
