body:
  text: 石埭楊文會仁山註鯤鵬變化逍遙遊北冥有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也齊諧者志怪者也諧之言曰鵬之徙於南冥也水擊三千里摶扶搖而上者九萬里去以六月息者也野馬也塵埃也生物之以息相吹也天之蒼蒼其正色耶其遠而無所至極耶其視下也亦若是則已矣且夫水之積也不厚則負大舟也無力覆杯水於㘭堂之上則芥為之舟置杯焉則膠水淺而舟大也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南蜩與鸒鳩笑之曰我決起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為適莽蒼者三餐而反腹猶果然適百里者宿舂糧適千里者三月聚糧之二蟲又何知小知不及大知小年不及大年奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞眾人匹之不亦悲乎湯之問棘也是已窮髮之北有冥海者天池也有魚焉其廣數千里未有知其脩者其名為鯤有鳥焉其名為鵬背若泰山翼若垂天之雲摶扶搖羊角而上者九萬里絕雲氣負青天然後圖南且適南冥也斥鴳笑之曰彼且奚適也我騰躍而上不過數仞而下翱翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也故夫知效一官行比一鄉德合一君而徵一國者其自視也亦若此矣而宋榮子猶然笑之且舉世而譽之而不加勸舉世而非之而不加沮定乎內外之分辨乎榮辱之境斯已矣彼其於世未數數然也雖然猶有未樹也夫列子御風而行泠然善也旬有五日而後反彼於致福者未數數然也此雖免乎行猶有所待者也若夫乘天地之正而御六氣之辨以遊無窮者彼且惡乎待哉故曰至人無己神人無功聖人無名此一章書有十大一者具大因二者證大果三者居大處四者翔大路五者御大風六者亯大年七者遊大道八者忘大我九者泯大功十者隱大名初釋大因北冥幽闇之處也鯤魚潛藏其內喻根本無明也此無明體即是諸佛不動智是之謂具大因二釋大果鯤化為鵬奮迅而飛脫離陰溼而遊清虛無障無礙是之謂證大果三釋大處南冥天池離明之方也善財南詢龍女南往皆以處表法天池者浮幢王剎諸香水海之象也是之謂居大處四釋大路水擊三千高翔九萬蒼蒼一色遠而無極雖六月乃息仍不離一真法界也是之謂翔大路五釋大風風積不厚則不能負大翼乘九萬里之風方可圖南此風何所表耶乃表大願也現身九界普行六度乘此大願方證妙果是之謂御大風六釋大年以小年大年相形皆有限量之年也意在無限量之年如齊物論莫壽乎殤子而彭祖為天壽天齊而大年顯矣是之謂亯大年七釋大道若夫乘天地之正而御六氣之辨者即大道也無待於外而遊無窮者即逍遙遊也是之謂遊大道八釋大我夫至人者宇宙在乎手萬化生乎身者也法身大我豎窮三際橫亘十方而無我相可得是之謂忘大我九釋大功藐姑神人利澤遐敷年豐物阜而不見其功是之謂泯大功十釋大名聖如唐堯蕩蕩乎民無能名焉是之謂隱大名舊解謂此三人無有淺深竊窺莊生之意當以法報化三身配之以上略舉十大為南華別開生面闡逍遙遊之奧旨至於文字離奇章法變幻諸家論之詳矣不煩贅述子綦喪我齊物論南郭子綦隱几而坐仰天而噓嗒焉似喪其耦顏成子游立侍乎前曰何居乎形固可使如槁木而心固可使如死灰乎今之隱几者非昔之隱几者也子綦曰偃不亦善乎而問之也今者吾喪我汝知之乎此篇摘錄開章七十餘言辨明喪耦喪我二種差別蓋旁人見其容貌異常有似喪耦耦者對待之法也心不外緣幾如槁木死灰矣而豈知南郭子內證無心我執已亡乎倘我執未亡定有對待法時時現前不能深入寶明空海平等普觀也下文種種不齊之物論皆從喪我一法而齊之了無餘蘊所謂得其一萬事畢者此之謂也回問心齋人間世回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齋也顏回曰回之未始得使實自回也得使之也未始有回也可謂虛乎夫子曰盡矣仲尼欲示心齋之法先以返流全一誡之然後令其從耳門入先破浮塵根次破分別識後顯徧界不藏之聞性即是七大中之根大何以名之為氣耶蓋所謂氣者身內身外有情無情平等無二者也隨有聲動聞根即顯所謂循業發現者是也聽止於耳釋浮塵根之分齊根塵交接滯而不脫所以須破心止於符釋分別識之分齊五根對境有同時意識與五識俱不前不後故謂之符此識葢覆真性所以須破氣也者虛而待物者也名之為氣其實真空也自性真空物來即應故為道之本體見此本體安有不心齋者乎顏子即時領解而應之曰未聞師訓妄執為我既聞師訓本來無我可得謂之虛乎夫子印之曰心齋之法盡於是矣吾語若吾告汝若能入遊其樊入衛君之樊而不干其祿故謂之遊而無感其名不自衒其能故無名可感入則鳴不入則止聞者信從則言之聞者不信則不言無門不立門戶無毒不設醫方一宅而寓於不得已以一清虛之境為棲神之所感而後應不為物先則幾矣於入世之道其庶幾乎若能二字與則幾矣三字首尾相應下文劈空而來縱橫排盪神化莫測非法身大士不能道其隻字絕迹易行無轍迹猶是易事無行地難讓公答六祖云聖諦亦不為何階級之有六祖云汝如是吾亦如是故知宗門極則到無行地所以最難也為人使易以偽隨情流轉動成虛妄為天使難以偽率性而行觸處全真聞以有翼飛者矣未聞以無翼飛者也古人云不疾而速不行而至即是此義有梵僧晨離天竺午至東土禪德猶嫌其緩鄧隱峯振錫凌空而過令兩軍罷戰此皆無翼而飛者也聞以有知知者矣未聞以無知知者也孔子曰吾有知乎哉無知也梁武帝問達摩曰對朕者誰答曰不識此皆無知而知者也上二語皆說未聞乃係歎美之辭非謂其無有也瞻彼闋者虛室生白分破無明性空自顯吉祥止止吉祥者至善之地也求其動相了不可得即是性定而以修定契合故重言止止也大學言知止而後有定亦同此義夫且不止此一轉語警醒愚迷是之謂坐馳雖妄念紛馳而自性未嘗動也夫徇耳目內通返見返聞徹證心元而外於心知離分別識鬼神將來舍三界有情同歸性海而况人乎天下歸仁是萬物之化也無不從此法界流禹舜之所紐也伏羲几蘧之所行終而况散焉者乎歷舉上古聖帝共行此道以啟後人信修之心此章孔顏問答有千餘言今錄後段二百餘言為之解釋以通其義以前皆孔子徵詰之辭至心齋以後乃正答入衛之道又復詳示超世之學窮高極微為傳心妙旨至耳目內通一語應前聽之以氣而况人乎一語作入衛收束言辭如此善巧而實出於無心也兀者王駘德充符魯有兀者王駘從之遊者與仲尼相若常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虛而往實而歸固有不言之教無形而心成者耶是何人也仲尼曰夫子聖人也丘也直後而未往耳丘將以為師而况不若丘者乎奚假魯國丘將引天下而與從之常季曰彼兀者也而王先生其與庸亦遠矣若然者其用心也獨若之何王駘與仲尼分道揚鑣一顯一密行顯教者耳提面命進德修業人所共知行密教者潛移默化理得心安人所難見常季怪而問之仲尼直以聖人稱王駘而願引天下從之遊益動常季之疑矣仲尼曰死生亦大矣而不得與之變雖天地覆墜亦將不與之遺審乎無假而不與物遷命物之化而守其宗也常季曰何謂也痛切至死生而不能動其心毀壞至天地而不能易其性深知真常不變之義不隨萬物遷化且萬物化生同出一原既窮其原何有一物而不由之化生耶命者主宰義入此三昧者無作妙用非情量所測豈有主宰之心如外道所稱大梵天王者乎宗者萬法之本也若有可守則非宗矣愚者昧之智者見之知其頭頭顯露法法全彰無壞無失強名為守此二句中命字守字俱要活看慎毋執言失旨也仲尼如此開示常季仍不能曉故復問之仲尼曰自其異者視之肝膽楚越也依生滅門作差別觀自其同者視之萬物皆一也依真如門作平等觀夫若然者且不知耳目之所宜而遊心乎德之和二門不二則不為耳目所牖而情與無情煥然等現矣物視其所一而不見其所喪差別即平等何得喪之有視喪其足猶遺土也內四大與外四大無二無別善忘我者也常季曰彼為己言其專為修己以其知得其心以六識觀照而得八識現量以其心得其常心超八識現量而顯常住真心物何為最之哉彼但修己無益於人人何為尊崇如此耶常季只悟王駘之體不悟即體之用故勞仲尼委示也仲尼曰人莫鑑於流水流動之水不能鑑物而鑑於止水止水澄清方能鑑之唯止能止眾止就俗諦言之一家仁一國興仁一家讓一國興讓就真諦言之一人發真歸元十方虛空盡皆消殞均同此義以下文勢分賓主四科受命於地唯松柏獨也在冬夏青青引植物為喻謂之賓中賓受命於天唯舜獨也正幸能正生以正眾生引古聖作證謂之賓中主夫保始之徵徹證心元妄想不起不懼之實一切無畏魔不能撓勇士一人雄入於九軍將求名而能自要者而猶若是保始二語既為王駘寫影而忽插入勇士一喻所以謂之主中賓而况官天地官者主宰也即先天而天勿違者也府萬物府者囊括也心月孤懸光吞萬象直寓六骸應身入世直寄寓耳六骸者頭身二手二足也象耳目在目為見在耳為聞人所共知而勝義根非人所知也一知之所知證無分別心而有分別用而心未嘗死者乎本自無生何死之有金剛經應無所住而生其心亦同此義此段方是主中主二十七字作一句讀彼且擇日而登假言其不久當入涅槃人則從是也人之從遊者以其妙用無形隨根普益耳彼且何肯以物為事乎王駘自他兩忘不住有為不住無為何嘗有教人之意存乎其心耶此文出於莊周之手稱王駘盛德由常季發問而仲尼答之究竟王駘有無其人而常季仲尼有無其言耶皆不必問也以慧眼觀之莊周者幻化人也王駘常季仲尼幻中之幻者也乃至三界四生六道無一而非幻也幻化之中有知幻者知幻即離離幻即覺覺則非幻乎曰否也經云若有一法過於涅槃我亦說為如幻如化然則如之何而可也曰不起妄計而已矣太史公作項羽本記述戰時之言行太史公親見之而親聞之乎抑從他人傳聞而筆之於書乎誰得而究詰也一切唯心造一言足以概之矣古今人同此心也此心之妙同而別別而同者也今人展閱此書有莊周出現又有王駘常季仲尼同時出現仲尼之言王駘之德畢現於心鏡中一真法界主伴交參妙旨泠然非今非古誰謂參訪知識須歷百城煙水也女偊論道大宗師南伯子葵葵心向日表慕道之誠也問乎女偊曰子之年長矣而色若孺子何也曰吾聞道矣南伯子葵曰道可得學耶曰惡惡可子非其人也時節未至夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果為聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之雖得上根猶不輕授慎之又慎其道始尊三日而後能外天下人在天下猶牢籠也外天下則脫牢籠矣已外天下矣吾又守之七日而後能外物陰符經云心生於物死於物既能外物則心不隨物轉矣已外物矣吾又守之九日而後能外生人之所最重者莫如生既能外生則無一法可當情矣已外生矣而後能朝徹長夜漫漫忽然天曉朝徹而後能見獨靈光獨耀迥脫根塵見獨而後能無古今妄念遷流方有古今之異既能見獨則妄念全消過未現在不出當念遂能長劫入短劫短劫入長劫延促自由豈有古往今來之定相耶無古今而後能入於不死不生古今遷流方有死生去來之相今證一剎那際三昧時量全消迷者妄見生死實無生死悟者本無生死示現生死所謂生死涅槃二俱平等方是不死不生義也殺生者不死生生者不生即用明體以釋不死不生之義道之真體具殺生生生二用所以證其不死不生也禪宗謂之殺活自在其為物即指道體無不將也一入一切無不迎也一攝一切上文外天下外物外生皆是不將不迎此文反之為無不將無不迎無不毀也一壞一切壞應上文殺生者不死無不成也一成一切成應上文生生者不生其名為攖寧即將即迎即毀即成合四句為一攖字朝徹見獨無古今不死生合四句為一寧字前文先寧而後攖此文先攖而後寧顛倒妙用存乎其人道無定法也攖寧也者攖而後成者也攖者煩擾也寧者沈靜也兩門相反適以相成所謂八萬塵勞即解脫相也南伯子葵曰子獨惡乎聞之曰聞諸副墨之子去聖時遙尋諸簡冊可得道意副墨之子聞諸洛誦之孫進而求之讀誦純熟妙義自顯洛誦之孫聞之瞻明見地明徹瞻明聞之聶許攝念自許聶許聞之需役拳拳服膺需役聞之於謳詠歎入神於謳聞之玄冥萬法俱泯玄冥聞之參寥真空顯露參寥聞之疑始始覺有始本覺無始始覺合本有始無始皆不可說此章分為兩段前段言卜梁倚依教進修凡有七層前三層漸修漸證自朝徹以下勢如破竹一時頓證以顯真體其為物以下將迎毀成四句一切普應以彰妙用體用具足乃以攖寧二字收之後段女偊自敘聞道凡有九層前二層聞慧次二層思慧次二層修慧後三層證道是之謂九轉功成也此九層皆以聞字貫纂到底但取文便其實後之三層言說不到思慮不及豈耳根所能領耶謀報渾沌應帝王南海之帝為儵北海之帝為忽中央之帝為渾沌儵與忽時相與遇於渾沌之地渾沌待之甚善儵與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死此章在內篇之末儵忽六七識生滅心也渾沌八識含藏心也渾沌無知為儵忽所鑿而死渾沌雖死其性不死隨儵忽轉而冥熏儵忽生其悔過之心遂謀所以生渾沌者時相謂曰渾沌德我今亡渾沌矣為之奈何旦夕推求渾沌之性而培植之久之而渾沌復甦曩之無知者轉而為精明之體矣於是儵忽奉為宗主聽其使令非但分化於南北抑且并八方上下而統治之渾沌改名為大圓鏡儵名妙觀察忽名平等性與儵忽為侶者皆名成所作四智菩提圓彰法界南華之能事畢矣以無始無明稱為渾沌既是渾沌必有儵忽既有儵忽必至鑿竅後之解者但惡其鑿意謂不鑿則天性完全豈知縱不被鑿亦是闇鈍無明不能顯出全體大用也莊生決不以渾沌為道妙有他文可證此章說到迷妄極處而止未說返流歸真之道留待後人自悟奈何二千年來幽關未闢故為揭而出之以餉知言君子篇末之渾沌即首章之鯤魚也鯤喻大心凡夫在冥海中長養聖胎一變而證大果渾沌喻毛道眾生莫不被鑿而死莊生哀世人之沈淪而以此章結之其無盡大悲可想見矣象罔得珠天地黃帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔象罔得之黃帝曰異哉象罔乃可以得之乎赤水渾濁汙穢之至也遊乎其北舉目無可樂之境也崑崙巉巖危險之處也登乎其丘置身可畏之地也一念回光始知玄珠已失矣雖然未嘗失也知善於用心者也離朱明察秋毫者也喫詬辭辯縱橫者也皆不能得計已窮矣乃使象罔雖使而無所使也象罔得之得其本有也黃帝歎異一語意味深長百世之下令人聞之而心折也世之所貴天道世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也為其貴非其貴也故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲為足以得彼之情夫形色名聲果不足以得彼之情則知者不言言者不知而世豈識之哉此章為執著文字者下鍼砭今進一解為掃除文字者下鍼砭古聖遺言如標月指執指固不能見月去指又何能見月莊子恐人認指為月不求見月故作此論令全書文字如神龍變化若有若無猶釋典中之有金剛經能令一代時教飛空絕迹也達摩西來不立文字直指人心見性成佛當時利根上智得其旨趣者固不乏人而數百年後依草附木之流正眼未開輒以宗師自命邪正不分淺深莫辨反不若研求教典之為得也蓋書之可貴者能傳先聖之道至於千百世令後人一展卷間如覲明師如得益友若廢棄書籍師心自用不至逃坑落塹不止也下文輪扁答桓公之言曰君所讀者古人之糟粕試反之曰予所讀者古人之英華有何不可天門庚桑楚出無本入無竅無本則無所出無竅則無所入而云出入者皆假名耳有實而無乎處實者實際也處者方域也既有實宜有處而無處者方之妙也有長而無乎本剽長者久長也本剽者本末也既有長宜有本剽而無本剽時之妙也有所出而無竅者有實此句束出入二句互為影略呂氏謂有缺文宣氏謂是衍文皆非也因有出有入所以證其有實有實而無乎處者宇也宇者上下四方也既無處矣何得名宇乃知宇者唯心之方非妄計之方也有長而無本剽者宙也宙者往古來今也既無本剽何得名宙乃知宙者唯心之時非妄計之時也有乎生有乎死有乎出有乎入生死出入非有而有即空之有也入出而無見其形是謂天門無形可見而有出入何以名之名為天門天門者無有也剋實而言唯是真空萬物出乎無有從真空現妙有有不能以有為有必出乎無有重申上意而無有一無有此即重空亦名空空亦名大空亦名究竟空亦名第一義空聖人藏乎是即是聖人放捨身命處此章語語超越常情顯示空如來藏也世出世法皆以真空為本強名之為天門天者空無所有也門者萬物所由出也既以有無二端互相顯發而仍結歸甚深空義恰合般若旨趣七大徐無鬼知大一知大陰知大目知大均知大方知大信知大定至矣知此七大蔑以加矣上舉七大名下述七大用大一通之體則無二用乃萬殊大陰解之寂滅大海究竟解脫大目視之正法眼藏徹見本源大均緣之平等一如普緣十界大方體之無邊剎土不出自心大信稽之因果歷然纖毫不爽大定持之本來無動不持而持盡有天業識消亡天真獨露循有照隨順羣有智照無遺冥有樞得其環中以應無窮始有彼有始則有彼自他宛然無始則無彼自他雙泯則其解之也似不解之者其知之也似不知之也聖解非同凡解真知異於妄知不知而後知之禪宗所謂髑髏無識眼初明者是也其問之也不可以有崖而不可以無崖此誡學人發問不可墮有無二邊也蓋有則墮增益過無則墮損減過若欲免此二過心計亦有亦無則墮相違過又計非有非無則墮戲論過離此四過方可問道頡滑有實頡滑者不可捉摸也雖不可捉摸而又非虛無則超斷常二見矣古今不代古未嘗往今未嘗來見有時代遷流者皆妄情耳而不可以虧既無往來何虧之有則可不謂有大揚搉乎具宣七大故名大揚搉權小之機豈能領會闔不亦問是已奚惑然為何不研究此道而徒自迷惑汩沒於三有之海耶以不惑解惑修也復於不惑證也是尚大不惑造極也此三句謂以不惑之理解瞑眩之惑以復其本性之不惑然後進而至於大不惑則契於道矣此章歷舉七大陸氏謂其名目皆莊子所自命而不知其與佛經暗合也眾生流轉由起惑而造業由造業而受苦故以起惑為病源佛經說有三惑一曰見思麤惑也二曰塵沙細惑也三曰無明根本惑也起時由細而麤滅時由麤而細無明貫於本末此文斷惑次第有三層至大不惑則無明破盡永脫輪回矣得其環中則陽冉相氏古之聖君得其環中自證之道如禪宗一圓相以隨成隨眾生機而成就之與物真俗圓融無終無始始或為終終或為始無幾無時幾心盡息時量全消以上四無環中之妙也日與物化者一不化者也恆順眾生與之俱化而自無化相可得此即隨物曲成也闔嘗舍之慈心濟世何肯舍棄眾生而自求安樂耶以上述冉相氏之德夫師天而不得師天與物皆殉此言世人不達真理錯亂修習雖欲師天不知天法道道法自然而以為有天可師則與殉物何異其以為事也若之何以此為事何能合道反詰之語映起下文夫聖人超越常情未始有天未始有人未始有始未始有物四者皆無空之極也既言未始有天可知非師天者乃先天之聖人得環中之體者也與世偕行而不替雖證真空而不絕世緣偕行者同事攝也不替者不休息也所行之備而不洫萬行備修而不混濫洫者濫也以上二語得隨成之用其合之也若之何如此行道方順正軌反詰語映帶上文湯得其司御門尹登恆為之傅之又引成湯得賢臣為之輔弼方能行聖人之道從師而不囿雖以賢臣為師而不為師所囿得其隨成與冉相氏無異也為之司其名無為而治雖居君位但虛名耳之名嬴法此名不過嬴餘之法無關大要得其兩見要在得兩見耳實智見真諦性空也權智見俗諦假有也得此兩見方能治天下仲尼之盡慮為之傅之又引仲尼與湯相形湯為人君以賢臣為傅仲尼為人師以己之盡慮為傅盡慮者慮至極盡處也見無不徹智無不周即以傅師道之傳於萬世也此慮非凡夫六識妄緣乃自性所起妙觀察智耳容成氏曰引古聖之言以結上文之意除日無歲破時量也積日而成歲除日則無歲矣積剎那而成日除剎那則無日矣剎那者時之極促無時量之可得也證剎那際三昧者延一念為無量劫促無量劫為一念過未入現在現在入過未即冉相氏無終無始無幾無時莫不由此道也無內無外破方量也自外觀之以內為小小之內更有小焉小而不可極則歸於無內而已自內觀之以外為大大之外更有大焉大而不可盡則歸於無外而已內外消融遂能小中見大大中見小一塵徧法界法界入一塵何方量之有即聖人之非天非人非始非物莫不由此道也此章顯示行菩薩道之正軌也發大乘心者以第一義空為本冉相氏既得此理入俗利生不轉而轉轉而不轉誠為無上至德不可以常情測度也次則舉下凡妄修以啟上聖真修徹證真空而不捨度生之業又舉成湯仲尼以明君師之別然後引容成氏二語結之二語之義豎窮三際橫亘十方前文環中隨成不化盡慮種種法門攝無不盡矣得意忘言外物筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉筌者魚笱也蹄者兔罝也因筌而得魚因蹄而得兔魚兔既得筌蹄可捨後人不達此意竟欲捨筌蹄而求魚兔魚兔何由可得耶章末二語神韻悠然天道篇內世之所貴一章專主離言此章先即後離以救其弊維摩經云言說文字皆解脫相則非即非離更進一層矣等不等觀雜錄卷一目錄讀法華經妙音品圓覺經清淨慧章別記彌陀報土起信論證果三身義大乘律佛法大旨學佛淺說金剛經四句偈說藏經字體不可泥古說鴉片說觀未來支那佛教振興策一支那佛教振興策二釋氏學堂內班課程芻議釋氏學堂內班課程佛學研究會小引祇桓精舍開學記金陵本願寺東文學堂祝文般若波羅密多會演說一般若波羅密多會演說二般若波羅密多會演說三般若波羅密多會演說四南洋勸業會演說送日本得大上人之武林
