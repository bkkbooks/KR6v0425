body:
  text: 清石埭楊文會仁山著與日本笠原研壽南條文雄書弟在滬上與松本上人談次得悉真宗高士有西遊者秉拂於英頃至倫敦晤末松氏詢知二公退居學地精習梵文惜離都稍遠不獲訪造瞻仰高風欽佩靡已弟潛心淨域十餘年矣願持迦文遺教闡揚於泰西諸國苦於言語不通無從啓發上人在英日久與此邦人士定多講論其中有信心不疑者乎現在所誦梵文是否三藏教典今文與古文同異若何大乘經論流傳印度者尚存幾部上人當能洞悉底蘊敬懇詳細見示為幸上人功課之暇若能將印度字母譜寫出一紙以英文配其音以漢文注其法俾弟亦得稍知崖略則感荷無涯矣弟在倫敦再住十餘日即赴巴黎行雲流水本無定蹤有時驀地相逢亦未可知也與日本南條文雄書一附來書去月辱惠書得悉君曾逢松本白華於上海頃到倫敦遭末松謙澄談次每及弟等之事遂有此賜何幸加焉方今泰西諸國學術進步熟讀梵文三藏教典從事於譯出者固不為鮮矣其人之信否則非弟等之所得知也現在所誦三藏教典與彼羅什玄奘等之原本無異其中佛經梵文別存一體往往有以方言代古語者是以雖印度學士甚難讀之大乘經論尚流傳印度東北尼波羅者其數頗多晚近印度及泰西學士得其寫本刊行布世者已有數部弟等曾得唐日照所譯方廣大莊嚴經之梵文此其一也小乘三藏教典今尚存於錫蘭島其文則所謂巴引理語者而非大乘教典之梵文之類也印度子母字音表二樣寫以應高諭若夫詳解則請讀文法書唐僧智廣著悉曇記其梵字即尼波羅文字也而注發音之法如稍詳者今別鈔録以供參考不知其配音之文字果當乎否請賜教示弟等今汲汲於學事不得趨拜遺憾何限唯願他日得相逢罄情緒不宣前接覆書備承指示並得印度字母新舊二種慶幸無涯諧聲之法濫觴於此雖未涉其支流卻已探其本源矣非二公之賜何由見之舊譯陀羅尼有二合以至四合者如音答囉音勃籠皆二合也音體哩呬窨音紇利伊斯皆四合也研其字體實有二三字相合而成未知近年仍用此法否乾隆間所定同文韻統首列天竺字母十六字翻切三十四字與尊示二種大致略同至下文排譜均以唐古忒字代之係西藏喇嘛常用文字也君所得刊本大莊嚴經之梵文外面當有英文注出經名及發售之處請示悉以便覓購弟縱未諳亦願備此一體格耳奉贈小照二幅以當面謁尊相如蒙見賜幸甚與日本南條文雄書二附來書覆書前此連夜遭遇快聚頗醫久渴且見贈以玢編奇書讀閲之餘大有所得感謝靡已弟歸牛津已過一旬未作一書對君前夜之高問太曠友誼伏乞寬貸貴問曰梵唄者音聲轉變之妙也梁高僧傳有唱誦一科想見古時聲學之精今印度梵僧聲學尚有古法否弟聞文法之精密梵語為最昔有波儞尼仙以詩句作聲明論即梵語文典也其教語言之用法與發音之定則最詳婆羅門教徒到今背誦全部講習不已有一年少梵僧今在牛津即婆羅門教師也能諳誦此文典辨音聲之事併能以上古梵語談論弟嘗訪其居聞諸其人婆羅門教徒之敏於明記不忘也不啻文典如所謂四吠陀書亦自古諳誦以傳之不別要用簡册此事歐人之所信而不疑者也後世梵僧亦往往筆諸於書晚近到歐人遂有吠陀及文典併詩篇等刊行之舉雖然梵僧之古風尚行其間與二千年前殆不見其異云夫聲音以代文字以傳其教書則聲學之不可不講也必矣婆羅門教徒之於吠陀也以為章章句句皆生於婆羅門神之意是以人類唯得聞而傳之而已如筆諸於書則侮神之甚者故因聲音以保存教旨一誤聲音則教旨不明教徒當迷歧路此所以印度婆羅門教徒之到今講聲學之古法孜孜不倦也我佛陀教之起也佛滅度後摩訶迦葉波集五百大阿羅漢於王舍城編集佛説阿難陀唱誦修多羅藏所謂經也優波離唱誦毗奈耶藏所謂律也於是乎印度始有文書然其遺書不存於今後二百餘年有阿輸迦王殆領印度全國乃命臣民所在建多數窣堵波併石柱且有巖石處直刻文其上皆用其方言唐僧玄奘之時存者不下十數見西域記晚近歐人發見其遺存者數箇譯以歐文刻以傳世其文中述佛教精義簡而明矣印度古文書之存於今者以此阿輸迦王告示文為最古矣案梵唄以極音聲轉變之妙者亦印度之古風而其濫觴蓋在婆羅門教徒之問而佛陀教徒因襲用之高僧傳中遂有唱誦一科歟記君前夜問弟以大乘起信論梵文之存否而弟不作其對而止明之北藏中有至元法寶勘同總録其中以梵文之當時存於貴國者與譯文考較附以梵文書目書中舉大乘廣五蘊論寶行王正論與大乘起信論之二譯云右四論蕃本闕蕃本謂梵本也由此觀之則起信論之梵文唐代以後如不復傳於世者弟讀貴贈之淨土三經論其無量壽經起信論中作者之評趙宋王日休也當矣然於其自用曹魏康僧鎧譯文或得無效尤者乎何脫僧鎧之譯文如此其多雖作者已云今略仍舊第有當合者合之經中義句間有繁復謹參他本重加參定但去繁復不敢更有增易乃至庶幾盡善盡美不使後人少留餘憾讀者詳之弟詳讀之餘聊不得無餘憾也抑譯文正否之判固非得原本而比較考定之後則決非可為之業也弟嘗評王日休之大阿彌陀經云爾今於此論亦不得不云爾也此弟等之所以汲汲欲得原本也弟今幸得無量壽經之梵本英國有三寫本佛國有二寫本皆得而校之其大旨與康本同弟之梵本終始頗簡短較與趙宋法賢譯本同如其詳悉則請俟梵本刊行之日報之今有一事依梵本得判正否無量壽經起信論古佛出興第五之下作者云寶積本從錠光上溯往世過五十三佛方至世自在王俱用逆數於此全異然他譯本多從順數未知寶積別有據否弟案趙宋法賢亦用逆數弟恐菩提流志法賢共過矣或其所用梵本有異同而然也然依弟之梵本判之則寶積經無量壽如來會與無量壽莊嚴經之不得其正可知也況於後漢吳魏之三譯既已用順數能與弟之梵本合乎觀無量壽佛經之梵文弟未聞其存否唐僧善導曾作四帖疏細釋此經日本有刻本數種未知貴國亦有此刻本否阿彌陀經之梵文弟曾呈其一本君前夜要弟以其梵文之譯音君能解英人所用之羅馬文字之譯音則弟當作其譯音一本以應命也君云君曾讀真宗教旨其大旨同是引導衆生於無量壽佛大願海中者也然弟曾聞廬山之説間與終南異終南者謂善導也弟已讀蓮宗寶鑑若有他之好書以可容易解知廬山宗旨者請幸教示抑君果屬廬山乎將別成一家乎弟未知之也弟今呈君以大雲請雨經梵文鈔本一册幸納焉此經有宇文周闍那耶舍之二譯隋那連提耶舍之一譯不知今尚為貴國人所用乎否時方炎暑伏祈自重昨接賜函備承指示臨風三復欣慰無涯承答印度聲學一則至為精詳數百年來東土無人知此矣大乘起信論既不能得梵本將來即據梁譯翻成英文或亦歐人入道之勝緣也尊論彭氏無量壽經論非深研梵本者不能道彭氏當日見五譯之不同故有此作今幸足下求得原本他日校訂妥協華梵並書弟願刊布東土善導尊宿作觀經四帖疏中華未見當求之貴國支那所傳者妙宗鈔也阿彌陀經之梵本請君以羅馬字譯其音以華文譯其義仍梵文原式作三排橫書併留空地一排如蒙作成弟歸時當登諸梨棗弟聞法以來世業多而學力淺大乘之機啓自馬鳴淨土之緣因於蓮池學華嚴則遵循方山參祖印則景仰高峰他如明之憨山亦素所欽佩者也用力不專而歲月虛度如來説謂可憐憫者廬山之書未曾多見嘗聞貴宗説法專提他力信心普被羣機攝受無遺與今時傳天主耶蘇之教者外同而內異也夫生天受樂未脫輪回念佛橫超永無退墮此理一明導歐美而歸諸淨土易於反掌耳抑更有請者提倡宗旨似不必全遮聖道蓋一類世智辨聰之流不向聖道門中體究一番則不能死心踏地歸依淨土也弟近日以念佛往生為正宗以弘法度生為助緣既無專師但求不背經旨而已承賜大雲請雨經梵文實深感謝此經除藏內舊譯外乾隆年間又有欽定之本係喇嘛所譯今時北京喇嘛常用者也弟返巴黎未有定期君到龍動請至敝館會陳左二君則知弟行蹤大駕到巴黎時弟定在巴黎可作數日談盼甚盼甚尊處如有元奘法師西域記之華文望帶至巴黎以便查考印度古迹也謹案先生於華嚴啓自方山後乃專宗賢首清涼此書尚係在英倫時作故有遵循方山一語編者識附南條文雄覆書分手以後倏忽五旬宿諾不似仲由之勇慚愧慚愧貴囑阿彌陀經梵漢羅馬文字合璧昨來才得間暇草草卒業茲將稿本寄上梵字上所附漢字直譯與彼隋達摩笈多譯金剛能斷般若波羅密經一般唯譯一二梵語而已如其義譯譯家兩巨擘鳩摩羅什玄奘已擅其美今復何言童壽所譯阿彌陀經最與今之梵文合要之梵語文法固與拉丁希臘獨逸語等文法一樣名詞動詞代名詞形容詞皆依語尾變化轉其義意其中梵語名詞代名詞形容詞各有男女中三性之別每性各有單兩復三數之別而每數各有八格曰體主目的器械附與奪去物主居處稱呼是為體業具為從屬於呼之八轉聲玄奘門下慈恩大師窺基唯識樞要中三性各舉一例略示其梗概基師所謂蘇漫多聲底彥多聲者謂梵語名詞動詞也名詞中又有六種混合法是為六離合釋所謂依主持業有財相違帶數鄰近是也窺基義林章第一總料簡章有其略解梵語之動詞大分為三體曰他動自動受動每體有現在第一第二第三過去第一第二未來之時別及願望命令等之諸法此時式法各有單兩復之三數而每數各有第一第二第三之三人稱其差別一依語尾變化時有加一字於語首者而已此梵語文典中之大觀也慈恩傳中舉他動自動二體現在法之一例惜哉其解未甚詳悉梵語變化既已如此然而今泛然以無變化漢字充之則失其原語之真者固不足怪也況於文章中文字言語位置排列大異其體乎宜矣哉蕅益大師智旭閲藏知津中評達摩笈多所譯金剛經以為文拙甚然此非其文實拙唯由其原文文法之異旭師不知其為直譯是以有此評也今試舉一例以述之漢譯佛經卷首初明衆成就中往往有與大比丘衆千二百五十人俱之十二字達摩笈多譯其梵曰大比丘衆共半三十比丘百此與梵文語合而第二之比丘漢譯常轉為人此直譯中其尤奇者為半三十百之四字如準此四字次第以半三十為十五則有或解為千五百之數者亦未可知也然童壽覺希真諦玄奘義淨皆同於其金剛經譯文舉千二百五十之數然則笈多獨為有梵文異本乎曰否不然今案梵文所謂衆成就之一段其語皆依第三轉具聲與大比丘衆千二百五十人俱十二字之原文中有四箇之第三轉語與一箇之不轉語曰嘛哈答阿拔哈伊螭烏薩迎噶哈厄納是為二箇之單數具聲第一語乃形容詞譯為與大第二語乃依主得名名詞譯為與比丘衆漢譯中常除第二之與字與前形容詞合於是乎與大比丘衆之五字成矣笈多併略兩箇與字曰薩阿哷達哈模此是不轉語而常立第三具轉名詞前而與之合者譯為與俱漢譯中亦除此與字故第十二俱字成矣笈多譯為共曰阿哷達哈得喇衣鄂達沙拔哈伊哷拔哈伊螭烏沙得厄厄斯是為二箇之復數具聲第一語乃帶數得名名詞而形容第二語中所示比丘之數譯為與半十三漢譯略與字如前而笈多之譯十三為半三十者固非無其理也抑梵語數目十一以上到九十九各目各一語則固與漢語之二字或三字列次者不同但其同一語中含有二數目之語基而已而其語中小數語基常在滿數語基之前故十一為厄嘎一達沙十十二為德斡阿二達沙十十三為得喇衣鄂三達沙十十三以上到十九之數目英語亦同其軌而梵語二十為無伊昂沙得伊三十為得哷伊昂沙得英語亦同其次第梵文十三之數目成語次第如此是以笈多雖隨其語基之位置敢與漢譯次第反譯為三十而固非指滿語之三十也明矣今之梵文十三數目前冠小語阿哷達哈譯為半者然則半十三之數非是六半乎曰此亦不然此半十三之語非獨立語固屬次語者於是乎讀者不可不詳解第二語也第二語亦帶數得名名詞也譯為與百比丘漢譯略與如前笈多亦逐語基位置譯為比丘百此比丘漢譯常為人如前所述於是乎第十一人字成矣今所餘有半十三百之四字以不可不得第六以下千二百五十之五字也如何而就半十三百可得北數乎無他十三百是千三百也今有半字以標半百之減數千三百中減殺五十於是乎千二百五十之數成矣右唯舉一語以證梵漢二語之所以大異其撰也記本年夏月在倫敦與君及陳左二君快聚聯吟之夕偶話及此半三十百之梵語弟時作略解博得三君之一粲其景況歷然在目今也離居三處不知何日尋快聚之盟重證此事回顧愴然今舉舊題作之細釋再瀆電覽與日本南條文雄書三七月初五日由貴邦岸田君轉致尊函展閲之餘如親雅範併悉前賜一書由松江君轉遞仍未達到滄溟遠隔未能覿面傾談良可慨也大駕東歸時曾遊歷印度否竊願聞之承寄梵文般若心經及尊勝陀羅尼合本不啻百朋之錫出以示同志諸友無不歡喜踊躍歎為希有也從前承寄書册誤於郵者之手未得寓目深以為歉敝友沈君仲禮閲英文新報見足下在牛津闡揚梵學一段併及弟名惟愧募刻藏經至今尚未完成無以仰副同學之望耳印度僧來遊之説未有所聞弟前言遣幼童學習梵文者在第三第四二子也不意回國時二子已逝此時頗難其人當以俟諸異日所需五百羅漢尊號一卷惟金山龍藏內有之遲日託人鈔出再行奉寄大清新譯般若心經弟未聞有此本若至北京再當詢之頃在舊書店內覓得同文韻統一部計二本特以奉贈祈鑒收茲有懇者尊著華梵字典及梵文無量壽經乞各惠一本不勝翹盼之至與日本南條文雄書四舊歲十一月十八日接到九月初一日手書以信面所寫英文上海無處可投展轉於長江各口然後遞至金陵機器局適敝友沈君仲禮見之始得達到展讀之餘備悉查考法華梵文欣慰之至承問北京天台五臺三處梵文非弟親至其境莫能詳悉十二月初間陳君松生起程弟送之上海請其晤君時將致信上海之英文寫存尊處或晤時適忘之耶今年九月十三日接到七月初五日手書係由義夫白君處轉來始知今年二月承寄聖教目録一部六月承寄無量壽經阿彌陀經梵文合本一部均未達到未知沈浮何所矣詳君尚留牛津寫金光明入楞伽等經馬博士將譯無量壽英文淨土一宗定能傳之歐洲皆上人之力也笠原君養病於東京不勝繫念河田竹村末松諸君均無恙稍慰鄙懷知君歸期在來年把晤非遙曷勝盼望但弟行蹤無定一年之中必遊歷一二次或數月而後返君到上海請先賜一信弟在金陵便當遣一使奉迎與君盤桓於蔣山淮水間作數日暢談亦勝會也若弟他往則敝寓無人接待恐復函亦致疏略矣敝友沈君名善登字穀成浙省太史公也居上海問中國電報局便知此君尊崇淨土近聞大駕將歸開梵學於東瀛亦願遣少年俊士從學君到上海可一訪之與日本南條文雄書五華歷七月間岸田君寄到手函如親雅範承賜梵文般若心經及尊勝陀羅尼一册歡喜無量曾泐蕪函併奉贈同文韻統一部交岸田君轉致尊處想已達到後接松江君寄到尊函二件備承詳示不啻覿面傾談併梵文無量壽經及小彌陀經一册令知會雜志一本展閲之餘欣慰彌深方知大駕回國係越美洲而來印度之遊尚未如願弟現承劉星使之召又當從事英倫他日儻有機會得隨杖履遊歷五天瞻禮如來應化遺迹是所深願也出洋之期約在兩月以後俟到倫敦再當泐函奉報所需五百羅漢尊號一卷已請寶華山主藏僧鈔出寄呈台端祈查收如蒙賜緘仍請寄由松江岸田二君轉達敝處不致有誤與日本南條文雄書六兩月前接岸田君寄到手函併惠贈梵文無量壽阿彌陀經合本英譯明藏目録翻刻造像量度經阿彌陀經音義兩譯牛津圖書館目録共七本拜領之餘良深感謝頃到滬上接松江君交來手書併梵文法集名數經一本歡喜無量上人教授梵文孜孜訓誨造就人才未可限量東方佛經華梵並行實自上人始也英倫既翻佛經四本又刊明藏目録大教西行上人與笠原君可同摩騰竺法蘭並稱矣弟五日後即當隨使節出洋到英之日再行奉報尊函所述諸君見時代致盛意與日本南條文雄書七五年前接到賜函併書籍數種自是以來未通音問伏維上人少病少惱起居輕利不勝遙頌弟於前時隨同劉星使前赴歐洲住倫敦三年去歲夏間回國仍經理刻經事十餘年後當可完成近日在北京覓得梵文字母譜一卷身心語一部均係番經式樣茲因舍親蘇少坡赴貴國之便特以奉贈身心語卷中未知是經是呪便中略示教言為荷貴處梵學生徒想見造詣精深奘師而後於茲為盛唐以前佚書貴國問有存者弟欲覓晉時支道林竺道生著述另開於後如可覓得祈代購數種儻寺內尊藏之本不能購買可屬蘇君鈔稿寄回不勝盼禱與日本南條文雄書八附來書日前貴親蘇君來過敝處因接到賜函併梵文身心語卷一册欣喜靡已伏維道履無恙再赴歐洲居倫敦三年而今已歸來仍經理刻經事務期其完成不堪欣賀弟去歲以後在東京教授梵英二文學又演説佛教頗得同人今案貴贈梵文身字一卷佛説佛母寶德藏般若波羅密經之原本也此經趙宋法賢所譯在明藏臨字函語字一卷題曰聖文殊師利説未見其漢譯心字一卷普賢行願讚之原本也此讚唐不空所譯在明藏唱字函弟往年在英國借覽金剛經及行願讚之梵文於露西亞國聖彼得堡府大學其式樣實與貴贈同故望蜀之念勃起不可抑也貴處復得金剛經及他經梵文則請使弟閲之貴囑支道林竺道生著述弟未見聞其現存故無由鈔出之別單所記陀羅尼等諸書亦未保其盡存日本與否弟今日郵致書目於西京經書局命轉送書籍到之日當交蘇君轉寄貴處另開於後之外恐未易覓得也頃由蘇君寄到尊函展讀之餘如親道範欣悉貴體無恙傳授梵英二學弘揚佛教為後進津梁殊深欽佩承示身語心三卷大意如暗遇燈歡喜無量他年若到北方當再求覓如有所得即當寄呈台端喇嘛所誦之經均係西藏唐古忒文字非梵文也箋末所開經書十八種渴望之至惟淨土論大意係日本文弟不能讀其餘十七種均求代購其價由蘇君奉上此外如有古時支那人撰述各種為明藏所無者無論敝單已開未開均祈代為尋覓支道林竺道生論著甚為難得貴國存儲古書之所若有陸澄所集法論則其中當得幾種也滄溟遠隔聚晤何時每望朝暾伊人宛在與日本南條文雄書九未通音問者將及兩年矣風恬浪靜一葦可航法事有緣仍欲相訪也頃擬籌措遊資親赴貴國參謁高賢行期約在一月之後未知彼時閣下仍住東京否儻在巡教之期台駕他往則弟到時無東道主人可託一切求覓內典之事茫無頭緒未免望洋而歎也弟併擬赴西京及各處名藍收藏古本章疏之處次第尋覓未識貴國常例準支那人隨意遊歷否均祈詳細示知以定行止弟擬攜次兒同行因其略知英語雖不敷用聊勝於無也或到橫濱雇一通事偕行但恐價昂無此巨款耳與日本南條文雄書十未通音問者兩年餘矣秋水伊人時深葭溯伏維道履增綏至以為頌弟比年來每思度海而東與諸上人暢談衷曲兼可求覓未得之典第以身體衰弱艱於步履又無傳語之人得以偕行因而中止貴國寄來之書現已刊出幾種寄呈台覽兼贈知交用伸法供再求代購釋典另單開列隨得幾種請由上海本願寺松林上人處轉寄南京花牌樓池州楊公館定能達到所有購書價值及寄費等款均乞暫為墊付賜信示悉即當匯寄歸還紙短情長不盡欲言求代購章疏開列於後法華五百問論三卷湛然略止觀六卷梁肅世稱刪定止觀禪門要略一卷智者隨自意三昧一卷臺山金剛般若疏二卷基般若心經疏一卷靖邁對法論鈔七卷基華嚴雜章門一卷法藏三聖圓融觀一卷澄觀心要一卷澄觀五蘊觀一卷澄觀金剛般若略疏一卷智儼注金剛般若一卷僧肇龍女成佛義一卷源清以上十四種照諸宗章疏録內有硃圈者録出金七十論校注三卷起信論校注一卷八宗綱要考證二卷以上三種東華和上著述大乘起信論義記唐法藏觀無量壽佛經疏宋元照以上二種已得會本欲求未經會合之本看其文勢斷續另行排定以備刊板大乘密嚴經疏三卷唐法藏弘教書院及東大寺均載此書求而未得想他處收藏古書之所或有存者祈登載新聞報中求之如得寫本完全者酬銀五圓刻本完全者酬銀十圓緣此書期望甚殷故不惜重價以購之也與日本南條文雄書十一舊歲接奉覆函展誦之餘欣慰無既後由蘇君寄到閣下代購書籍歡喜踊躍非可言喻古時著述流傳鄰境者一旦復歸本土因緣時節非偶然也弟求法之心無有饜足茲續開單寄呈台端祈屬書肆覓購不勝盼禱之至唐法藏所撰楞伽經疏七卷懸想甚殷貴國既有玄義古時當已並傳請向收藏古本之處求之或購或寫均可上年蘇君函述貴處地震成災實堪憫惻邇來支那境內水旱蝗蝻時形荒歉皆係衆生業力所感減劫時分倍覺難堪非淨土橫超一門何能出此火宅耶上人自行化他躋衆生於極樂之域所謂如來使者非乎弟屢興東遊之志為世緣所阻不克如願何日得與諸上善人同會一處暢聆雅教也炎威頓減秋色宜人諸維珍攝不盡欲言與日本南條文雄書十二日前接讀手書併經籍十一種曾作復函附贈新刻內典十部計四十四本託上海本願寺轉寄東京想已達到辰維起居佳勝至以為頌今寄上匯票日本金二十圓以備寫經購經之用祈鑒收法藏密嚴疏查弘教書院目録原載四卷想貴國當有完全之本可覓也弟願出重價求之以成完璧再窺基有密嚴經述讚三卷亦求代為覓購或借本謄寫總以得見為幸前年所得智者大師之禪門章內缺百三百四百五三頁如能寫補最妙瀆費清神心感不盡與日本南條文雄書十三半月前晤蘇君于滬上得接尊賜二緘併惠書二十九本赤松君惠書十四本島田君惠書十四本均已拜領感謝無極晤二君時祈代申謝悃奉詢各款條列於後一錫蘭人達摩波羅欲興隆佛教而至上海云在貴國耽住多日想已深談教中旨趣其意欲請東方人至印度宣傳佛教未知貴國有願去者否以鄙意揆之非閣下不能當此任也二英人李提摩太在上海約弟同譯大乘起信論李君寫出英文刊布歐洲應用華梵英合璧字典李君有一本係前時西人在香港印行者近年若有新出之書較前加詳祈開示英字名目以便購用謹案李提摩太所譯起信論頗有援佛入耶之嫌曾有人親問先生先生云當時李君約同譯起信論李君請為講釋甚明李君亦自言已解乃至執筆時仍以私見穿鑿故此後有西人請同譯楞嚴等經皆堅辭謝絶此事之因緣如是謹識於此以釋後人之疑編者識三英國牛津及歐洲各國所譯佛經共有幾種乞示悉四展讀航西詩稿讚賞不置拙作列於卷首實為榮幸四疊亞兒碧行之韻鄙人亦在懷友列中此情直與太平海水而無極矣印度紀行登台詩譜二書甚願見之台山梵策是何經文便中示悉為盼五承賜尊照三復來書不啻覿面晤談小影俟天暖新照一紙再當寄呈六華嚴搜玄記來書九本每卷皆分本末二册惟第四卷有末而無本實缺一册望詢問書肆中有完全者再購一部七照來信寄上妙玄節要二本選佛譜二本西方公據一本往生論注一本奉贈赤松君祈轉致之又起信裂網疏二本翻譯名義集六本西方公據一本往生論注一本奉贈閣下祈鑒收八俱舍論三十卷貴國書肆如有善本望代購一部九蘇君瀕行時曾將書籍信函往來之事託諸中華使館劉君子楨及吳君靜軒已承允許日後有應付錢款均由二君經手也十尊處寄信函書籍外面請寫明寄南京花牌樓池州楊公館字樣由上海轉寄時方不至舛誤紙短情長不盡欲言與日本南條文雄書十四前接二月五日手函併承贈經籍九册後又接三月二十六日賜緘併承贈經籍八十一册均已拜領感謝無極時因奔走他方久稽未復中懷歉然然思慕之忱無日不神馳左右也今將各款條復於左一承寫贈大典六如書目一册併狀文足見弘法利生今古同心百年前未償之願一旦成之想亦二公願力加持也二承贈華嚴行願品疏鈔一部本朝龍藏雖已收入外間流行之本竟未遇見今得此部正合他日寫刻之用梵語千字文支那未聞其名實足新人耳目也瑜伽論纂要承代寫補可成完璧其餘各種均屬難得之本慶幸無極三赤松島田二君見贈各種內典祈代為致謝赤松君許贈華嚴搜玄記及勝鬘經述記寫本金剛經述讚寫本不禁引領望之四赤松君欲得法海觀瀾二十年前曾於亡友處見之今寄信各處訪問皆無所得儻他時遇見當寫一本奉贈論語點晴闕頁照寫一紙寄呈五蕅益大師著書另開一單分別有無寄呈台覽六島田赤松二君欲刻敝處書目遵將作者姓名注於題下惟大藏經內所有者概不贅名至於新刻之書隨時增添未能預定七赤松君欲得之書併圖像及島田君所需二部如數奉贈祈轉交為荷閣下欲得敝處刻本謹擇貴國所罕有者奉贈四十二部列於另單祈鑒收此外如有尊意所需者請開示名目以便續寄八島田君所贈大唐內典録一部具見德川氏弘法之盛弟等倡募刻經亦後先一轍也但遲速懸殊實深慚愧耳天時炎暑伏維珍攝紙短情長不盡萬一等不等觀雜録卷八目録與日本南條文雄書十五與日本南條文雄書十六與日本南條文雄書十七與日本南條文雄書十八與日本南條文雄書十九附覆書與日本南條文雄書二十與日本南條文雄書二十一與日本南條文雄書二十二與日本南條文雄書二十三附來書與日本南條文雄書二十四與日本南條文雄書二十五與日本南條文雄書二十六與日本南條文雄書二十七與日本南條文雄書二十八與日本藏經書院書一與日本藏經書院書二與日本藏經書院書三與日本藏經書院書四與日本松林孝純書一與日本松林孝純書二與日本東海書與日本町田書與日本後藤葆真書與日本龍舟書代余同伯答日本末底書一附來書代余同伯答日本末底書二以上都為一百五十篇曩者梅擷藝君曾刻其七篇合十宗略説為八篇今以十宗略説別為一種而就刻經處所藏稿本重加編次勒成八卷竊意先生遺文當不止此中日二國人士藏有先生手稿為茲編所未録者如荷郵寄刻經處俾得刊為續編以餉當世則法門之幸也丁巳夏編者識
