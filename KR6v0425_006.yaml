body:
  text: 石埭楊文會仁山述法界無始終無內外強立名為法界法界性即法身因不覺號無明空色現情器分三世間從此生迷則凡悟則聖真如體須親證釋迦佛生證者誰釋迦尊大悲願示誕生處王宮求出離夜踰城人不知入雪山修苦行六年間習寂定從定起出山來坐樹下心鏡開天龍喜魔膽落覩明星成正覺啟大教說華嚴塵剎海現寶蓮愍凡愚不能聽隱尊特顯劣應說阿含第二時四諦法接小機證四果出生滅演方等破法執第四時談般若二乘轉教菩薩開顯圓法華會學無學得授記涅槃經最後說顯真常扶戒律五時教如是說亦融通亦分別化道圓歸真際雙樹間吉祥逝闍毘後分舍利阿育王變古制碎寶末造浮圖役鬼神徧閻浮優填王始造像令後人修供養結集三藏大迦葉命阿難結集經石窟間脩多羅是經藏毘奈耶是律藏阿毘曇是論藏正法隆外道喪藏分三部十二遇有緣作佛事大法東來漢明帝夢金人求聖教遣蔡愔騰蘭來經像至初譯經四十二道教徒興惡念請焚經為試驗道經燬佛經全光熾盛耀人天善男女皆生信求出家期現證建十寺安僧尼三寶備始於茲溯源流知宗派宗有十分小大成實宗六代盛高僧傳可為證俱舍宗俱舍宗陳至唐五代後漸微茫此二宗是小乘律小大七大乘禪宗傳心印為禪宗佛拈花迦葉通授阿難為二祖次第承皆可數第十二號馬鳴造起信大乘興十四祖名龍樹入龍宮華嚴遇傳世間法雨澍造諸論施甘露廿八祖達摩尊來東土示性真離文字要親證有慧可得心印傳僧璨為三祖信心銘超今古第四祖名道信知無縛解脫竟五祖忍居黃梅東山上道場恢第六祖名慧能傳衣鉢道大行六祖下二禪師南嶽讓青原思南嶽下一馬駒踏殺人徧寰區青原下一石頭石頭路滑似油分五家派各別臨濟宗行棒喝玄要分賓主別人與境奪不奪溈仰宗示圓相暗機投義海暢曹洞宗傳寶鏡定君臣行正令雲門宗顧鑒咦一字關透者希法眼宗明六相禪與教無兩樣律宗既明宗須知律持五戒本乃立為沙彌持十戒比丘僧具足戒戒二百又五十尼增百戒始足梵網戒制菩薩重有十輕四八律門祖優波離承佛印肅清規先束身次攝心得圓通證道深唐道宣精毘尼大小乘咸總持宋元照繼其後著述多善分剖既明律須研教辨權實判大小天台宗北齊朝有慧文讀中論得其精祖龍樹立三觀空假中歸一貫傳弟子南嶽思止觀法萬世師第三世有智者演教觀判高下藏與通別與圓此四教至今傳談性具善惡兼百界如有三千此一派號天台宗法華佛慧開華嚴經最尊勝初傳來在東晉杜順師是文殊闡華嚴盤走珠第一傳得智儼作搜玄記十卷第二傳是賢首探玄記世希有清涼疏釋新經并作鈔博而精小與始終與頓至於圓五教振四法界十玄門暨六相義最純因該果果徹因攝萬法歸一真圭峰密疏圓覺大鈔詳小鈔略此一派賢首宗亦行布亦圓融慈恩宗唐玄奘遊西域學瑜伽祖彌勒依戒賢大論師親傳授歷年時歸長安傳窺基通因明善三支成唯識作述記破邪宗伸正義有現量有比量究竟依聖教量徧計執依他性二者離圓成證此一宗號慈恩先談相後顯真三論宗三論宗傳最古秦羅什來茲土真空義為第一羣弟子競傳習曰中論曰百論十二門為三論唐吉藏施大功三論疏傳海東法藏釋十二門宗致記至今存密宗善無畏至長安唐一行受真傳作疏釋大日經真言教始得明金剛智及不空接踵來廣流通灌頂法不輕授非法器轉獲咎立禁令自明始祕密宗勅停止晉慧遠住匡廬結蓮社德不孤魏曇鸞修妙觀生品高瑞相現唐道綽暨善導唱專修為妙道此法門三經說大經該小經切觀經語最驚人許五逆得往生三藏教所不攝佛願力誠難測一稱名眾罪滅臨終時佛來接下中上根不齊一句佛同生西既生西皆不退親見佛得授記淨土宗真簡要協時機妙中妙懺法上十宗已說完懺悔法更須探慈悲懺何人集誌公等高僧十梁武帝心至誠度故妻脫蟒形唐悟達有夙業人面瘡生於膝遇神僧為洗冤三昧水澆即痊作水懺後世傳如法行利無邊諸法為學者須知法染與淨善分別五蘊色受想并行識此五蘊本空寂六根眼耳鼻舌身意此六根應須記六塵色聲香味觸法此六塵亦須識十二處前六根與六塵十二處常相親十八界根塵接有六識十八界從此立轉八識成四智末那識為第七阿賴耶第八識八種識為心王轉成智性發光大圓鏡平等性妙觀察成所作此四智一心圓八識轉體用全三身曰法身曰報身曰應身是三身自受用他受用一報身說二用胎生身變化身此二種皆應身約為三開為五相無定隨機覩五眼有肉眼有天眼有慧眼有法眼并佛眼名五眼見所見皆無限六通天眼通天耳通他心通宿命通神境通漏盡通聖與凡各不同四諦曰苦集曰滅道四諦法須尋討十二因緣自無明至老死十二因為緣起順流轉逆還滅當處空無分別六度布施度持戒度忍辱度精進度禪定度智慧度自他苦從此度四無量心慈與悲喜與捨四無量稱聖者涅槃四德曰常樂曰我淨此四德涅槃證十界有情界說六凡三途苦須先論曰地獄曰餓鬼曰畜生苦無比曰天道曰人道曰脩羅樂事少曰聲聞曰緣覺取滅度為獨樂曰菩薩曰如來撫眾生如嬰孩此四聖并六凡為十界一性含器世間既論身須論土土為依身為主四大洲共鐵圍七金山繞須彌為大地風力持水火金不相離水輪含十方界性流動如何載業力持得自在風金摩火現彩菴摩果比閻浮果體圓圓如毬彼上下與四週人與物如何留楞嚴經祕密說善會通不可執日與月繞虛空不墮落誰之功有過去有現在有未來三世改南與北西與東并四維上下通觀十方人在中人居地地居空數此地至大千凡聖居各有緣同居土方便土實報土寂光土分四土自台教前二麤後二妙法性土淨化土染化土分三土賢首教如是說從本源生枝節娑婆界極樂界華藏界及餘界界非界非界界重重涉各無礙勸學學佛者首在信信而解解而行由解行至於證識次第辨邪正宗說通理事融破我執第一功四句離百非遣妄念消真性顯敘述古德古之人行履篤言不誑心不曲守清素如慧開竭盡施不積財自潔者如道林入深山遠女人尊師者如道安服苦役心自甘孝親者如道丕為養母自忍飢父捐軀為報國丕苦求骨躍出高尚者如道恆避榮命入山深感應者如道生石點頭聽講經求通經如靈辨骨肉穿妙義顯冲舉者尼淨檢凌霄去身冉冉神解者李通玄華嚴論千古傳機捷者靈照女老龐公徒延佇舉十德勵初學依此修成正覺餘韻三字偈隨分說如風過萬籟歇非有言非無言會此意是真詮
